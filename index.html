g. God gives commandments but never forces obedience \u2014 the choice is always ours. This section explores how to make choices aligned with God's will."}},Friday:{scripture:"2 Kings 22:1\u20132; 23:1\u20133",summary:"2 Kings 20\u201325: Hezekiah shows Babylon all his treasures \u2014 a mistake. Isaiah says: everything here will be carried to Babylon. Manasseh, Hezekiah's son, is the worst king Judah ever had \u2014 he fills Jerusalem with innocent blood. Josiah is the last good king \u2014 he finds the book of the law and tears his clothes in grief. Jerusalem eventually falls to Babylon.",keyPrinciple:"Josiah found the scriptures and immediately wept and repented and led his entire people in renewal.",reflect:"When did reading the scriptures last move you to genuine action or change?",pray:"Ask God to make the scriptures living and active for you \u2014 not just familiar.",act:"Read one passage slowly today and ask: what does God want me to do because of this?",fsy:{title:"FSY: Living the Gospel",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/12living-the-gospel",note:"Today's reading illustrates what it looks like to live the gospel fully \u2014 or to drift from it. This section describes what it means to be an active disciple in everyday life."}}},resources:[{title:"The Consequences of Bad Choices",url:"https://www.churchofjesuschrist.org/study/general-conference/2015/04/choose-the-right",type:"General Conference",who:"Elder M. Russell Ballard"},{title:"Don't Miss This \u2014 2 Kings 16\u201325",url:"https://www.youtube.com/c/DontMissThis",type:"Podcast",who:"Don't Miss This"}],ywPrep:{summary:"Israel was conquered by Assyria and scattered. Judah lasted longer \u2014 Hezekiah prayed and God held back Assyria. But eventually Judah fell to Babylon. The temple was destroyed. The people were carried away captive. It took generations of warnings before the consequences came. This is a sobering and important section: choices have consequences that outlast individual lifetimes. Yet even in captivity, God promised to return them.",prompts:["Israel and Judah had prophets warning them for generations. Why do people ignore prophets even when they know they're right?","Hezekiah spread his letter before the Lord and prayed specifically. What does his example teach about bringing crisis to God?","The temple was destroyed \u2014 the place where God said He would dwell. What is lost when covenant places and practices are abandoned?","After everything, God still promised to bring His people back. Why does God always leave the door open?"]}},{week:30,dates:"Jul 20\u201326",title:"Set Your Heart to Seek the Lord",ref:"2 Chronicles 14\u201320; 26; 30",theme:"Asa and Jehoshaphat sought the Lord and He delivered impossible odds. Set your heart fully toward Him.",days:{Monday:{scripture:"2 Chronicles 14:11",summary:"2 Chronicles 17\u201320: Jehoshaphat is a good king who removes the high places and sends teachers throughout Judah. Three armies come against him. His response: he proclaims a fast and prays in the temple. God speaks through a prophet: 'Fear not \u2014 the battle is not yours, but God's.' Jehoshaphat sends singers ahead of the army praising God. The enemies destroy each other.",keyPrinciple:"Asa prayed: 'Lord, it is nothing with thee to help, whether with many or with them that have no power.' God is not limited by odds.",reflect:"What impossible situation are you facing where you need to remember that God is not limited by numbers?",pray:"Pray Asa's prayer today. Tell God the odds are nothing to Him.",act:"Stop calculating odds and start calculating God's track record.",fsy:{title:"FSY: Living the Gospel",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/12living-the-gospel",note:"Today's reading illustrates what it looks like to live the gospel fully \u2014 or to drift from it. This section describes what it means to be an active disciple in everyday life."}},Wednesday:{scripture:"2 Chronicles 20:15, 17",summary:"2 Chronicles 20\u201324: The battle of praise and faith \u2014 Jehoshaphat's army goes out singing. When they arrive, they find only dead bodies. No fighting required. Jehoshaphat's mistake: he makes an alliance with wicked Ahaziah. The ships they build together are wrecked. Bad partnerships break good plans.",keyPrinciple:"'The battle is not yours but God's. Stand ye still and see the salvation of the Lord.' They sent singers first.",reflect:"Is there a battle in your life God is asking you to stop fighting and hand over to Him completely?",pray:"Hand one specific battle to God today. Say it out loud.",act:"Write the thing you're fighting. Then write: 'The battle is the Lord's.'",fsy:{title:"FSY: Agency and Integrity",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/04agency-and-integrity",note:"Agency is at the heart of today's reading. God gives commandments but never forces obedience \u2014 the choice is always ours. This section explores how to make choices aligned with God's will."}},Friday:{scripture:"2 Chronicles 30:9",summary:"2 Chronicles 29\u201332; 34\u201336: Hezekiah reopens the temple, cleans it, restores the Levites and the Passover. Josiah discovers the book of the law and weeps. He makes covenant renewal the centerpiece of his reign. Both kings demonstrate that one faithful person can change the spiritual trajectory of a nation \u2014 even briefly.",keyPrinciple:"Hezekiah reinstituted the Passover: 'The Lord your God is gracious and merciful and will not turn away his face from you, if ye return unto him.'",reflect:"What covenant practice or spiritual habit have you let lapse that you want to return to?",pray:"Ask God to restore something spiritually that has gone quiet.",act:"Restart one practice \u2014 scripture study, fasting, journaling \u2014 that you've let go.",fsy:{title:"FSY: Covenant Path",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/02covenant-path",note:"Covenants are the backbone of today's reading. This section explains what it means to be on the covenant path and how every ordinance connects us more deeply to God."}}},resources:[{title:"Seek the Lord While He May Be Found",url:"https://www.churchofjesuschrist.org/study/general-conference/2009/10/seek-the-lord-while-he-may-be-found",type:"General Conference",who:"Elder Richard G. Scott"},{title:"Don't Miss This \u2014 2 Chronicles 14\u201320; 26; 30",url:"https://www.youtube.com/c/DontMissThis",type:"Podcast",who:"Don't Miss This"}],ywPrep:{summary:"2 Chronicles focuses on the kings of Judah who sought the Lord \u2014 Asa, Jehoshaphat, Hezekiah, Josiah. Jehoshaphat faced an impossible army and was told: 'The battle is not yours but God's. Set yourselves, stand ye still, and see the salvation of the Lord.' They fasted, prayed, and then went out singing \u2014 and their enemies destroyed each other. What they set out to fight was already defeated.",prompts:["Jehoshaphat's battle plan was to send singers out first. What does that kind of radical trust look like?","God told them, 'Set yourselves, stand ye still, and see the salvation of the Lord.' When have you had to stand still and watch God work?","The Chronicler focuses on what people sought \u2014 those who sought God flourished, those who didn't fell. What are you actively seeking right now?","Hezekiah reopened the temple and reinstituted the Passover after years of neglect. What in your spiritual life needs to be reopened or renewed?"]}},{week:31,dates:"Jul 27\u2013Aug 2",title:"They Strengthened Their Hands for the Good Work",ref:"Ezra 1; 3\u20137; Nehemiah 2; 4\u20136; 8",theme:"The exiles returned and rebuilt. They worked with one hand and held a sword in the other. The work matters.",days:{Monday:{scripture:"Ezra 3:10\u201313",summary:"Ezra 1\u20136: Cyrus of Persia, fulfilling Isaiah's prophecy by name, issues a decree for the Jews to return to Jerusalem and rebuild the temple. Fifty thousand return. They lay the foundation \u2014 the old men who remember Solomon's temple weep; the young men who have never seen it shout for joy. Enemies oppose the work. The building stops for fifteen years. Then Haggai and Zechariah prophesy and the people build again.",keyPrinciple:"When the foundation of the temple was laid, some wept and some shouted for joy. New beginnings hold both grief and hope.",reflect:"Is there something you're rebuilding right now that holds both grief for what was lost and hope for what's ahead?",pray:"Ask God to give you the courage to begin again, even with tears.",act:"Identify one thing you are in the process of rebuilding and take one small step today.",fsy:{title:"FSY: Giving Service",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/11giving-service",note:"Today's reading features someone who gives more than expected \u2014 or fails to. This section explores why serving others is central to discipleship."}},Wednesday:{scripture:"Nehemiah 4:17\u201318",summary:"Nehemiah 1\u20134: Nehemiah, cupbearer to the Persian king, hears that Jerusalem's walls are broken down. He weeps and fasts for days. He prays and asks the king for permission to rebuild. The king grants it. Nehemiah arrives in Jerusalem at night and surveys the walls alone. Then he organizes the people \u2014 every family rebuilds the section of wall in front of their own house. Enemies mock and threaten. The workers build with one hand and hold a weapon with the other.",keyPrinciple:"They built with one hand and held a sword in the other. Faithful work and spiritual vigilance at the same time.",reflect:"What important work is God asking you to do right now while staying spiritually alert?",pray:"Ask God to give you both focus for the work and awareness of spiritual opposition.",act:"Do something productive today while intentionally staying in prayer about it.",fsy:{title:"FSY: Giving Service",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/11giving-service",note:"Today's reading features someone who gives more than expected \u2014 or fails to. This section explores why serving others is central to discipleship."}},Friday:{scripture:"Nehemiah 8:8\u201310",summary:"Nehemiah 8\u201310: Ezra the priest stands before all the assembled people \u2014 men, women, children old enough to understand \u2014 and reads the law from morning until noon. The people weep as they hear it. Nehemiah, Ezra, and the Levites say: 'This day is holy. Weep not. The joy of the Lord is your strength.' They celebrate the Feast of Tabernacles \u2014 not done since Joshua's day.",keyPrinciple:"Ezra read the law and the people wept. Nehemiah said: the joy of the Lord is your strength. Don't mourn \u2014 rejoice.",reflect:"When did hearing or reading scripture last genuinely move you to tears or deep emotion?",pray:"Ask God to make His word living and powerful for you again \u2014 not just familiar.",act:"Read a passage of scripture today and sit with it until it moves you.",fsy:{title:"FSY: Living the Gospel",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/12living-the-gospel",note:"Today's reading illustrates what it looks like to live the gospel fully \u2014 or to drift from it. This section describes what it means to be an active disciple in everyday life."}}},resources:[{title:"The Work of Nehemiah",url:"https://www.churchofjesuschrist.org/study/ensign/1979/10/nehemiah-man-of-prayer-and-action",type:"Ensign",who:"James E. Talmage"},{title:"Don't Miss This \u2014 Ezra; Nehemiah",url:"https://www.youtube.com/c/DontMissThis",type:"Podcast",who:"Don't Miss This"}],ywPrep:{summary:"The exiles returned to Jerusalem and faced a massive rebuilding project. The temple was rebuilt against opposition. Nehemiah rebuilt the wall in 52 days while enemies mocked and threatened \u2014 the workers built with one hand and held a sword in the other. Ezra read the scriptures to the whole congregation and they wept. The people renewed their covenants. Rebuilding after destruction is possible \u2014 one section at a time.",prompts:["The wall was rebuilt in 52 days despite constant opposition. What in your life is worth that kind of sustained, focused effort?","Nehemiah's people built with one hand and held a sword in the other. What does it mean to work and stay spiritually vigilant at the same time?","Ezra read the law and the people wept. When did hearing scripture last genuinely move you?","The exiles rebuilt specifically \u2014 each family took a section of the wall. What is your section right now?"]}},{week:32,dates:"Aug 3\u20139",title:"Who Knoweth Whether Thou Art Come for Such a Time as This?",ref:"Esther",theme:"Esther was placed in her position for such a time as this. So are you.",days:{Monday:{scripture:"Esther 4:13\u201314",summary:"Esther 1\u20134: Ahasuerus throws a feast and demands his queen Vashti appear before the crowd. She refuses. She is deposed. A search for a new queen leads to Esther \u2014 a Jewish woman who has concealed her identity. Her cousin Mordecai overhears a plot to kill the king and reports it. Haman is promoted and demands everyone bow. Mordecai refuses. Haman plots to destroy all Jews.",keyPrinciple:"'Who knoweth whether thou art come to the kingdom for such a time as this?' You are not in your position by accident.",reflect:"Where do you feel a sense of divine placement right now \u2014 in your family, calling, school, or community?",pray:"Ask God to show you what 'such a time as this' looks like for your specific life.",act:"Write one way your current position uniquely equips you to do something only you can do."},Wednesday:{scripture:"Esther 4:15\u201316",summary:"Esther 4\u20135: Mordecai tells Esther about Haman's plan. She says she cannot go to the king unsummoned \u2014 it could mean death. Mordecai sends back: 'Who knoweth whether thou art come to the kingdom for such a time as this?' Esther asks all Jews to fast for three days. Then she goes to the king. He extends the golden scepter. She is received.",keyPrinciple:"'If I perish, I perish.' Esther committed fully, without guaranteeing the outcome first.",reflect:"Is there something God is asking you to do that you've been waiting for a guarantee before starting?",pray:"Ask God for Esther's kind of all-in commitment.",act:"Take one step toward a thing God has asked that you've been waiting to feel safe about first.",fsy:{title:"FSY: Agency and Integrity",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/04agency-and-integrity",note:"Agency is at the heart of today's reading. God gives commandments but never forces obedience \u2014 the choice is always ours. This section explores how to make choices aligned with God's will."}},Friday:{scripture:"Esther 5:1\u20133",summary:"Esther 6\u201310: Haman has built a gallows for Mordecai. But the king, sleepless, has records read to him and discovers Mordecai was never rewarded for saving his life. Haman arrives to ask permission to hang Mordecai \u2014 and is asked: 'What should be done for a man the king delights to honor?' He thinks the king means him. He is forced to honor Mordecai publicly. The plan unravels. Haman is hanged on his own gallows.",keyPrinciple:"The king held out the golden scepter. Esther found favor. What she risked, God honored.",reflect:"When have you stepped out in faith and found God's favor waiting on the other side?",pray:"Ask God to give you the courage to approach what you've been afraid of.",act:"Do one thing today that requires walking into an uncertain room.",fsy:{title:"FSY: Agency and Integrity",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/04agency-and-integrity",note:"Agency is at the heart of today's reading. God gives commandments but never forces obedience \u2014 the choice is always ours. This section explores how to make choices aligned with God's will."}}},resources:[{title:"For Such a Time as This",url:"https://www.churchofjesuschrist.org/study/general-conference/2014/04/for-such-a-time-as-this",type:"General Conference",who:"Elder Michael T. Ringwood"},{title:"Don't Miss This \u2014 Esther",url:"https://www.youtube.com/c/DontMissThis",type:"Podcast",who:"Don't Miss This"},{title:"FSY: Agency and Integrity",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/04agency-and-integrity",type:"FSY Handbook",who:"For the Strength of Youth"}],ywPrep:{summary:"Esther was a Jewish girl who became queen in Persia. When an order came to destroy all Jews, her cousin Mordecai told her: 'Who knoweth whether thou art come to the kingdom for such a time as this?' Esther fasted three days, went to the king uninvited \u2014 at the risk of her life \u2014 and saved her people. Her bravery was preceded by fasting, community, and clarity of purpose.",prompts:["Mordecai told Esther she was placed in her position for such a time as this. Where do you feel that kind of divine placement right now?","Esther said, 'If I perish, I perish.' What would it look like to commit fully to something God is asking regardless of the cost?","Esther fasted and asked others to fast with her before she acted. What does that preparation teach about courage?","Who is your Mordecai \u2014 someone who tells you hard truths and pushes you toward your purpose?"]}},{week:33,dates:"Aug 10\u201316",title:"I Know That My Redeemer Liveth",ref:"Job 1\u20133; 12\u201314; 19; 21\u201324; 38\u201340; 42",theme:"Job suffered without explanation. In the darkest moment he declared: I know that my Redeemer lives.",days:{Monday:{scripture:"Job 1:20\u201322",summary:"Job 1\u20133; 12\u201314: Job is blameless and upright. Satan challenges God: 'Does Job serve you for nothing? Remove your blessing and he will curse you.' God allows Satan to test Job. In one day Job loses everything \u2014 his flocks, his children, his health. He tears his clothes and shaves his head: 'The Lord gave, and the Lord hath taken away; blessed be the name of the Lord.' Three friends come and sit with him in silence for seven days.",keyPrinciple:"Job lost everything and said: the Lord gave, the Lord has taken away \u2014 blessed be the name of the Lord. This is faith.",reflect:"Is there something you are holding so tightly that losing it would shatter you?",pray:"Surrender one precious thing to God \u2014 not literally but in your heart.",act:"Write what you would still have if you lost everything material.",fsy:{title:"FSY: Living the Gospel",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/12living-the-gospel",note:"Today's reading illustrates what it looks like to live the gospel fully \u2014 or to drift from it. This section describes what it means to be an active disciple in everyday life."}},Wednesday:{scripture:"Job 19:25\u201327",summary:"Job 19; 21\u201324: Job debates with his friends who insist his suffering must be punishment for sin. Job refuses to accept this. He cries out: 'My friends scorn me; mine eye poureth out tears unto God.' Then the great declaration: 'I know that my redeemer liveth, and that he shall stand at the latter day upon the earth... yet in my flesh shall I see God.' Hope in the midst of deepest suffering.",keyPrinciple:"'I know that my Redeemer liveth, and that he shall stand at the latter day upon the earth.' Faith in the darkest night.",reflect:"In your darkest moment, what is the most foundational thing you know?",pray:"Declare your 'I know' \u2014 the thing that holds when everything else is gone.",act:"Write your personal 'I know that my Redeemer liveth' statement.",fsy:{title:"FSY: Covenant Path",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/02covenant-path",note:"Covenants are the backbone of today's reading. This section explains what it means to be on the covenant path and how every ordinance connects us more deeply to God."}},Friday:{scripture:"Job 38:4\u20137",summary:"Job 38\u201342: God speaks to Job from a whirlwind. Not with answers \u2014 with questions. 'Where wast thou when I laid the foundations of the earth?' God recites the wonders of creation for four chapters. Job is not rebuked \u2014 he is expanded. His perspective is too small. God restores everything double. God tells the three friends they were wrong \u2014 Job spoke truth about God.",keyPrinciple:"God answered Job: where were you when I laid the foundations of the earth? God is bigger than our understanding.",reflect:"How does remembering God's vastness \u2014 and your smallness \u2014 bring comfort rather than terror?",pray:"Worship God for being beyond your comprehension. Rest in His bigness.",act:"Read Job 38\u201339 and write three things that humble and comfort you simultaneously.",fsy:{title:"FSY: Living the Gospel",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/12living-the-gospel",note:"Today's reading illustrates what it looks like to live the gospel fully \u2014 or to drift from it. This section describes what it means to be an active disciple in everyday life."}}},resources:[{title:"Where Justice, Love, and Mercy Meet",url:"https://www.churchofjesuschrist.org/study/general-conference/2015/04/where-justice-love-and-mercy-meet",type:"General Conference",who:"Elder Jeffrey R. Holland"},{title:"Don't Miss This \u2014 Job",url:"https://www.youtube.com/c/DontMissThis",type:"Podcast",who:"Don't Miss This"},{title:"Why Bad Things Happen to Good People",url:"https://www.saintsunscripted.com",type:"Podcast",who:"Saints Unscripted"}],ywPrep:{summary:"Job lost everything \u2014 his children, his health, his wealth. His friends offered theological explanations. God showed up in a whirlwind and asked: where were you when I laid the foundations of the earth? Job didn't get an explanation \u2014 he got God's presence. And it was enough. 'I know that my Redeemer liveth.'",prompts:["Job suffered without knowing the spiritual context. How do you handle suffering without explanation?","Job's friends offered theological answers to his pain. How do you comfort someone without doing that?","Job declared 'I know that my Redeemer lives' in the middle of his worst suffering. How did he hold that faith?","God answered Job from a whirlwind with questions, not answers. Why would God's response be questions rather than explanations?"]}},{week:34,dates:"Aug 17\u201323",title:"The Lord Is My Shepherd",ref:"Psalms 1\u20132; 8; 19\u201333; 40; 46",theme:"The Lord is my shepherd. Even in the valley of the shadow of death, He is with us.",days:{Monday:{scripture:"Psalm 23",summary:"Psalms 22\u201323; 27; 46: Psalm 22 opens: 'My God, my God, why hast thou forsaken me?' \u2014 words Christ will speak on the cross. It becomes a song of trust. Psalm 23: 'The Lord is my shepherd. I shall not want.' The valley of the shadow of death is real \u2014 but God is present. Psalm 46: 'God is our refuge and strength. Be still and know that I am God.'",keyPrinciple:"The Lord is my shepherd. He restores my soul. Even in the valley of the shadow of death, thou art with me.",reflect:"Which part of Psalm 23 do you most need today \u2014 green pastures, still waters, or presence in the valley?",pray:"Pray Psalm 23 slowly as your own prayer.",act:"Memorize one verse of Psalm 23 today.",fsy:{title:"FSY: Living the Gospel",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/12living-the-gospel",note:"Today's reading illustrates what it looks like to live the gospel fully \u2014 or to drift from it. This section describes what it means to be an active disciple in everyday life."}},Wednesday:{scripture:"Psalm 27:1, 14",summary:"Psalms 19\u201333: The heavens declare the glory of God \u2014 all creation is a sermon. Psalm 22 anticipates Christ's suffering in detail: they divided my garments, they cast lots. Psalm 24: 'Who shall ascend into the hill of the Lord? He that hath clean hands and a pure heart.' Psalm 32: 'Blessed is he whose transgression is forgiven, whose sin is covered.'",keyPrinciple:"The Lord is my light and my salvation \u2014 whom shall I fear? Wait on the Lord.",reflect:"What are you afraid of right now? What would it mean for the Lord to be your light in that fear?",pray:"Pray Psalm 27:1 as your declaration.",act:"Wait on the Lord for one thing today instead of solving it yourself.",fsy:{title:"FSY: Physical Health",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/08physical-health",note:"Today's reading involves the physical body \u2014 its limits or miraculous capacity. This section teaches that the body is sacred and how we treat it reflects what we believe."}},Friday:{scripture:"Psalm 46:1\u20133, 10",summary:"Psalms 90\u2013103; 110: Psalm 90 is Moses's psalm \u2014 'Lord, thou hast been our dwelling place in all generations.' A thousand years are as a watch in the night. Psalm 91: 'He shall cover thee with his feathers; under his wings shalt thou trust.' Psalm 100: 'Make a joyful noise unto the Lord, all ye lands.' Psalm 103: 'Bless the Lord, O my soul, and forget not all his benefits.'",keyPrinciple:"God is our refuge and strength \u2014 a very present help in trouble. Be still and know that I am God.",reflect:"What would it look like to be truly still before God today?",pray:"Be still. Sit for five minutes. Let God be God.",act:"Identify one area of your life where you need to stop striving and be still.",fsy:{title:"FSY: Living the Gospel",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/12living-the-gospel",note:"Today's reading illustrates what it looks like to live the gospel fully \u2014 or to drift from it. This section describes what it means to be an active disciple in everyday life."}}},resources:[{title:"The Lord Is My Shepherd",url:"https://www.churchofjesuschrist.org/study/general-conference/2022/10/51cook",type:"General Conference",who:"Elder Quentin L. Cook"},{title:"Don't Miss This \u2014 Psalms 1\u201333; 40; 46",url:"https://www.youtube.com/c/DontMissThis",type:"Podcast",who:"Don't Miss This"}],ywPrep:{summary:"The Psalms are Israel's prayer book \u2014 songs of lament, praise, trust, and longing. Psalm 23: the Lord is my shepherd. Psalm 22: 'My God, my God, why hast thou forsaken me?' \u2014 Jesus quoted this from the cross. Psalm 8: 'What is man that thou art mindful of him?' Every human emotion is in the Psalms, brought honestly to God.",prompts:["Which Psalm has meant the most to you in your life? What was happening when you found it?","Psalm 22 begins with abandonment \u2014 Jesus quoted it on the cross. What does it mean that Christ lived this psalm?","Psalm 8 asks: 'What is man that thou art mindful of him?' How would you answer that question?","The Psalms model bringing every emotion to God honestly. Which emotion do you most need to bring to Him right now?"]}},{week:35,dates:"Aug 24\u201330",title:"Create in Me a Clean Heart",ref:"Psalms 49\u201351; 61\u201366; 69\u201372; 77\u201378; 85\u201386",theme:"Create in me a clean heart. God is the one who restores what sin has broken.",days:{Monday:{scripture:"Psalm 51:1\u20134, 10",summary:"Psalm 51: David's great prayer of repentance after Nathan confronted him about Bathsheba. 'Have mercy upon me, O God, according to thy lovingkindness.' 'Create in me a clean heart, O God, and renew a right spirit within me.' 'Cast me not away from thy presence, and take not thy holy spirit from me.' The most honest, raw prayer of repentance in scripture.",keyPrinciple:"Create in me a clean heart, O God. David's repentance was raw, specific, and complete. This is how we come back.",reflect:"Is there a Psalm 51 prayer you need to pray right now?",pray:"Pray Psalm 51:1\u201310 as your own prayer. Make it personal.",act:"Read Psalm 51 slowly, out loud, as if it's your own words.",fsy:{title:"FSY: Repentance and Forgiveness",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/05repentance-and-forgiveness",note:"Today's reading shows someone facing consequences of sin \u2014 or being given a second chance. This FSY section teaches that repentance is always available and God's mercy can cover any mistake."}},Wednesday:{scripture:"Psalm 63:1\u20133",summary:"Psalms 62\u201372; 84\u201386: Psalm 62: 'My soul waiteth only upon God; my expectation is from him.' Psalm 63: 'O God, thou art my God; early will I seek thee. My soul thirsteth for thee in a dry and thirsty land where no water is.' Psalm 84: 'How amiable are thy tabernacles, O Lord of hosts. A day in thy courts is better than a thousand elsewhere.'",keyPrinciple:"My soul thirsteth for thee, my flesh longeth for thee in a dry and thirsty land. Spiritual thirst is real.",reflect:"When have you felt spiritually dry and thirsting for God?",pray:"Come to God with your thirst. Don't pretend to be full when you're not.",act:"Identify what you most thirst for spiritually right now. Name it to God.",fsy:{title:"FSY: Living the Gospel",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/12living-the-gospel",note:"Today's reading illustrates what it looks like to live the gospel fully \u2014 or to drift from it. This section describes what it means to be an active disciple in everyday life."}},Friday:{scripture:"Psalm 77:2\u20133, 11\u201312",summary:"Psalms 107\u2013119: Psalm 107: 'O give thanks unto the Lord, for he is good. Those who went down to the sea in ships, who do business in great waters \u2014 these saw the works of the Lord.' Psalm 119 \u2014 the longest chapter in the Bible, 176 verses, all about loving God's word. 'Thy word is a lamp unto my feet and a light unto my path.'",keyPrinciple:"I remembered God and was troubled \u2014 and then I remembered His works. Memory of God's faithfulness restores hope.",reflect:"What do you remember about God's past faithfulness that gives you hope for right now?",pray:"Rehearse God's past works in your prayer today. Name them specifically.",act:"Write five specific times God came through for you. Read them when trouble hits.",fsy:{title:"FSY: Living the Gospel",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/12living-the-gospel",note:"Today's reading illustrates what it looks like to live the gospel fully \u2014 or to drift from it. This section describes what it means to be an active disciple in everyday life."}}},resources:[{title:"Create in Me a Clean Heart",url:"https://www.churchofjesuschrist.org/study/general-conference/2012/10/create-in-me-a-clean-heart",type:"General Conference",who:"Elder Scott D. Whiting"},{title:"Don't Miss This \u2014 Psalms 49\u201386",url:"https://www.youtube.com/c/DontMissThis",type:"Podcast",who:"Don't Miss This"}],ywPrep:{summary:"Psalms 49\u201386 contain some of the most honest prayers in scripture. Psalm 51 is David's repentance after Bathsheba \u2014 'Create in me a clean heart.' Psalm 63: 'My soul thirsteth for thee.' Psalm 77: 'I remembered God and was troubled.' Psalm 86: 'Teach me thy way, O Lord.' The psalmists never pretended.",prompts:["Psalm 51 is raw repentance. What makes it so powerful and honest?","Psalm 63 says: my soul thirsts for thee in a dry and thirsty land. When have you felt spiritually thirsty?","Psalm 77 says, 'I remembered God and was troubled.' When has remembering God actually increased your struggle before it brought comfort?","Psalm 86:11 says: 'Unite my heart to fear thy name.' What does a united heart look like versus a divided one?"]}},{week:36,dates:"Aug 31\u2013Sep 6",title:"I Will Praise the Lord",ref:"Psalms 102\u2013103; 110; 116\u2013119; 127\u2013128; 135\u2013139; 146\u2013150",theme:"Praise is an act of faith. Bless the Lord at all times \u2014 not just when life is good.",days:{Monday:{scripture:"Psalm 103:1\u20135",summary:"Psalms 103\u2013106; 110: Psalm 103: 'Bless the Lord, O my soul, who forgiveth all thine iniquities, who healeth all thy diseases, who redeemeth thy life from destruction, who crowneth thee with lovingkindness and tender mercies.' Psalm 110 is the most quoted psalm in the New Testament \u2014 a messianic prophecy about the Lord sitting at God's right hand.",keyPrinciple:"Bless the Lord, O my soul \u2014 and forget not all His benefits. Gratitude requires intentional remembering.",reflect:"What specific benefits of God have you been forgetting to notice lately?",pray:"Bless the Lord specifically \u2014 list His benefits out loud in prayer.",act:"Write ten specific things God has done for you in the last year.",fsy:{title:"FSY: Sabbath Day",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/06sabbath-day",note:"Today's reading touches on sacred time, rest, or covenant renewal. This section explains why God asks us to set aside one day \u2014 and what that day is really for."}},Wednesday:{scripture:"Psalm 118:22\u201324",summary:"Psalms 116\u2013119; 127\u2013128: Psalm 116: 'I love the Lord because he hath heard my voice. The Lord is gracious and righteous; our God is merciful.' Psalm 127: 'Except the Lord build the house, they labour in vain that build it.' Psalm 128: 'Blessed is every one that feareth the Lord. Thy wife shall be as a fruitful vine by the sides of thine house.'",keyPrinciple:"The stone the builders rejected has become the chief cornerstone. This is the day the Lord has made.",reflect:"Where in your life has something rejected or discarded become the foundation of something good?",pray:"Thank God for turning what was rejected into something foundational in your life.",act:"Rejoice in this specific day. Name three things about today that are from God.",fsy:{title:"FSY: Living the Gospel",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/12living-the-gospel",note:"Today's reading illustrates what it looks like to live the gospel fully \u2014 or to drift from it. This section describes what it means to be an active disciple in everyday life."}},Friday:{scripture:"Psalm 127:1\u20132",summary:"Psalms 135\u2013150: The great hymns of praise. Psalm 136: 'O give thanks unto the Lord, for he is good \u2014 for his mercy endureth forever' \u2014 repeated 26 times. Psalm 145: 'The Lord is gracious and full of compassion, slow to anger and of great mercy.' Psalm 148: 'Praise him, sun and moon, praise him, all ye stars of light.' Psalm 150: 'Let every thing that hath breath praise the Lord.'",keyPrinciple:"Except the Lord build the house, they labour in vain. All the striving, all the building \u2014 it's empty without Him.",reflect:"What are you building right now that you need to make sure the Lord is building with you?",pray:"Give God your current project \u2014 work, family, calling \u2014 and ask Him to build with you.",act:"Identify one area where you have been laboring in your own strength without inviting God in.",fsy:{title:"FSY: Living the Gospel",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/12living-the-gospel",note:"Today's reading illustrates what it looks like to live the gospel fully \u2014 or to drift from it. This section describes what it means to be an active disciple in everyday life."}}},resources:[{title:"Praise to the Lord, the Almighty",url:"https://www.churchofjesuschrist.org/study/general-conference/2017/04/praise-to-the-lord-the-almighty",type:"General Conference",who:"President Henry B. Eyring"},{title:"Don't Miss This \u2014 Psalms 102\u2013150",url:"https://www.youtube.com/c/DontMissThis",type:"Podcast",who:"Don't Miss This"}],ywPrep:{summary:"The final Psalms section \u2014 Psalms 102\u2013150 \u2014 includes the great praise psalms. Psalm 103: 'Bless the Lord, O my soul.' Psalm 110: 'The Lord said unto my Lord, Sit thou at my right hand' \u2014 Jesus quoted this. Psalm 118: 'This is the day which the Lord hath made.' Psalm 150: 'Let every thing that hath breath praise the Lord.' Praise is an act of faith.",prompts:["Psalm 103 lists specific reasons to bless the Lord. What are your specific reasons right now?","Psalm 110 is the most quoted OT psalm in the New Testament \u2014 Jesus and the apostles saw Christ in it. What do you see?","Psalm 118:22 says the stone the builders rejected is the chief cornerstone \u2014 Jesus quoted this about Himself. How does rejection become cornerstone?","Psalm 150 says let everything that has breath praise the Lord. What does it mean to praise with your actual life?"]}},{week:37,dates:"Sep 7\u201313",title:"Fear God and Keep His Commandments",ref:"Proverbs 1\u20134; 15\u201316; 22; 31; Ecclesiastes 1\u20133; 11\u201312",theme:"Trust in the Lord with all your heart, lean not on your own understanding. Fear God \u2014 this is the whole duty of man.",days:{Monday:{scripture:"Proverbs 3:5\u20137",summary:"Proverbs 1\u20139: Wisdom is personified as a woman crying in the streets \u2014 'How long will you love simplicity?' The first nine chapters are a father's extended address to his son about wisdom, discipline, and avoiding foolish choices. 'Trust in the Lord with all thine heart and lean not unto thine own understanding.' The fear of the Lord is the beginning of wisdom.",keyPrinciple:"Trust in the Lord with all your heart. Lean not on your own understanding. In all your ways acknowledge Him.",reflect:"Where is your own understanding currently competing with God's direction?",pray:"Surrender your understanding about one specific decision to God.",act:"Make one decision today by asking God first instead of figuring it out yourself.",fsy:{title:"FSY: Education and Learning",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/10education-and-learning",note:"Today's reading features wisdom or the cost of ignoring instruction. This section encourages learning as a lifelong spiritual discipline."}},Wednesday:{scripture:"Proverbs 31:25\u201326, 30",summary:"Proverbs 31: The virtuous woman \u2014 a poem in the original Hebrew that forms an acrostic using every letter of the alphabet. She rises while it is still night. She plants a vineyard with her own hands. She extends her hands to the poor. Her husband is known in the gates. Strength and honor are her clothing. She shall rejoice in time to come.",keyPrinciple:"Strength and honour are her clothing. She speaketh with wisdom. Favour is deceitful, beauty is vain \u2014 a woman that feareth the Lord shall be praised.",reflect:"Which qualities of the Proverbs 31 woman do you most want to cultivate?",pray:"Ask God to develop in you the character of a woman who fears Him.",act:"Pick one quality from Proverbs 31 and intentionally practice it today.",fsy:{title:"FSY: Relationships",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/06relationships",note:"Today's reading involves a key relationship between people or between a person and God. This FSY section explores what healthy, God-centered relationships look like."}},Friday:{scripture:"Ecclesiastes 3:1\u20134",summary:"Ecclesiastes 1\u201312: Qoheleth \u2014 the Preacher \u2014 has tried everything: wisdom, pleasure, work, wealth. Vanity of vanities. The Preacher's conclusion after searching everywhere: 'Fear God and keep his commandments, for this is the whole duty of man. God will bring every deed into judgment.' Everything else is chasing after wind.",keyPrinciple:"To everything there is a season \u2014 a time for every purpose under heaven. God ordains the rhythms of life.",reflect:"What season are you in right now? What does that season require of you?",pray:"Ask God to help you be present in your current season rather than wishing for another.",act:"Name your current season and write one thing God might be doing in it.",fsy:{title:"FSY: Living the Gospel",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/12living-the-gospel",note:"Today's reading illustrates what it looks like to live the gospel fully \u2014 or to drift from it. This section describes what it means to be an active disciple in everyday life."}}},resources:[{title:"Becoming a Disciple of Jesus Christ",url:"https://www.churchofjesuschrist.org/study/general-conference/2017/10/becoming-a-disciple-of-jesus-christ",type:"General Conference",who:"Elder Brian K. Taylor"},{title:"Don't Miss This \u2014 Proverbs; Ecclesiastes",url:"https://www.youtube.com/c/DontMissThis",type:"Podcast",who:"Don't Miss This"}],ywPrep:{summary:"Proverbs is wisdom literature \u2014 practical teaching for daily life. 'Trust in the Lord with all your heart, lean not on your own understanding.' 'A soft answer turneth away wrath.' 'Train up a child in the way he should go.' Ecclesiastes asks what gives life meaning and concludes: fear God and keep His commandments \u2014 this is the whole duty of man.",prompts:["Proverbs 3:5\u20136: trust in the Lord with all your heart, lean not on your own understanding. Where are you leaning on your own understanding right now?","Proverbs 31 describes a woman of valor. Which characteristics stand out to you?","Ecclesiastes calls most pursuits 'vanity.' What does it mean that so much of what we chase is ultimately empty?","'Fear God and keep His commandments \u2014 this is the whole duty of man.' How does that simplify life?"]}},{week:38,dates:"Sep 14\u201320",title:"Come Now, and Let Us Reason Together",ref:"Isaiah 1\u201312",theme:"Isaiah saw Christ more clearly than almost anyone. Though your sins be as scarlet, they shall be white as snow.",days:{Monday:{scripture:"Isaiah 1:18",summary:"Isaiah 1\u20135: Isaiah begins with a devastating indictment of Israel \u2014 a nation that has rebelled, a people laden with iniquity, children who have forsaken the Lord. 'Come now, let us reason together, saith the Lord: though your sins be as scarlet, they shall be as white as snow.' But Israel continues chasing idols. The vineyard song: God planted Israel as a choice vine. Why did it bring forth wild grapes?",keyPrinciple:"Come now, let us reason together: though your sins be as scarlet, they shall be as white as snow. God invites dialogue.",reflect:"What does it mean to reason together with God rather than just confess to Him?",pray:"Have a real conversation with God today \u2014 not just a list of requests.",act:"Write a letter to God reasoning through something you are struggling with.",fsy:{title:"FSY: Covenant Path",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/02covenant-path",note:"Covenants are the backbone of today's reading. This section explains what it means to be on the covenant path and how every ordinance connects us more deeply to God."}},Wednesday:{scripture:"Isaiah 6:1\u20138",summary:"Isaiah 6: Isaiah's call. He sees the Lord on a throne, high and lifted up. Seraphim surround the throne crying 'Holy, holy, holy.' Isaiah says: 'Woe is me! I am a man of unclean lips.' A seraph flies to him with a coal from the altar and touches his mouth \u2014 'Thine iniquity is taken away.' Then God says: 'Whom shall I send?' Isaiah: 'Here am I; send me.'",keyPrinciple:"Isaiah saw God, felt completely undone, was cleansed, and immediately volunteered. Repentance leads to readiness.",reflect:"When have you felt most aware of your own unworthiness \u2014 and what did God do with that?",pray:"Ask God to cleanse one specific thing in your life and make you ready.",act:"Say 'Here am I, send me' as a prayer of genuine availability today.",fsy:{title:"FSY: Agency and Integrity",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/04agency-and-integrity",note:"Agency is at the heart of today's reading. God gives commandments but never forces obedience \u2014 the choice is always ours. This section explores how to make choices aligned with God's will."}},Friday:{scripture:"Isaiah 9:6\u20137",summary:"Isaiah 9\u201312: Isaiah prophesies of a child who will be born \u2014 'Wonderful, Counsellor, the Mighty God, the Everlasting Father, the Prince of Peace.' His government shall know no end. Then Isaiah 11: a shoot from the stump of Jesse \u2014 the Messiah. 'He shall not judge after the sight of his eyes.' The wolf shall lie down with the lamb. Isaiah 12: 'With joy shall ye draw water out of the wells of salvation.'",keyPrinciple:"Wonderful Counselor, Mighty God, Everlasting Father, Prince of Peace. Isaiah described Christ seven centuries early.",reflect:"Which title for Christ do you need most right now?",pray:"Address God by the name you most need today. Let that name shape your prayer.",act:"Study one of Isaiah's four titles for Christ and what it means for you personally.",fsy:{title:"FSY: Covenant Path",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/02covenant-path",note:"Covenants are the backbone of today's reading. This section explains what it means to be on the covenant path and how every ordinance connects us more deeply to God."}}},resources:[{title:"Come Unto Me",url:"https://www.churchofjesuschrist.org/study/general-conference/2016/04/come-unto-me",type:"General Conference",who:"Elder Robert D. Hales"},{title:"Don't Miss This \u2014 Isaiah 1\u201312",url:"https://www.youtube.com/c/DontMissThis",type:"Podcast",who:"Don't Miss This"},{title:"Isaiah for Latter-day Saints",url:"https://www.saintsunscripted.com",type:"Podcast",who:"Saints Unscripted"}],ywPrep:{summary:"Isaiah is the most quoted Old Testament prophet in the New Testament and by Jesus Himself. His first chapters call Israel to reason with God: 'Though your sins be as scarlet, they shall be as white as snow.' He saw the Savior's ministry centuries before it happened. Isaiah 6: he saw God's glory, felt undone, was cleansed with a coal, and said 'Here am I, send me.'",prompts:["Isaiah 1:18: 'Though your sins be as scarlet, they shall be as white as snow.' What does that imagery mean to you?","Isaiah saw the Lord and said 'I am undone' \u2014 then was cleansed. What does that pattern teach about repentance?","Isaiah said 'Here am I, send me.' What is God sending you to do right now?","Isaiah 9:6 names Christ Wonderful Counselor, Mighty God, Everlasting Father, Prince of Peace. Which title means most to you?"]}},{week:39,dates:"Sep 21\u201327",title:"God Is My Salvation",ref:"Isaiah 13\u201314; 22; 24\u201330; 35",theme:"God is my salvation \u2014 I will trust and not be afraid. The wilderness shall rejoice and blossom.",days:{Monday:{scripture:"Isaiah 12:2",summary:"Isaiah 13\u201314; 24\u201328: Isaiah's oracles against Babylon, Assyria, and the nations. Then apocalyptic visions \u2014 the earth will be shaken, the moon will be ashamed. But in the midst of judgment: 'Thou wilt keep him in perfect peace whose mind is stayed on thee.' Isaiah 25: 'He will swallow up death in victory. The Lord God will wipe away tears from all faces.'",keyPrinciple:"God is my salvation; I will trust and not be afraid. The Lord Jehovah is my strength and my song.",reflect:"When you are afraid, what do you return to? What is your song?",pray:"Sing or speak Isaiah 12:2 as your declaration today.",act:"Write your own short declaration of trust based on Isaiah 12:2.",fsy:{title:"FSY: Covenant Path",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/02covenant-path",note:"Covenants are the backbone of today's reading. This section explains what it means to be on the covenant path and how every ordinance connects us more deeply to God."}},Wednesday:{scripture:"Isaiah 26:3\u20134",summary:"Isaiah 29\u201333: Woe to those who hide their plans from God. 'Ye have said: we have made a covenant with death, and with hell we have agreement.' God mocks their false security. Then promises: the blind shall see, the deaf shall hear, the lame shall leap. 'In quietness and in confidence shall be your strength. Return unto me, for I have redeemed thee.'",keyPrinciple:"Thou wilt keep him in perfect peace whose mind is stayed on thee. Peace is a product of where your mind rests.",reflect:"Where does your mind go when you are anxious? What does staying it on God look like practically?",pray:"Practice redirecting your mind to God every time anxiety rises today.",act:"Set a reminder three times today: mind stayed on God.",fsy:{title:"FSY: Physical Health",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/08physical-health",note:"Today's reading involves the physical body \u2014 its limits or miraculous capacity. This section teaches that the body is sacred and how we treat it reflects what we believe."}},Friday:{scripture:"Isaiah 35:1\u20134",summary:"Isaiah 35: A vision of the redeemed. 'The wilderness and the solitary place shall be glad for them. The desert shall rejoice and blossom as the rose.' Then: 'The eyes of the blind shall be opened, the ears of the deaf shall be unstopped. The lame shall leap as a hart, the tongue of the dumb shall sing.' And the ransomed of the Lord shall return with songs and everlasting joy.",keyPrinciple:"The wilderness shall blossom as a rose. Desolation becomes garden. God specializes in reversals.",reflect:"What is the wilderness in your life that you are trusting God to blossom?",pray:"Ask God for one specific blossoming \u2014 a reversal of something desolate.",act:"Plant something today \u2014 literally or figuratively \u2014 as an act of faith in future growth.",fsy:{title:"FSY: Living the Gospel",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/12living-the-gospel",note:"Today's reading illustrates what it looks like to live the gospel fully \u2014 or to drift from it. This section describes what it means to be an active disciple in everyday life."}}},resources:[{title:"God Is My Salvation",url:"https://www.churchofjesuschrist.org/study/general-conference/2016/10/god-is-my-salvation",type:"General Conference",who:"Elder Wilford W. Andersen"},{title:"Don't Miss This \u2014 Isaiah 13\u201314; 24\u201330; 35",url:"https://www.youtube.com/c/DontMissThis",type:"Podcast",who:"Don't Miss This"}],ywPrep:{summary:"Isaiah 13\u201335 moves between warnings of judgment on wicked nations and beautiful promises of redemption. 'Thou wilt keep him in perfect peace, whose mind is stayed on thee.' The desert shall blossom as the rose. God turning wastelands into gardens. Amid the dark passages, Isaiah keeps returning to light.",prompts:["Isaiah 26:3 promises perfect peace to those whose minds are stayed on God. What does keeping your mind stayed on God look like practically?","Isaiah 35 describes the desert blossoming. What desolation in your life do you hope God will blossom?","Isaiah 12:2: 'God is my salvation; I will trust and not be afraid.' What fear do you need to hand to Him today?","Isaiah 25:8: God will swallow up death in victory and wipe away all tears. What tears do you most need Him to wipe away?"]}},{week:40,dates:"Sep 28\u2013Oct 4",title:"Comfort Ye My People",ref:"Isaiah 40\u201349",theme:"Comfort ye. They that wait upon the Lord shall renew their strength. Fear not \u2014 I have called thee by name.",days:{Monday:{scripture:"Isaiah 40:1, 11, 29\u201331",summary:"Isaiah 40\u201344: The great comfort chapters. 'Comfort ye, comfort ye my people, saith your God.' 'He that waiteth upon the Lord shall renew their strength. They shall mount up with wings as eagles, they shall run and not be weary.' Then God names Cyrus \u2014 by name, a century before his birth \u2014 as the one who will give permission for Israel to return from exile. 'Fear not, for I have redeemed thee; I have called thee by name; thou art mine.'",keyPrinciple:"Comfort ye. God feeds His flock like a shepherd. He gives strength to the weary who wait on Him.",reflect:"Which part do you need most today \u2014 comfort, gentle shepherding, or strength for the weary?",pray:"Receive God's specific comfort for what you are carrying today.",act:"Rest in Isaiah 40 for fifteen minutes. Read it slowly. Let it be enough.",fsy:{title:"FSY: Living the Gospel",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/12living-the-gospel",note:"Today's reading illustrates what it looks like to live the gospel fully \u2014 or to drift from it. This section describes what it means to be an active disciple in everyday life."}},Wednesday:{scripture:"Isaiah 43:1\u20134",summary:"Isaiah 43\u201346: God says: 'I, even I, am he that blotteth out thy transgressions for mine own sake, and will not remember thy sins.' Then lists of false gods that cannot see, hear, or save \u2014 they are carried, unable to move. But God says: 'Before me no god was formed, neither shall there be after me. I, even I, am the Lord; and beside me there is no saviour.'",keyPrinciple:"Fear not, I have called thee by thy name. Thou art mine. When thou passest through waters, I will be with thee.",reflect:"What waters \u2014 flood, fire, hard place \u2014 are you passing through right now?",pray:"Receive God's declaration: Thou art mine. Let it settle in your heart.",act:"Write Isaiah 43:2\u20133 with your own name inserted into it.",fsy:{title:"FSY: Covenant Path",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/02covenant-path",note:"Covenants are the backbone of today's reading. This section explains what it means to be on the covenant path and how every ordinance connects us more deeply to God."}},Friday:{scripture:"Isaiah 44:22; 43:25",summary:"Isaiah 47\u201349: The fall of Babylon \u2014 she sat as a queen, she thought she would be a lady forever. Then God speaks to scattered Israel: 'Can a woman forget her sucking child? Yea, she may forget, yet will I not forget thee. Behold, I have graven thee upon the palms of my hands.' Your name is written on God's hands.",keyPrinciple:"I have blotted out thy transgressions as a thick cloud. Return unto me, for I have redeemed thee.",reflect:"What sin or shame have you been carrying that God says He has blotted out like a cloud?",pray:"Receive God's forgiveness today. Stop carrying what He has already removed.",act:"Write one burden of shame that God says He has already erased. Then cross it out.",fsy:{title:"FSY: Repentance and Forgiveness",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/05repentance-and-forgiveness",note:"Today's reading shows someone facing consequences of sin \u2014 or being given a second chance. This FSY section teaches that repentance is always available and God's mercy can cover any mistake."}}},resources:[{title:"Waiting on the Road to Damascus",url:"https://www.churchofjesuschrist.org/study/general-conference/2011/04/waiting-on-the-road-to-damascus",type:"General Conference",who:"President Dieter F. Uchtdorf"},{title:"Don't Miss This \u2014 Isaiah 40\u201349",url:"https://www.youtube.com/c/DontMissThis",type:"Podcast",who:"Don't Miss This"}],ywPrep:{summary:"Isaiah 40\u201349 \u2014 often called Deutero-Isaiah \u2014 contains the most beautiful promises in scripture. 'Comfort ye, comfort ye my people.' 'They that wait upon the Lord shall renew their strength.' 'Fear not \u2014 I have called thee by name; thou art mine.' These chapters were written to people in captivity who needed to know God had not forgotten them.",prompts:["Isaiah 40:28\u201331 promises strength to the weary. Where are you weary? What does waiting upon the Lord look like for you?","Isaiah 40:11 says God will gently lead those that are with young. What does God's gentleness with you look like right now?","Isaiah 43:1\u20133 says God calls us by name and we are His. What does being called by name change?","Isaiah 43:25: 'I, even I, am he that blotteth out thy transgressions, for mine own sake.' Why does God forgive for His own sake?"]}},{week:41,dates:"Oct 5\u201311",title:"He Was Wounded for Our Transgressions",ref:"Isaiah 50\u201357",theme:"He was wounded for our transgressions. Isaiah 53 is the clearest prophecy of the Atonement in the Old Testament.",days:{Monday:{scripture:"Isaiah 53:3\u20135",summary:"Isaiah 50\u201353: The Servant Songs. Isaiah describes a suffering servant who will be exalted. 'He hath no form nor comeliness. He was despised and rejected of men, a man of sorrows, acquainted with grief.' Then: 'He was wounded for our transgressions. He was bruised for our iniquities. The chastisement of our peace was upon him. With his stripes we are healed.' This is the most direct prophecy of Christ's atonement in the Old Testament.",keyPrinciple:"He was despised and rejected. He bore our griefs. He was wounded for our transgressions. Written 700 years early.",reflect:"Which phrase from Isaiah 53 hits you hardest right now? Why?",pray:"Read Isaiah 53 as a prayer of gratitude to the Savior.",act:"Memorize Isaiah 53:5 this week.",fsy:{title:"FSY: Repentance and Forgiveness",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/05repentance-and-forgiveness",note:"Today's reading shows someone facing consequences of sin \u2014 or being given a second chance. This FSY section teaches that repentance is always available and God's mercy can cover any mistake."}},Wednesday:{scripture:"Isaiah 53:6\u20137",summary:"Isaiah 53\u201354: The servant's suffering continues \u2014 'He was oppressed and afflicted, yet he opened not his mouth. He was led as a lamb to the slaughter.' Then the outcome: 'He shall see of the travail of his soul and shall be satisfied.' Then Isaiah 54: 'For a small moment have I forsaken thee, but with great mercies will I gather thee. With everlasting kindness will I have mercy on thee, saith the Lord thy Redeemer.'",keyPrinciple:"All we like sheep have gone astray. He was brought as a lamb to the slaughter and opened not his mouth.",reflect:"How does the image of the silent lamb going to slaughter deepen your understanding of the Atonement?",pray:"Thank Christ for His silent willingness to bear what you deserved.",act:"Sit quietly with Isaiah 53:6\u20137 for ten minutes. No agenda. Just receive.",fsy:{title:"FSY: Covenant Path",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/02covenant-path",note:"Covenants are the backbone of today's reading. This section explains what it means to be on the covenant path and how every ordinance connects us more deeply to God."}},Friday:{scripture:"Isaiah 55:1\u20133",summary:"Isaiah 55\u201357: The great invitation. 'Ho, every one that thirsteth, come ye to the waters. He that hath no money, come ye, buy and eat.' 'Seek ye the Lord while he may be found, call ye upon him while he is near.' 'My thoughts are not your thoughts, neither are your ways my ways, saith the Lord. For as the heavens are higher than the earth, so are my ways higher than your ways.'",keyPrinciple:"Come, buy and eat \u2014 without money. God's invitation is free. The best things He offers cannot be purchased.",reflect:"What does it mean that God's most important gifts cannot be earned or purchased?",pray:"Come to God today without trying to earn it. Just come.",act:"Do one thing today simply because God invited you \u2014 without calculating whether you deserve it.",fsy:{title:"FSY: Covenant Path",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/02covenant-path",note:"Covenants are the backbone of today's reading. This section explains what it means to be on the covenant path and how every ordinance connects us more deeply to God."}}},resources:[{title:"His Suffering: The Atonement of Jesus Christ",url:"https://www.churchofjesuschrist.org/study/general-conference/2014/04/he-is-risen",type:"General Conference",who:"Elder D. Todd Christofferson"},{title:"Don't Miss This \u2014 Isaiah 50\u201357",url:"https://www.youtube.com/c/DontMissThis",type:"Podcast",who:"Don't Miss This"}],ywPrep:{summary:"Isaiah 50\u201357 contains Isaiah 53 \u2014 the Suffering Servant \u2014 the most direct prophecy of the Atonement in the entire Old Testament. Written 700 years before it happened. 'He was wounded for our transgressions, he was bruised for our iniquities: the chastisement of our peace was upon him; and with his stripes we are healed.' Every verse points to Jesus Christ.",prompts:["Isaiah 53 describes Christ's suffering in past tense, written centuries before it happened. What verse hits you hardest?","'He hath borne our griefs and carried our sorrows.' What grief is He carrying for you right now?","Isaiah 55:1: Come, buy and eat without money. What does it mean that God's invitation is free?","Isaiah 55:8\u20139: My thoughts are higher than your thoughts. When has that been comforting rather than frustrating?"]}},{week:42,dates:"Oct 12\u201318",title:"Arise, Shine; for Thy Light Is Come",ref:"Isaiah 58\u201366",theme:"Arise, shine \u2014 your light is come. True fasting is justice. The Spirit of the Lord is upon me.",days:{Monday:{scripture:"Isaiah 58:6\u20137",summary:"Isaiah 58: The fast God chooses \u2014 not fasting as performance or religious ritual, but loosing the bands of wickedness, letting the oppressed go free, sharing bread with the hungry, bringing the homeless poor into your house. 'Then shall thy light break forth as the morning, and thine health shall spring forth speedily.' True religion is about people, not performance.",keyPrinciple:"True fasting is justice \u2014 loosing bonds, freeing captives, feeding the hungry, covering the naked.",reflect:"How has fasting changed you? Has it ever moved you toward action for someone else?",pray:"Fast or abstain from one thing today and direct that energy toward someone who needs it.",act:"Do one act of justice or mercy today that costs you something.",fsy:{title:"FSY: Giving Service",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/11giving-service",note:"Today's reading features someone who gives more than expected \u2014 or fails to. This section explores why serving others is central to discipleship."}},Wednesday:{scripture:"Isaiah 60:1\u20133",summary:"Isaiah 60\u201361: 'Arise, shine; for thy light is come, and the glory of the Lord is risen upon thee.' Nations and kings shall come to the brightness of thy rising. Then Isaiah 61 \u2014 words Christ reads in the synagogue in Luke 4 to describe His own mission: 'The Spirit of the Lord God is upon me, because the Lord hath anointed me to preach good tidings unto the meek.'",keyPrinciple:"Arise, shine \u2014 your light is come. Darkness covers the earth, but glory rises upon you. Be the light.",reflect:"What does it mean for you specifically to arise and shine right now?",pray:"Ask God to make you a light in one specific dark place.",act:"Bring light \u2014 literally or figuratively \u2014 to one dark place today.",fsy:{title:"FSY: Giving Service",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/11giving-service",note:"Today's reading features someone who gives more than expected \u2014 or fails to. This section explores why serving others is central to discipleship."}},Friday:{scripture:"Isaiah 61:1\u20133; Luke 4:17\u201321",summary:"Isaiah 62\u201366: 'For Zion's sake will I not hold my peace.' God will not rest until Jerusalem is a praise in the earth. Then a new heavens and a new earth \u2014 Jerusalem a rejoicing, her people a joy. 'Before they call, I will answer; and while they are yet speaking, I will hear.' The book of Isaiah ends with an extended vision of the final judgment and the gathering of all nations.",keyPrinciple:"Jesus read Isaiah 61 in Nazareth and declared it fulfilled. The Spirit of the Lord is upon me \u2014 to heal and redeem.",reflect:"Which part of Isaiah 61:1\u20133 do you most need Christ to fulfill in your life right now?",pray:"Ask the Anointed One to come with healing and liberty to your specific need.",act:"Read Luke 4:16\u201321 alongside Isaiah 61:1\u20133. Write what you see.",fsy:{title:"FSY: Covenant Path",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/02covenant-path",note:"Covenants are the backbone of today's reading. This section explains what it means to be on the covenant path and how every ordinance connects us more deeply to God."}}},resources:[{title:"Arise and Shine Forth",url:"https://www.churchofjesuschrist.org/study/general-conference/2012/04/arise-and-shine-forth",type:"General Conference",who:"Sister Elaine S. Dalton"},{title:"Don't Miss This \u2014 Isaiah 58\u201366",url:"https://www.youtube.com/c/DontMissThis",type:"Podcast",who:"Don't Miss This"}],ywPrep:{summary:"Isaiah 58\u201366 \u2014 Isaiah's final vision of restoration, justice, and glory. 'Arise, shine; for thy light is come.' Isaiah 58 defines true fasting as justice: loose the bonds, feed the hungry, cover the naked. Isaiah 61 is the passage Jesus read in Nazareth: 'The Spirit of the Lord is upon me.' Isaiah 65: a new heaven and new earth.",prompts:["Isaiah 60:1 says 'Arise, shine; for thy light is come.' What does it look like to rise and shine in your specific life?","Isaiah 58 says true fasting is justice \u2014 feeding the hungry, loosing bonds. What does that change about how you think about fasting?","Jesus read Isaiah 61:1\u20132 in the synagogue and said it was fulfilled in Him. Which part of that passage do you need Christ to fulfill in you?","Isaiah 65:17 describes a new heaven and earth. What do you most look forward to in God's restored world?"]}},{week:43,dates:"Oct 19\u201325",title:"Before I Formed Thee I Knew Thee",ref:"Jeremiah 1\u20133; 7; 16\u201318; 20",theme:"Before I formed thee in the belly I knew thee. Jeremiah was called before birth and was faithful anyway.",days:{Monday:{scripture:"Jeremiah 1:4\u20138",summary:"Jeremiah 1\u20133; 17\u201320: Jeremiah's call \u2014 'Before I formed thee in the belly I knew thee; before thou camest forth out of the womb I sanctified thee.' Jeremiah resists: 'I cannot speak, for I am a child.' God touches his mouth and puts His words in it. Jeremiah will be hated, persecuted, and imprisoned for his message. He weeps so much he is called the weeping prophet.",keyPrinciple:"Before you were formed, God knew you. Before you were born, He set you apart. Your call predates your birth.",reflect:"What does it mean to you that you were known and set apart before you were born?",pray:"Thank God for knowing you completely \u2014 before, now, and always.",act:"Write what you believe God knew about you before you were born.",fsy:{title:"FSY: Covenant Path",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/02covenant-path",note:"Covenants are the backbone of today's reading. This section explains what it means to be on the covenant path and how every ordinance connects us more deeply to God."}},Wednesday:{scripture:"Jeremiah 1:9; 20:9",summary:"Jeremiah 20; 36\u201338: Jeremiah tries to stop prophesying \u2014 the people mock him constantly. But: 'His word was in mine heart as a burning fire shut up in my bones; and I was weary with forbearing.' He cannot stop. His scroll is read before the king, who cuts it piece by piece and burns it in the fire. Jeremiah rewrites it with additions. He is thrown into a cistern and left to sink in the mud.",keyPrinciple:"God touched Jeremiah's mouth. The word became like fire in his bones \u2014 he could not hold it in.",reflect:"What truth burns in you that you feel compelled to speak even when it's hard?",pray:"Ask God to put His words in your mouth for someone who needs to hear them.",act:"Speak one true and needed thing to someone today.",fsy:{title:"FSY: Agency and Integrity",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/04agency-and-integrity",note:"Agency is at the heart of today's reading. God gives commandments but never forces obedience \u2014 the choice is always ours. This section explores how to make choices aligned with God's will."}},Friday:{scripture:"Jeremiah 17:7\u20138",summary:"Jeremiah 30\u201333: In the middle of Jerusalem's darkest hour \u2014 siege, famine, captivity \u2014 God tells Jeremiah to buy a field. It is an act of prophetic hope: 'Houses and fields and vineyards shall be possessed again in this land.' Then the New Covenant promise: God will write His law on their hearts, not on stone tablets. All will know Him \u2014 from the least to the greatest.",keyPrinciple:"Blessed is the man who trusts in the Lord \u2014 like a tree planted by water, unshaken in drought.",reflect:"What are the rivers of water in your life that keep you rooted when drought hits?",pray:"Ask God to deepen your roots before the next dry season.",act:"Identify and strengthen one root \u2014 a habit, relationship, or practice that keeps you anchored.",fsy:{title:"FSY: Living the Gospel",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/12living-the-gospel",note:"Today's reading illustrates what it looks like to live the gospel fully \u2014 or to drift from it. This section describes what it means to be an active disciple in everyday life."}}},resources:[{title:"Before I Formed Thee in the Belly I Knew Thee",url:"https://www.churchofjesuschrist.org/study/general-conference/2014/10/knowing-that-god-knows-us",type:"General Conference",who:"Elder Dieter F. Uchtdorf"},{title:"Don't Miss This \u2014 Jeremiah 1\u201320",url:"https://www.youtube.com/c/DontMissThis",type:"Podcast",who:"Don't Miss This"}],ywPrep:{summary:"Jeremiah was called before birth and was afraid he was too young. God touched his mouth and said He would put His words there. Jeremiah prophesied for 40 years and was mostly ignored, imprisoned, and mocked. He never quit. 'His word was in mine heart as a burning fire shut up in my bones... and I could not stay.'",prompts:["God told Jeremiah: 'Before I formed thee in the belly I knew thee.' What does it mean that God knew you before your birth?","Jeremiah said 'I cannot speak; for I am a child.' What did God say in response?","Jeremiah 20:9 \u2014 the word was like fire shut up in his bones. What truth burns in you that you feel compelled to speak?","Jeremiah kept prophesying even when no one listened. What would it take for you to keep speaking truth no one wants to hear?"]}},{week:44,dates:"Oct 26\u2013Nov 1",title:"Great Is Thy Faithfulness",ref:"Jeremiah 31\u201333; 36\u201338; Lamentations 1; 3",theme:"Jerusalem fell. Jeremiah wept. But in the ashes: His mercies are new every morning. Great is thy faithfulness.",days:{Monday:{scripture:"Lamentations 3:19\u201323",summary:"Lamentations 1\u20135: Jerusalem has fallen. The city sits desolate. The roads to Zion mourn because no one comes to the feasts. Her children have gone into captivity. Jeremiah weeps over the ruined city. The enemies mock: 'Is this the city that men called the perfection of beauty?' Yet in the middle of the book: 'It is of the Lord's mercies that we are not consumed. His compassions fail not. They are new every morning.'",keyPrinciple:"This I recall to my mind, therefore have I hope. Memory of God's past mercies is the foundation of present hope.",reflect:"What do you recall to your mind when hope is running low?",pray:"Name five specific mercies of God in your prayer today.",act:"Make a list of God's mercies this week. Carry it with you.",fsy:{title:"FSY: Living the Gospel",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/12living-the-gospel",note:"Today's reading illustrates what it looks like to live the gospel fully \u2014 or to drift from it. This section describes what it means to be an active disciple in everyday life."}},Wednesday:{scripture:"Lamentations 3:24\u201326",summary:"Jeremiah 29; 31\u201333: The letter to the exiles \u2014 people carried off to Babylon. God says: build houses, plant gardens, marry, have children. 'Seek the peace of the city whither I have caused you to be carried away captive.' Then: 'I know the thoughts I think toward you \u2014 thoughts of peace and not of evil, to give you an expected end.' Then: 'Ye shall seek me and find me, when ye shall search for me with all your heart.'",keyPrinciple:"The Lord is my portion, saith my soul; therefore will I hope in him. Hope is a choice made in grief.",reflect:"When have you had to choose hope against everything you felt?",pray:"Say 'The Lord is my portion' as your declaration \u2014 even if you don't fully feel it.",act:"Write 'Great is thy faithfulness' somewhere you will see it.",fsy:{title:"FSY: Living the Gospel",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/12living-the-gospel",note:"Today's reading illustrates what it looks like to live the gospel fully \u2014 or to drift from it. This section describes what it means to be an active disciple in everyday life."}},Friday:{scripture:"Jeremiah 29:11\u201313",summary:"Jeremiah 31: The New Covenant. 'Behold, the days come, saith the Lord, that I will make a new covenant with the house of Israel.' Not like the old covenant \u2014 which they broke. 'I will put my law in their inward parts, and write it in their hearts; and will be their God, and they shall be my people.' This is what the Atonement makes possible \u2014 interior transformation.",keyPrinciple:"I know the plans I have for you \u2014 plans for welfare and not for evil, to give you a future and a hope.",reflect:"Do you actually believe God's plans for you are good? What makes it hard to believe?",pray:"Claim Jeremiah 29:11 as your personal promise today.",act:"Write Jeremiah 29:11 by hand and post it somewhere visible.",fsy:{title:"FSY: Covenant Path",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/02covenant-path",note:"Covenants are the backbone of today's reading. This section explains what it means to be on the covenant path and how every ordinance connects us more deeply to God."}}},resources:[{title:"Great Is Thy Faithfulness",url:"https://www.churchofjesuschrist.org/study/general-conference/2019/04/15nelson",type:"General Conference",who:"President Russell M. Nelson"},{title:"Don't Miss This \u2014 Jeremiah 31\u201338; Lamentations",url:"https://www.youtube.com/c/DontMissThis",type:"Podcast",who:"Don't Miss This"}],ywPrep:{summary:"Lamentations is Jeremiah weeping over the destroyed Jerusalem. In the middle of chapter 3, after graphic descriptions of anguish, he writes: 'It is of the Lord's mercies that we are not consumed, because his compassions fail not. They are new every morning: great is thy faithfulness.' Hope appears in the center of grief. Jeremiah 31 promises a new covenant written on the heart. Jeremiah 32 \u2014 he buys a field while the city falls. Defiant hope.",prompts:["Lamentations is raw grief \u2014 Jeremiah doesn't minimize. What does it teach us to bring grief honestly to God?","In the middle of his worst grief, Jeremiah remembered God's mercies. What do you recall that gives you hope?","'His mercies are new every morning.' What does a new mercy look like in your day today?","Jeremiah bought a field while Babylon besieged Jerusalem. What defiant act of hope is God asking you to make?"]}},{week:45,dates:"Nov 2\u20138",title:"A New Heart Also Will I Give You",ref:"Ezekiel 1\u20133; 33\u201334; 36\u201337; 47",theme:"A new heart will I give you. Can these bones live? God brings dead things back to life.",days:{Monday:{scripture:"Ezekiel 1:1; 3:14\u201315",summary:"Ezekiel 1\u20133: Ezekiel's vision by the river Chebar \u2014 four living creatures with wings, wheels within wheels with eyes all around, a great fire, the glory of God on a throne of sapphire. Ezekiel falls on his face. God commissions him as a watchman \u2014 if the wicked do not repent because the watchman failed to warn them, their blood is on the watchman's hands.",keyPrinciple:"God met Ezekiel by a river in Babylon \u2014 in exile, far from home. His presence is portable.",reflect:"Have you ever experienced God in a place or time you didn't expect?",pray:"Ask God to meet you right where you are today \u2014 not where you think He should be.",act:"Open your heart to God's presence in an ordinary moment today.",fsy:{title:"FSY: Temple and Family History",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/03temple-and-family-history",note:"Today's reading connects to God dwelling with His people. This section explains why temples matter and how to prepare spiritually to enter."}},Wednesday:{scripture:"Ezekiel 36:26\u201328",summary:"Ezekiel 36\u201337: God promises to give Israel a new heart \u2014 'I will take away the stony heart out of your flesh, and I will give you an heart of flesh.' Then the valley of dry bones \u2014 Ezekiel is placed in a valley full of dry bones and asked: 'Can these bones live?' He prophesies. Bones come together, sinews grow, flesh covers them, breath enters. A vast army stands. 'These bones are the whole house of Israel.'",keyPrinciple:"A new heart also will I give you \u2014 a heart of flesh instead of stone. Transformation, not just forgiveness.",reflect:"What part of your heart still feels like stone \u2014 hardened, closed, or numb?",pray:"Ask God specifically for a new heart in the place where yours is hard.",act:"Name the area of hardness. Surrender it to God's transforming work.",fsy:{title:"FSY: Repentance and Forgiveness",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/05repentance-and-forgiveness",note:"Today's reading shows someone facing consequences of sin \u2014 or being given a second chance. This FSY section teaches that repentance is always available and God's mercy can cover any mistake."}},Friday:{scripture:"Ezekiel 37:1\u20134, 14",summary:"Ezekiel 47: In a vision, Ezekiel sees water flowing from the threshold of the temple \u2014 a trickle that becomes ankle-deep, then knee-deep, then waist-deep, then a river too deep to cross. Wherever the river flows, there is life. Fish fill the dead sea, trees grow on both banks, leaves for healing. This is what God's Spirit does \u2014 it starts as a trickle and becomes overwhelming life.",keyPrinciple:"Can these bones live? Ezekiel said: thou knowest. Then he prophesied and the bones came together.",reflect:"What situation in your life feels completely dead? Do you believe God can bring it back to life?",pray:"Bring your valley of dry bones to God. Say: thou knowest if this can live.",act:"Write your valley of dry bones. Then write what resurrection would look like.",fsy:{title:"FSY: Temple and Family History",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/03temple-and-family-history",note:"Today's reading connects to God dwelling with His people. This section explains why temples matter and how to prepare spiritually to enter."}}},resources:[{title:"A New Heart and a New Spirit",url:"https://www.churchofjesuschrist.org/study/general-conference/2012/10/a-new-heart-and-a-new-spirit",type:"General Conference",who:"Elder D. Todd Christofferson"},{title:"Don't Miss This \u2014 Ezekiel 1\u20133; 33\u201334; 36\u201337; 47",url:"https://www.youtube.com/c/DontMissThis",type:"Podcast",who:"Don't Miss This"}],ywPrep:{summary:"Ezekiel was a priest in exile. He saw a vision of God's glory in Babylon \u2014 God is not limited by geography. He saw a valley of dry bones and God asked: 'Can these bones live?' Ezekiel said: 'Thou knowest.' He prophesied, the bones came together, flesh came upon them, breath entered them. God brings what is dead back to life. He also promised a new heart of flesh instead of stone.",prompts:["Ezekiel saw God's glory in Babylon \u2014 in exile. What does it mean that God's presence is n
