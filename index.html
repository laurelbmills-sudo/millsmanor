ot limited to sacred places?","God asked Ezekiel: 'Can these bones live?' Ezekiel said 'Thou knowest.' What situation in your life feels completely dead?","God raised dead bones by the power of spoken prophecy. What does it mean to speak life?","Ezekiel 36:26: a new heart of flesh instead of stone. What part of your heart still feels like stone?"]}},{week:46,dates:"Nov 9\u201315",title:"God Delivereth and Rescueth",ref:"Daniel 1\u20137",theme:"Daniel would not compromise. God delivered from the lions' den. But if not, we will not bow.",days:{Monday:{scripture:"Daniel 1:8, 15, 20",summary:"Daniel 1\u20133: Daniel, Hananiah, Mishael, and Azariah are taken to Babylon and given Babylonian names. They refuse to eat the king's food and are healthier than those who do. Daniel interprets Nebuchadnezzar's dream \u2014 a great image of gold, silver, bronze, iron, and clay \u2014 destroyed by a stone cut without hands. The stone fills the whole earth. Then Shadrach, Meshach, and Abed-nego refuse to bow to the golden image and are thrown into the fiery furnace. There are four men walking in the fire.",keyPrinciple:"Daniel resolved in his heart not to defile himself. Resolved \u2014 before the test. Small integrity compounds.",reflect:"What is one thing you have resolved in your heart before the test comes?",pray:"Ask God to help you make decisions now that will hold when you are tested later.",act:"Make one pre-commitment about integrity before the next temptation arrives.",fsy:{title:"FSY: Agency and Integrity",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/04agency-and-integrity",note:"Agency is at the heart of today's reading. God gives commandments but never forces obedience \u2014 the choice is always ours. This section explores how to make choices aligned with God's will."}},Wednesday:{scripture:"Daniel 3:16\u201318",summary:"Daniel 4\u20136: Nebuchadnezzar's pride \u2014 he boasts and is struck with madness, living with animals for seven years, until he acknowledges God. Daniel reads the handwriting on the wall: Mene Mene Tekel Upharsin \u2014 Belshazzar's kingdom is finished. That night he is killed. Then Darius's decree against prayer \u2014 Daniel prays anyway. He is thrown to the lions. In the morning, the king runs to the den: 'O Daniel, servant of the living God, is thy God able to deliver thee?'",keyPrinciple:"Our God can deliver us. But if not, we will not bow. Faith that holds even when deliverance doesn't come.",reflect:"Have you ever held your faith when God didn't intervene the way you wanted?",pray:"Pray a 'but if not' prayer \u2014 trusting God even if the outcome is not what you want.",act:"Name one thing you trust God with even if He does not change it.",fsy:{title:"FSY: Agency and Integrity",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/04agency-and-integrity",note:"Agency is at the heart of today's reading. God gives commandments but never forces obedience \u2014 the choice is always ours. This section explores how to make choices aligned with God's will."}},Friday:{scripture:"Daniel 6:10\u201311, 22\u201323",summary:"Daniel 7\u201312: Daniel's apocalyptic visions \u2014 four great beasts representing world empires, the Ancient of Days on His throne with ten thousand times ten thousand attending Him. One like the Son of Man comes with the clouds and receives dominion. Daniel sees the end of the world and the resurrection: 'Many of them that sleep in the dust of the earth shall awake \u2014 some to everlasting life.'",keyPrinciple:"Daniel opened his window and prayed as usual \u2014 knowing it was illegal. Faithfulness does not hide.",reflect:"Is there any part of your faith you have been hiding or quieting because of social pressure?",pray:"Open your window today. Pray without hiding.",act:"Do one visible act of faith today.",fsy:{title:"FSY: Covenant Path",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/02covenant-path",note:"Covenants are the backbone of today's reading. This section explains what it means to be on the covenant path and how every ordinance connects us more deeply to God."}}},resources:[{title:"But If Not\u2026",url:"https://www.churchofjesuschrist.org/study/general-conference/2002/10/but-if-not",type:"General Conference",who:"Elder Dennis E. Simmons"},{title:"Don't Miss This \u2014 Daniel 1\u20137",url:"https://www.youtube.com/c/DontMissThis",type:"Podcast",who:"Don't Miss This"}],ywPrep:{summary:"Daniel and his friends were taken to Babylon as teenagers. They resolved not to defile themselves \u2014 and excelled above everyone. Shadrach, Meshach, and Abednego refused to bow to the king's statue: 'Our God is able to deliver us \u2014 but if not, we will not bow.' A fourth person was seen in the fire. Daniel prayed three times a day even when it was illegal, and survived the lions.",prompts:["Daniel resolved not to defile himself. What small acts of integrity shape your character in ways that matter later?","'Our God is able to deliver us \u2014 but if not, we will not bow.' What does 'but if not' faith look like for you?","Who was the fourth person in the fire? What does His presence mean?","Daniel prayed at his window three times a day knowing he would be arrested. When has your faith been countercultural?"]}},{week:47,dates:"Nov 16\u201322",title:"I Will Love Them Freely",ref:"Hosea 1\u20136; 10\u201314; Joel",theme:"God is a loving husband to His covenant people. I will love them freely. Pour out my Spirit on all flesh.",days:{Monday:{scripture:"Hosea 2:19\u201320",summary:"Hosea 1\u201314: God tells Hosea to marry a woman who will be unfaithful \u2014 because Israel has been unfaithful to God. Hosea loves her anyway and buys her back. This marriage is a living parable of God's relationship with Israel. 'I will heal their backsliding; I will love them freely.' Hosea ends with a call to return: 'Return, O Israel, unto the Lord thy God, for thou hast fallen by thine iniquity.'",keyPrinciple:"God will betroth Israel to Himself \u2014 in righteousness, lovingkindness, mercies, faithfulness. Covenant restored.",reflect:"What would it mean to be betrothed to God \u2014 committed fully, in righteousness and lovingkindness?",pray:"Renew your covenant with God today. Say yes again.",act:"Write the covenant you have with God in your own words.",fsy:{title:"FSY: Covenant Path",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/02covenant-path",note:"Covenants are the backbone of today's reading. This section explains what it means to be on the covenant path and how every ordinance connects us more deeply to God."}},Wednesday:{scripture:"Hosea 14:4; 6:6",summary:"Joel 1\u20133: A plague of locusts strips the land bare. Joel calls it a sign \u2014 the Day of the Lord is near. Call a fast. Gather the elders. Cry unto the Lord. Then the promise: 'I will restore to you the years that the locust hath eaten.' And the Pentecost prophecy: 'I will pour out my Spirit upon all flesh. Your sons and daughters shall prophesy.'",keyPrinciple:"I will love them freely \u2014 my anger is turned away. God desires mercy more than sacrifice.",reflect:"Where are you trying to perform for God's love instead of simply receiving it?",pray:"Stop performing. Simply receive God's love today.",act:"Do one thing out of love for God today rather than out of duty.",fsy:{title:"FSY: Repentance and Forgiveness",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/05repentance-and-forgiveness",note:"Today's reading shows someone facing consequences of sin \u2014 or being given a second chance. This FSY section teaches that repentance is always available and God's mercy can cover any mistake."}},Friday:{scripture:"Joel 2:12\u201313",summary:"Hosea 11; 14: God speaks as a grieving father: 'When Israel was a child, then I loved him, and called my son out of Egypt. I taught Ephraim to walk, taking them by their arms. I drew them with cords of a man, with bands of love.' How can I give you up? God's love is stronger than His judgment. Hosea 14: 'Take with you words, and turn to the Lord.'",keyPrinciple:"Return to me with all your heart. Rend your hearts, not your garments. God wants internal turning.",reflect:"What does rending your heart \u2014 genuine contrition \u2014 look like versus just going through motions?",pray:"Pray a whole-heart return to God today \u2014 not ritual, but real.",act:"Name one thing you have been half-hearted about with God. Give it full-heartedness.",fsy:{title:"FSY: Giving Service",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/11giving-service",note:"Today's reading features someone who gives more than expected \u2014 or fails to. This section explores why serving others is central to discipleship."}}},resources:[{title:"The Merciful Obtain Mercy",url:"https://www.churchofjesuschrist.org/study/general-conference/2012/04/the-merciful-obtain-mercy",type:"General Conference",who:"Elder Dieter F. Uchtdorf"},{title:"Don't Miss This \u2014 Hosea; Joel",url:"https://www.youtube.com/c/DontMissThis",type:"Podcast",who:"Don't Miss This"}],ywPrep:{summary:"Hosea was commanded to marry a woman who would be unfaithful \u2014 and to keep loving her and taking her back. This is God's own story with Israel. 'I will love them freely.' Hosea shows that God is not a distant judge \u2014 He is a heartbroken husband who keeps pursuing. Joel promises that afterward God will pour out His Spirit on all flesh \u2014 sons and daughters shall prophesy.",prompts:["Hosea's marriage was a living parable of God's love for unfaithful Israel. How does that story change how you understand God's love for you?","Hosea 6:6: God desires mercy and knowledge of God more than burnt offerings. What does that mean for how you worship?","Joel 2:28\u201329 promises the Spirit on sons and daughters. How do you see that fulfilled in your life?","'I will love them freely' \u2014 God says. What does free love, love with no strings, look like from God? From you?"]}},{week:48,dates:"Nov 23\u201329",title:"Seek the Lord, and Ye Shall Live",ref:"Amos; Obadiah; Jonah",theme:"Jonah ran from God and learned about mercy. God's compassion is bigger than our comfort with who receives it.",days:{Monday:{scripture:"Amos 5:24",summary:"Amos 1\u20139: Amos \u2014 a shepherd and fig farmer \u2014 is sent to prophesy to the wealthy northern kingdom. His message: you have sold the righteous for silver and the poor for a pair of sandals. You trample the heads of the poor into the dust of the earth. God declares: 'Let judgment run down as waters, and righteousness as a mighty stream.' Then: 'Seek good, and not evil, that ye may live.'",keyPrinciple:"Let justice roll down as waters, and righteousness as a mighty stream. Faith without justice is hollow.",reflect:"What injustice are you in a position to address in your sphere of influence?",pray:"Ask God to show you one specific way you can work for justice.",act:"Do one tangible act of justice or mercy today.",fsy:{title:"FSY: Giving Service",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/11giving-service",note:"Today's reading features someone who gives more than expected \u2014 or fails to. This section explores why serving others is central to discipleship."}},Wednesday:{scripture:"Jonah 1:1\u20133; 2:1\u20132, 9",summary:"Jonah 1\u20134: God tells Jonah to go to Nineveh \u2014 the enemy capital. Jonah runs the opposite direction. A storm, a great fish, three days in the belly, a second chance. Jonah goes to Nineveh and preaches the shortest sermon in scripture: 'Yet forty days and Nineveh shall be overthrown.' The whole city repents \u2014 king, people, and cattle. God relents. Jonah is furious that God showed mercy to his enemies.",keyPrinciple:"Jonah ran from God. From inside the whale he prayed and was delivered. Running delays \u2014 it doesn't cancel the call.",reflect:"What are you running from that God has already called you to?",pray:"Stop running. Pray Jonah's prayer from the deep: salvation is of the Lord.",act:"Turn toward the thing you have been avoiding. Take one step.",fsy:{title:"FSY: Repentance and Forgiveness",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/05repentance-and-forgiveness",note:"Today's reading shows someone facing consequences of sin \u2014 or being given a second chance. This FSY section teaches that repentance is always available and God's mercy can cover any mistake."}},Friday:{scripture:"Jonah 4:2, 10\u201311",summary:"Jonah 3\u20134; Obadiah: Jonah sits outside Nineveh hoping for its destruction. God causes a plant to shade him \u2014 Jonah loves it. God sends a worm to kill the plant. Jonah says he is angry enough to die over a plant he didn't make. God: 'Should I not spare Nineveh, that great city, wherein are more than six score thousand persons that cannot discern between their right hand and their left hand?' God's mercy is bigger than ours.",keyPrinciple:"God had compassion on Nineveh. Jonah was angry. God said: should I not have pity on this great city?",reflect:"Is there a person or group whose forgiveness or blessing makes you uncomfortable? Why?",pray:"Ask God to expand your capacity for His mercy toward people you find hard to love.",act:"Pray for someone you find difficult to love. Do it specifically and sincerely.",fsy:{title:"FSY: Agency and Integrity",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/04agency-and-integrity",note:"Agency is at the heart of today's reading. God gives commandments but never forces obedience \u2014 the choice is always ours. This section explores how to make choices aligned with God's will."}}},resources:[{title:"Repentance and Conversion",url:"https://www.churchofjesuschrist.org/study/general-conference/2007/04/repentance-and-conversion",type:"General Conference",who:"Elder Russell M. Nelson"},{title:"Don't Miss This \u2014 Amos; Obadiah; Jonah",url:"https://www.youtube.com/c/DontMissThis",type:"Podcast",who:"Don't Miss This"}],ywPrep:{summary:"Amos was a shepherd and farmer \u2014 not a professional prophet \u2014 who was told to go preach to Israel. He preached economic justice. Jonah ran from God, ended up in a whale, repented, and then was angry when God showed mercy to Nineveh. God asked: should I not spare this city? The lesson: God's mercy is bigger than our comfort with who receives it.",prompts:["Amos was a farmer, not a trained prophet. What does God's call to ordinary people teach about who He uses?","Amos 5:24: let justice roll down as waters. What does justice look like in your daily life?","Jonah ran from God. When have you run from something God clearly called you to?","God was angry that Jonah was angry about Nineveh's mercy. Is there anyone whose forgiveness or blessing you struggle with?"]}},{week:49,dates:"Nov 30\u2013Dec 6",title:"He Delighteth in Mercy",ref:"Micah; Nahum; Habakkuk; Zephaniah",theme:"Do justice, love mercy, walk humbly with thy God. The just shall live by faith. God sings over you with joy.",days:{Monday:{scripture:"Micah 6:8",summary:"Micah 1\u20137: Micah \u2014 a contemporary of Isaiah \u2014 speaks against the corruption of rulers, priests, and prophets who lead Israel astray for money. But the famous summary of what God requires: 'He hath shewed thee, O man, what is good; and what doth the Lord require of thee, but to do justly, and to love mercy, and to walk humbly with thy God?' Then Bethlehem is named as the birthplace of the Messiah.",keyPrinciple:"Do justice. Love mercy. Walk humbly with thy God. Three requirements. One life.",reflect:"Which of the three is most natural for you? Which is hardest?",pray:"Ask God to show you what walking humbly with Him looks like today specifically.",act:"Do one act of justice, one act of mercy, and one act of humility today.",fsy:{title:"FSY: Giving Service",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/11giving-service",note:"Today's reading features someone who gives more than expected \u2014 or fails to. This section explores why serving others is central to discipleship."}},Wednesday:{scripture:"Habakkuk 1:2\u20133; 2:1\u20133",summary:"Habakkuk 1\u20133; Nahum: Habakkuk asks the hardest question: 'O Lord, how long shall I cry, and thou wilt not hear? Why dost thou shew me iniquity?' God's answer: I am working. You will not believe it if I told you. The righteous shall live by faith. Habakkuk ends with a declaration: 'Though the fig tree shall not blossom, and there shall be no fruit \u2014 yet I will rejoice in the Lord.'",keyPrinciple:"Habakkuk asked God why He allowed evil. God said: write the vision, wait for it. It will come.",reflect:"What hard why question do you have for God right now?",pray:"Ask your hard question. Then listen and wait.",act:"Write your question and what you believe God might be saying in response.",fsy:{title:"FSY: Agency and Integrity",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/04agency-and-integrity",note:"Agency is at the heart of today's reading. God gives commandments but never forces obedience \u2014 the choice is always ours. This section explores how to make choices aligned with God's will."}},Friday:{scripture:"Habakkuk 2:4",summary:"Zephaniah 1\u20133: The Day of the Lord is near \u2014 a day of wrath. But after judgment: 'Sing, O daughter of Zion; shout, O Israel. The King of Israel, even the Lord, is in the midst of thee.' Then the most tender promise in all the minor prophets: 'He will rejoice over thee with joy; he will rest in his love; he will joy over thee with singing.' God sings over you.",keyPrinciple:"The just shall live by faith. Not by sight. Not by feeling. By faith.",reflect:"What are you currently trusting God for that you cannot see yet?",pray:"Declare your faith in God for the unseen thing you are waiting for.",act:"Write out your faith declaration for one specific unseen hope.",fsy:{title:"FSY: Living the Gospel",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/12living-the-gospel",note:"Today's reading illustrates what it looks like to live the gospel fully \u2014 or to drift from it. This section describes what it means to be an active disciple in everyday life."}}},resources:[{title:"What Manner of Men Ought Ye to Be?",url:"https://www.churchofjesuschrist.org/study/general-conference/2012/04/what-manner-of-men-ought-ye-to-be",type:"General Conference",who:"Elder Lynn G. Robbins"},{title:"Don't Miss This \u2014 Micah; Habakkuk; Zephaniah",url:"https://www.youtube.com/c/DontMissThis",type:"Podcast",who:"Don't Miss This"}],ywPrep:{summary:"Micah gave one of the most concise summaries of the gospel: 'He hath shewed thee, O man, what is good; and what doth the Lord require of thee, but to do justly, and to love mercy, and to walk humbly with thy God?' Habakkuk asked God why He allowed evil. God answered: trust Me, the just shall live by faith. Zephaniah says God sings over you with joy.",prompts:["Micah 6:8: do justice, love mercy, walk humbly. Which of the three is hardest for you right now?","Habakkuk asked God why He allowed wickedness. Have you ever asked God why? Did He answer?","'The just shall live by faith' \u2014 Paul quoted this in Romans. What does living by faith look like daily?","Zephaniah says God sings over us with joy. God sings. What does it mean that God rejoices over you?"]}},{week:50,dates:"Dec 7\u201313",title:"Holiness unto the Lord",ref:"Haggai 1\u20132; Zechariah 1\u20134; 7\u201314",theme:"Not by might, nor by power, but by my Spirit. Rebuild. Thy King cometh, lowly, riding on a donkey.",days:{Monday:{scripture:"Haggai 1:4\u20138",summary:"Haggai 1\u20132; Zechariah 1\u20134: The exiles have returned from Babylon. They start to rebuild the temple \u2014 and stop. They say: 'The time is not come to build the Lord's house.' Meanwhile they are living in paneled houses. Haggai: 'Consider your ways. Ye looked for much, and lo it came to little.' Then: 'Be strong, O Zerubbabel, be strong, O Joshua. For I am with you, saith the Lord of hosts.' The glory of this latter house shall be greater than the former.",keyPrinciple:"Is it time for you to live in paneled houses while my house lies waste? Consider your ways.",reflect:"What has God asked you to build or prioritize that you have been putting off?",pray:"Ask God to help you prioritize His work before your own comfort.",act:"Do one thing today that builds God's work \u2014 not just your own projects.",fsy:{title:"FSY: Temple and Family History",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/03temple-and-family-history",note:"Today's reading connects to God dwelling with His people. This section explains why temples matter and how to prepare spiritually to enter."}},Wednesday:{scripture:"Zechariah 4:6",summary:"Zechariah 4\u20136: Zechariah's visions \u2014 a golden lampstand fed by two olive trees, representing God's anointed ones. The word of the Lord to Zerubbabel: 'Not by might, nor by power, but by my Spirit, saith the Lord of hosts. Who art thou, O great mountain? Before Zerubbabel thou shalt become a plain.' Every obstacle can be leveled by God's Spirit.",keyPrinciple:"Not by might, nor by power, but by my Spirit. The things that matter most require God's Spirit, not our effort alone.",reflect:"What is one thing you are working on that you need to admit requires God's Spirit?",pray:"Explicitly ask for God's Spirit in the area where you have been working in your own strength.",act:"Pause one effort and pray over it before continuing.",fsy:{title:"FSY: Living the Gospel",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/12living-the-gospel",note:"Today's reading illustrates what it looks like to live the gospel fully \u2014 or to drift from it. This section describes what it means to be an active disciple in everyday life."}},Friday:{scripture:"Zechariah 9:9; Matthew 21:5",summary:"Zechariah 9\u201314: The messianic king comes 'riding upon a donkey, and upon a colt the foal of an ass' \u2014 Palm Sunday in prophecy, written five hundred years before the event. Then: thirty pieces of silver, the potter's field, the one they pierced, the fountain opened for sin and uncleanness. Zechariah 14 describes the Second Coming. All the nations will gather at Jerusalem. The Lord will be King over all the earth.",keyPrinciple:"Thy King cometh, lowly, on a donkey. Written 500 years before Palm Sunday. Fulfilled exactly.",reflect:"What do you feel knowing that Jesus lived out a script written centuries before His birth?",pray:"Thank God for His precision \u2014 every prophecy fulfilled perfectly.",act:"Find one other Zechariah prophecy fulfilled in the Gospels and read both passages.",fsy:{title:"FSY: Covenant Path",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/02covenant-path",note:"Covenants are the backbone of today's reading. This section explains what it means to be on the covenant path and how every ordinance connects us more deeply to God."}}},resources:[{title:"Holiness to the Lord \u2014 In Ordinary Things",url:"https://www.churchofjesuschrist.org/study/general-conference/2012/10/holiness-to-the-lord",type:"General Conference",who:"Elder L. Tom Perry"},{title:"Don't Miss This \u2014 Haggai; Zechariah 1\u20134; 7\u201314",url:"https://www.youtube.com/c/DontMissThis",type:"Podcast",who:"Don't Miss This"}],ywPrep:{summary:"Haggai challenged the returned exiles: is it time for you to live in paneled houses while My house lies waste? Consider your ways. Zechariah had eight visions of restoration. 'Not by might, nor by power, but by my Spirit.' Zechariah 9:9 prophesied the triumphal entry \u2014 Jesus riding on a donkey \u2014 five centuries before it happened. 'Thy King cometh, lowly.'",prompts:["Haggai asked: is it time for you to live in nice houses while my house lies waste? What modern equivalent is God asking you?","'Not by might, nor by power, but by my Spirit.' What is something only God's Spirit can accomplish in your life?","Zechariah 9:9 was written 500 years before Palm Sunday. What does precise fulfilled prophecy do for your faith?","Zechariah 14:20 says 'Holiness unto the Lord' will be inscribed on everything. What would total holiness look like in your world?"]}},{week:51,dates:"Dec 14\u201320",title:"I Have Loved You, Saith the Lord",ref:"Malachi",theme:"I have loved you, saith the Lord. Bring the tithes. Elijah is coming. The last words before 400 years of silence.",days:{Monday:{scripture:"Malachi 1:2",summary:"Malachi 1\u20132: The last book of the Old Testament. God opens: 'I have loved you, saith the Lord.' But Israel responds with half-hearted offerings \u2014 blind animals, lame cattle, whatever costs nothing. God says: 'Would that someone among you would shut the temple doors so you would not kindle useless fire on my altar.' Priests who teach falsehood, who show partiality, who have wearied God with their words.",keyPrinciple:"God's opening line: I have loved you, saith the Lord. His first word to unfaithful people is love.",reflect:"When you imagine God speaking to you, what is His opening line? What should it be?",pray:"Receive God's I have loved you today. Let it be the foundation of your prayer.",act:"Write what God's love for you specifically means, based on what you have studied this year.",fsy:{title:"FSY: Covenant Path",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/02covenant-path",note:"Covenants are the backbone of today's reading. This section explains what it means to be on the covenant path and how every ordinance connects us more deeply to God."}},Wednesday:{scripture:"Malachi 3:10",summary:"Malachi 3\u20134: The call to bring the full tithe into the storehouse and test God: 'I will open you the windows of heaven and pour out a blessing that there shall not be room enough to receive it.' Then: 'They that feared the Lord spake often one to another. And the Lord hearkened and heard it, and a book of remembrance was written before him.' Your faithfulness is recorded.",keyPrinciple:"Bring the tithes \u2014 prove me now herewith \u2014 and see if I will not open the windows of heaven.",reflect:"Have you ever proved God in tithing or another covenant? What was the result?",pray:"Commit to one covenant promise and ask God to prove Himself faithful.",act:"Pay tithing or affirm a financial covenant with God today.",fsy:{title:"FSY: Giving Service",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/11giving-service",note:"Today's reading features someone who gives more than expected \u2014 or fails to. This section explores why serving others is central to discipleship."}},Friday:{scripture:"Malachi 3:16\u201317",summary:"Malachi 4: The final words of the Old Testament. 'Behold, I will send you Elijah the prophet before the coming of the great and dreadful day of the Lord. And he shall turn the heart of the fathers to the children, and the heart of the children to their fathers.' Then four hundred years of silence. The next voice will say: 'In those days came John the Baptist, preaching in the wilderness of Judea.'",keyPrinciple:"A book of remembrance was written for those who feared God and thought upon His name. God keeps record.",reflect:"What does it mean that God keeps a book of remembrance for those who think of Him?",pray:"Think upon God's name today. Let it be deliberate and frequent.",act:"Journal a page of remembrance \u2014 your thoughts about God and His faithfulness this year.",fsy:{title:"FSY: Temple and Family History",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/03temple-and-family-history",note:"Today's reading connects to God dwelling with His people. This section explains why temples matter and how to prepare spiritually to enter."}}},resources:[{title:"I Have Loved You",url:"https://www.churchofjesuschrist.org/study/general-conference/2016/10/i-have-loved-you",type:"General Conference",who:"Elder Dieter F. Uchtdorf"},{title:"Don't Miss This \u2014 Malachi",url:"https://www.youtube.com/c/DontMissThis",type:"Podcast",who:"Don't Miss This"},{title:"Turning Hearts \u2014 Temple and Family History",url:"https://www.saintsunscripted.com",type:"Podcast",who:"Saints Unscripted"}],ywPrep:{summary:"Malachi means 'my messenger.' He was the last voice before 400 years of silence. He called Israel back to covenant \u2014 bring the tithes, honor God's name. His first words: 'I have loved you, saith the Lord.' His last words: Elijah will come and turn hearts of fathers to children and hearts of children to their fathers. The very last words of the Old Testament \u2014 then silence, until John the Baptist.",prompts:["Malachi's first words are God's: 'I have loved you, saith the Lord.' Despite everything \u2014 Israel's unfaithfulness \u2014 God leads with love. What does that tell you?","Malachi 3:10: God says prove me in tithing. Have you ever proved God on a covenant promise? What happened?","Malachi 4:5\u20136: Elijah will turn hearts of fathers to children and children to fathers. How is family history and temple work connected to your faith?","Malachi closes with 400 years of silence ahead. What do you do when God seems quiet?"]}},{week:52,dates:"Dec 21\u201327",title:"And the Word Was Made Flesh",ref:"Christmas",theme:"The Word was made flesh. Every covenant, every prophet, every promise pointed to one birth in Bethlehem.",days:{Monday:{scripture:"John 1:1\u20133, 14",summary:"John 1: 'In the beginning was the Word, and the Word was with God, and the Word was God.' The prologue to John echoes Genesis \u2014 another beginning. Christ is the light that enlightens every person. He came to his own people and they did not receive him. But to those who received him, he gave power to become the sons of God. The Word became flesh and dwelt among us.",keyPrinciple:"In the beginning was the Word. The Word became flesh and pitched His tent among us. This is the whole point.",reflect:"In the beginning He was already there. At the manger He came here. What does that journey mean to you?",pray:"Worship the Word made flesh today. Just worship.",act:"Read John 1:1\u201314 slowly. Underline every phrase that connects to your year in the Old Testament.",fsy:{title:"FSY: Covenant Path",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/02covenant-path",note:"Covenants are the backbone of today's reading. This section explains what it means to be on the covenant path and how every ordinance connects us more deeply to God."}},Wednesday:{scripture:"Luke 2:8\u201316",summary:"Luke 2; Matthew 2: The birth of Jesus \u2014 no room in the inn, a manger, shepherds watching their flocks by night. An angel appears: 'Fear not, for behold I bring you good tidings of great joy, which shall be to all people.' A multitude of angels singing. The shepherds go in haste. Then the wise men following a star, Herod's rage, the flight to Egypt. The Old Testament ends; the New Testament begins.",keyPrinciple:"The angels appeared to shepherds \u2014 not priests, not kings. God always chooses the overlooked to receive the first announcement.",reflect:"How has God overlooked your credentials and spoken to you directly this year?",pray:"Thank God for speaking to ordinary people \u2014 including you.",act:"Write what announcement God has made to you this year through your scripture study.",fsy:{title:"FSY: Covenant Path",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/02covenant-path",note:"Covenants are the backbone of today's reading. This section explains what it means to be on the covenant path and how every ordinance connects us more deeply to God."}},Friday:{scripture:"Matthew 2:1\u20132, 10\u201311",summary:"Matthew 1\u20132; Luke 1\u20132: The genealogies \u2014 Matthew traces Jesus through Abraham and David. Luke goes all the way to Adam, 'who was the son of God.' The angel Gabriel appears to Mary: 'Hail, thou that art highly favoured. The Lord is with thee.' Mary's response: 'Be it unto me according to thy word.' The incarnation of God into human flesh \u2014 the hinge of all history.",keyPrinciple:"Wise men followed a star for years. They brought gifts. They worshipped. Distance didn't stop them.",reflect:"What has the journey of this year of Old Testament study cost you? What have you found?",pray:"Offer your gifts \u2014 what you have and who you are \u2014 to Christ at the end of this year.",act:"Write what gift you are bringing to Christ from your year of study.",fsy:{title:"FSY: Covenant Path",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/02covenant-path",note:"Covenants are the backbone of today's reading. This section explains what it means to be on the covenant path and how every ordinance connects us more deeply to God."}}},resources:[{title:"Christ and the New Covenant",url:"https://www.churchofjesuschrist.org/study/general-conference/2019/12/christ-and-the-new-covenant",type:"General Conference",who:"Elder Jeffrey R. Holland"},{title:"Don't Miss This \u2014 Christmas Week",url:"https://www.youtube.com/c/DontMissThis",type:"Podcast",who:"Don't Miss This"}],ywPrep:{summary:"The Old Testament ends. The New Testament begins with the thing the entire Old Testament was anticipating: the birth of Jesus Christ. Luke 2: the shepherds. Matthew 2: the wise men. John 1: 'In the beginning was the Word, and the Word was God. And the Word was made flesh and dwelt among us.' The whole year of study leads here.",prompts:["The shepherds were the first to hear the announcement \u2014 ordinary, overlooked people. What does God's choice of audience say about who He values?","John 1:14 says the Word dwelt among us \u2014 literally pitched His tent with humanity. What does that image mean to you?","As you finish the Old Testament, what is one thing you understand about Jesus that you didn't before?","The wise men followed a star for years across hundreds of miles. What are you willing to travel far to find or worship?"]}}],Hy={"Burger Bowls":"https://laurelbmills-sudo.github.io/familyrecipebox/","Chicken Tacos":"https://laurelbmills-sudo.github.io/familyrecipebox/"},Ig={"Air Fryer Pork Chops":"https://laurelbmills-sudo.github.io/familyrecipebox/#/recipe/air-fryer-pork-chops","Ballpark Sausage":"https://laurelbmills-sudo.github.io/familyrecipebox/#/recipe/ballpark-sausage","Balsamic Steak with Caprese":"https://laurelbmills-sudo.github.io/familyrecipebox/#/recipe/balsamic-steak-with-caprese","BBQ Pork Chops":"https://laurelbmills-sudo.github.io/familyrecipebox/#/recipe/bbq-pork-chops","Creamy Dijon Pork Tenderloin":"https://laurelbmills-sudo.github.io/familyrecipebox/#/recipe/creamy-dijon-pork-tenderloin","Crockpot Meatballs":"https://laurelbmills-sudo.github.io/familyrecipebox/#/recipe/crockpot-meatballs","Garlic Butter Steak Bites with Crispy Potatoes":"https://laurelbmills-sudo.github.io/familyrecipebox/#/recipe/garlic-butter-steak-bites-with-crispy-potatoes","Grilled Herb Flank Steak and Roasted Carrots":"https://laurelbmills-sudo.github.io/familyrecipebox/#/recipe/grilled-herb-flank-steak-and-roasted-carrots","Grilled Tin Foil Dinner":"https://laurelbmills-sudo.github.io/familyrecipebox/#/recipe/grilled-tin-foil-dinner","Lion House Meatballs & Potatoes":"https://laurelbmills-sudo.github.io/familyrecipebox/#/recipe/lion-house-meatballs-potatoes","Meat Loaf":"https://laurelbmills-sudo.github.io/familyrecipebox/#/recipe/meat-loaf","Meatballs & Mashed Potatoes":"https://laurelbmills-sudo.github.io/familyrec
