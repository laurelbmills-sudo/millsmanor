      resources: [{ title: "Repentance Is Always Possible", url: "https://www.churchofjesuschrist.org/study/general-conference/2022/10/47christofferson", type: "General Conference", who: "Elder D. Todd Christofferson" }, { title: "Don't Miss This \u2014 2 Samuel 11\u201312; 1 Kings 3; 6\u20139", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }],
      ywPrep: { summary: "David was home when kings went to war. He stayed behind, saw Bathsheba, and his life unraveled from one moment of displaced presence. Nathan told him a parable \u2014 David didn't recognize himself \u2014 then said, 'Thou art the man.' David's repentance in Psalm 51 is one of the rawest prayers in scripture. Solomon then asked for wisdom above everything else, and God gave him both wisdom and wealth.", prompts: ["David's sin began when he wasn't where he was supposed to be. How does being out of our right place leave us vulnerable?", "Nathan confronted David with a story rather than a direct accusation. When has someone helped you see yourself through a story?", "Psalm 51 is David's repentance prayer. What makes it so powerful and honest?", "Solomon asked for wisdom instead of wealth or victory. What would you ask God for if you could ask for anything?"] },
      days: [
        { day: "Monday", summary: "2 Samuel 11\u201312: David stays home when kings go to war. He sees Bathsheba bathing, sends for her, she becomes pregnant. He arranges for her husband Uriah to be killed in battle. He marries Bathsheba. The Lord sends Nathan the prophet to David with a parable about a rich man who steals a poor man's only lamb. David is furious \u2014 until Nathan says: 'Thou art the man.'", scripture: "2 Samuel 11\u201312", focus: "2 Samuel 11:1\u20134", keyPrinciple: "David's sin began with staying home when kings went to war \u2014 displaced presence. Where we are matters.", reflect: "Where are you supposed to be \u2014 spiritually, relationally, vocationally \u2014 that you're currently avoiding?", pray: "Ask God to put you back in your right place.", act: "Return to one thing you've been avoiding \u2014 a relationship, a calling, a habit.", dailyQuote: { text: "It came to pass, in the time when kings go forth to battle, that David tarried still at Jerusalem.", source: "2 Samuel 11:1" }, resources: [{ title: "Thou Art the Man", url: "https://www.saintsunscripted.com", type: "Podcast", who: "Saints Unscripted" }, { title: "Don't Miss This \u2014 David and Bathsheba", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }, { title: "FSY: Repentance and Forgiveness", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/05repentance-and-forgiveness", type: "FSY Handbook", who: "For the Strength of Youth", note: "Today's reading shows someone facing consequences of sin \u2014 or being given a second chance. This FSY section teaches that repentance is always available and God's mercy can cover any mistake." }] },
        { day: "Wednesday", summary: "1 Kings 3; 6\u20137: David dies and Solomon becomes king. God appears to Solomon in a dream and offers him anything he wants. Solomon asks for wisdom to govern well. God is so pleased that Solomon asked for this \u2014 not wealth or victory \u2014 that He gives him wisdom AND wealth AND honor. Then Solomon builds the temple \u2014 seven years, thousands of workers, cedar from Lebanon.", scripture: "1 Kings 3; 6\u20137", focus: "1 Kings 3:5\u20139", keyPrinciple: "'Thou art the man.' Nathan's parable pierced what direct accusation couldn't. David's repentance was deep and real.", reflect: "Is there a 'thou art the man' moment you've been avoiding \u2014 a truth about yourself you haven't accepted?", pray: "Pray Psalm 51:1\u20134 as your own prayer today.", act: "Read Psalm 51 slowly, out loud, as if it's your own prayer.", dailyQuote: { text: "Create in me a clean heart, O God; and renew a right spirit within me.", source: "Psalm 51:10" }, resources: [{ title: "The Book of Mormon \u2014 Another Testament of Repentance", url: "https://www.churchofjesuschrist.org/study/general-conference/2017/10/the-book-of-mormon-what-would-your-life-be-like-without-it", type: "General Conference", who: "President Russell M. Nelson" }, { title: "Repentance Is Always Possible", url: "https://www.churchofjesuschrist.org/study/general-conference/2022/10/47christofferson", type: "General Conference", who: "Elder D. Todd Christofferson" }, { title: "FSY: Repentance and Forgiveness", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/05repentance-and-forgiveness", type: "FSY Handbook", who: "For the Strength of Youth", note: "Today's reading shows someone facing consequences of sin \u2014 or being given a second chance. This FSY section teaches that repentance is always available and God's mercy can cover any mistake." }] },
        { day: "Friday", summary: "1 Kings 8\u20139; 11: Solomon dedicates the temple with one of the greatest prayers in scripture: 'Hear thou in heaven thy dwelling place, and when thou hearest, forgive.' Fire comes down and fills the temple. The glory of God is so thick the priests cannot stand. Then Solomon's wives turn his heart to other gods. 'His heart was not perfect with the Lord his God, as was the heart of David his father.'", scripture: "1 Kings 8\u20139; 11", focus: "1 Kings 8:27\u201330", keyPrinciple: "Solomon asked for wisdom to govern God's people well. God gave him wisdom \u2014 and everything else.", reflect: "If God appeared to you and said 'Ask what I shall give thee,' what would you ask for?", pray: "Ask God for wisdom today \u2014 specifically for your most complex current situation.", act: "Identify one decision you're facing and ask for wisdom about it specifically.", dailyQuote: { text: "Give therefore thy servant an understanding heart to judge thy people, that I may discern between good and bad.", source: "1 Kings 3:9" }, resources: [{ title: "Wisdom and Wealth \u2014 Solomon's Lesson", url: "https://www.saintsunscripted.com", type: "Podcast", who: "Saints Unscripted" }, { title: "Don't Miss This \u2014 Solomon's Temple", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }, { title: "FSY: Temple and Family History", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/03temple-and-family-history", type: "FSY Handbook", who: "For the Strength of Youth", note: "Today's reading connects to God dwelling with His people. This section explains why temples matter and how to prepare spiritually to enter." }] },
        { day: "Saturday", scripture: "1 Kings 8:27\u201330", keyPrinciple: "Solomon's temple dedication: 'Hear thou in heaven their prayer.' God inhabits a temple \u2014 but heaven cannot contain Him.", reflect: "What does temple worship mean to you personally \u2014 not as a building but as a covenant space?", pray: "Pray Solomon's prayer \u2014 ask God to hear you in your specific need today.", act: "Plan your next temple visit or write what you love about temple worship.", dailyQuote: { text: "Hear thou in heaven thy dwelling place: and when thou hearest, forgive.", source: "1 Kings 8:30" } }
      ]
    },
    {
      week: 27,
      dates: "Jun 29\u2013Jul 5",
      ref: "1 Kings 12\u201313; 17\u201322",
      title: "How Long Halt Ye Between Two Opinions?",
      theme: "The kingdom split. Elijah challenged Israel to choose. After his greatest victory, he collapsed. God met him with bread and rest.",
      resources: [{ title: "The Prophet Elijah", url: "https://www.churchofjesuschrist.org/study/general-conference/1989/10/elijah-the-prophet", type: "General Conference", who: "Elder Joseph B. Wirthlin" }, { title: "Don't Miss This \u2014 1 Kings 12\u201313; 17\u201322", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }, { title: "Mental Health and Elijah's Depression", url: "https://www.saintsunscripted.com", type: "Podcast", who: "Saints Unscripted" }],
      ywPrep: { summary: "The kingdom split after Solomon. Elijah appeared on the scene and challenged 450 prophets of Baal on Mount Carmel \u2014 called down fire from heaven \u2014 and then immediately ran in fear from one woman. He sat under a juniper tree and asked to die. God didn't rebuke him. He sent an angel with food and said: 'Arise and eat, the journey is too great for thee.' God meets burnout with bread, rest, and a still small voice.", prompts: ["Elijah asked, 'How long halt ye between two opinions?' What areas of your life feel spiritually undecided?", "Elijah went from his greatest miracle to suicidal exhaustion in one day. Why do spiritual highs sometimes precede crashes?", "God's answer to Elijah's burnout was food, rest, and gentle touch \u2014 not a lecture. What does that teach about how God treats exhaustion?", "God was not in the wind, earthquake, or fire \u2014 but in the still small voice. How do you hear that voice in your own life?"] },
      days: [
        { day: "Monday", summary: "1 Kings 12\u201313; 17\u201318: The kingdom splits after Solomon. Rehoboam threatens heavier burdens; ten tribes follow Jeroboam north. Elijah appears from nowhere and announces a drought \u2014 no rain except at his word. God hides him by the brook Cherith where ravens bring him food. Then to Zarephath where a widow shares her last meal \u2014 her oil and flour never run out. Finally Elijah confronts 450 prophets of Baal on Mount Carmel and calls down fire from heaven.", scripture: "1 Kings 12\u201313; 17\u201318", focus: "1 Kings 18:21", keyPrinciple: "'How long halt ye between two opinions? If the Lord be God, follow Him.' No more fence-sitting.", reflect: "Where are you fence-sitting between God and something else right now?", pray: "Ask God for the clarity and courage to fully choose one side.", act: "Pick one area of spiritual fence-sitting and make a real decision today.", dailyQuote: { text: "How long halt ye between two opinions? if the Lord be God, follow him: but if Baal, then follow him.", source: "1 Kings 18:21" }, resources: [{ title: "Choose Ye This Day", url: "https://www.churchofjesuschrist.org/study/general-conference/2004/10/choose-you-this-day", type: "General Conference", who: "Elder Russell M. Nelson" }, { title: "Don't Miss This \u2014 Kingdom Divided; Elijah", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }, { title: "FSY: Agency and Integrity", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/04agency-and-integrity", type: "FSY Handbook", who: "For the Strength of Youth", note: "Agency is at the heart of today's reading. God gives commandments but never forces obedience \u2014 the choice is always ours. This section explores how to make choices aligned with God's will." }] },
        { day: "Wednesday", summary: "1 Kings 19: After the greatest miracle of his life, Elijah receives a death threat from Jezebel and runs. He sits under a juniper tree and asks to die: 'It is enough; now, O Lord, take away my life.' An angel touches him \u2014 twice \u2014 with food and water. God does not rebuke him. He says: 'The journey is too great for thee.' Then God appears \u2014 not in wind, earthquake, or fire \u2014 but in a still small voice.", scripture: "1 Kings 19", focus: "1 Kings 19:4\u20137", keyPrinciple: "Elijah called down fire and then immediately ran in fear. Spiritual highs don't protect us from exhaustion.", reflect: "When have you had a major spiritual victory followed quickly by a crash?", pray: "Ask God to sustain you after the mountain, not just on it.", act: "Do something today that fills your tank \u2014 rest, nature, real food, a conversation that matters.", dailyQuote: { text: "It is enough; now, O Lord, take away my life; for I am not better than my fathers.", source: "1 Kings 19:4" }, resources: [{ title: "Beware of Pride", url: "https://www.churchofjesuschrist.org/study/general-conference/1989/04/beware-of-pride", type: "General Conference", who: "President Ezra Taft Benson" }, { title: "Elijah and the Still Small Voice", url: "https://www.saintsunscripted.com", type: "Podcast", who: "Saints Unscripted" }, { title: "FSY: Physical Health", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/08physical-health", type: "FSY Handbook", who: "For the Strength of Youth", note: "Today's reading involves the physical body \u2014 its limits or miraculous capacity. This section teaches that the body is sacred and how we treat it reflects what we believe." }] },
        { day: "Friday", summary: "1 Kings 20\u201322: Ahab fights Ben-Hadad of Syria and wins \u2014 twice, against impossible odds, because God is showing He is Lord everywhere, not just in the hills. Then Ahab covets Naboth's vineyard. Naboth refuses to sell his inheritance. Jezebel arranges Naboth's murder. Elijah confronts Ahab: 'Hast thou killed, and also taken possession?' Ahab's humiliation before God. Jehoshaphat joins a disastrous alliance with Ahab \u2014 the danger of choosing the wrong partnerships.", scripture: "1 Kings 20\u201322", focus: "1 Kings 19:11\u201313", keyPrinciple: "God fed Elijah, let him sleep, and fed him again. He didn't lecture him. The journey is too great for you alone.", reflect: "When have you been so depleted that God's answer was simply: eat, rest, eat again?", pray: "Ask God to meet your exhaustion with provision, not demands.", act: "Rest without guilt today. Nourish your body. Treat it as sacred.", dailyQuote: { text: "Arise and eat; because the journey is too great for thee.", source: "1 Kings 19:7" }, resources: [{ title: "Rest Unto Your Souls", url: "https://www.churchofjesuschrist.org/study/general-conference/2022/10/35oaks", type: "General Conference", who: "President Dallin H. Oaks" }, { title: "Spiritual Burnout and the Juniper Tree", url: "https://www.saintsunscripted.com", type: "Podcast", who: "Saints Unscripted" }, { title: "FSY: Physical Health", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/08physical-health", type: "FSY Handbook", who: "For the Strength of Youth", note: "Today's reading involves the physical body \u2014 its limits or miraculous capacity. This section teaches that the body is sacred and how we treat it reflects what we believe." }] },
        { day: "Saturday", scripture: "1 Kings 19:11\u201313", keyPrinciple: "God was not in the wind, earthquake, or fire. He was in the still small voice. Quiet is where He speaks.", reflect: "What noise in your life might be drowning out the still small voice?", pray: "Get still and quiet. Sit for five minutes and just listen.", act: "Identify one thing this week you can turn off to hear God more clearly.", dailyQuote: { text: "And after the fire a still small voice. And it was so, when Elijah heard it, that he wrapped his face in his mantle.", source: "1 Kings 19:12\u201313" } }
      ]
    },
    {
      week: 28,
      dates: "Jul 6\u201312",
      ref: "2 Kings 2\u20137",
      title: "There Is a Prophet in Israel",
      theme: "Elisha received a double portion. Oil multiplied, Naaman healed, eyes opened to heaven's armies.",
      resources: [{ title: "Are We Not All Beggars?", url: "https://www.churchofjesuschrist.org/study/general-conference/2014/10/are-we-not-all-beggars", type: "General Conference", who: "Elder Jeffrey R. Holland" }, { title: "Don't Miss This \u2014 2 Kings 2\u20137 (Elisha)", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }],
      ywPrep: { summary: "Elisha refused to leave Elijah's side three times, then asked for a double portion of his spirit. After Elijah was taken to heaven, Elisha performed miracle after miracle: a widow's oil multiplied, a child raised from the dead, Naaman healed of leprosy despite his pride, and his servant's eyes opened to see the armies of heaven surrounding them. 'Fear not \u2014 they that be with us are more than they that be with them.'", prompts: ["Elisha refused to leave Elijah no matter how many times he was told to stay. Who in your life is worth that kind of persistence?", "The widow's oil multiplied until she ran out of vessels. What does that teach about preparation and faith?", "Naaman nearly missed his healing because the cure seemed too simple. What simple things does God ask that we sometimes resist?", "Elisha prayed and his servant saw the armies of heaven. What unseen support do you believe God has around you?"] },
      days: [
        { day: "Monday", summary: "2 Kings 2: Elijah is about to be taken to heaven. He tries three times to tell Elisha to stay behind \u2014 Elisha refuses each time: 'As the Lord liveth, I will not leave thee.' They cross the Jordan. A chariot of fire separates them. Elijah ascends in a whirlwind. Elisha picks up Elijah's mantle and parts the Jordan himself. The double portion of the spirit rests on him.", scripture: "2 Kings 2:2\u20136, 9\u201310", keyPrinciple: "Elisha refused to leave Elijah three times. His persistence and loyalty earned a double portion.", reflect: "Who in your life is worth staying close to \u2014 a mentor, parent, or leader \u2014 even when others pull away?", pray: "Ask God for the persistence to stay near people who are leading you toward Him.", act: "Express genuine gratitude to one mentor or leader in your life today.", dailyQuote: { text: "As the Lord liveth, and as thy soul liveth, I will not leave thee.", source: "2 Kings 2:4" }, resources: [{ title: "Loyalty", url: "https://www.churchofjesuschrist.org/study/general-conference/2016/10/loyalty", type: "General Conference", who: "Elder Thomas S. Monson" }, { title: "Don't Miss This \u2014 Elisha; Double Portion", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }, { title: "FSY: Relationships", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/06relationships", type: "FSY Handbook", who: "For the Strength of Youth", note: "Today's reading involves a key relationship between people or between a person and God. This FSY section explores what healthy, God-centered relationships look like." }] },
        { day: "Wednesday", summary: "2 Kings 4: A widow's husband has died leaving debts. Creditors are coming to take her sons as slaves. Elisha asks: 'What do you have in the house?' A little oil. He tells her to gather empty vessels \u2014 as many as possible \u2014 and pour. The oil fills every vessel. It stops when the vessels run out. The miracle matched her preparation.", scripture: "2 Kings 4:1\u20137", keyPrinciple: "The widow's oil multiplied until she ran out of vessels. The miracle stopped when preparation stopped.", reflect: "What vessels are you preparing for God to fill?", pray: "Ask God to show you how to prepare for the blessing that is coming.", act: "Do one act of preparation today for a future opportunity or responsibility.", dailyQuote: { text: "And it came to pass, when the vessels were full... And the oil stayed.", source: "2 Kings 4:6" }, resources: [{ title: "The Widow's Mite \u2014 and Ours", url: "https://www.churchofjesuschrist.org/study/general-conference/2012/10/the-windows-of-heaven", type: "General Conference", who: "Elder David A. Bednar" }, { title: "Don't Miss This \u2014 Widow's Oil; Naaman", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }, { title: "FSY: Giving Service", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/11giving-service", type: "FSY Handbook", who: "For the Strength of Youth", note: "Today's reading features someone who gives more than expected \u2014 or fails to. This section explores why serving others is central to discipleship." }] },
        { day: "Friday", summary: "2 Kings 5\u20137: Naaman, the commander of Syria's army, has leprosy. His Israelite servant girl says there is a prophet in Israel. Naaman arrives at Elisha's house. Elisha sends a messenger \u2014 he doesn't even come out \u2014 and says: go wash in the Jordan seven times. Naaman is furious. His servants persuade him. He dips seven times. He is clean. Then Elisha's servant Gehazi lies to get the reward \u2014 and receives Naaman's leprosy instead.", scripture: "2 Kings 5:10\u201314", keyPrinciple: "Naaman almost missed his healing because God's instructions seemed too simple and beneath him.", reflect: "What has God asked you to do that seemed too simple or too humble to take seriously?", pray: "Ask God if there's a simple instruction you've been resisting.", act: "Do one simple, unglamorous act of obedience today.", dailyQuote: { text: "So he went down, and dipped himself seven times in Jordan... and he was clean.", source: "2 Kings 5:14" }, resources: [{ title: "The Vision of Heaven's Armies", url: "https://www.saintsunscripted.com", type: "Podcast", who: "Saints Unscripted" }, { title: "Fear Not, I Am with Thee", url: "https://www.churchofjesuschrist.org/study/general-conference/2013/04/fear-not-i-am-with-thee", type: "General Conference", who: "Elder Jeffrey R. Holland" }, { title: "FSY: Living the Gospel", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/12living-the-gospel", type: "FSY Handbook", who: "For the Strength of Youth", note: "Today's reading illustrates what it looks like to live the gospel fully \u2014 or to drift from it. This section describes what it means to be an active disciple in everyday life." }] },
        { day: "Saturday", scripture: "2 Kings 6:15\u201317", keyPrinciple: "'Fear not \u2014 they that be with us are more than they that be with them.' Elisha prayed and his servant saw heaven's armies.", reflect: "What unseen support do you believe God has around you right now?", pray: "Ask God to open your eyes to the help around you that you can't currently see.", act: "Write three unseen ways God may be supporting you right now.", dailyQuote: { text: "Fear not: for they that be with us are more than they that be with them.", source: "2 Kings 6:16" } }
      ]
    },
    {
      week: 29,
      dates: "Jul 13\u201319",
      ref: "2 Kings 16\u201325",
      title: "They Served Other Gods",
      theme: "Israel fell to Assyria. Judah fell to Babylon. Generations of warnings. Choices have generational consequences.",
      resources: [{ title: "The Consequences of Bad Choices", url: "https://www.churchofjesuschrist.org/study/general-conference/2015/04/choose-the-right", type: "General Conference", who: "Elder M. Russell Ballard" }, { title: "Don't Miss This \u2014 2 Kings 16\u201325", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }],
      ywPrep: { summary: "Israel was conquered by Assyria and scattered. Judah lasted longer \u2014 Hezekiah prayed and God held back Assyria. But eventually Judah fell to Babylon. The temple was destroyed. The people were carried away captive. It took generations of warnings before the consequences came. This is a sobering and important section: choices have consequences that outlast individual lifetimes. Yet even in captivity, God promised to return them.", prompts: ["Israel and Judah had prophets warning them for generations. Why do people ignore prophets even when they know they're right?", "Hezekiah spread his letter before the Lord and prayed specifically. What does his example teach about bringing crisis to God?", "The temple was destroyed \u2014 the place where God said He would dwell. What is lost when covenant places and practices are abandoned?", "After everything, God still promised to bring His people back. Why does God always leave the door open?"] },
      days: [
        { day: "Monday", summary: "2 Kings 17\u201318: The northern kingdom of Israel is conquered by Assyria and the people scattered \u2014 the 'ten lost tribes.' Why? They had been warned by prophet after prophet and would not listen. They served idols, passed children through fire, rejected the covenant. Then Hezekiah becomes king in Judah \u2014 'He trusted in the Lord God of Israel, and after him was none like him among all the kings of Judah.'", scripture: "2 Kings 17:7\u20139, 13\u201314", keyPrinciple: "Israel fell because they wouldn't hear the prophets and walked in the ways of the nations. Ignoring God has consequences.", reflect: "What warnings are you hearing from prophets right now that you might be setting aside?", pray: "Ask God to help you hear and act on prophetic counsel even when it's inconvenient.", act: "Read one recent general conference talk and identify one personal application.", dailyQuote: { text: "The Lord testified against Israel... Notwithstanding they would not hear, but hardened their necks.", source: "2 Kings 17:13\u201314" }, resources: [{ title: "Living with the Warning Voice of Prophets", url: "https://www.churchofjesuschrist.org/study/general-conference/2013/04/receiving-a-testimony-of-light-and-truth", type: "General Conference", who: "Elder Neil L. Andersen" }, { title: "Don't Miss This \u2014 Israel Falls; Assyria", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }, { title: "FSY: Living the Gospel", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/12living-the-gospel", type: "FSY Handbook", who: "For the Strength of Youth", note: "Today's reading illustrates what it looks like to live the gospel fully \u2014 or to drift from it. This section describes what it means to be an active disciple in everyday life." }] },
        { day: "Wednesday", summary: "2 Kings 18\u201319: Sennacherib of Assyria invades Judah and sends a threatening letter to Hezekiah. Hezekiah takes the letter into the temple and spreads it before the Lord: 'Thou art the God, even thou alone, of all the kingdoms of the earth. Bow thine ear, O Lord, and hear.' That night the angel of the Lord strikes 185,000 Assyrian soldiers dead.", scripture: "2 Kings 18:5\u20137; 19:14\u201319", keyPrinciple: "Hezekiah spread the threatening letter before God and prayed. He didn't panic \u2014 he prayed with specifics.", reflect: "What 'threatening letter' \u2014 bad news, hard diagnosis, impossible situation \u2014 do you need to spread before God?", pray: "Lay your specific fear before God exactly as Hezekiah did.", act: "Write out your worst fear on paper and then write one promise of God next to it.", dailyQuote: { text: "Hezekiah received the letter... and spread it before the Lord. And Hezekiah prayed.", source: "2 Kings 19:14\u201315" }, resources: [{ title: "Come to Zion", url: "https://www.churchofjesuschrist.org/study/general-conference/2008/10/come-to-zion", type: "General Conference", who: "Elder D. Todd Christofferson" }, { title: "Hezekiah's Prayer \u2014 A Model for Crisis", url: "https://www.saintsunscripted.com", type: "Podcast", who: "Saints Unscripted" }, { title: "FSY: Agency and Integrity", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/04agency-and-integrity", type: "FSY Handbook", who: "For the Strength of Youth", note: "Agency is at the heart of today's reading. God gives commandments but never forces obedience \u2014 the choice is always ours. This section explores how to make choices aligned with God's will." }] },
        { day: "Friday", summary: "2 Kings 20\u201325: Hezekiah shows Babylon all his treasures \u2014 a mistake. Isaiah says: everything here will be carried to Babylon. Manasseh, Hezekiah's son, is the worst king Judah ever had \u2014 he fills Jerusalem with innocent blood. Josiah is the last good king \u2014 he finds the book of the law and tears his clothes in grief. Jerusalem eventually falls to Babylon.", scripture: "2 Kings 22:1\u20132; 23:1\u20133", keyPrinciple: "Josiah found the scriptures and immediately wept and repented and led his entire people in renewal.", reflect: "When did reading the scriptures last move you to genuine action or change?", pray: "Ask God to make the scriptures living and active for you \u2014 not just familiar.", act: "Read one passage slowly today and ask: what does God want me to do because of this?", dailyQuote: { text: "And Josiah made a covenant before the Lord, to walk after the Lord, and to keep his commandments.", source: "2 Kings 23:3" }, resources: [{ title: "The Prophet Joseph Smith \u2014 Teacher by Example", url: "https://www.churchofjesuschrist.org/study/general-conference/2009/04/prophets-and-apostles", type: "General Conference", who: "Elder M. Russell Ballard" }, { title: "Don't Miss This \u2014 Judah Falls; Babylon", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }, { title: "FSY: Living the Gospel", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/12living-the-gospel", type: "FSY Handbook", who: "For the Strength of Youth", note: "Today's reading illustrates what it looks like to live the gospel fully \u2014 or to drift from it. This section describes what it means to be an active disciple in everyday life." }] },
        { day: "Saturday", scripture: "Jeremiah 29:10\u201311", keyPrinciple: "Even in captivity, God promised a future and a hope. He never leaves the door permanently closed.", reflect: "What captivity in your life \u2014 a habit, a hard season, a relationship \u2014 might God be promising to return you from?", pray: "Claim Jeremiah 29:11 as your personal promise today.", act: "Write Jeremiah 29:11 somewhere you'll see it this week.", dailyQuote: { text: "I know the thoughts that I think toward you, saith the Lord, thoughts of peace, and not of evil, to give you an expected end.", source: "Jeremiah 29:11" } }
      ]
    },
    {
      week: 30,
      dates: "Jul 20\u201326",
      ref: "2 Chronicles 14\u201320; 26; 30",
      title: "Set Your Heart to Seek the Lord",
      theme: "Asa and Jehoshaphat sought the Lord and He delivered impossible odds. Set your heart fully toward Him.",
      resources: [{ title: "Seek the Lord While He May Be Found", url: "https://www.churchofjesuschrist.org/study/general-conference/2009/10/seek-the-lord-while-he-may-be-found", type: "General Conference", who: "Elder Richard G. Scott" }, { title: "Don't Miss This \u2014 2 Chronicles 14\u201320; 26; 30", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }],
      ywPrep: { summary: "2 Chronicles focuses on the kings of Judah who sought the Lord \u2014 Asa, Jehoshaphat, Hezekiah, Josiah. Jehoshaphat faced an impossible army and was told: 'The battle is not yours but God's. Set yourselves, stand ye still, and see the salvation of the Lord.' They fasted, prayed, and then went out singing \u2014 and their enemies destroyed each other. What they set out to fight was already defeated.", prompts: ["Jehoshaphat's battle plan was to send singers out first. What does that kind of radical trust look like?", "God told them, 'Set yourselves, stand ye still, and see the salvation of the Lord.' When have you had to stand still and watch God work?", "The Chronicler focuses on what people sought \u2014 those who sought God flourished, those who didn't fell. What are you actively seeking right now?", "Hezekiah reopened the temple and reinstituted the Passover after years of neglect. What in your spiritual life needs to be reopened or renewed?"] },
      days: [
        { day: "Monday", summary: "2 Chronicles 17\u201320: Jehoshaphat is a good king who removes the high places and sends teachers throughout Judah. Three armies come against him. His response: he proclaims a fast and prays in the temple. God speaks through a prophet: 'Fear not \u2014 the battle is not yours, but God's.' Jehoshaphat sends singers ahead of the army praising God. The enemies destroy each other.", scripture: "2 Chronicles 14:11", keyPrinciple: "Asa prayed: 'Lord, it is nothing with thee to help, whether with many or with them that have no power.' God is not limited by odds.", reflect: "What impossible situation are you facing where you need to remember that God is not limited by numbers?", pray: "Pray Asa's prayer today. Tell God the odds are nothing to Him.", act: "Stop calculating odds and start calculating God's track record.", dailyQuote: { text: "Lord, it is nothing with thee to help, whether with many or with them that have no power: help us, O Lord our God.", source: "2 Chronicles 14:11" }, resources: [{ title: "Seek the Lord While He May Be Found", url: "https://www.churchofjesuschrist.org/study/general-conference/2009/10/seek-the-lord-while-he-may-be-found", type: "General Conference", who: "Elder Richard G. Scott" }, { title: "Don't Miss This \u2014 Chronicles; Jehoshaphat", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }, { title: "FSY: Living the Gospel", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/12living-the-gospel", type: "FSY Handbook", who: "For the Strength of Youth", note: "Today's reading illustrates what it looks like to live the gospel fully \u2014 or to drift from it. This section describes what it means to be an active disciple in everyday life." }] },
        { day: "Wednesday", summary: "2 Chronicles 20\u201324: The battle of praise and faith \u2014 Jehoshaphat's army goes out singing. When they arrive, they find only dead bodies. No fighting required. Jehoshaphat's mistake: he makes an alliance with wicked Ahaziah. The ships they build together are wrecked. Bad partnerships break good plans.", scripture: "2 Chronicles 20:15, 17", keyPrinciple: "'The battle is not yours but God's. Stand ye still and see the salvation of the Lord.' They sent singers first.", reflect: "Is there a battle in your life God is asking you to stop fighting and hand over to Him completely?", pray: "Hand one specific battle to God today. Say it out loud.", act: "Write the thing you're fighting. Then write: 'The battle is the Lord's.'", dailyQuote: { text: "Be not afraid nor dismayed by reason of this great multitude; for the battle is not yours, but God's.", source: "2 Chronicles 20:15" }, resources: [{ title: "The Battle Is the Lord's", url: "https://www.saintsunscripted.com", type: "Podcast", who: "Saints Unscripted" }, { title: "Put Your Trust in the Lord", url: "https://www.churchofjesuschrist.org/study/general-conference/2019/10/33christofferson", type: "General Conference", who: "Elder D. Todd Christofferson" }, { title: "FSY: Agency and Integrity", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/04agency-and-integrity", type: "FSY Handbook", who: "For the Strength of Youth", note: "Agency is at the heart of today's reading. God gives commandments but never forces obedience \u2014 the choice is always ours. This section explores how to make choices aligned with God's will." }] },
        { day: "Friday", summary: "2 Chronicles 29\u201332; 34\u201336: Hezekiah reopens the temple, cleans it, restores the Levites and the Passover. Josiah discovers the book of the law and weeps. He makes covenant renewal the centerpiece of his reign. Both kings demonstrate that one faithful person can change the spiritual trajectory of a nation \u2014 even briefly.", scripture: "2 Chronicles 30:9", keyPrinciple: "Hezekiah reinstituted the Passover: 'The Lord your God is gracious and merciful and will not turn away his face from you, if ye return unto him.'", reflect: "What covenant practice or spiritual habit have you let lapse that you want to return to?", pray: "Ask God to restore something spiritually that has gone quiet.", act: "Restart one practice \u2014 scripture study, fasting, journaling \u2014 that you've let go.", dailyQuote: { text: "The Lord your God is gracious and merciful, and will not turn away his face from you, if ye return unto him.", source: "2 Chronicles 30:9" }, resources: [{ title: "Thou Shalt Have No Other Gods", url: "https://www.churchofjesuschrist.org/study/general-conference/2013/04/thou-shalt-have-no-other-gods", type: "General Conference", who: "Elder Dallin H. Oaks" }, { title: "Don't Miss This \u2014 Hezekiah; Josiah", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }, { title: "FSY: Covenant Path", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/02covenant-path", type: "FSY Handbook", who: "For the Strength of Youth", note: "Covenants are the backbone of today's reading. This section explains what it means to be on the covenant path and how every ordinance connects us more deeply to God." }] },
        { day: "Saturday", scripture: "2 Chronicles 26:4\u20135; 26:16", keyPrinciple: "Uzziah prospered as long as he sought God. When he became strong, his heart was lifted up to his own destruction.", reflect: "What success or strength in your life carries the risk of making you less dependent on God?", pray: "Ask God to keep you humble in the places where you are strong.", act: "Identify one area of personal strength. Deliberately thank God for it and credit Him.", dailyQuote: { text: "He sought God in the days of Zechariah... and as long as he sought the Lord, God made him to prosper.", source: "2 Chronicles 26:5" } }
      ]
    },
    {
      week: 31,
      dates: "Jul 27\u2013Aug 2",
      ref: "Ezra 1; 3\u20137; Nehemiah 2; 4\u20136; 8",
      title: "They Strengthened Their Hands for the Good Work",
      theme: "The exiles returned and rebuilt. They worked with one hand and held a sword in the other. The work matters.",
      resources: [{ title: "The Work of Nehemiah", url: "https://www.churchofjesuschrist.org/study/ensign/1979/10/nehemiah-man-of-prayer-and-action", type: "Ensign", who: "James E. Talmage" }, { title: "Don't Miss This \u2014 Ezra; Nehemiah", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }],
      ywPrep: { summary: "The exiles returned to Jerusalem and faced a massive rebuilding project. The temple was rebuilt against opposition. Nehemiah rebuilt the wall in 52 days while enemies mocked and threatened \u2014 the workers built with one hand and held a sword in the other. Ezra read the scriptures to the whole congregation and they wept. The people renewed their covenants. Rebuilding after destruction is possible \u2014 one section at a time.", prompts: ["The wall was rebuilt in 52 days despite constant opposition. What in your life is worth that kind of sustained, focused effort?", "Nehemiah's people built with one hand and held a sword in the other. What does it mean to work and stay spiritually vigilant at the same time?", "Ezra read the law and the people wept. When did hearing scripture last genuinely move you?", "The exiles rebuilt specifically \u2014 each family took a section of the wall. What is your section right now?"] },
      days: [
        { day: "Monday", summary: "Ezra 1\u20136: Cyrus of Persia, fulfilling Isaiah's prophecy by name, issues a decree for the Jews to return to Jerusalem and rebuild the temple. Fifty thousand return. They lay the foundation \u2014 the old men who remember Solomon's temple weep; the young men who have never seen it shout for joy. Enemies oppose the work. The building stops for fifteen years. Then Haggai and Zechariah prophesy and the people build again.", scripture: "Ezra 3:10\u201313", keyPrinciple: "When the foundation of the temple was laid, some wept and some shouted for joy. New beginnings hold both grief and hope.", reflect: "Is there something you're rebuilding right now that holds both grief for what was lost and hope for what's ahead?", pray: "Ask God to give you the courage to begin again, even with tears.", act: "Identify one thing you are in the process of rebuilding and take one small step today.", dailyQuote: { text: "The people could not discern the noise of the shout of joy from the noise of the weeping of the people.", source: "Ezra 3:13" }, resources: [{ title: "Rebuilding after Loss", url: "https://www.saintsunscripted.com", type: "Podcast", who: "Saints Unscripted" }, { title: "Don't Miss This \u2014 Ezra; Return from Exile", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }, { title: "FSY: Giving Service", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/11giving-service", type: "FSY Handbook", who: "For the Strength of Youth", note: "Today's reading features someone who gives more than expected \u2014 or fails to. This section explores why serving others is central to discipleship." }] },
        { day: "Wednesday", summary: "Nehemiah 1\u20134: Nehemiah, cupbearer to the Persian king, hears that Jerusalem's walls are broken down. He weeps and fasts for days. He prays and asks the king for permission to rebuild. The king grants it. Nehemiah arrives in Jerusalem at night and surveys the walls alone. Then he organizes the people \u2014 every family rebuilds the section of wall in front of their own house. Enemies mock and threaten. The workers build with one hand and hold a weapon with the other.", scripture: "Nehemiah 4:17\u201318", keyPrinciple: "They built with one hand and held a sword in the other. Faithful work and spiritual vigilance at the same time.", reflect: "What important work is God asking you to do right now while staying spiritually alert?", pray: "Ask God to give you both focus for the work and awareness of spiritual opposition.", act: "Do something productive today while intentionally staying in prayer about it.", dailyQuote: { text: "Every one with one of his hands wrought in the work, and with the other hand held a weapon.", source: "Nehemiah 4:17" }, resources: [{ title: "Do Not Weary in Well-Doing", url: "https://www.churchofjesuschrist.org/study/general-conference/2017/10/do-not-weary-in-well-doing", type: "General Conference", who: "Elder Quentin L. Cook" }, { title: "Don't Miss This \u2014 Nehemiah Builds the Wall", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }, { title: "FSY: Giving Service", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/11giving-service", type: "FSY Handbook", who: "For the Strength of Youth", note: "Today's reading features someone who gives more than expected \u2014 or fails to. This section explores why serving others is central to discipleship." }] },
        { day: "Friday", summary: "Nehemiah 8\u201310: Ezra the priest stands before all the assembled people \u2014 men, women, children old enough to understand \u2014 and reads the law from morning until noon. The people weep as they hear it. Nehemiah, Ezra, and the Levites say: 'This day is holy. Weep not. The joy of the Lord is your strength.' They celebrate the Feast of Tabernacles \u2014 not done since Joshua's day.", scripture: "Nehemiah 8:8\u201310", keyPrinciple: "Ezra read the law and the people wept. Nehemiah said: the joy of the Lord is your strength. Don't mourn \u2014 rejoice.", reflect: "When did hearing or reading scripture last genuinely move you to tears or deep emotion?", pray: "Ask God to make His word living and powerful for you again \u2014 not just familiar.", act: "Read a passage of scripture today and sit with it until it moves you.", dailyQuote: { text: "The joy of the Lord is your strength.", source: "Nehemiah 8:10" }, resources: [{ title: "The Joy of the Lord Is Your Strength", url: "https://www.churchofjesuschrist.org/study/general-conference/2016/10/the-joy-of-the-lord-is-your-strength", type: "General Conference", who: "Elder David A. Bednar" }, { title: "Don't Miss This \u2014 Ezra Reads the Law", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }, { title: "FSY: Living the Gospel", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/12living-the-gospel", type: "FSY Handbook", who: "For the Strength of Youth", note: "Today's reading illustrates what it looks like to live the gospel fully \u2014 or to drift from it. This section describes what it means to be an active disciple in everyday life." }] },
        { day: "Saturday", scripture: "Nehemiah 6:3", keyPrinciple: "'I am doing a great work, so that I cannot come down.' Nehemiah refused to be distracted from God's assignment.", reflect: "What great work has God given you that you need to stop coming down from?", pray: "Ask God to help you protect the work He has called you to do.", act: "Say no to one thing today that would pull you away from what matters most.", dailyQuote: { text: "I am doing a great work, so that I cannot come down: why should the work cease, whilst I leave it?", source: "Nehemiah 6:3" } }
      ]
    },
    {
      week: 32,
      dates: "Aug 3\u20139",
      ref: "Esther",
      title: "Who Knoweth Whether Thou Art Come for Such a Time as This?",
      theme: "Esther was placed in her position for such a time as this. So are you.",
      resources: [{ title: "For Such a Time as This", url: "https://www.churchofjesuschrist.org/study/general-conference/2014/04/for-such-a-time-as-this", type: "General Conference", who: "Elder Michael T. Ringwood" }, { title: "Don't Miss This \u2014 Esther", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }, { title: "FSY: Agency and Integrity", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/04agency-and-integrity", type: "FSY Handbook", who: "For the Strength of Youth", note: "Agency is at the heart of today's reading. God gives commandments but never forces obedience \u2014 the choice is always ours. This section explores how to make choices aligned with God's will." }],
      ywPrep: { summary: "Esther was a Jewish girl who became queen in Persia. When an order came to destroy all Jews, her cousin Mordecai told her: 'Who knoweth whether thou art come to the kingdom for such a time as this?' Esther fasted three days, went to the king uninvited \u2014 at the risk of her life \u2014 and saved her people. Her bravery was preceded by fasting, community, and clarity of purpose.", prompts: ["Mordecai told Esther she was placed in her position for such a time as this. Where do you feel that kind of divine placement right now?", "Esther said, 'If I perish, I perish.' What would it look like to commit fully to something God is asking regardless of the cost?", "Esther fasted and asked others to fast with her before she acted. What does that preparation teach about courage?", "Who is your Mordecai \u2014 someone who tells you hard truths and pushes you toward your purpose?"] },
      days: [
        { day: "Monday", summary: "Esther 1\u20134: Ahasuerus throws a feast and demands his queen Vashti appear before the crowd. She refuses. She is deposed. A search for a new queen leads to Esther \u2014 a Jewish woman who has concealed her identity. Her cousin Mordecai overhears a plot to kill the king and reports it. Haman is promoted and demands everyone bow. Mordecai refuses. Haman plots to destroy all Jews.", scripture: "Esther 4:13\u201314", keyPrinciple: "'Who knoweth whether thou art come to the kingdom for such a time as this?' You are not in your position by accident.", reflect: "Where do you feel a sense of divine placement right now \u2014 in your family, calling, school, or community?", pray: "Ask God to show you what 'such a time as this' looks like for your specific life.", act: "Write one way your current position uniquely equips you to do something only you can do.", dailyQuote: { text: "Who knoweth whether thou art come to the kingdom for such a time as this?", source: "Esther 4:14" }, resources: [{ title: "For Such a Time as This", url: "https://www.churchofjesuschrist.org/study/general-conference/2014/04/for-such-a-time-as-this", type: "General Conference", who: "Elder Michael T. Ringwood" }, { title: "Don't Miss This \u2014 Esther", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }] },
        { day: "Wednesday", summary: "Esther 4\u20135: Mordecai tells Esther about Haman's plan. She says she cannot go to the king unsummoned \u2014 it could mean death. Mordecai sends back: 'Who knoweth whether thou art come to the kingdom for such a time as this?' Esther asks all Jews to fast for three days. Then she goes to the king. He extends the golden scepter. She is received.", scripture: "Esther 4:15\u201316", keyPrinciple: "'If I perish, I perish.' Esther committed fully, without guaranteeing the outcome first.", reflect: "Is there something God is asking you to do that you've been waiting for a guarantee before starting?", pray: "Ask God for Esther's kind of all-in commitment.", act: "Take one step toward a thing God has asked that you've been waiting to feel safe about first.", dailyQuote: { text: "So will I go in unto the king, which is not according to the law: and if I perish, I perish.", source: "Esther 4:16" }, resources: [{ title: "Courage to Stand as a Witness", url: "https://www.churchofjesuschrist.org/study/general-conference/2018/04/stand-as-witnesses-of-god", type: "General Conference", who: "Elder Gary E. Stevenson" }, { title: "If I Perish, I Perish \u2014 Esther's Faith", url: "https://www.saintsunscripted.com", type: "Podcast", who: "Saints Unscripted" }, { title: "FSY: Agency and Integrity", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/04agency-and-integrity", type: "FSY Handbook", who: "For the Strength of Youth", note: "Agency is at the heart of today's reading. God gives commandments but never forces obedience \u2014 the choice is always ours. This section explores how to make choices aligned with God's will." }] },
        { day: "Friday", summary: "Esther 6\u201310: Haman has built a gallows for Mordecai. But the king, sleepless, has records read to him and discovers Mordecai was never rewarded for saving his life. Haman arrives to ask permission to hang Mordecai \u2014 and is asked: 'What should be done for a man the king delights to honor?' He thinks the king means him. He is forced to honor Mordecai publicly. The plan unravels. Haman is hanged on his own gallows.", scripture: "Esther 5:1\u20133", keyPrinciple: "The king held out the golden scepter. Esther found favor. What she risked, God honored.", reflect: "When have you stepped out in faith and found God's favor waiting on the other side?", pray: "Ask God to give you the courage to approach what you've been afraid of.", act: "Do one thing today that requires walking into an uncertain room.", dailyQuote: { text: "And it was so, when the king saw Esther the queen standing in the court, that she obtained favour in his sight.", source: "Esther 5:2" }, resources: [{ title: "Courageous Covenant Keeping", url: "https://www.churchofjesuschrist.org/study/general-conference/2019/10/15costa", type: "General Conference", who: "Elder Claudio D. Costa" }, { title: "Esther \u2014 Placed for a Purpose", url: "https://www.saintsunscripted.com", type: "Podcast", who: "Saints Unscripted" }, { title: "FSY: Agency and Integrity", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/04agency-and-integrity", type: "FSY Handbook", who: "For the Strength of Youth", note: "Agency is at the heart of today's reading. God gives commandments but never forces obedience \u2014 the choice is always ours. This section explores how to make choices aligned with God's will." }] },
        { day: "Saturday", scripture: "Esther 8:16\u201317", keyPrinciple: "After Esther acted, there was light and gladness and joy and honour. Courage produces flourishing.", reflect: "What would flourish in your community if you had the courage to act on what God has put in your heart?", pray: "Ask God to let your obedience produce light and gladness for those around you.", act: "Do one courageous thing today for someone else's benefit, not your own.", dailyQuote: { text: "The Jews had light, and gladness, and joy, and honour.", source: "Esther 8:16" } }
      ]
    },
    {
      week: 33,
      dates: "Aug 10\u201316",
      ref: "Job 1\u20133; 12\u201314; 19; 21\u201324; 38\u201340; 42",
      title: "I Know That My Redeemer Liveth",
      theme: "Job suffered without explanation. In the darkest moment he declared: I know that my Redeemer lives.",
      resources: [{ title: "Where Justice, Love, and Mercy Meet", url: "https://www.churchofjesuschrist.org/study/general-conference/2015/04/where-justice-love-and-mercy-meet", type: "General Conference", who: "Elder Jeffrey R. Holland" }, { title: "Don't Miss This \u2014 Job", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }, { title: "Why Bad Things Happen to Good People", url: "https://www.saintsunscripted.com", type: "Podcast", who: "Saints Unscripted" }],
      ywPrep: { summary: "Job lost everything \u2014 his children, his health, his wealth. His friends offered theological explanations. God showed up in a whirlwind and asked: where were you when I laid the foundations of the earth? Job didn't get an explanation \u2014 he got God's presence. And it was enough. 'I know that my Redeemer liveth.'", prompts: ["Job suffered without knowing the spiritual context. How do you handle suffering without explanation?", "Job's friends offered theological answers to his pain. How do you comfort someone without doing that?", "Job declared 'I know that my Redeemer lives' in the middle of his worst suffering. How did he hold that faith?", "God answered Job from a whirlwind with questions, not answers. Why would God's response be questions rather than explanations?"] },
      days: [
        { day: "Monday", summary: "Job 1\u20133; 12\u201314: Job is blameless and upright. Satan challenges God: 'Does Job serve you for nothing? Remove your blessing and he will curse you.' God allows Satan to test Job. In one day Job loses everything \u2014 his flocks, his children, his health. He tears his clothes and shaves his head: 'The Lord gave, and the Lord hath taken away; blessed be the name of the Lord.' Three friends come and sit with him in silence for seven days.", scripture: "Job 1:20\u201322", keyPrinciple: "Job lost everything and said: the Lord gave, the Lord has taken away \u2014 blessed be the name of the Lord. This is faith.", reflect: "Is there something you are holding so tightly that losing it would shatter you?", pray: "Surrender one precious thing to God \u2014 not literally but in your heart.", act: "Write what you would still have if you lost everything material.", dailyQuote: { text: "The Lord gave, and the Lord hath taken away; blessed be the name of the Lord.", source: "Job 1:21" }, resources: [{ title: "The Fourth Watch", url: "https://www.churchofjesuschrist.org/study/general-conference/2004/04/the-fourth-watch", type: "General Conference", who: "Elder Robert D. Hales" }, { title: "Don't Miss This \u2014 Job 1\u20133; 12\u201314", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }, { title: "FSY: Living the Gospel", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/12living-the-gospel", type: "FSY Handbook", who: "For the Strength of Youth", note: "Today's reading illustrates what it looks like to live the gospel fully \u2014 or to drift from it. This section describes what it means to be an active disciple in everyday life." }] },
        { day: "Wednesday", summary: "Job 19; 21\u201324: Job debates with his friends who insist his suffering must be punishment for sin. Job refuses to accept this. He cries out: 'My friends scorn me; mine eye poureth out tears unto God.' Then the great declaration: 'I know that my redeemer liveth, and that he shall stand at the latter day upon the earth... yet in my flesh shall I see God.' Hope in the midst of deepest suffering.", scripture: "Job 19:25\u201327", keyPrinciple: "'I know that my Redeemer liveth, and that he shall stand at the latter day upon the earth.' Faith in the darkest night.", reflect: "In your darkest moment, what is the most foundational thing you know?", pray: "Declare your 'I know' \u2014 the thing that holds when everything else is gone.", act: "Write your personal 'I know that my Redeemer liveth' statement.", dailyQuote: { text: "I know that my redeemer liveth, and that he shall stand at the latter day upon the earth.", source: "Job 19:25" }, resources: [{ title: "I Know That My Redeemer Lives", url: "https://www.churchofjesuschrist.org/study/general-conference/2007/04/i-know-that-my-redeemer-lives", type: "General Conference", who: "Elder Russell M. Nelson" }, { title: "Don't Miss This \u2014 Job 19; 21\u201324", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }, { title: "FSY: Covenant Path", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/02covenant-path", type: "FSY Handbook", who: "For the Strength of Youth", note: "Covenants are the backbone of today's reading. This section explains what it means to be on the covenant path and how every ordinance connects us more deeply to God." }] },
        { day: "Friday", summary: "Job 38\u201342: God speaks to Job from a whirlwind. Not with answers \u2014 with questions. 'Where wast thou when I laid the foundations of the earth?' God recites the wonders of creation for four chapters. Job is not rebuked \u2014 he is expanded. His perspective is too small. God restores everything double. God tells the three friends they were wrong \u2014 Job spoke truth about God.", scripture: "Job 38:4\u20137", keyPrinciple: "God answered Job: where were you when I laid the foundations of the earth? God is bigger than our understanding.", reflect: "How does remembering God's vastness \u2014 and your smallness \u2014 bring comfort rather than terror?", pray: "Worship God for being beyond your comprehension. Rest in His bigness.", act: "Read Job 38\u201339 and write three things that humble and comfort you simultaneously.", dailyQuote: { text: "Where wast thou when I laid the foundations of the earth? declare, if thou hast understanding.", source: "Job 38:4" }, resources: [{ title: "Where Were You When I Laid the Foundations?", url: "https://www.saintsunscripted.com", type: "Podcast", who: "Saints Unscripted" }, { title: "None Were with Him", url: "https://www.churchofjesuschrist.org/study/general-conference/2016/04/none-were-with-him", type: "General Conference", who: "Elder Jeffrey R. Holland" }, { title: "FSY: Living the Gospel", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/12living-the-gospel", type: "FSY Handbook", who: "For the Strength of Youth", note: "Today's reading illustrates what it looks like to live the gospel fully \u2014 or to drift from it. This section describes what it means to be an active disciple in everyday life." }] },
        { day: "Saturday", scripture: "Job 42:5", keyPrinciple: "After everything, Job said: I have heard thee by the hearing of the ear, but now mine eye seeth thee. Suffering produced encounter.", reflect: "Has suffering ever brought you to a deeper, more real experience of God than ease could have?", pray: "Thank God for what you have come to know of Him through hard places.", act: "Write one thing you know about God now that you only learned through difficulty.", dailyQuote: { text: "I have heard of thee by the hearing of the ear: but now mine eye seeth thee.", source: "Job 42:5" } }
      ]
    },
    {
      week: 34,
      dates: "Aug 17\u201323",
      ref: "Psalms 1\u20132; 8; 19\u201333; 40; 46",
      title: "The Lord Is My Shepherd",
      theme: "The Lord is my shepherd. Even in the valley of the shadow of death, He is with us.",
      resources: [{ title: "The Lord Is My Shepherd", url: "https://www.churchofjesuschrist.org/study/general-conference/2022/10/51cook", type: "General Conference", who: "Elder Quentin L. Cook" }, { title: "Don't Miss This \u2014 Psalms 1\u201333; 40; 46", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }],
      ywPrep: { summary: "The Psalms are Israel's prayer book \u2014 songs of lament, praise, trust, and longing. Psalm 23: the Lord is my shepherd. Psalm 22: 'My God, my God, why hast thou forsaken me?' \u2014 Jesus quoted this from the cross. Psalm 8: 'What is man that thou art mindful of him?' Every human emotion is in the Psalms, brought honestly to God.", prompts: ["Which Psalm has meant the most to you in your life? What was happening when you found it?", "Psalm 22 begins with abandonment \u2014 Jesus quoted it on the cross. What does it mean that Christ lived this psalm?", "Psalm 8 asks: 'What is man that thou art mindful of him?' How would you answer that question?", "The Psalms model bringing every emotion to God honestly. Which emotion do you most need to bring to Him right now?"] },
      days: [
        { day: "Monday", summary: "Psalms 22\u201323; 27; 46: Psalm 22 opens: 'My God, my God, why hast thou forsaken me?' \u2014 words Christ will speak on the cross. It becomes a song of trust. Psalm 23: 'The Lord is my shepherd. I shall not want.' The valley of the shadow of death is real \u2014 but God is present. Psalm 46: 'God is our refuge and strength. Be still and know that I am God.'", scripture: "Psalm 23", keyPrinciple: "The Lord is my shepherd. He restores my soul. Even in the valley of the shadow of death, thou art with me.", reflect: "Which part of Psalm 23 do you most need today \u2014 green pastures, still waters, or presence in the valley?", pray: "Pray Psalm 23 slowly as your own prayer.", act: "Memorize one verse of Psalm 23 today.", dailyQuote: { text: "The Lord is my shepherd; I shall not want. He maketh me to lie down in green pastures.", source: "Psalm 23:1\u20132" }, resources: [{ title: "The Lord Is My Shepherd", url: "https://www.churchofjesuschrist.org/study/general-conference/2022/10/51cook", type: "General Conference", who: "Elder Quentin L. Cook" }, { title: "Don't Miss This \u2014 Psalms 23; 27; 46", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }, { title: "FSY: Living the Gospel", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/12living-the-gospel", type: "FSY Handbook", who: "For the Strength of Youth", note: "Today's reading illustrates what it looks like to live the gospel fully \u2014 or to drift from it. This section describes what it means to be an active disciple in everyday life." }] },
        { day: "Wednesday", summary: "Psalms 19\u201333: The heavens declare the glory of God \u2014 all creation is a sermon. Psalm 22 anticipates Christ's suffering in detail: they divided my garments, they cast lots. Psalm 24: 'Who shall ascend into the hill of the Lord? He that hath clean hands and a pure heart.' Psalm 32: 'Blessed is he whose transgression is forgiven, whose sin is covered.'", scripture: "Psalm 27:1, 14", keyPrinciple: "The Lord is my light and my salvation \u2014 whom shall I fear? Wait on the Lord.", reflect: "What are you afraid of right now? What would it mean for the Lord to be your light in that fear?", pray: "Pray Psalm 27:1 as your declaration.", act: "Wait on the Lord for one thing today instead of solving it yourself.", dailyQuote: { text: "The Lord is my light and my salvation; whom shall I fear? the Lord is the strength of my life.", source: "Psalm 27:1" }, resources: [{ title: "Be Still and Know That I Am God", url: "https://www.churchofjesuschrist.org/study/general-conference/2021/04/44gong", type: "General Conference", who: "Elder Gerrit W. Gong" }, { title: "Don't Miss This \u2014 Psalms 19\u201333", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }, { title: "FSY: Physical Health", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/08physical-health", type: "FSY Handbook", who: "For the Strength of Youth", note: "Today's reading involves the physical body \u2014 its limits or miraculous capacity. This section teaches that the body is sacred and how we treat it reflects what we believe." }] },
        { day: "Friday", summary: "Psalms 90\u2013103; 110: Psalm 90 is Moses's psalm \u2014 'Lord, thou hast been our dwelling place in all generations.' A thousand years are as a watch in the night. Psalm 91: 'He shall cover thee with his feathers; under his wings shalt thou trust.' Psalm 100: 'Make a joyful noise unto the Lord, all ye lands.' Psalm 103: 'Bless the Lord, O my soul, and forget not all his benefits.'", scripture: "Psalm 46:1\u20133, 10", keyPrinciple: "God is our refuge and strength \u2014 a very present help in trouble. Be still and know that I am God.", reflect: "What would it look like to be truly still before God today?", pray: "Be still. Sit for five minutes. Let God be God.", act: "Identify one area of your life where you need to stop striving and be still.", dailyQuote: { text: "Be still, and know that I am God.", source: "Psalm 46:10" }, resources: [{ title: "The Psalms as a Model for Prayer", url: "https://www.saintsunscripted.com", type: "Podcast", who: "Saints Unscripted" }, { title: "Perfect Love Casteth Out Fear", url: "https://www.churchofjesuschrist.org/study/general-conference/2014/04/perfect-love-casteth-out-fear", type: "General Conference", who: "Elder Paul V. Johnson" }, { title: "FSY: Living the Gospel", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/12living-the-gospel", type: "FSY Handbook", who: "For the Strength of Youth", note: "Today's reading illustrates what it looks like to live the gospel fully \u2014 or to drift from it. This section describes what it means to be an active disciple in everyday life." }] },
        { day: "Saturday", scripture: "Psalm 19:14", keyPrinciple: "Let the words of my mouth and the meditation of my heart be acceptable in thy sight. A prayer of alignment.", reflect: "If God could see every word and thought today, what would you want to change?", pray: "Pray Psalm 19:14 as your daily prayer this week.", act: "Pay attention to your words today \u2014 are they acceptable in His sight?", dailyQuote: { text: "Let the words of my mouth, and the meditation of my heart, be acceptable in thy sight, O Lord, my strength, and my redeemer.", source: "Psalm 19:14" } }
      ]

    {
      week: 35,
      dates: "Aug 24\u201330",
      ref: "Psalms 49\u201351; 61\u201366; 69\u201372; 77\u201378; 85\u201386",
      title: "Create in Me a Clean Heart",
      theme: "Create in me a clean heart. God is the one who restores what sin has broken.",
      resources: [{ title: "Create in Me a Clean Heart", url: "https://www.churchofjesuschrist.org/study/general-conference/2012/10/create-in-me-a-clean-heart", type: "General Conference", who: "Elder Scott D. Whiting" }, { title: "Don't Miss This \u2014 Psalms 49\u201386", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }],
      ywPrep: { summary: "Psalms 49\u201386 contain some of the most honest prayers in scripture. Psalm 51 is David's repentance after Bathsheba \u2014 'Create in me a clean heart.' Psalm 63: 'My soul thirsteth for thee.' Psalm 77: 'I remembered God and was troubled.' Psalm 86: 'Teach me thy way, O Lord.' The psalmists never pretended.", prompts: ["Psalm 51 is raw repentance. What makes it so powerful and honest?", "Psalm 63 says: my soul thirsts for thee in a dry and thirsty land. When have you felt spiritually thirsty?", "Psalm 77 says, 'I remembered God and was troubled.' When has remembering God actually increased your struggle before it brought comfort?", "Psalm 86:11 says: 'Unite my heart to fear thy name.' What does a united heart look like versus a divided one?"] },
      days: [
        { day: "Monday", summary: "Psalm 51: David's great prayer of repentance after Nathan confronted him about Bathsheba. 'Have mercy upon me, O God, according to thy lovingkindness.' 'Create in me a clean heart, O God, and renew a right spirit within me.' 'Cast me not away from thy presence, and take not thy holy spirit from me.' The most honest, raw prayer of repentance in scripture.", scripture: "Psalm 51:1\u20134, 10", keyPrinciple: "Create in me a clean heart, O God. David's repentance was raw, specific, and complete. This is how we come back.", reflect: "Is there a Psalm 51 prayer you need to pray right now?", pray: "Pray Psalm 51:1\u201310 as your own prayer. Make it personal.", act: "Read Psalm 51 slowly, out loud, as if it's your own words.", dailyQuote: { text: "Create in me a clean heart, O God; and renew a right spirit within me.", source: "Psalm 51:10" }, resources: [{ title: "Create in Me a Clean Heart", url: "https://www.churchofjesuschrist.org/study/general-conference/2012/10/create-in-me-a-clean-heart", type: "General Conference", who: "Elder Scott D. Whiting" }, { title: "Don't Miss This \u2014 Psalm 51", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }, { title: "FSY: Repentance and Forgiveness", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/05repentance-and-forgiveness", type: "FSY Handbook", who: "For the Strength of Youth", note: "Today's reading shows someone facing consequences of sin \u2014 or being given a second chance. This FSY section teaches that repentance is always available and God's mercy can cover any mistake." }] },
        { day: "Wednesday", summary: "Psalms 62\u201372; 84\u201386: Psalm 62: 'My soul waiteth only upon God; my expectation is from him.' Psalm 63: 'O God, thou art my God; early will I seek thee. My soul thirsteth for thee in a dry and thirsty land where no water is.' Psalm 84: 'How amiable are thy tabernacles, O Lord of hosts. A day in thy courts is better than a thousand elsewhere.'", scripture: "Psalm 63:1\u20133", keyPrinciple: "My soul thirsteth for thee, my flesh longeth for thee in a dry and thirsty land. Spiritual thirst is real.", reflect: "When have you felt spiritually dry and thirsting for God?", pray: "Come to God with your thirst. Don't pretend to be full when you're not.", act: "Identify what you most thirst for spiritually right now. Name it to God.", dailyQuote: { text: "O God, thou art my God; early will I seek thee: my soul thirsteth for thee... in a dry and thirsty land.", source: "Psalm 63:1" }, resources: [{ title: "My Soul Thirsteth for Thee", url: "https://www.saintsunscripted.com", type: "Podcast", who: "Saints Unscripted" }, { title: "Spiritual Thirst", url: "https://www.churchofjesuschrist.org/study/general-conference/2014/10/spiritual-thirst", type: "General Conference", who: "Elder Russell M. Nelson" }, { title: "FSY: Living the Gospel", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/12living-the-gospel", type: "FSY Handbook", who: "For the Strength of Youth", note: "Today's reading illustrates what it looks like to live the gospel fully \u2014 or to drift from it. This section describes what it means to be an active disciple in everyday life." }] },
        { day: "Friday", summary: "Psalms 107\u2013119: Psalm 107: 'O give thanks unto the Lord, for he is good. Those who went down to the sea in ships, who do business in great waters \u2014 these saw the works of the Lord.' Psalm 119 \u2014 the longest chapter in the Bible, 176 verses, all about loving God's word. 'Thy word is a lamp unto my feet and a light unto my path.'", scripture: "Psalm 77:2\u20133, 11\u201312", keyPrinciple: "I remembered God and was troubled \u2014 and then I remembered His works. Memory of God's faithfulness restores hope.", reflect: "What do you remember about God's past faithfulness that gives you hope for right now?", pray: "Rehearse God's past works in your prayer today. Name them specifically.", act: "Write five specific times God came through for you. Read them when trouble hits.", dailyQuote: { text: "I will remember the works of the Lord: surely I will remember thy wonders of old.", source: "Psalm 77:11" }, resources: [{ title: "How to Remember God", url: "https://www.churchofjesuschrist.org/study/general-conference/2009/04/always-remember-him", type: "General Conference", who: "Elder Gerrit W. Gong" }, { title: "Don't Miss This \u2014 Psalms 77\u201386", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }, { title: "FSY: Living the Gospel", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/12living-the-gospel", type: "FSY Handbook", who: "For the Strength of Youth", note: "Today's reading illustrates what it looks like to live the gospel fully \u2014 or to drift from it. This section describes what it means to be an active disciple in everyday life." }] },
        { day: "Saturday", scripture: "Psalm 86:11", keyPrinciple: "Teach me thy way, O Lord. Unite my heart to fear thy name. A divided heart is the great problem.", reflect: "What divides your heart from fully following God right now?", pray: "Ask God to unite your heart \u2014 to make you whole-hearted, not divided.", act: "Identify one thing that divides your heart and give it fully to God today.", dailyQuote: { text: "Teach me thy way, O Lord; I will walk in thy truth: unite my heart to fear thy name.", source: "Psalm 86:11" } }
      ]
