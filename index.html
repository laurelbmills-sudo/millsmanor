        { day: "Friday", summary: "Exodus 12\u201313: The final plague \u2014 every firstborn in Egypt dies, including Pharaoh's son. Pharaoh calls Moses at midnight: 'Rise up, and get you forth.' Israel leaves Egypt. Six hundred thousand men, plus women and children. They had been there 430 years. They leave with the wealth of Egypt.", scripture: "Luke 24:5\u20136", keyPrinciple: "He is not here \u2014 He is risen. The Resurrection is the central event of all human history.", reflect: "What difference does the Resurrection make to your daily life right now?", pray: "Worship the risen Christ today. Not just the suffering Christ \u2014 the risen one.", act: "Tell someone why the Resurrection matters to you personally.", dailyQuote: { text: "Why seek ye the living among the dead? He is not here, but is risen.", source: "Luke 24:5\u20136" }, resources: [{ title: "Christ and the New Covenant", url: "https://www.churchofjesuschrist.org/study/general-conference/2006/04/all-things-testify-of-him", type: "General Conference", who: "Elder L. Tom Perry" }, { title: "Easter \u2014 the Resurrection of Jesus Christ", url: "https://www.saintsunscripted.com", type: "Podcast", who: "Saints Unscripted" }, { title: "FSY: Covenant Path", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/02covenant-path", type: "FSY Handbook", who: "For the Strength of Youth", note: "Covenants are the backbone of today's reading. This section explains what it means to be on the covenant path and how every ordinance connects us more deeply to God." }] },
        { day: "Saturday", scripture: "John 20:16", keyPrinciple: "Mary thought Jesus was the gardener. Then He said her name. The risen Christ knows your name.", reflect: "What does it mean to you that the risen Christ knows your name specifically?", pray: "Sit quietly. Let God say your name in your heart.", act: "Write what it means to you that the resurrected Christ is a real, specific, personal being who knows you.", dailyQuote: { text: "Jesus saith unto her, Mary. She turned herself, and saith unto him, Rabboni; which is to say, Master.", source: "John 20:16" } }
      ]
    },
    {
      week: 15,
      dates: "Apr 6\u201312",
      ref: "Exodus 7\u201313",
      title: "That Ye May Know That I Am the Lord",
      theme: "The plagues showed Egypt there is a God, and He is Israel's God. The Passover points to the Atonement.",
      resources: [{ title: "The Passover and the Sacrament", url: "https://www.churchofjesuschrist.org/study/ensign/1972/02/the-passover-and-the-sacrament", type: "Ensign", who: "Elder Mark E. Petersen" }, { title: "Don't Miss This \u2014 Exodus 7\u201313", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }],
      ywPrep: { summary: "Ten plagues. Each targeted a different Egyptian god \u2014 showing that Israel's God was more powerful than all of Egypt's gods combined. The Passover: blood on the doorposts saved Israel's firstborn. The people had to actually apply the blood \u2014 they couldn't just know about it. The Israelites took unleavened bread in haste and walked out of slavery.", prompts: ["Each plague targeted an Egyptian god. What gods compete for people's loyalty today?", "The Passover lamb's blood had to be applied \u2014 not just known about. What does applying Christ's Atonement look like for you?", "The Israelites left in such haste they had no time for leaven. What does leaving Egypt quickly without looking back look like in your life?", "This is why we take the sacrament every week. What does the sacrament mean to you now that you've studied Passover?"] },
      days: [
        { day: "Monday", summary: "Exodus 13\u201315: Israel approaches the Red Sea. Pharaoh changes his mind and sends his army after them. Israel panics. Moses says: 'Fear ye not, stand still, and see the salvation of the Lord.' The cloud moves behind Israel. Moses stretches his rod over the sea. The waters divide. They cross on dry ground.", scripture: "Exodus 7:10\u201312", keyPrinciple: "Pharaoh's magicians could mimic Moses's miracles \u2014 but only to a point. Counterfeits have limits.", reflect: "What counterfeits of God's blessings are most tempting in your life?", pray: "Ask God to help you distinguish His gifts from cheap imitations.", act: "Identify one area where you might be settling for a counterfeit.", dailyQuote: { text: "Aaron cast down his rod before Pharaoh... and it became a serpent.", source: "Exodus 7:10" }, resources: [{ title: "A Living Witness", url: "https://www.churchofjesuschrist.org/study/general-conference/2000/10/a-living-witness", type: "General Conference", who: "Elder Henry B. Eyring" }, { title: "Don't Miss This \u2014 Exodus 7\u201313", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }, { title: "FSY: Living the Gospel", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/12living-the-gospel", type: "FSY Handbook", who: "For the Strength of Youth", note: "Today's reading illustrates what it looks like to live the gospel fully \u2014 or to drift from it. This section describes what it means to be an active disciple in everyday life." }] },
        { day: "Wednesday", summary: "Exodus 15\u201316: After crossing the Red Sea, Israel sings \u2014 Miriam leads the women in dancing and song. Then the murmuring begins. No water, then bitter water. God shows Moses a tree to throw in the water \u2014 it becomes sweet. God says: 'If you obey, I will be your healer.' Then no food. God sends manna from heaven.", scripture: "Exodus 12:3\u20137, 12\u201313", keyPrinciple: "The Passover lamb had to be perfect, its blood applied. You can't just know about it \u2014 you have to apply it.", reflect: "What does it mean to apply Christ's atoning blood to your life personally?", pray: "Thank Jesus for being the Lamb whose blood covers you.", act: "Read Exodus 12 looking for every detail that points to Jesus Christ.", dailyQuote: { text: "And the blood shall be to you for a token... and when I see the blood, I will pass over you.", source: "Exodus 12:13" }, resources: [{ title: "Beware of False Prophets and False Teachers", url: "https://www.churchofjesuschrist.org/study/general-conference/1999/10/beware-of-false-prophets-and-false-teachers", type: "General Conference", who: "Elder M. Russell Ballard" }, { title: "The Passover and the Sacrament", url: "https://www.churchofjesuschrist.org/study/liahona/2010/03/the-passover-and-the-sacrament", type: "Liahona", who: "Elder Donald W. Parry" }, { title: "FSY: Sabbath Day", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/06sabbath-day", type: "FSY Handbook", who: "For the Strength of Youth", note: "Today's reading touches on sacred time, rest, or covenant renewal. This section explains why God asks us to set aside one day \u2014 and what that day is really for." }] },
        { day: "Friday", summary: "Exodus 16\u201317: Manna appears each morning \u2014 like coriander seed, white, tasting of wafers and honey. They gather what they need, no more, no less. On the sixth day they gather double. On the Sabbath it doesn't appear. God is teaching them to trust \u2014 one day at a time. Then water from the rock at Horeb.", scripture: "Exodus 13:17\u201318, 21", keyPrinciple: "God led them the long way \u2014 and led them personally with a pillar of cloud and fire. He doesn't abandon us in the wilderness.", reflect: "Has God ever led you the long way? What did you learn in the longer route?", pray: "Ask God to make His presence as clear and visible to you as a pillar of fire.", act: "Name one thing God has led you through that you're grateful for now.", dailyQuote: { text: "And the Lord went before them by day in a pillar of a cloud, to lead them the way; and by night in a pillar of fire.", source: "Exodus 13:21" }, resources: [{ title: "Sacrament Meeting and the Sacrament", url: "https://www.churchofjesuschrist.org/study/general-conference/2008/10/sacrament-meeting-and-the-sacrament", type: "General Conference", who: "Elder Dallin H. Oaks" }, { title: "Don't Miss This \u2014 The Plagues", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }, { title: "FSY: Living the Gospel", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/12living-the-gospel", type: "FSY Handbook", who: "For the Strength of Youth", note: "Today's reading illustrates what it looks like to live the gospel fully \u2014 or to drift from it. This section describes what it means to be an active disciple in everyday life." }] },
        { day: "Saturday", scripture: "Exodus 10:1\u20132", keyPrinciple: "The plagues were so Israel could tell their children \u2014 testimony passes through story.", reflect: "What stories of God's power are you collecting to tell the next generation?", pray: "Ask God to give you experiences worth sharing.", act: "Write one testimony story you want to tell your children someday.", dailyQuote: { text: "That thou mayest tell in the ears of thy son... that ye may know how that I am the Lord.", source: "Exodus 10:2" } }
      ]
    },
    {
      week: 16,
      dates: "Apr 13\u201319",
      ref: "Exodus 14\u201318",
      title: "Stand Still, and See the Salvation of the Lord",
      theme: "God parted the Red Sea when Israel had nowhere to go. He specializes in impossible deliverances.",
      resources: [{ title: "Be Still, and Know That I Am God", url: "https://www.churchofjesuschrist.org/study/general-conference/2016/04/be-still-and-know-that-i-am-god", type: "General Conference", who: "Elder Dennis B. Neuenschwander" }, { title: "Don't Miss This \u2014 Exodus 14\u201318", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }],
      ywPrep: { summary: "Israel left Egypt and immediately faced the Red Sea ahead and Pharaoh's army behind. Moses said, 'Stand still, and see the salvation of the Lord.' They stepped forward \u2014 the sea parted. Then in the wilderness: no food, no water, constant complaints. God provided manna every morning \u2014 only enough for one day. Not stockpiled. Just daily.", prompts: ["Israel was trapped between the sea and the army. When have you felt like there was no way forward and no way back?", "God said to Moses: stop crying and move forward. When does God answer prayer by telling us to stop praying and start moving?", "The Israelites murmured almost immediately after one of the greatest miracles in history. Why do we forget so quickly?", "Manna came every morning \u2014 only enough for one day. What does daily dependence on God look like for you?"] },
      days: [
        { day: "Monday", summary: "Exodus 17\u201318: Israel arrives at Rephidim and fights Amalek. When Moses holds up his rod, Israel prevails. When his arms drop, Amalek prevails. Aaron and Hur hold up his arms. Israel wins. Then Jethro, Moses's father-in-law, visits and gives Moses wise counsel: delegate. Moses is doing too much alone.", scripture: "Exodus 14:13\u201314", keyPrinciple: "'Fear not. Stand still. See the salvation of the Lord. He will fight for you.' Sometimes God asks us to stop and watch.", reflect: "What situation are you facing where God might be saying 'stand still and watch what I do'?", pray: "Practice stillness today. Tell God what you're afraid of and ask Him to fight for you.", act: "Spend five quiet minutes trusting instead of planning or worrying.", dailyQuote: { text: "Fear ye not, stand still, and see the salvation of the Lord... The Lord shall fight for you.", source: "Exodus 14:13\u201314" }, resources: [{ title: "Be Still and Know That I Am God", url: "https://www.churchofjesuschrist.org/study/general-conference/2021/04/44gong", type: "General Conference", who: "Elder Gerrit W. Gong" }, { title: "Don't Miss This \u2014 Red Sea", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }, { title: "FSY: Covenant Path", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/02covenant-path", type: "FSY Handbook", who: "For the Strength of Youth", note: "Covenants are the backbone of today's reading. This section explains what it means to be on the covenant path and how every ordinance connects us more deeply to God." }] },
        { day: "Wednesday", summary: "Exodus 19\u201320: Israel arrives at Sinai. God calls Moses up the mountain and proposes a covenant: if you obey, you will be a kingdom of priests and a holy nation. The people agree. Then God descends in fire and smoke with thunder. The people tremble. He speaks the Ten Commandments.", scripture: "Exodus 14:21\u201322", keyPrinciple: "The sea parted. Israel walked through on dry ground. God's impossible became Israel's path forward.", reflect: "What impossible has God made possible in your life?", pray: "Thank God for one specific miracle \u2014 big or small \u2014 He has done for you.", act: "Tell one person today about something God did for you that you didn't expect.", dailyQuote: { text: "And the children of Israel went into the midst of the sea upon the dry ground.", source: "Exodus 14:22" }, resources: [{ title: "Miracles", url: "https://www.churchofjesuschrist.org/study/general-conference/2001/10/miracles", type: "General Conference", who: "Elder Dallin H. Oaks" }, { title: "Our Daily Bread", url: "https://www.churchofjesuschrist.org/study/general-conference/2011/04/our-daily-bread", type: "General Conference", who: "President Dieter F. Uchtdorf" }, { title: "FSY: Living the Gospel", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/12living-the-gospel", type: "FSY Handbook", who: "For the Strength of Youth", note: "Today's reading illustrates what it looks like to live the gospel fully \u2014 or to drift from it. This section describes what it means to be an active disciple in everyday life." }] },
        { day: "Friday", summary: "Exodus 20\u201324: The commandments expand into laws about worship, property, justice, and mercy. God describes a sacrificial system that points forward to Christ. Moses reads the covenant to the people. They say: 'All that the Lord hath said will we do.' Moses goes up the mountain. God's glory is like a consuming fire.", scripture: "Exodus 16:14\u201316", keyPrinciple: "Manna came every morning \u2014 fresh, just enough for today. Not stockpiled. Just daily.", reflect: "What does your daily spiritual manna look like? Scripture? Prayer? Stillness?", pray: "Ask God for what you need just for today. Not the whole year \u2014 just today.", act: "Gather your spiritual manna today. Don't skip it.", dailyQuote: { text: "This is the bread which the Lord hath given you to eat.", source: "Exodus 16:15" }, resources: [{ title: "Temporal Preparation", url: "https://www.churchofjesuschrist.org/study/general-conference/2017/10/preparations-for-the-second-coming", type: "General Conference", who: "Elder Dallin H. Oaks" }, { title: "Don't Miss This \u2014 Manna", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }, { title: "FSY: Physical Health", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/08physical-health", type: "FSY Handbook", who: "For the Strength of Youth", note: "Today's reading involves the physical body \u2014 its limits or miraculous capacity. This section teaches that the body is sacred and how we treat it reflects what we believe." }] },
        { day: "Saturday", scripture: "Exodus 17:1\u20136", keyPrinciple: "God gave water from a rock. Even in the driest places, He has resources we can't see.", reflect: "Where is your desert right now \u2014 and what rock might God be about to strike?", pray: "Ask God to provide in a place that feels impossibly dry.", act: "Identify one dry area of your life and give it specifically to God.", dailyQuote: { text: "Behold, I will stand before thee upon the rock... and thou shalt smite the rock, and there shall come water out of it.", source: "Exodus 17:6" } }
      ]
    },
    {
      week: 17,
      dates: "Apr 20\u201326",
      ref: "Exodus 19\u201320; 24; 31\u201334",
      title: "I Will Write It upon Their Hearts",
      theme: "God gave the commandments as a covenant guide. The new covenant is written on the heart.",
      resources: [{ title: "The Laws of God", url: "https://www.churchofjesuschrist.org/study/general-conference/2012/10/the-laws-of-god", type: "General Conference", who: "Elder L. Tom Perry" }, { title: "Don't Miss This \u2014 Exodus 19\u201320; 24; 31\u201334", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }],
      ywPrep: { summary: "God gave the Ten Commandments as a covenant guide for love, not just compliance. Israel immediately broke the covenant with the golden calf. Moses interceded and God gave the law again. The new covenant is written not on stone but on the heart.", prompts: ["The Ten Commandments begin with 'I am the Lord your God who brought you out.' Why does identity come before law?", "Israel made a golden calf three days after covenanting with God. What does that tell you about human nature?", "Moses interceded for Israel even when God was ready to give up. Who intercedes for us now?", "Which of the Ten Commandments do you feel is truly written on your heart versus just followed as a rule?"] },
      days: [
        { day: "Monday", summary: "Exodus 20: The Ten Commandments \u2014 no other gods, no idols, don't misuse God's name, keep the Sabbath, honor parents, no murder, no adultery, no theft, no false witness, no coveting. These commandments come from a God who already delivered them from slavery. Obedience is a response to grace, not a way to earn it.", scripture: "Exodus 19:3\u20136", keyPrinciple: "God called Israel to be a kingdom of priests \u2014 set apart to represent Him to the world.", reflect: "What does it mean to you personally to be called to represent God?", pray: "Ask God to help you live as His representative today.", act: "In one interaction today, intentionally represent God's love and character.", dailyQuote: { text: "Ye shall be unto me a kingdom of priests, and a holy nation.", source: "Exodus 19:6" }, resources: [{ title: "The Ten Commandments and the Beatitudes", url: "https://www.churchofjesuschrist.org/study/ensign/1991/01/the-ten-commandments-and-the-beatitudes", type: "Ensign", who: "Elder Carlos E. Asay" }, { title: "Don't Miss This \u2014 Sinai Covenant", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }, { title: "FSY: Sabbath Day", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/06sabbath-day", type: "FSY Handbook", who: "For the Strength of Youth", note: "Today's reading touches on sacred time, rest, or covenant renewal. This section explains why God asks us to set aside one day \u2014 and what that day is really for." }] },
        { day: "Wednesday", summary: "Exodus 32: While Moses is on the mountain with God, the people ask Aaron to make them a god. Aaron collects their gold and makes a golden calf. 'These are thy gods, O Israel, which brought thee up out of the land of Egypt.' God is furious. Moses intercedes. He comes down and shatters the tablets.", scripture: "Exodus 20:1\u20133", keyPrinciple: "The first commandment is love \u2014 love God first. All other commands flow from this one.", reflect: "What competes with God for the top position in your life right now?", pray: "Give God first place today. Deliberately choose Him over whatever is competing.", act: "Identify your top competitor with God and make a plan to reorder your priorities.", dailyQuote: { text: "I am the Lord thy God... Thou shalt have no other gods before me.", source: "Exodus 20:2\u20133" }, resources: [{ title: "That Which Is of God Is Light", url: "https://www.churchofjesuschrist.org/study/general-conference/2015/10/that-which-is-of-god-is-light", type: "General Conference", who: "President Dieter F. Uchtdorf" }, { title: "The Golden Calf", url: "https://www.saintsunscripted.com", type: "Podcast", who: "Saints Unscripted" }, { title: "FSY: Agency and Integrity", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/04agency-and-integrity", type: "FSY Handbook", who: "For the Strength of Youth", note: "Agency is at the heart of today's reading. God gives commandments but never forces obedience \u2014 the choice is always ours. This section explores how to make choices aligned with God's will." }] },
        { day: "Friday", summary: "Exodus 33\u201334: Moses asks to see God's glory. God passes before him saying: 'The Lord, the Lord God, merciful and gracious, longsuffering.' Moses bows and worships. New tablets are made. The covenant is renewed. Moses descends and his face shines so brightly the people are afraid to come near him.", scripture: "Exodus 32:1\u20134, 14", keyPrinciple: "Israel made a golden calf 40 days after covenanting. Moses interceded. God relented. Mercy won.", reflect: "When have you broken a commitment quickly after making it? What brought you back?", pray: "Thank God for those who intercede for you \u2014 and for Jesus who always intercedes.", act: "Commit to one covenant behavior you have been inconsistent in. Write it down.", dailyQuote: { text: "And the Lord repented of the evil which he thought to do unto his people.", source: "Exodus 32:14" }, resources: [{ title: "Written in Our Hearts: The New Covenant", url: "https://www.churchofjesuschrist.org/study/general-conference/2012/10/the-new-and-everlasting-covenant", type: "General Conference", who: "Elder D. Todd Christofferson" }, { title: "Don't Miss This \u2014 Exodus 31\u201334", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }, { title: "FSY: Covenant Path", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/02covenant-path", type: "FSY Handbook", who: "For the Strength of Youth", note: "Covenants are the backbone of today's reading. This section explains what it means to be on the covenant path and how every ordinance connects us more deeply to God." }] },
        { day: "Saturday", scripture: "Jeremiah 31:33", keyPrinciple: "The new covenant is written on the heart \u2014 not stone. Internal transformation, not external compliance.", reflect: "Which commandments feel truly written on your heart versus just followed as rules?", pray: "Ask God to write His laws on your heart, not just your habit list.", act: "Pick one commandment and ask God to move it from your to-do list to your character.", dailyQuote: { text: "I will put my law in their inward parts, and write it in their hearts; and will be their God, and they shall be my people.", source: "Jeremiah 31:33" } }
      ]
    },
    {
      week: 18,
      dates: "Apr 27\u2013May 3",
      ref: "Exodus 35\u201340; Leviticus 1; 4; 16; 19",
      title: "Let Them Make Me a Sanctuary",
      theme: "God gave detailed instructions for the Tabernacle. He wanted to dwell among His people.",
      resources: [{ title: "The Holy Temple", url: "https://www.churchofjesuschrist.org/study/general-conference/2010/10/the-holy-temple", type: "General Conference", who: "President Boyd K. Packer" }, { title: "Don't Miss This \u2014 Exodus 35\u201340; Leviticus", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }],
      ywPrep: { summary: "God gave detailed instructions for the Tabernacle \u2014 every dimension and material specified. Every element pointed to Christ: the altar (Atonement), the laver (baptism), the bread (sacrament), the high priest (Christ as mediator). When it was complete, the glory of the Lord filled it.", prompts: ["The Tabernacle was God's way of dwelling with Israel in the wilderness. How does the temple fulfill that same purpose today?", "Every item in the Tabernacle had specific symbolic meaning pointing to Christ. What elements of temple worship are most meaningful to you?", "The people donated freely \u2014 their hearts moved them. What motivates your giving: obligation or love?", "The Tabernacle was portable \u2014 they could take it everywhere. How do you carry the spirit of the temple daily?"] },
      days: [
        { day: "Monday", summary: "Exodus 25\u201330: God gives detailed instructions for the Tabernacle \u2014 the portable temple Israel will build in the wilderness. Every element is symbolic: the ark of the covenant, the mercy seat, the menorah, the bread of the presence, the altar of incense. God says: 'Let them make me a sanctuary that I may dwell among them.'", scripture: "Exodus 25:8", keyPrinciple: "Let them make me a sanctuary; that I may dwell among them. God's whole desire is to be with His people.", reflect: "What does God dwelling among you mean for your daily life?", pray: "Invite God to dwell in your home and heart today specifically.", act: "Create a small sacred space in your home for scripture, prayer, or stillness.", dailyQuote: { text: "And let them make me a sanctuary; that I may dwell among them.", source: "Exodus 25:8" }, resources: [{ title: "The Holy Temple \u2014 a Beacon to the World", url: "https://www.churchofjesuschrist.org/study/general-conference/2011/04/the-holy-temple-a-beacon-to-the-world", type: "General Conference", who: "President Thomas S. Monson" }, { title: "Don't Miss This \u2014 The Tabernacle", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }, { title: "FSY: Temple and Family History", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/03temple-and-family-history", type: "FSY Handbook", who: "For the Strength of Youth", note: "Today's reading connects to God dwelling with His people. This section explains why temples matter and how to prepare spiritually to enter." }] },
        { day: "Wednesday", summary: "Exodus 35\u201338: Israel builds the Tabernacle. Bezaleel is filled with the Spirit of God to do all manner of workmanship. Everyone whose heart stirred them and whose spirit was willing brought an offering. They brought so much Moses had to tell them to stop. The people gave with joy.", scripture: "Exodus 25:17\u201322", keyPrinciple: "The Mercy Seat was where God's presence rested. God meets us at a place called mercy.", reflect: "How does knowing God's presence rests at a place called mercy change how you approach Him?", pray: "Come to God at the mercy seat today \u2014 with honesty, not performance.", act: "Study one element of the Tabernacle and its symbolic connection to Christ.", dailyQuote: { text: "There I will meet with thee, and I will commune with thee from above the mercy seat.", source: "Exodus 25:22" }, resources: [{ title: "Sacred Temples", url: "https://www.churchofjesuschrist.org/study/general-conference/2009/10/sacred-temples", type: "General Conference", who: "Elder Richard G. Scott" }, { title: "Symbols of the Tabernacle Pointing to Christ", url: "https://www.saintsunscripted.com", type: "Podcast", who: "Saints Unscripted" }, { title: "FSY: Temple and Family History", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/03temple-and-family-history", type: "FSY Handbook", who: "For the Strength of Youth", note: "Today's reading connects to God dwelling with His people. This section explains why temples matter and how to prepare spiritually to enter." }] },
        { day: "Friday", summary: "Leviticus 1\u201310: The sacrificial system is established. Burnt offerings, grain offerings, peace offerings, sin offerings, guilt offerings \u2014 each points to atonement. Aaron and his sons are consecrated as priests. When the Tabernacle is complete, the glory of God fills it. No one can enter. God is present.", scripture: "Exodus 35:21\u201322, 29", keyPrinciple: "The people gave willingly \u2014 their hearts moved them. Not because they had to. Out of love.", reflect: "What motivates your giving \u2014 obligation or genuine love?", pray: "Ask God to give you a willing heart that gives freely.", act: "Give something today \u2014 time, money, attention \u2014 out of love rather than duty.", dailyQuote: { text: "And they came, every one whose heart stirred him up... to bring the Lord's offering.", source: "Exodus 35:21" }, resources: [{ title: "Offerings in Righteousness", url: "https://www.churchofjesuschrist.org/study/general-conference/2009/10/offerings-in-righteousness", type: "General Conference", who: "Elder D. Todd Christofferson" }, { title: "Don't Miss This \u2014 Exodus 35\u201340; Leviticus", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }, { title: "FSY: Giving Service", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/11giving-service", type: "FSY Handbook", who: "For the Strength of Youth", note: "Today's reading features someone who gives more than expected \u2014 or fails to. This section explores why serving others is central to discipleship." }] },
        { day: "Saturday", scripture: "Exodus 40:34\u201335", keyPrinciple: "When the Tabernacle was complete, the glory of the Lord filled it. God honors work done for Him.", reflect: "When you do something for God with full effort, how does He show up in it?", pray: "Ask God to fill the work you are doing for Him with His presence.", act: "Do your current calling \u2014 YW, school, or home \u2014 as if you're doing it specifically for God.", dailyQuote: { text: "Then a cloud covered the tent of the congregation, and the glory of the Lord filled the tabernacle.", source: "Exodus 40:34" } }
      ]
    },
    {
      week: 19,
      dates: "May 4\u201310",
      ref: "Numbers 11\u201314; 20\u201324; 27",
      title: "The Lord Bless Thee and Keep Thee",
      theme: "The law of Moses was a schoolmaster pointing to Christ. Manna came every morning \u2014 just enough for the day.",
      resources: [{ title: "Numbers: The Book of Wanderings", url: "https://www.churchofjesuschrist.org/study/ensign/1980/06/numbers-the-book-of-wanderings", type: "Ensign", who: "Sidney B. Sperry" }, { title: "Don't Miss This \u2014 Numbers 11\u201314; 20\u201324", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }],
      ywPrep: { summary: "Numbers 6 gives the Aaronic Priesthood blessing: 'The Lord bless thee and keep thee.' Two spies saw giants; two saw God \u2014 the same land, completely different perspective. The majority's fear cost an entire generation their promised land.", prompts: ["Numbers 6:24\u201326 \u2014 what would it mean to personally receive each phrase God speaks over you?", "Ten spies saw giants. Two saw God. What is the difference in how they were looking at the same situation?", "Israel murmured constantly even after miracles. Where do you recognize that pattern in yourself?", "Manna was given one day at a time. What does trusting God one day at a time look like for you right now?"] },
      days: [
        { day: "Monday", summary: "Numbers 11\u201312: Israel murmurs again \u2014 they want meat instead of manna. They weep and cry about the fish and cucumbers they had in Egypt. God sends quail \u2014 so much it comes out of their nostrils. Then Miriam and Aaron criticize Moses for his Cushite wife. God strikes Miriam with leprosy. Moses prays for her healing.", scripture: "Numbers 6:24\u201326", keyPrinciple: "The Aaronic blessing: the Lord bless you, keep you, make His face shine on you, be gracious, give you peace.", reflect: "Which part of this blessing do you need most \u2014 protection, grace, or peace?", pray: "Pray the Aaronic blessing over yourself today. Receive it.", act: "Write Numbers 6:24\u201326 by hand and post it somewhere visible.", dailyQuote: { text: "The Lord bless thee, and keep thee: the Lord make his face shine upon thee, and be gracious unto thee.", source: "Numbers 6:24\u201325" }, resources: [{ title: "The Aaronic Priesthood and the Sacrament", url: "https://www.churchofjesuschrist.org/study/general-conference/2017/10/the-aaronic-priesthood-and-the-sacrament", type: "General Conference", who: "Elder Robert D. Hales" }, { title: "Don't Miss This \u2014 Numbers 11\u201314", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }, { title: "FSY: Covenant Path", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/02covenant-path", type: "FSY Handbook", who: "For the Strength of Youth", note: "Covenants are the backbone of today's reading. This section explains what it means to be on the covenant path and how every ordinance connects us more deeply to God." }] },
        { day: "Wednesday", summary: "Numbers 13\u201314: Twelve spies are sent into Canaan. They return after forty days. The land flows with milk and honey \u2014 they bring back a cluster of grapes so large two men carry it. But ten spies say: 'We are like grasshoppers in their sight.' Caleb and Joshua say: 'We can do it.' The people choose fear.", scripture: "Numbers 13:27\u201333", keyPrinciple: "Ten spies felt like grasshoppers. Two felt like conquerors. Same land \u2014 completely different perspective.", reflect: "When have you felt like a grasshopper? What shifted your perspective?", pray: "Ask God to give you Caleb's perspective on your current giants.", act: "Write your giant on one side of a paper and what God says about it on the other.", dailyQuote: { text: "We were in our own sight as grasshoppers, and so we were in their sight.", source: "Numbers 13:33" }, resources: [{ title: "Spies and Grasshoppers \u2014 Two Kinds of Vision", url: "https://www.saintsunscripted.com", type: "Podcast", who: "Saints Unscripted" }, { title: "Faith \u2014 the Choice Is Yours", url: "https://www.churchofjesuschrist.org/study/general-conference/2016/10/faith-the-choice-is-yours", type: "General Conference", who: "Elder Richard C. Edgley" }, { title: "FSY: Agency and Integrity", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/04agency-and-integrity", type: "FSY Handbook", who: "For the Strength of Youth", note: "Agency is at the heart of today's reading. God gives commandments but never forces obedience \u2014 the choice is always ours. This section explores how to make choices aligned with God's will." }] },
        { day: "Friday", summary: "Numbers 21\u201327: The people speak against God and Moses again. God sends serpents. Many die. Moses makes a bronze serpent and puts it on a pole \u2014 anyone who looks at it lives. This points to Christ being lifted up on the cross. Then Balaam and his donkey, Phinehas's zeal, and the daughters of Zelophehad claiming their inheritance.", scripture: "Numbers 14:6\u20139", keyPrinciple: "Caleb and Joshua tore their clothes in grief over Israel's unbelief. Faith is worth grieving over when it's missing.", reflect: "What makes you grieve when people around you choose fear over faith?", pray: "Ask God to anchor your faith so it isn't swept away by others' fear.", act: "Stand for one faith-based perspective in a conversation today.", dailyQuote: { text: "The land, which we passed through to search it, is an exceeding good land... the Lord is with us: fear them not.", source: "Numbers 14:7, 9" }, resources: [{ title: "Learning in the Priesthood", url: "https://www.churchofjesuschrist.org/study/general-conference/2011/04/learning-in-the-priesthood", type: "General Conference", who: "Elder David A. Bednar" }, { title: "Don't Miss This \u2014 Numbers 21\u201327", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }, { title: "FSY: Education and Learning", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/10education-and-learning", type: "FSY Handbook", who: "For the Strength of Youth", note: "Today's reading features wisdom or the cost of ignoring instruction. This section encourages learning as a lifelong spiritual discipline." }] },
        { day: "Saturday", scripture: "Galatians 3:24", keyPrinciple: "The law was our schoolmaster to bring us to Christ. Every ritual and law pointed forward to Him.", reflect: "What practices in your life are schoolmasters \u2014 things that teach you and point you to Christ?", pray: "Ask God to help you see His purposes in hard or repetitive things you walk through.", act: "Pick one discipline \u2014 fasting, tithing, sabbath \u2014 and study what it teaches you about Christ.", dailyQuote: { text: "The law was our schoolmaster to bring us unto Christ, that we might be justified by faith.", source: "Galatians 3:24" } }
      ]
    },
    {
      week: 20,
      dates: "May 11\u201317",
      ref: "Deuteronomy 6\u20138; 15; 18; 29\u201330; 34",
      title: "Thou Shalt Love the Lord Thy God",
      theme: "Moses' farewell: love God with all your heart, soul, and strength. I set before you life and death \u2014 choose life.",
      resources: [{ title: "Teaching Our Children to Love the Lord", url: "https://www.churchofjesuschrist.org/study/general-conference/2016/10/teaching-our-children-to-love-the-lord", type: "General Conference", who: "Sister Rosemary M. Wixom" }, { title: "Don't Miss This \u2014 Deuteronomy 6\u20138; 30; 34", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }],
      ywPrep: { summary: "Deuteronomy is Moses' farewell sermon. He spent his last days teaching Israel to love God, remember His history with them, and choose the covenant again. 'Love the Lord thy God with all thine heart, and with all thy soul, and with all thy might.' Jesus quoted this as the greatest commandment. Moses died before entering the promised land.", prompts: ["Moses said, 'Love the Lord with all your heart, soul, and might.' Which of the three is hardest for you right now?", "God told Israel to talk about His commandments morning and night. What does daily faith formation look like in your home?", "Moses died before entering the promised land after 40 years of faithful leading. What does his faithfulness without the reward teach you?", "'I set before you life and death \u2014 choose life.' What does choosing life look like for you specifically today?"] },
      days: [
        { day: "Monday", summary: "Deuteronomy 6\u20138: Moses gives Israel the Shema \u2014 'Hear O Israel, the Lord our God is one Lord. Thou shalt love the Lord thy God with all thine heart, with all thy soul, and with all thy might.' He urges them to teach these words to their children constantly. God is about to give them a prosperous land. Don't forget where it came from.", scripture: "Deuteronomy 6:4\u20139", keyPrinciple: "Love the Lord your God with all your heart, soul, and strength. The Shema \u2014 the foundation of everything.", reflect: "Heart, soul, strength \u2014 which aspect of your love for God needs the most attention right now?", pray: "Pray the Shema: Lord, I love you with my heart, soul, and strength.", act: "Write Deuteronomy 6:5 somewhere in your home where your family will see it.", dailyQuote: { text: "Thou shalt love the Lord thy God with all thine heart, and with all thy soul, and with all thy might.", source: "Deuteronomy 6:5" }, resources: [{ title: "How Do I Love Thee?", url: "https://www.churchofjesuschrist.org/study/general-conference/2011/10/how-do-i-love-thee", type: "General Conference", who: "Elder Thomas S. Monson" }, { title: "Don't Miss This \u2014 Deuteronomy 6\u20138", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }, { title: "FSY: Covenant Path", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/02covenant-path", type: "FSY Handbook", who: "For the Strength of Youth", note: "Covenants are the backbone of today's reading. This section explains what it means to be on the covenant path and how every ordinance connects us more deeply to God." }] },
        { day: "Wednesday", summary: "Deuteronomy 29\u201330: Moses gathers all Israel before him \u2014 leaders, elders, children, strangers, woodcutters, water drawers \u2014 and renews the covenant. Then he says: 'I have set before you life and death, blessing and cursing. Therefore choose life.' It is always a choice.", scripture: "Deuteronomy 8:2\u20133", keyPrinciple: "God led Israel in the wilderness to humble them and prove what was in their heart. Trials reveal us.", reflect: "What has a recent trial revealed about what is truly in your heart?", pray: "Ask God what He is building in you through your current hard season.", act: "Write what you have learned about yourself through your hardest recent experience.", dailyQuote: { text: "And thou shalt remember all the way which the Lord thy God led thee these forty years in the wilderness, to humble thee, and to prove thee.", source: "Deuteronomy 8:2" }, resources: [{ title: "Remembrance and Gratitude", url: "https://www.churchofjesuschrist.org/study/general-conference/1996/10/remembrance-and-gratitude", type: "General Conference", who: "President Gordon B. Hinckley" }, { title: "Don't Miss This \u2014 Deuteronomy 29\u201330", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }, { title: "FSY: Education and Learning", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/10education-and-learning", type: "FSY Handbook", who: "For the Strength of Youth", note: "Today's reading features wisdom or the cost of ignoring instruction. This section encourages learning as a lifelong spiritual discipline." }] },
        { day: "Friday", summary: "Deuteronomy 31\u201334: Moses writes down the law and gives it to the Levites. He teaches Israel a song. Then God tells him to go up Mount Nebo where he will see Canaan but not enter it. Moses is 120 years old. His eye is not dim. He sees the land and dies. 'There arose not a prophet since in Israel like Moses.'", scripture: "Deuteronomy 30:15\u201316, 19\u201320", keyPrinciple: "I set before you life and death. Choose life \u2014 that both you and your seed may live.", reflect: "What is one choice in front of you right now that is really a choice between spiritual life and death?", pray: "Ask God to help you choose life in your daily decisions.", act: "Write three life-giving choices you want to make this week.", dailyQuote: { text: "I have set before thee this day life and good, and death and evil... therefore choose life.", source: "Deuteronomy 30:15, 19" }, resources: [{ title: "Choose You This Day", url: "https://www.churchofjesuschrist.org/study/general-conference/2004/10/choose-you-this-day", type: "General Conference", who: "Elder Russell M. Nelson" }, { title: "Don't Miss This \u2014 Moses' Death", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }, { title: "FSY: Agency and Integrity", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/04agency-and-integrity", type: "FSY Handbook", who: "For the Strength of Youth", note: "Agency is at the heart of today's reading. God gives commandments but never forces obedience \u2014 the choice is always ours. This section explores how to make choices aligned with God's will." }] },
        { day: "Saturday", scripture: "Deuteronomy 34:5\u201310", keyPrinciple: "Moses died faithfully, never seeing the promised land. His legacy outlived him by millennia.", reflect: "What kind of legacy do you want to leave? What are you doing now to build it?", pray: "Ask God to help you live faithfully even when the reward is delayed or unseen.", act: "Write three things you want the next generation to know about your faith.", dailyQuote: { text: "There arose not a prophet since in Israel like unto Moses, whom the Lord knew face to face.", source: "Deuteronomy 34:10" } }
      ]

    {
      week: 21,
      dates: "May 18\u201324",
      ref: "Joshua 1\u20138; 23\u201324",
      title: "Be Strong and of a Good Courage",
      theme: "Joshua led Israel into the promised land. Courage is obedience in the presence of fear.",
      resources: [{ title: "Be Strong and of a Good Courage", url: "https://www.churchofjesuschrist.org/study/general-conference/2014/10/be-strong-and-of-a-good-courage", type: "General Conference", who: "Elder Robert D. Hales" }, { title: "Don't Miss This \u2014 Joshua 1\u20138; 23\u201324", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }],
      ywPrep: { summary: "Moses died. Joshua was terrified. God said 'be strong and courageous' three times. The Jordan parted after the priests stepped in first. Jericho fell after seven days of marching. Joshua's final declaration: 'As for me and my house, we will serve the Lord.'", prompts: ["God told Joshua to be courageous three times. Why does God repeat Himself?", "The Jordan didn't part until the priests stepped in. What step of faith are you standing at the edge of?", "Jericho's walls fell after seven days of what looked like foolishness. What is God asking you to keep doing when nothing visible is happening?", "'As for me and my house, we will serve the Lord.' What is your personal declaration of covenant loyalty?"] },
      days: [
        { day: "Monday", summary: "Joshua 1\u20134: Moses has died. God commissions Joshua: 'Be strong and of a good courage. Every place the sole of your foot shall tread, I have given it to you.' The people cross the Jordan River on dry ground \u2014 echoing the Red Sea crossing. Twelve stones are set up as a memorial: 'What do these stones mean?' 'God stopped the Jordan.'", scripture: "Joshua 1:5\u20139", keyPrinciple: "Be strong and courageous \u2014 I will be with you wherever you go. The courage comes from the presence.", reflect: "What situation is God asking you to face this week? Where is He in that situation?", pray: "Ask God to make His presence real in your scariest place.", act: "Do one thing today that requires courage. God said He'd be with you.", dailyQuote: { text: "Be strong and of a good courage; be not afraid... for the Lord thy God is with thee whithersoever thou goest.", source: "Joshua 1:9" }, resources: [{ title: "Be Strong and of a Good Courage", url: "https://www.churchofjesuschrist.org/study/general-conference/2014/10/be-strong-and-of-a-good-courage", type: "General Conference", who: "Elder Robert D. Hales" }, { title: "Don't Miss This \u2014 Joshua 1\u20138", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }, { title: "FSY: Agency and Integrity", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/04agency-and-integrity", type: "FSY Handbook", who: "For the Strength of Youth", note: "Agency is at the heart of today's reading. God gives commandments but never forces obedience \u2014 the choice is always ours. This section explores how to make choices aligned with God's will." }] },
        { day: "Wednesday", summary: "Joshua 5\u20138: Israel circumcises the men born in the wilderness \u2014 the generation that never received the covenant sign. They observe Passover. The manna stops \u2014 they eat from the land. Joshua meets the captain of the Lord's host with a drawn sword. The walls of Jericho fall after seven days of marching.", scripture: "Joshua 3:13\u201317", keyPrinciple: "The river parted when the priests' feet touched the water. Faith requires a step before the miracle.", reflect: "What step is God waiting for you to take before He opens the way?", pray: "Ask God for the faith to step in before the water parts.", act: "Take one concrete step toward something you've been waiting on God to open first.", dailyQuote: { text: "The waters... stood and rose up upon a heap... and the people passed over right against Jericho.", source: "Joshua 3:16" }, resources: [{ title: "Step by Step", url: "https://www.churchofjesuschrist.org/study/general-conference/1993/04/step-by-step", type: "General Conference", who: "Elder Russell M. Nelson" }, { title: "Don't Miss This \u2014 Crossing the Jordan", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }, { title: "FSY: Agency and Integrity", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/04agency-and-integrity", type: "FSY Handbook", who: "For the Strength of Youth", note: "Agency is at the heart of today's reading. God gives commandments but never forces obedience \u2014 the choice is always ours. This section explores how to make choices aligned with God's will." }] },
        { day: "Friday", summary: "Joshua 23\u201324: Joshua is old and gives his farewell address. He recites everything God has done for Israel \u2014 brought them out of Egypt, defeated their enemies, gave them a land they did not plant. Then the great challenge: 'Choose you this day whom ye will serve.' Joshua's answer: 'As for me and my house, we will serve the Lord.'", scripture: "Joshua 6:3\u20135, 20", keyPrinciple: "March around Jericho seven days. Shout. The walls fell. God's methods often look nothing like ours.", reflect: "Is God asking you to do something that seems pointless or too simple? What is your wall?", pray: "Ask God for patience to keep marching when nothing seems to be happening.", act: "Keep doing what God told you to do, even if nothing visible is changing yet.", dailyQuote: { text: "And it came to pass, when the people heard the sound of the trumpet... that the wall fell down flat.", source: "Joshua 6:20" }, resources: [{ title: "The Power of a Personal Testimony", url: "https://www.churchofjesuschrist.org/study/general-conference/2006/10/the-power-of-a-personal-testimony", type: "General Conference", who: "Elder M. Russell Ballard" }, { title: "Don't Miss This \u2014 Joshua 23\u201324", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }, { title: "FSY: Living the Gospel", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/12living-the-gospel", type: "FSY Handbook", who: "For the Strength of Youth", note: "Today's reading illustrates what it looks like to live the gospel fully \u2014 or to drift from it. This section describes what it means to be an active disciple in everyday life." }] },
        { day: "Saturday", scripture: "Joshua 24:14\u201315", keyPrinciple: "As for me and my house, we will serve the Lord. A declaration is a stake in the ground.", reflect: "What is your personal declaration of covenant loyalty?", pray: "Make your declaration out loud to God today.", act: "Write it somewhere permanent \u2014 your journal, your wall, your phone lock screen.", dailyQuote: { text: "Choose you this day whom ye will serve... but as for me and my house, we will serve the Lord.", source: "Joshua 24:15" } }
      ]
    },
    {
      week: 22,
      dates: "May 25\u201331",
      ref: "Judges 2\u20134; 6\u20138; 13\u201316",
      title: "The Lord Raised Up a Deliverer",
      theme: "Deborah led wisely. Gideon fought with 300. Samson squandered his gifts. God raises up unexpected deliverers.",
      resources: [{ title: "Deborah and the Latter-day Sisterhood", url: "https://www.churchofjesuschrist.org/study/ensign/2016/09/deborah-and-the-latter-day-sisterhood", type: "Ensign", who: "Camille Fronk Olson" }, { title: "Don't Miss This \u2014 Judges 2\u20134; 6\u20138; 13\u201316", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }],
      ywPrep: { summary: "Judges is honest and uncomfortable. Israel kept forgetting God, suffering, crying out, being delivered \u2014 and forgetting again. Deborah judged all of Israel with wisdom and led them to military victory. Gideon was the least of the least and God called him 'mighty man of valor.' Samson had every gift and wasted them all through slow compromise.", prompts: ["Deborah was a judge, prophetess, wife, and military leader. What does her story say about women in God's kingdom?", "God reduced Gideon's army from 32,000 to 300. Why would God intentionally make the task harder?", "Samson's gifts didn't automatically lead to righteousness. What gifts could you use for good or waste?", "The Judges cycle repeats: forget, suffer, cry out, deliver, forget. Where do you see that pattern in your own life?"] },
      days: [
        { day: "Monday", summary: "Judges 2\u20134: After Joshua dies, Israel falls into a cycle: they abandon God, enemies oppress them, they cry out, God raises a judge to deliver them, they follow God while the judge lives, then fall again. Deborah is a prophetess and judge \u2014 she leads Barak into battle against Sisera. Israel defeats the Canaanites.", scripture: "Judges 2:10\u201312, 16", keyPrinciple: "A generation arose that knew not the Lord. Covenant memory is the thing that keeps us from the cycle.", reflect: "What practices help you not forget God between blessings?", pray: "Ask God to help you build habits that keep Him central even when life is comfortable.", act: "Write one practice you will implement to remember God daily.", dailyQuote: { text: "There arose another generation after them, which knew not the Lord... Nevertheless the Lord raised up judges, which delivered them.", source: "Judges 2:10, 16" }, resources: [{ title: "Cycle of Apostasy in Judges", url: "https://www.saintsunscripted.com", type: "Podcast", who: "Saints Unscripted" }, { title: "Don't Miss This \u2014 Judges 2\u20134", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }, { title: "FSY: Living the Gospel", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/12living-the-gospel", type: "FSY Handbook", who: "For the Strength of Youth", note: "Today's reading illustrates what it looks like to live the gospel fully \u2014 or to drift from it. This section describes what it means to be an active disciple in everyday life." }] },
        { day: "Wednesday", summary: "Judges 4\u20135: Deborah and Barak's song of victory \u2014 one of the oldest poems in the Bible. Then Jael, a woman not even Israelite, drives a tent peg through Sisera's head. The song celebrates ordinary people doing extraordinary acts of deliverance. God works through whomever He chooses.", scripture: "Judges 4:4\u20139, 14", keyPrinciple: "Deborah led Israel as prophetess and judge. She went into battle and credited God for the victory.", reflect: "What leadership has God given you \u2014 in your home, class, or community?", pray: "Ask God to give you Deborah's confidence to lead when called.", act: "Lead one thing today with intentionality and credit God for the result.", dailyQuote: { text: "And Deborah said unto Barak, Up; for this is the day in which the Lord hath delivered Sisera into thine hand.", source: "Judges 4:14" }, resources: [{ title: "Daughters of God", url: "https://www.churchofjesuschrist.org/study/general-conference/2008/04/daughters-of-god", type: "General Conference", who: "Elder M. Russell Ballard" }, { title: "Deborah: An Ancient Role Model", url: "https://www.churchofjesuschrist.org/study/ensign/2016/09/deborah-and-the-latter-day-sisterhood", type: "Ensign", who: "Camille Fronk Olson" }, { title: "FSY: Giving Service", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/11giving-service", type: "FSY Handbook", who: "For the Strength of Youth", note: "Today's reading features someone who gives more than expected \u2014 or fails to. This section explores why serving others is central to discipleship." }] },
        { day: "Friday", summary: "Judges 13\u201316: Samson \u2014 the last judge. An angel announces his birth. He is to be a Nazirite, set apart to God. He has supernatural strength from his hair. He marries a Philistine woman against his parents' wishes. He kills a lion with his bare hands. He tells Delilah the secret of his strength. She betrays him.", scripture: "Judges 7:2\u20137", keyPrinciple: "God reduced Gideon's army so Israel wouldn't credit themselves for the victory. 300 against thousands.", reflect: "When has God made something harder so you would know the victory was His?", pray: "Ask God to remove anything that makes you trust your own strength over His.", act: "Identify one place you're relying on your own power and give it to God today.", dailyQuote: { text: "The Lord said unto Gideon, The people that are with thee are too many... lest Israel vaunt themselves against me.", source: "Judges 7:2" }, resources: [{ title: "Samson \u2014 Gifts and Dangers", url: "https://www.saintsunscripted.com", type: "Podcast", who: "Saints Unscripted" }, { title: "Avoiding the Trap of Sin", url: "https://www.churchofjesuschrist.org/study/general-conference/1994/04/avoiding-the-trap-of-sin", type: "General Conference", who: "Elder Richard G. Scott" }, { title: "FSY: Agency and Integrity", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/04agency-and-integrity", type: "FSY Handbook", who: "For the Strength of Youth", note: "Agency is at the heart of today's reading. God gives commandments but never forces obedience \u2014 the choice is always ours. This section explores how to make choices aligned with God's will." }] },
        { day: "Saturday", scripture: "Judges 16:20", keyPrinciple: "Samson had gifts from birth and squandered them through slow compromise. One small thing at a time.", reflect: "What small compromises slowly erode spiritual gifts and strength?", pray: "Ask God to protect your gifts from erosion through small compromises.", act: "Identify one compromise you have been tolerating. Name it. Give it to God.", dailyQuote: { text: "And he wist not that the Lord was departed from him.", source: "Judges 16:20" } }
      ]
    },
    {
      week: 23,
      dates: "Jun 1\u20137",
      ref: "Ruth; 1 Samuel 1\u20137",
      title: "My Heart Rejoiceth in the Lord",
      theme: "Ruth's loyalty is a picture of covenant love. Hannah prayed desperately and God answered with Samuel.",
      resources: [{ title: "The Book of Ruth: Covenant Love", url: "https://www.churchofjesuschrist.org/study/ensign/1991/03/the-book-of-ruth-covenant-love", type: "Ensign", who: "Camille Fronk Olson" }, { title: "Don't Miss This \u2014 Ruth; 1 Samuel 1\u20137", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }],
      ywPrep: { summary: "Ruth left her people and gods to stay with Naomi: 'Whither thou goest, I will go.' Boaz redeemed her as a kinsman redeemer \u2014 a clear type of Christ who covers and buys back. Hannah prayed so intensely the priest thought she was drunk. God gave her Samuel. Both women modeled faith through profound personal pain.", prompts: ["Ruth said, 'Whither thou goest, I will go.' Who has shown you that kind of loyalty? Who have you shown it to?", "Boaz covered Ruth, protected her, and bought her back. How is this a picture of Jesus Christ?", "Hannah's prayer was so intense the priest thought she was drunk. When have you prayed that desperately?", "Hannah gave Samuel back to God after she finally received him. What has God given you that He might be asking you to consecrate?"] },
      days: [
        { day: "Monday", summary: "Ruth 1: Naomi, an Israelite, loses her husband and both sons in Moab. She tells her daughters-in-law to return to their own people. Orpah leaves but Ruth clings to Naomi: 'Whither thou goest, I will go. Thy people shall be my people, and thy God my God.' This is one of the great declarations of loyalty in all of scripture.", scripture: "Ruth 1:16\u201317", keyPrinciple: "Whither thou goest I will go. Your people shall be my people. Ruth's loyalty was a covenant, not a convenience.", reflect: "Who are the people you are committed to regardless of cost or convenience?", pray: "Ask God to give you Ruth-level loyalty in your most important relationships.", act: "Do something for one person that shows you are fully in \u2014 no conditions.", dailyQuote: { text: "Whither thou goest, I will go; and where thou lodgest, I will lodge: thy people shall be my people, and thy God my God.", source: "Ruth 1:16" }, resources: [{ title: "Ruth and Naomi \u2014 Covenant Loyalty", url: "https://www.saintsunscripted.com", type: "Podcast", who: "Saints Unscripted" }, { title: "Don't Miss This \u2014 Ruth", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }, { title: "FSY: Relationships", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/06relationships", type: "FSY Handbook", who: "For the Strength of Youth", note: "Today's reading involves a key relationship between people or between a person and God. This FSY section explores what healthy, God-centered relationships look like." }] },
        { day: "Wednesday", summary: "Ruth 2\u20133: Ruth gleans in Boaz's fields \u2014 a provision in Israelite law for the poor. Boaz notices her and tells his workers to leave extra grain for her and not rebuke her. He asks who she is. Naomi realizes Boaz is their kinsman-redeemer \u2014 a relative with the legal right and responsibility to restore the family.", scripture: "Ruth 2:12", keyPrinciple: "Boaz redeemed Ruth \u2014 covered her, bought her back, protected her. He is a type of Christ as our kinsman redeemer.", reflect: "In what ways is Jesus your kinsman redeemer \u2014 covering you, buying you back, protecting you?", pray: "Thank Jesus for being your personal kinsman redeemer.", act: "Read about kinsman redeemer in a Bible dictionary. Write what stands out to you.", dailyQuote: { text: "The Lord recompense thy work, and a full reward be given thee of the Lord God of Israel, under whose wings thou art come to trust.", source: "Ruth 2:12" }, resources: [{ title: "Jesus Christ Is Our Kinsman Redeemer", url: "https://www.churchofjesuschrist.org/study/ensign/2000/09/jesus-christ-the-master-healer", type: "Ensign", who: "Elder Russell M. Nelson" }, { title: "The Symbol of the Redeemer in Ruth", url: "https://www.churchofjesuschrist.org/study/ensign/1991/03/the-book-of-ruth-covenant-love", type: "Ensign", who: "Camille Fronk Olson" }, { title: "FSY: Covenant Path", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/02covenant-path", type: "FSY Handbook", who: "For the Strength of Youth", note: "Covenants are the backbone of today's reading. This section explains what it means to be on the covenant path and how every ordinance connects us more deeply to God." }] },
        { day: "Friday", summary: "Ruth 4: Boaz goes to the city gate and negotiates with the closer kinsman, who won't marry Ruth because it will affect his own inheritance. Boaz takes the sandal as a symbol of the transaction. He marries Ruth. She bears a son \u2014 Obed, the grandfather of David. A Moabite woman becomes part of the lineage of Christ.", scripture: "1 Samuel 1:10\u201311, 20", keyPrinciple: "Hannah poured out her soul to God \u2014 weeping, vowing, refusing to give up. God gave her Samuel.", reflect: "What prayer have you brought to God with Hannah's intensity? How has He answered?", pray: "Pour out one honest, deep prayer today. Hold nothing back.", act: "Write the prayer you have been afraid to pray out loud.", dailyQuote: { text: "And Hannah prayed, and said, My heart rejoiceth in the Lord... there is none holy as the Lord.", source: "1 Samuel 2:1" }, resources: [{ title: "The Power of the Priesthood Blessings", url: "https://www.churchofjesuschrist.org/study/general-conference/2012/04/the-power-of-the-priesthood", type: "General Conference", who: "Elder Boyd K. Packer" }, { title: "Don't Miss This \u2014 Hannah's Prayer", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }, { title: "FSY: Living the Gospel", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/12living-the-gospel", type: "FSY Handbook", who: "For the Strength of Youth", note: "Today's reading illustrates what it looks like to live the gospel fully \u2014 or to drift from it. This section describes what it means to be an active disciple in everyday life." }] },
        { day: "Saturday", scripture: "1 Samuel 3:4\u201310", keyPrinciple: "God called Samuel by name three times. Samuel learned to respond: Speak, Lord; for thy servant heareth.", reflect: "Do you recognize God's voice when He calls? What helps you hear it?", pray: "Pray Samuel's prayer: Speak, Lord, for thy servant heareth.", act: "Spend ten minutes in silence today. Listen.", dailyQuote: { text: "Speak, Lord; for thy servant heareth.", source: "1 Samuel 3:9" } }
      ]
    },
    {
      week: 24,
      dates: "Jun 8\u201314",
      ref: "1 Samuel 8\u201310; 13; 15\u201316",
      title: "The Lord Looketh on the Heart",
      theme: "Israel wanted a king like the nations. God gave them Saul. David was chosen because God looks on the heart.",
      resources: [{ title: "The Lord Looketh on the Heart", url: "https://www.churchofjesuschrist.org/study/general-conference/1994/04/the-lord-looketh-on-the-heart", type: "General Conference", who: "Elder Richard G. Scott" }, { title: "Don't Miss This \u2014 1 Samuel 8\u201316", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }],
      ywPrep: { summary: "Israel demanded a king to be like other nations. God gave them Saul \u2014 tall, impressive, and ultimately disobedient. God rejected Saul and sent Samuel to anoint the youngest, smallest son of Jesse, who was out tending sheep. 'The Lord looketh not on the outward appearance, but on the heart.'", prompts: ["Israel wanted a king 'like the nations.' What do we want today just to fit in with the world around us?", "Saul was tall and impressive. David was small and overlooked. Why does God consistently choose the unexpected person?", "'The Lord looketh on the heart.' What is the current state of your heart?", "To obey is better than sacrifice. Saul sacrificed without obeying. What does that look like today?"] },
      days: [
        { day: "Monday", summary: "1 Samuel 8\u201310: Israel demands a king \u2014 'to be like all the nations.' God tells Samuel this is a rejection of God's kingship, not Samuel's leadership. He warns them what a king will do: take their sons for war, their daughters for cooks, their fields for his servants. They still want a king. God gives them Saul \u2014 tall, head and shoulders above all others.", scripture: "1 Samuel 8:5\u20137", keyPrinciple: "Israel wanted a king like the nations. God said they were rejecting Him. Conformity costs covenant.", reflect: "What pressure to conform to the world have you felt recently? What did it cost you?", pray: "Ask God to help you want Him more than you want to fit in.", act: "Identify one area where you are choosing culture over covenant.", dailyQuote: { text: "And the Lord said unto Samuel... they have not rejected thee, but they have rejected me.", source: "1 Samuel 8:7" }, resources: [{ title: "The Influence of Worldly Philosophies", url: "https://www.churchofjesuschrist.org/study/general-conference/1992/04/what-manner-of-men-and-women-ought-ye-to-be", type: "General Conference", who: "Elder M. Russell Ballard" }, { title: "Don't Miss This \u2014 1 Samuel 8\u201310", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }, { title: "FSY: Living the Gospel", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/12living-the-gospel", type: "FSY Handbook", who: "For the Strength of Youth", note: "Today's reading illustrates what it looks like to live the gospel fully \u2014 or to drift from it. This section describes what it means to be an active disciple in everyday life." }] },
        { day: "Wednesday", summary: "1 Samuel 13\u201315: Saul is impatient. He offers the sacrifice himself instead of waiting for Samuel. Samuel arrives and says: 'Thou hast done foolishly. The Lord would have established thy kingdom forever, but now it shall not continue.' Then Saul is commanded to destroy the Amalekites completely \u2014 he spares the king and best livestock. Samuel: 'To obey is better than sacrifice.'", scripture: "1 Samuel 15:22", keyPrinciple: "To obey is better than sacrifice. Saul sacrificed without obeying. God was not impressed.", reflect: "Where are you substituting religious activity for actual obedience?", pray: "Ask God to show you one area where you are going through the motions.", act: "Obey one specific thing God has been asking that you have been rationalizing around.", dailyQuote: { text: "To obey is better than sacrifice, and to hearken than the fat of rams.", source: "1 Samuel 15:22" }, resources: [{ title: "Obedience \u2014 Life's Great Challenge", url: "https://www.churchofjesuschrist.org/study/general-conference/1994/10/obedience-lifes-great-challenge", type: "General Conference", who: "Elder Ezra Taft Benson" }, { title: "Don't Miss This \u2014 Saul's Disobedience", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }, { title: "FSY: Agency and Integrity", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/04agency-and-integrity", type: "FSY Handbook", who: "For the Strength of Youth", note: "Agency is at the heart of today's reading. God gives commandments but never forces obedience \u2014 the choice is always ours. This section explores how to make choices aligned with God's will." }] },
        { day: "Friday", summary: "1 Samuel 16: God tells Samuel to go to Bethlehem to anoint one of Jesse's sons. Seven sons pass before Samuel. God says no to each one. 'Man looketh on the outward appearance but the Lord looketh on the heart.' The youngest, David \u2014 out with the sheep \u2014 is brought in. Samuel anoints him and the Spirit comes upon him.", scripture: "1 Samuel 16:7", keyPrinciple: "Man looks at outward appearance. God looks at the heart. David was chosen while his brothers stood by.", reflect: "What does God see in your heart right now that outward appearances hide?", pray: "Ask God to show you your heart honestly \u2014 the good and the parts that need work.", act: "Write an honest inventory of what you believe God sees in your heart right now.", dailyQuote: { text: "The Lord seeth not as man seeth; for man looketh on the outward appearance, but the Lord looketh on the heart.", source: "1 Samuel 16:7" }, resources: [{ title: "The Lord Looketh on the Heart", url: "https://www.churchofjesuschrist.org/study/general-conference/2014/04/the-lord-looketh-on-the-heart", type: "General Conference", who: "Elder John B. Dickson" }, { title: "Don't Miss This \u2014 David Anointed", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }, { title: "FSY: Living the Gospel", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/12living-the-gospel", type: "FSY Handbook", who: "For the Strength of Youth", note: "Today's reading illustrates what it looks like to live the gospel fully \u2014 or to drift from it. This section describes what it means to be an active disciple in everyday life." }] },
        { day: "Saturday", scripture: "1 Samuel 16:11\u201313", keyPrinciple: "David was outside tending sheep when everyone else was at the feast. God found him in the ordinary place.", reflect: "Where are you faithful when no one is watching? That is where God is looking.", pray: "Ask God to honor your faithfulness in the small and unseen places.", act: "Do something faithful today that no one will notice.", dailyQuote: { text: "There remaineth yet the youngest, and, behold, he keepeth the sheep.", source: "1 Samuel 16:11" } }
      ]
    },
    {
      week: 25,
      dates: "Jun 15\u201321",
      ref: "1 Samuel 17\u201318; 24\u201326; 2 Samuel 5\u20137",
      title: "The Battle Is the Lord's",
      theme: "David faced Goliath with faith, not armor. The battle is the Lord's. He showed mercy to his enemy.",
      resources: [{ title: "David and Goliath: A Type of Christ", url: "https://www.churchofjesuschrist.org/study/ensign/2012/06/old-testament", type: "Ensign", who: "Church of Jesus Christ" }, { title: "Don't Miss This \u2014 1 Samuel 17\u201326; 2 Samuel 5\u20137", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }],
      ywPrep: { summary: "David was too small for Saul's armor. He went to Goliath with a sling and the name of the Lord. 'The battle is the Lord's.' Later, when David could have killed Saul \u2014 his pursuer \u2014 he refused twice. He would not touch the Lord's anointed. God then established David's kingdom with a covenant pointing to Christ.", prompts: ["David refused Saul's armor because it didn't fit. What unique strengths has God given you for your own giants?", "'The battle is the Lord's, not ours.' What battle are you trying to fight in your own strength right now?", "David spared Saul's life twice when he had every reason to take it. What does that level of restraint look like in your relationships?", "God promised David a throne that would endure forever \u2014 fulfilled in Jesus Christ. How do you see Christ in David's story?"] },
      days: [
        { day: "Monday", summary: "1 Samuel 17: Goliath \u2014 a Philistine champion nine feet tall \u2014 challenges Israel for forty days. Everyone is terrified. David, delivering food to his brothers, hears the challenge and asks: 'Who is this uncircumcised Philistine that he should defy the armies of the living God?' He takes a sling and five smooth stones. Goliath falls.", scripture: "1 Samuel 17:32\u201337", keyPrinciple: "David rehearsed his past deliverances to build faith for his present giant. History with God builds courage.", reflect: "What past deliverances can you rehearse to build faith for what you're facing now?", pray: "Rehearse your testimony out loud today. Tell God what He has done for you.", act: "Write three times God came through for you. Read it before bed.", dailyQuote: { text: "The Lord that delivered me out of the paw of the lion... he will deliver me out of the hand of this Philistine.", source: "1 Samuel 17:37" }, resources: [{ title: "The Lord's Battle Is Ours", url: "https://www.saintsunscripted.com", type: "Podcast", who: "Saints Unscripted" }, { title: "Don't Miss This \u2014 David and Goliath", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }, { title: "FSY: Agency and Integrity", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/04agency-and-integrity", type: "FSY Handbook", who: "For the Strength of Youth", note: "Agency is at the heart of today's reading. God gives commandments but never forces obedience \u2014 the choice is always ours. This section explores how to make choices aligned with God's will." }] },
        { day: "Wednesday", summary: "1 Samuel 18\u201326: David becomes a military hero. The women sing: 'Saul hath slain his thousands and David his ten thousands.' Saul becomes jealous and tries to kill David multiple times. David lives as a fugitive. He has two chances to kill Saul and refuses both times. 'The Lord forbid that I should stretch forth mine hand against the Lord's anointed.'", scripture: "1 Samuel 17:45\u201347", keyPrinciple: "'I come in the name of the Lord.' The battle belongs to Him, not to us.", reflect: "What would it look like to face your current Goliath in the name of the Lord rather than your own ability?", pray: "Name your giant to God. Say out loud: 'This battle is the Lord's.'", act: "Replace one anxious thought with 'the battle is the Lord's' every time it comes today.", dailyQuote: { text: "This day will the Lord deliver thee into mine hand... that all the earth may know that there is a God in Israel.", source: "1 Samuel 17:46" }, resources: [{ title: "Principles of Spiritual Leadership", url: "https://speeches.byu.edu", type: "Devotional", who: "BYU Devotional" }, { title: "Loving Your Enemies", url: "https://www.churchofjesuschrist.org/study/general-conference/2014/10/are-we-not-all-beggars", type: "General Conference", who: "Elder Jeffrey R. Holland" }, { title: "FSY: Covenant Path", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/02covenant-path", type: "FSY Handbook", who: "For the Strength of Youth", note: "Covenants are the backbone of today's reading. This section explains what it means to be on the covenant path and how every ordinance connects us more deeply to God." }] },
        { day: "Friday", summary: "2 Samuel 5\u20137: David is anointed king over all Israel after years of waiting. He captures Jerusalem and makes it his capital. He brings the ark of the covenant into the city and dances before the Lord with all his might. God makes a covenant with David: his throne will be established forever. David asks to build God a house; God says He will build David a house.", scripture: "1 Samuel 24:4\u20137, 10", keyPrinciple: "David spared Saul's life when he had every reason \u2014 and opportunity \u2014 to end it. He refused to avenge himself.", reflect: "Who has wronged you that you have the power to hurt but have chosen not to? What did that cost you?", pray: "Ask God to give you David's restraint toward someone who has hurt you.", act: "Choose to respond to one injustice with mercy today instead of retaliation.", dailyQuote: { text: "The Lord forbid that I should do this thing unto my master, the Lord's anointed.", source: "1 Samuel 24:6" }, resources: [{ title: "The Temple \u2014 God's Gift to His Children", url: "https://www.churchofjesuschrist.org/study/general-conference/2015/10/the-temple-and-the-holy-priesthood", type: "General Conference", who: "Elder Russell M. Nelson" }, { title: "Don't Miss This \u2014 2 Samuel 5\u20137", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }, { title: "FSY: Agency and Integrity", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/04agency-and-integrity", type: "FSY Handbook", who: "For the Strength of Youth", note: "Agency is at the heart of today's reading. God gives commandments but never forces obedience \u2014 the choice is always ours. This section explores how to make choices aligned with God's will." }] },
        { day: "Saturday", scripture: "2 Samuel 7:12\u201313, 16", keyPrinciple: "God promised David a throne that would endure forever. Jesus is the fulfillment \u2014 the Son of David on an eternal throne.", reflect: "How does knowing Jesus is the fulfillment of every covenant God made change how you read the Old Testament?", pray: "Thank God for keeping every promise He has ever made \u2014 from Abraham to David to you.", act: "Read Luke 1:32\u201333 alongside 2 Samuel 7:12\u201316. Write what connects them.", dailyQuote: { text: "He shall build a house for my name, and I will stablish the throne of his kingdom for ever.", source: "2 Samuel 7:13" } }
      ]
    },
    {
      week: 26,
      dates: "Jun 22\u201328",
      ref: "2 Samuel 11\u201312; 1 Kings 3; 6\u20139; 11",
      title: "Hear Thou in Heaven Their Prayer",
      theme: "David fell and repented. Solomon asked for wisdom and built the temple. Even greatness can erode.",
