*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{background:${l.bg}}

.fade{animation:fadeUp .28s ease both}

@keyframes completePulse{0%{box-shadow:0 0 0 0 rgba(232,93,58,0.4)}70%{box-shadow:0 0 0 10px rgba(232,93,58,0)}100%{box-shadow:0 0 0 0 rgba(232,93,58,0)}}
@keyframes checkScale{0%{transform:scale(0.8)}50%{transform:scale(1.12)}100%{transform:scale(1)}}
@media(prefers-reduced-motion:reduce){.fade,.ck-anim{animation:none!important}}

urt within 30 min of finishing."},{label:"Week 4",note:"Heavier anchors. Supersets standard on accessories. 2 min rest between anchor sets.",bgNote:"BG running high = push harder, it'll come down. Under 100 before starting = eat 15g carbs first."},{label:"Week 5",note:"Tempo work on noted exercises (3-0-1: 3 sec lowering). Log every weight. Peak week.",bgNote:"Peak week = more stress. Watch for delayed BG drops 2\u20133 hrs post. Don't skip post-workout snack."},{label:"Week 6",note:"Deload. Drop weight 20%. Same exercises, same structure. Let the body consolidate.",bgNote:"Lighter week = less BG impact. Good time to note patterns and plan what to progress in the next block."}],gym:{Monday:{title:"Cardio + Light Lift",mobility:!0,warmup:"Treadmill walk/run 20\u201325 min",bgNote:"Cardio raises BG mildly early, then drops post-session. Check CGM. No pre-snack needed if BG 100\u2013180.",note:"Lighter day by design. Mobility done at home. One upper, one lower, two core. 30 min total lifting.",strength:[{name:"Incline Dumbbell Press",sets:"3\xD710",tip:"30-45\xB0 bench, DBs only \u2014 no flat barbell. Elbows 45\xB0. Chest is accessory here, not focus.",swaps:["Cable incline press 3\xD710","DB chest fly 3\xD712"]},{name:"Dumbbell RDL",sets:"3\xD710",tip:"Hinge at hips, soft knee. Pelvic floor: brace before hinge, exhale at lockout.",swaps:["Single leg RDL 2\xD710 each","KB deadlift 3\xD710"]}],core:[{name:"Dead Bugs",weighted:!1,sets:"3\xD710 each",tip:"Postpartum essential. Low back flat throughout. Exhale as arm/leg extend. Never let the low back arch.",swaps:["Bird dog 3\xD710 each","Hollow body hold 3\xD720 sec","Toe taps 3\xD712 each"]},{name:"Pallof Press",weighted:!1,sets:"2\xD712 each",tip:"Anti-rotation at cable station. Brace before pressing out. Deep core and pelvic floor.",swaps:["Side plank 2\xD730 sec each","Suitcase carry 2\xD730 sec each","Seated knee tucks 2\xD712"]},{name:"Ab Rollout (kneeling)",weighted:!1,sets:"2\xD78",tip:"Wheel or slider from knees. Only go as far as you can keep a flat back. Build range weekly.",swaps:["Body saw 2\xD710","Bear crawl 2\xD720 sec","Plank with reach 2\xD710 each"]}]},Tuesday:{title:"Shoulders + Arms",warmup:"Treadmill walk 10\u201312 min \xB7 incline 3\u20135",bgNote:"Upper body = moderate BG drop. Usually stable if BG starts 120\u2013160. Check CGM.",note:"Station flow: cable station first (front raise + pressdown + curl) \u2192 shoulder machine \u2192 bench (press + skull crushers + hammer curl). Wk3+: superset pressdown + curl at cable. 45 min.",strength:[{name:"Cable Front Raise",sets:"2\xD712",tip:"Start at cable station. Low pulley. One arm at a time or both. Control the lowering \u2014 3 sec eccentric.",swaps:["DB front raise 2\xD712","Plate front raise 2\xD712"]},{name:"Rope Tricep Pressdown",sets:"3\xD712",tip:"Stay on cable \u2014 swap to rope. Elbows at sides, flare at bottom. Wk3+: superset with cable curl.",swaps:["Bar pressdown 3\xD712","Single arm pressdown 3\xD712 each"]},{name:"Cable Curl",sets:"3\xD712",tip:"Same cable station, swap attachment. Full extension at bottom, 3 sec eccentric. Wk3+: superset with pressdown.",swaps:["EZ bar curl 3\xD710","DB curl 3\xD712"]},{name:"Machine Lateral Raise",sets:"3\xD712",tip:"Move to shoulder machine. Lead with elbows, slight forward lean. Light is fine \u2014 form matters.",swaps:["DB lateral raise 3\xD712","Cable lateral raise 3\xD712 each"]},{name:"Seated DB Shoulder Press",sets:"4\xD78",tip:"Bench near DB rack. Full range \u2014 ear height at bottom, lock out at top. Primary lift \u2014 progress every week.",swaps:["Smith machine press 4\xD78","Landmine press 4\xD710 each"]},{name:"Skull Crusher",sets:"3\xD712",tip:"Stay at bench. EZ bar or DBs. Elbows in, lower to forehead.",swaps:["Overhead DB extension 3\xD710","Cable overhead extension 3\xD712"]},{name:"Hammer Curl",sets:"2\xD712",tip:"DB rack right next to bench. Neutral grip. Cross-body variation for variety. Last exercise.",swaps:["Rope hammer curl 2\xD712","Cross-body hammer 2\xD710 each"]}],core:[]},Wednesday:{title:"Lower Body \u2014 Squat Focus",mobility:!0,warmup:"Treadmill walk 10\u201312 min \xB7 incline 3\u20135",bgNote:"Lower body = highest BG drop potential. Under 100 before starting = eat 15g fast carbs and wait 10 min. Watch CGM 2\u20133 hrs post.",note:"Squat is the anchor \u2014 progress it every week. Wk3+: superset leg extension + hamstring curl to save time. Core is postpartum-appropriate \u2014 stability ball replaces loaded crunches.",strength:[{name:"Squat or Hack Squat",sets:"4\xD76",tip:"Heaviest leg day movement. Full depth, knees track toes. Pelvic floor: brace before descent, exhale on the way up.",swaps:["Smith machine squat 4\xD78","Goblet squat 4\xD710","Leg press heavy 4\xD76"]},{name:"Leg Press",sets:"3\xD710",tip:"Same machine area. Shoulder-width feet, full range, heels drive back.",swaps:["Hack squat machine 3\xD710","Belt squat 3\xD710"]},{name:"Leg Extension",sets:"3\xD712",tip:"A1 Wk3+. Quad isolation. Pause at top. 3-0-1 tempo Wk5+.",swaps:["Step-ups with DB 3\xD710 each"]},{name:"Hamstring Curl",sets:"3\xD712",tip:"A2 Wk3+. 3 sec eccentric \u2014 this is where hamstring work actually happens.",swaps:["Nordic curl 3\xD78","Single leg curl 3\xD710 each"]},{name:"Calf Raises",weighted:!1,sets:"3\xD715",tip:"Calf machine or Smith. Pause at top and bottom. Can superset with something else if short on time.",swaps:["Seated calf raise 3\xD715","Leg press calf raise 3\xD715"]}],core:[{name:"Pallof Press",weighted:!1,sets:"2\xD712 each",tip:"Anti-rotation. Brace before pressing out. Deep core and pelvic floor.",swaps:["Dead bugs 3\xD710 each","Side plank 2\xD720 sec each"]},{name:"Hollow Body Hold",weighted:!1,sets:"3\xD720 sec",tip:"Press low back into floor, arms overhead, legs low. Build to longer holds each week.",swaps:["Incline sit-up 3\xD712","Stability ball crunch 3\xD715"]}]},Thursday:{title:"Back + Pull",warmup:"Treadmill walk 10\u201312 min \xB7 incline 3\u20135",bgNote:"Back days are usually BG-stable. Lower body involvement is minimal. Still check CGM.",note:"Two exercises at the lat station, then one row station, then free weights. Wk3+: superset curl variations. In and out in 45 min.",strength:[{name:"Lat Pulldown",sets:"4\xD78",tip:"Full stretch at top. Drive elbows to pockets. Use a different grip variation than Tuesday. Wk5+: 3-0-1 tempo.",swaps:["Assisted pull-up 4\xD78","Close-grip pulldown 4\xD710"]},{name:"Straight Arm Pulldown",sets:"2\xD715",tip:"Still on lat cable. Arms straight, slight lean forward. Lat isolation \u2014 great postpartum back builder.",swaps:["Band straight arm pulldown 2\xD715","DB pullover 2\xD712"]},{name:"Seated Cable Row",sets:"3\xD710",tip:"Cable row station. Elbows close, squeeze shoulder blades. Heavier than Tuesday.",swaps:["Machine row 3\xD710","Single arm cable row 3\xD710 each"]},{name:"Overhead Tricep Extension",sets:"3\xD710",tip:"EZ bar or DB. Elbows forward, slow eccentric. A nice arm finisher after all the pulling.",swaps:["Cable overhead extension 3\xD712","DB skull crusher 3\xD712","Tricep dip 3\xD710"]},{name:"Incline Dumbbell Curl",sets:"3\xD710",tip:"A1 Wk3+. Full stretch at bottom. Supinate at top. Slow eccentric.",swaps:["Preacher curl 3\xD710","Concentration curl 3\xD710 each"]},{name:"Hammer Curl",sets:"2\xD712",tip:"A2 Wk3+. Neutral grip. Control the lowering.",swaps:["Cross-body hammer 2\xD710 each","Rope curl 2\xD712"]}],core:[]},Friday:{title:"Glutes + Posterior Chain",mobility:!0,warmup:"Treadmill walk 10\u201312 min \xB7 incline 3\u20135",bgNote:"Mixed session \u2014 hip thrusts drop BG, accessories fairly neutral. Check CGM. Post-workout snack recommended.",note:"Hip thrust is the anchor \u2014 load it heavy, progress it every single week. Station order: barbell/bench \u2192 glute machines \u2192 free weights \u2192 core.",strength:[{name:"Barbell Hip Thrust",sets:"4\xD78",tip:"Primary glute lift. Drive through heels. Full extension. Squeeze hard 1 sec at top. Pelvic floor: exhale on the drive up. Wk5+: 3-0-1 lowering. This is your #1 progress metric.",swaps:["Smith machine hip thrust 4\xD78","DB hip thrust 4\xD710","Banded hip thrust 4\xD712"]},{name:"Bulgarian Split Squat",sets:"3\xD78 each",tip:"Same bench. Rear foot elevated. Weight through front heel. Hardest accessory of the week.",swaps:["Reverse lunge 3\xD710 each","Step-up 3\xD710 each"]},{name:"Standing Glute Machine",sets:"3\xD712",tip:"A1 Wk3+. The standing glute machine \u2014 one leg at a time, press back and up. Full extension, squeeze hard 1 sec at top.",swaps:["Cable kickback 3\xD712 each","Reverse hyperextension 3\xD712","Single leg press 3\xD712 each"]},{name:"Hip Abductor Machine",sets:"3\xD715",tip:"A2 Wk3+. Glute med and hip stability.",swaps:["Banded clamshell 3\xD715 each","Side-lying abduction 3\xD715 each"]},{name:"DB RDL",sets:"3\xD710",tip:"Glute and hamstring finisher. Pelvic floor: brace before hinge, exhale at lockout.",swaps:["Single leg RDL 3\xD710 each","Good morning 3\xD712","Cable pull-through 3\xD712"]}],core:[{name:"Captain's Chair Knee Raise",weighted:!1,sets:"3\xD712",tip:"Arms on pads, hang freely. Drive knees to chest with control. Progress to straight leg raises over the program.",swaps:["Hanging knee raise 3\xD710","Lying leg raises 3\xD712","Toes to bar 2\xD78"]},{name:"Cable Crunch",sets:"3\xD715",tip:"Kneel at cable stack, rope at neck. Crunch elbows to knees. Keep hips fixed \u2014 all movement from abs.",swaps:["Weighted decline crunch 3\xD712","Ab machine 3\xD715","Rope crunch 3\xD712"]},{name:"Side Plank",weighted:!1,sets:"2\xD730 sec each",tip:"Elbow under shoulder. Hips up, body straight. Add hip dips for more challenge.",swaps:["Copenhagen plank 2\xD720 sec","Side plank with rotation 2\xD710 each","Star side plank 2\xD720 sec"]}]},Saturday:{title:"Active Recovery",rest:!0,note:"Deep stretch at Vasa, outdoor walk, or light yoga. No structured lifting."},Sunday:{title:"Rest Day",rest:!0,note:"Church, family, full recovery."}},home:{Monday:{title:"Cardio + Light Lift",mobility:!0,warmup:"Walking pad or treadmill 20\u201325 min",bgNote:"Cardio = mild BG rise early, then drop. Check CGM.",note:"Mobility done early. Cardio is the main event. One upper, one lower, two core.",strength:[{name:"Push Ups",weighted:!1,sets:"3\xD712",tip:"Full range. Use DB handles if available \u2014 protects wrists and adds depth.",swaps:["DB chest press on floor 3\xD710","Band press 3\xD712"]},{name:"Goblet Squat",weighted:!1,sets:"3\xD712",tip:"DB at chest. Elbows inside knees. Full depth. Pelvic floor: brace on descent, exhale up.",swaps:["Sumo squat 3\xD712","Wall sit 3\xD730 sec","Band squat 3\xD715"]}],core:[{name:"Lying Leg Raises",weighted:!1,sets:"3\xD712",tip:"Flat on back, hands under hips. Legs straight, lower slowly. Don't let low back arch.",swaps:["Reverse crunch 3\xD712","Bicycle crunch 3\xD715","Flutter kicks 3\xD720 sec"]},{name:"Body Saw",weighted:!1,sets:"2\xD710",tip:"Forearms on sliders or socks on hard floor. Plank position, slide forward and back. Deep core.",swaps:["Ab rollout 2\xD78","Dead bugs 3\xD710 each","Bear crawl 2\xD720 sec"]},{name:"Russian Twist",weighted:!1,sets:"3\xD712 each",tip:"Sit at 45\xB0, feet off floor. Rotate through the torso, not just the arms. Add a weight plate to progress.",swaps:["Bicycle crunch 3\xD715","Seated knee tucks 3\xD712","V-up 3\xD710"]}]},Tuesday:{title:"Upper Body",warmup:"Arm circles + shoulder rolls 5 min, then 5 min walk",bgNote:"Upper body = moderate BG drop. Check CGM.",strength:[{name:"Bent-over DB Row",sets:"4\xD710 each",tip:"Primary back movement at home. Hinge 45\xB0, elbow drives back and up. Heavy.",swaps:["Band row 4\xD712","Suitcase row 4\xD710 each"]},{name:"DB Shoulder Press",sets:"3\xD710",tip:"Seated or standing. No arch.",swaps:["Band overhead press 3\xD712","Arnold press 3\xD710"]},{name:"DB Lateral Raise",sets:"3\xD712",tip:"Light. Lead with elbows.",swaps:["Band lateral raise 3\xD715"]},{name:"DB Curl",sets:"3\xD712",tip:"A1 Wk3+. Full range, slow lowering.",swaps:["Band curl 3\xD712","Hammer curl 3\xD710"]},{name:"Overhead Tricep Extension",sets:"3\xD712",tip:"A2 Wk3+. One DB, both hands. Elbows forward, slow eccentric.",swaps:["Chair dip 3\xD712","Band pressdown 3\xD715"]},{name:"DB Chest Fly (floor)",sets:"2\xD712",tip:"Chest accessory. On your back, DBs, full stretch. Light weight.",swaps:["Push-up 2\xD712"]}],core:[]},Wednesday:{title:"Lower Body \u2014 Squat Focus",mobility:!0,warmup:"Walk outside or march in place 10 min",bgNote:"Lower body at home still drops BG. Under 100 = eat 15g carbs before starting.",strength:[{name:"Goblet Squat",weighted:!1,sets:"4\xD712",tip:"DB at chest. Elbows inside knees. Full depth. Pelvic floor: brace on descent, exhale up.",swaps:["Band squat 4\xD715","Sumo squat 4\xD712"]},{name:"Reverse Lunge",weighted:!1,sets:"3\xD710 each",tip:"Add DB if available. Control the descent. Weight stays in front heel.",swaps:["Split squat hold 3\xD730 sec each","Curtsy lunge 3\xD710 each"]},{name:"Single Leg Glute Bridge",weighted:!1,sets:"3\xD712 each",tip:"Foot flat, drive through heel, squeeze at top. Exhale on drive.",swaps:["DB hip thrust on floor 3\xD712","Frog pump 3\xD720"]},{name:"Sumo Squat",weighted:!1,sets:"3\xD712",tip:"Wide stance, toes out. Sit into hips. DB optional.",swaps:["Lateral squat 3\xD710 each"]},{name:"Calf Raises on Step",sets:"3\xD715",tip:"Stair or step. Full range, pause at top.",swaps:["Single-leg raise 3\xD712 each"]}],core:[{name:"Dead Bugs",weighted:!1,sets:"3\xD710 each",tip:"Low back flat. Exhale on extension.",swaps:["Bird dog 3\xD710 each"]},{name:"Reverse Crunch",sets:"3\xD712",tip:"On your back, knees to chest. Drive hips off the floor. Lower slow. Great lower ab work.",swaps:["Stability ball crunch 3\xD712","Flutter kicks 3\xD720 sec"]}]},Thursday:{title:"Back + Pull",warmup:"Cat-cow + thoracic rotation 5 min, then 5 min walk",bgNote:"Back days are usually BG-stable. Still check CGM.",strength:[{name:"Bent-over DB Row",sets:"4\xD710 each",tip:"Hinge 45\xB0, elbow drives back. Heavier than Tuesday.",swaps:["Band row 4\xD712"]},{name:"Band Pull-aparts",sets:"3\xD715",tip:"Arms straight. Squeeze shoulder blades at full extension.",swaps:["Band face pull 3\xD715","Superman 3\xD710"]},{name:"Superman Hold",sets:"3\xD710",tip:"Squeeze glutes and back. 2 sec hold at top.",swaps:["Back extension on floor 3\xD712","Prone Y raise 3\xD712"]},{name:"DB Curl",sets:"3\xD712",tip:"A1 Wk3+. Full range, supinate at top.",swaps:["Band curl 3\xD715"]},{name:"Hammer Curl",sets:"2\xD712",tip:"A2 Wk3+. Slow eccentric.",swaps:["Cross-body curl 2\xD710 each"]}],core:[]},Friday:{title:"Glutes + Posterior Chain",mobility:!0,warmup:"Hip circles + glute bridges 5 min",bgNote:"Check CGM. Usually BG-neutral. Post-workout snack recommended.",note:"Hip thrust anchors the day at home too \u2014 DB across hips, couch as bench.",strength:[{name:"DB Hip Thrust",sets:"4\xD710",tip:"DB across hips, couch as bench. Full extension, squeeze 1 sec at top. Pelvic floor: exhale on the drive. Wk5+: 3-0-1 lowering.",swaps:["Banded hip thrust 4\xD712","Frog pump 4\xD720"]},{name:"Bulgarian Split Squat",sets:"3\xD78 each",tip:"Rear foot on couch. Weight through front heel.",swaps:["Reverse lunge 3\xD710 each","Step-up on chair 3\xD710 each"]},{name:"Donkey Kicks",sets:"3\xD715 each",tip:"A1 Wk3+. Squeeze glute at top. Ankle weight if available.",swaps:["Band kickback 3\xD715"]},{name:"Fire Hydrant",sets:"3\xD715 each",tip:"A2 Wk3+. Hip stability and glute med.",swaps:["Banded clamshell 3\xD715 each"]},{name:"DB RDL",sets:"3\xD712",tip:"Hip hinge finisher. Pelvic floor: brace before, exhale at lockout.",swaps:["Single leg RDL 3\xD710 each","Good morning with band 3\xD712"]}],core:[{name:"Lying Leg Raises",sets:"3\xD712",tip:"On your back. Lower back presses into floor. Slow lowering. Progress to flutter kicks.",swaps:["Reverse crunch 3\xD712","Bent knee raise 3\xD712"]},{name:"Stability Ball Crunch",sets:"3\xD712",tip:"Full range over the ball. Add light DB to chest as you progress. Great for T1D \u2014 no BP-spiking breath hold.",swaps:["Incline sit-up 3\xD712","Dead bugs 3\xD710 each"]},{name:"Body Saw",weighted:!1,sets:"2\xD710",tip:"Forearms on ball or socks on floor. Plank position, slide forward and back. Deep core.",swaps:["Plank hold 2\xD730 sec","Plank shoulder taps 2\xD720"]}]},Saturday:{title:"Active Recovery",rest:!0,note:"Deep stretch at Vasa, outdoor walk, or yoga at home."},Sunday:{title:"Rest Day",rest:!0,note:"Church, family, full recovery."}}},kc=[{name:"90/90 Hip Stretch",duration:"90 sec each side",cue:"Sit in 90/90 position. Tall spine. Lean gently over front shin. Breathe into the hip."},{name:"Pigeon Pose",duration:"60 sec each side",cue:"From plank, bring one knee to wrist. Square hips. Fold forward over the front leg."},{name:"World's Greatest Stretch",duration:"5 reps each side",cue:"Lunge forward, same-side hand to floor, rotate opposite arm to sky. Slow and deliberate."},{name:"Leg Swings (front/back)",duration:"10 each direction",cue:"Hold a wall. Swing leg forward and back, increasing range each rep. Keep core engaged."},{name:"Standing Hamstring Stretch",duration:"30 sec each side",cue:"Step one foot forward, slight bend in back knee, hinge at hips. Feel the pull behind the thigh."},{name:"Seated Forward Fold",duration:"60 sec",cue:"Legs straight in front. Reach for toes or shins. Don't round the lower back \u2014 hinge from hips."},{name:"Hip Flexor Stretch (kneeling)",duration:"45 sec each side",cue:"Low lunge. Drive hips forward. Tuck pelvis under slightly. Feel the front of the back hip."},{name:"Glute Bridge Hold",weighted:!1,duration:"3\xD710 sec",cue:"Feet flat, knees bent. Drive hips up, squeeze glutes hard at top. Hold. Slow down."}],Ng={Monday:{name:"Deep Stretch",times:["6:00\u20137:00am","7:45\u20138:45pm"],note:"Saratoga Springs \xB7 check app to confirm"},Tuesday:{name:"Deep Stretch",times:["7:45\u20138:45pm"],note:"Saratoga Springs \xB7 check app to confirm"},Wednesday:{name:"Deep Stretch",times:["7:15\u20138:15am","6:30\u20137:30pm"],note:"Saratoga Springs \xB7 check app to confirm"},Friday:{name:"Deep Stretch",times:["6:30\u20137:30pm"],note:"Saratoga Springs \xB7 check app to confirm"},Saturday:{name:"Deep Stretch",times:["9:00am"],note:"Saratoga Springs \xB7 check app to confirm"}},Jg={Menstrual:{energy:"Low. Honor it \u2014 this is your body doing hard work. Don't push.",workout:"Reduce intensity. Walking, light stretching, or gentle movement are perfect.",food:"Iron-rich foods: red meat, spinach, lentils. Dark chocolate in moderation. Stay hydrated.",bg:"Blood sugar often drops early in this phase. Keep fast-acting carbs nearby during any workout.",watch:"Heavy flow, cramping, fatigue are all normal. Rest is productive. Be patient with yourself.",relationships:"You may want more solitude right now \u2014 that's valid. Let Matt know you need a little more grace and less stimulation this week. With Luke, keep interactions calm and simple. Lower your threshold for frustration and lean on Matt for backup when you're depleted."},Follicular:{energy:"Rising steadily. This is your build week \u2014 your most capable phase.",workout:"Great time for strength gains. Your body responds well to new challenges and heavier weights.",food:"Lighter meals, more vegetables. Appetite naturally lower. Good week for food prep.",bg:"Insulin sensitivity improves this phase. Blood sugar is easier to manage \u2014 workouts feel better.",watch:"Energy and mood lift as estrogen rises. Use this window for hard conversations, big goals, and new projects.",relationships:"You're naturally more patient, open, and warm this week. Great time to connect intentionally with Matt \u2014 plan a date, have a meaningful conversation. Luke will benefit from your extra energy. Use this phase to build positive memories and routines."},Ovulation:{energy:"Peak. Highest strength, coordination, and social energy of the month.",workout:"Best window for hard sessions, personal records, or high-intensity work.",food:"Clean protein and greens. Body is primed for performance. Don't under-eat.",bg:"LH surge may briefly raise blood sugar. Monitor if doing intense sessions.",watch:"Possible joint laxity mid-cycle \u2014 warm up thoroughly. You may feel invincible. You're not.",relationships:"Peak connection window. You're magnetic and expressive right now \u2014 lean into it with Matt. Intimacy is highest this phase naturally. With Luke, you'll have more bandwidth for playful, engaged parenting. Enjoy it."},Luteal:{energy:"Declining as progesterone rises. Cravings and irritability increase \u2014 both are hormonal.",workout:"Reduce volume in late luteal. Moderate intensity early in this phase, gentler toward the end.",food:"Complex carbs help with cravings. Magnesium-rich foods ease PMS: nuts, seeds, dark chocolate, leafy greens.",bg:"Progesterone causes insulin resistance. Blood sugar runs higher \u2014 you may need adjustments. Watch post-meal spikes.",watch:"Late luteal: mood dips, bloating, sleep disruption are hormonal. Not a character flaw. Not permanent.",relationships:"This is the hardest relationship phase. You may feel more critical, withdrawn, or easily overwhelmed. Give Matt a heads up \u2014 'I'm in late luteal, I may need more space or more help.' With Luke, your patience will be thinner. Build in extra downtime and don't overschedule. Ask for help before you hit empty."}},Ty=[{text:"Pain is temporary. Glory is forever.",source:"Unknown"},{text:"The only bad workout is the one that didn't happen.",source:"Unknown"},{text:"What you do consistently over years will shock you.",source:"Unknown"},{text:"Discipline is the bridge between where you are and where you want to be.",source:"Jim Rohn"},{text:"You don't have to be extreme. You have to be consistent.",source:"Unknown"},{text:"The first two minutes are the hardest. Get through those.",source:"Unknown"},{text:"Champions aren't made in gyms. They're made in the quiet moments when no one's watching.",source:"Unknown"},{text:"Strength doesn't come from what you can do. It comes from overcoming the things you once thought you couldn't.",source:"Rikki Rogers"},{text:"If it doesn't challenge you, it won't change you.",source:"Fred DeVito"},{text:"Don't count the days. Make the days count.",source:"Muhammad Ali"},{text:"The clock is ticking. Make it count.",source:"Unknown"},{text:"Every workout is either a step forward or a step back. There's no staying the same.",source:"Unknown"},{text:"Your body can do it. It's time to convince your mind.",source:"Unknown"},{text:"Train for the life you want to live.",source:"Unknown"},{text:"No feeling is final. Keep moving.",source:"Rainer Maria Rilke"},{text:"The pain you feel today is the strength you'll feel tomorrow.",source:"Unknown"},{text:"You are not tired. You are not done. Keep going.",source:"Unknown"},{text:"What separates the best from the rest is what they do when they don't feel like it.",source:"Unknown"},{text:"Progress is not linear. Show up anyway.",source:"Unknown"},{text:"You owe it to yourself to find out what you're capable of.",source:"Unknown"},{text:"She is clothed with strength and dignity.",source:"Proverbs 31:25"},{text:"Strong women don't have attitudes. They have standards.",source:"Unknown"},{text:"Your comeback will be stronger than your setback. Every single time.",source:"Unknown"},{text:"She believed she could, so she did.",source:"R.S. Grey"},{text:"A woman who knows her worth doesn't negotiate it.",source:"Unknown"},{text:"You grew a human. Now watch what else your body can do.",source:"Unknown"},{text:"Be the woman who decided to go for it.",source:"Unknown"},{text:"She is not fragile. She is forged.",source:"Unknown"},{text:"The most powerful thing a woman can do is decide her worth for herself.",source:"Unknown"},{text:"Lift heavy. Think deep. Live fully.",source:"Unknown"},{text:"Strong is not a size. It's a commitment.",source:"Unknown"},{text:"You are allowed to be both a masterpiece and a work in progress.",source:"Sophia Bush"},{text:"Run your own race. At your own pace. On your own terms.",source:"Unknown"},{text:"No one who trains consistently ever regrets it.",source:"Unknown"},{text:"The gym is one of the few places where effort is always rewarded.",source:"Unknown"},{text:"Take care of your body. It's the only place you have to live.",source:"Jim Rohn"},{text:"Movement is medicine.",source:"Unknown"},{text:"Your body hears everything your mind says.",source:"Naomi Judd"},{text:"Exercise is a celebration of what your body can do, not a punishment for what you ate.",source:"Unknown"},{text:"Nourish to flourish.",source:"Unknown"},{text:"Rest is not quitting. Rest is earning.",source:"Unknown"},{text:"Recovery is part of the program. Honor it.",source:"Unknown"},{text:"Sleep is the best legal performance-enhancing drug there is.",source:"Matthew Walker"},{text:"The body achieves what the mind believes.",source:"Napoleon Hill"},{text:"Health is not a destination. It's a daily decision.",source:"Unknown"},{text:"Invest in your health now. The alternative costs more.",source:"Unknown"},{text:"Your body is not an obstacle. It's your partner.",source:"Unknown"},{text:"Energy is everything. Protect yours.",source:"Unknown"},{text:"Fit doesn't mean skinny. Fit means capable.",source:"Unknown"},{text:"Every meal is either fighting disease or feeding it.",source:"Unknown"},{text:"I can do all things through Christ which strengtheneth me.",source:"Philippians 4:13"},{text:"Be strong and courageous. Do not be afraid.",source:"Joshua 1:9"},{text:"The Lord is my strength and my shield.",source:"Psalm 28:7"},{text:"Renew thy strength. Mount up with wings as eagles.",source:"Isaiah 40:31"},{text:"God doesn't need you to be perfect. He needs you to keep going.",source:"Unknown"},{text:"Your strength is not your own. That's what makes it infinite.",source:"Unknown"},{text:"Run with endurance the race that is set before you.",source:"Hebrews 12:1"},{text:"God gave you this body as a gift. Honor it.",source:"Unknown"},{text:"Even when you feel weak, you are enough with God.",source:"Unknown"},{text:"He restoreth my soul.",source:"Psalm 23:3"},{text:"You are not bouncing back. You are building forward.",source:"Unknown"},{text:"Your body did something extraordinary. Now give it time.",source:"Unknown"},{text:"Postpartum strength is not about getting your old body back. It's about discovering what you can do now.",source:"Unknown"},{text:"One rep. One day. One month at a time.",source:"Unknown"},{text:"Healing is not linear. Neither is strength. Keep going.",source:"Unknown"},{text:"Motherhood is the hardest and most physically demanding role you'll ever have. Train for it.",source:"Unknown"},{text:"You're not behind. You're exactly where you need to be.",source:"Unknown"},{text:"Your body deserves patience and strength in equal measure.",source:"Unknown"},{text:"The version of you on the other side of consistency will be worth it.",source:"Unknown"},{text:"Show up for yourself the way you show up for everyone else.",source:"Unknown"},{text:"Whether you think you can or think you can't, you're right.",source:"Henry Ford"},{text:"The mind gives up first. The body can handle more than you think.",source:"Unknown"},{text:"Comfortable is where fitness goes to die.",source:"Unknown"},{text:"Do something today that your future self will thank you for.",source:"Sean Patrick Flanery"},{text:"The only person you need to be better than is who you were yesterday.",source:"Unknown"},{text:"Motivation gets you started. Habit keeps you going.",source:"Unknown"},{text:"You don't rise to your goals. You fall to your systems.",source:"James Clear"},{text:"Show up on the hard days. That's where character is built.",source:"Unknown"},{text:"The difference between who you are and who you want to be is what you do today.",source:"Unknown"},{text:"Hard things done consistently become easy things eventually.",sourc ack extension on bed 12"]},{name:"Shoulder Tap Plank",sets:"20 total",tip:"High plank. Tap opposite shoulder, resist rotation.",swaps:["Plank hold 30 sec","Side plank 20 sec each"]}]},{label:"Circuit C \u2014 Core (2 rounds)",note:"Rest 45 sec between rounds. Postpartum \u2014 stop if you see coning at midline.",exercises:[{name:"Dead Bugs",weighted:!1,sets:"10 each",tip:"Lower back flat the whole time. Exhale as arm/leg extend.",swaps:["Bird dog 10 each"]},{name:"Reverse Crunch",sets:"12 reps",tip:"On back, knees to chest. Drive hips off the floor. Slow lowering.",swaps:["Leg raises 10","Flutter kicks 20"]},{name:"Side Plank",weighted:!1,sets:"20 sec each",tip:"Stack feet or stagger. Build to 30 sec over time.",swaps:["Elbow plank 30 sec"]},{name:"Mountain Climbers",sets:"20 total",tip:"Hands under shoulders. Drive knees in alternating. Stay controlled.",swaps:["Slow climbers 10 each","Plank shoulder taps 20"]}]},{label:"Finisher \u2014 5 minutes",note:"Optional. Do this if you have energy left and want cardio.",exercises:[{name:"Jump Squats",sets:"10 reps",tip:"Land soft. Modify to regular squats if knees are sensitive.",swaps:["Squat to calf raise 15","Fast bodyweight squat 20"]},{name:"Burpees (modified)",sets:"8 reps",tip:"Step instead of jump. Still gets the heart rate up.",swaps:["Half burpee 10","Squat thrust 10"]}]}]},_g={"Burger Bowls":["1 lb ground beef (80/20)","1 cup jasmine rice (dry)","1 head romaine lettuce","1 cup cherry tomatoes","1/2 cup pickles","1/2 red onion","1/2 cup sour cream","1 cup shredded cheddar","3 tbsp mayo + 1 tbsp ketchup + 1 tsp mustard (sauce)"],"Chicken Pillows":["1.5 lb chicken breast","2 cans crescent roll dough","8 oz cream cheese","1 packet ranch seasoning","1 head broccoli"],"Chicken Tacos":["1.5 lb chicken thighs","12 small corn tortillas","1 cup pico de gallo (or tomatoes + onion + cilantro + jalape\xF1o)","1/2 cup sour cream + 1 lime (crema)","2 avocados","fresh cilantro","2 limes"],"Sunday Pot Roast":["3\u20134 lb chuck  good.",keyPrinciple:"The scriptures were written for our learning, that we might have hope. The Old Testament was written for us.",reflect:"What do you expect from this year of Old Testament study?",pray:"Ask God to help you see Jesus Christ in every story you read.",act:"Write one question you want answered by the end of 2026.",fsy:{title:"FSY: Covenant Path",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/02covenant-path",note:"Covenants are the backbone of today's reading. This section explains what it means to be on the covenant path and how every ordinance connects us more deeply to God."}},Wednesday:{scripture:"John 5:39",summary:"Genesis 2 gives a closer look at the Garden of Eden \u2014 the Tree of Life, the Tree of Knowledge, the creation of Eve as a companion and covenant partner. God walks with Adam and Eve in the cool of the day. This is what life with God is meant to look like.",keyPrinciple:"Search the scriptures \u2014 they testify of Christ. The whole Old Testament is pointing to one person.",reflect:"How does knowing the Bible is the word of God change how you approach it?",pray:"Ask God to help you read with faith and patience this year.",act:"Open the introduction to the Old Testament in your Gospel Library app and read it.",fsy:{title:"FSY: Living the Gospel",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/12living-the-gospel",note:"Today's reading illustrates what it looks like to live the gospel fully \u2014 or to drift from it. This section describes what it means to be an active disciple in everyday life."}},Friday:{scripture:"2 Nephi 11:4",summary:"The world before the Old Testament: Abraham 3 shows God's vision of premortal spirits, where we were foreordained and chose to come to earth. John 1 establishes that Jesus Christ \u2014 the Word \u2014 was with God from the beginning. These texts frame everything that follows.",keyPrinciple:"All things point to Christ. Every symbol, covenant, and story in the Old Testament is the typifying of Him.",reflect:"Why would ancient prophets write about a Savior they hadn't yet seen?",pray:"Ask God to open your eyes to see Christ in ancient scripture.",act:"Look up one Messianic prophecy in the Old Testament \u2014 Isaiah 53 is a great start.",fsy:{title:"FSY: Living the Gospel",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/12living-the-gospel",note:"Today's reading illustrates what it looks like to live the gospel fully \u2014 or to drift from it. This section describes what it means to be an active disciple in everyday life."}}},resources:[{title:"The Old Testament: 'Tell Your Children of It'",url:"https://www.churchofjesuschrist.org/study/general-conference/2022/04/51anderson",type:"General Conference",who:"Elder Neil L. Andersen"},{title:"Don't Miss This \u2014 Introduction to the Old Testament",url:"https://www.youtube.com/c/DontMissThis",type:"Podcast",who:"Don't Miss This"}],ywPrep:{summary:"The Old Testament is not ancient history \u2014 it is a record of God's covenant relationship with His children. From the very first pages, it points to Jesus Christ. As you study this year, look for the Savior in every story, every symbol, every covenant.",prompts:["What does 'testament' mean, and why does it matter that the Old Testament is a witness of Christ?","What makes you nervous or excited about studying the Old Testament this year?","How has the Old Testament already shown up in your life \u2014 in songs, general conference, or the temple?","What is one thing you want to understand better about the Old Testament by December?"]}},{week:2,dates:"Jan 5\u201311",title:"This Is My Work and My Glory",ref:"Moses 1; Abraham 3",theme:"God's purpose is to bring about the immortality and eternal life of man. You are His work and His glory.",days:{Monday:{scripture:"Moses 1:3\u20134, 6",summary:"Moses 1 opens with God's declaration to Moses: 'This is my work and my glory.' Moses sees the creation, is left alone, Satan appears and tries to deceive him, and Moses rebukes him. This sets up the rest of scripture \u2014 everything is about God's children.",keyPrinciple:"God calls Moses 'my son' before Moses does anything to earn it. Identity comes before assignment.",reflect:"When do you feel most like a child of God? What gets in the way of that feeling?",pray:"Ask God to help you understand who you are to Him.",act:"Write 'I am a child of God' somewhere you'll see it today.",fsy:{title:"FSY: Covenant Path",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/02covenant-path",note:"Covenants are the backbone of today's reading. This section explains what it means to be on the covenant path and how every ordinance connects us more deeply to God."}},Wednesday:{scripture:"Moses 1:39",summary:"Abraham 3 contains God's vision of intelligences \u2014 souls foreordained before the earth was made. God shows Abraham the stars and teaches him that some souls are more noble and great than others. Abraham is told he was chosen before he was born. This is your origin story.",keyPrinciple:"This is my work and my glory \u2014 to bring to pass the immortality and eternal life of man. You are His purpose.",reflect:"How does knowing this is God's entire purpose change how you pray or relate to Him?",pray:"Thank God for caring about your eternal life personally.",act:"Share Moses 1:39 with one person today.",fsy:{title:"FSY: Agency and Integrity",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/04agency-and-integrity",note:"Agency is at the heart of today's reading. God gives commandments but never forces obedience \u2014 the choice is always ours. This section explores how to make choices aligned with God's will."}},Friday:{scripture:"Abraham 3:22\u201323",summary:"Moses 2\u20133 and Abraham 4\u20135 give two accounts of creation \u2014 one grand and sweeping, one intimate and personal. God forms man from the dust, breathes life into him, and plants a garden. The purpose of physical life comes into focus: growth, agency, relationships.",keyPrinciple:"God saw the intelligences before the world was organized. He knew you before you were born.",reflect:"What does it mean that you were noble and great in the premortal life?",pray:"Ask God what He saw in you before this life.",act:"Write about one strength you think you brought to this life.",fsy:{title:"FSY: Agency and Integrity",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/04agency-and-integrity",note:"Agency is at the heart of today's reading. God gives commandments but never forces obedience \u2014 the choice is always ours. This section explores how to make choices aligned with God's will."}}},resources:[{title:"The Purpose of Life",url:"https://www.churchofjesuschrist.org/study/general-conference/2023/10/15uchtdorf",type:"General Conference",who:"President Dieter F. Uchtdorf"},{title:"Don't Miss This \u2014 Moses 1; Abraham 3",url:"https://www.youtube.com/c/DontMissThis",type:"Podcast",who:"Don't Miss This"}],ywPrep:{summary:"God told Moses: 'This is my work and my glory \u2014 to bring to pass the immortality and eternal life of man.' You are not an accident or a project. You are His purpose. Abraham saw the intelligences of the premortal world and learned God knew him before he was born.",prompts:["What does it mean to you personally that God's whole purpose is your eternal life?","Moses was shown a vision of the entire earth. How does that perspective change how you see yourself?","Satan told Moses 'I am the Only Begotten.' How do we recognize counterfeit voices that steal our identity?","How does knowing you existed before this life change how you think about your purpose now?"]}},{week:3,dates:"Jan 12\u201318",title:"In the Beginning God Created",ref:"Genesis 1\u20132; Moses 2\u20133; Abraham 4\u20135",theme:"God created the earth for us. We are the crowning purpose of creation \u2014 made in His image.",days:{Monday:{scripture:"Genesis 1:1; Abraham 4:1",summary:"Genesis 1\u20132 describes the creation of the world in six days \u2014 light, land, sea, plants, animals, and finally humanity. God speaks things into existence and declares each one good. On the seventh day He rests. This is the foundation of the Sabbath and of human dignity.",keyPrinciple:"In the beginning, God organized the heavens and earth. Creation was intentional, not accidental.",reflect:"What does it mean that you live on a planet God specifically organized for you?",pray:"Thank God for one specific thing about creation you love.",act:"Go outside and notice one thing in creation that reflects God's care.",fsy:{title:"FSY: Physical Health",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/08physical-health",note:"Today's reading involves the physical body \u2014 its limits or miraculous capacity. This section teaches that the body is sacred and how we treat it reflects what we believe."}},Wednesday:{scripture:"Genesis 1:26\u201327; Moses 2:26\u201327",summary:"Genesis 2 zooms in: God forms Adam from the dust, breathes into his nostrils, places him in Eden. He is given work \u2014 to dress and keep the garden. Then God says 'It is not good for man to be alone' and creates Eve. Marriage and family are God's design from the very beginning.",keyPrinciple:"God created man and woman in His own image. Our bodies reflect something divine.",reflect:"How does believing your body is made in God's image change how you treat it?",pray:"Ask God to help you see your body the way He does.",act:"Write three things you appreciate about your body today.",fsy:{title:"FSY: Physical Health",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/08physical-health",note:"Today's reading involves the physical body \u2014 its limits or miraculous capacity. This section teaches that the body is sacred and how we treat it reflects what we believe."}},Friday:{scripture:"Genesis 2:18, 24",summary:"Moses 2\u20133 adds the Lord's perspective to the creation account \u2014 God's voice, His Spirit moving on the face of the waters. Then the physical creation of Adam and the Garden, the commandment about the Tree of Knowledge. Two ways to read: literal days or eternal organizing principles.",keyPrinciple:"It is not good for man to be alone. God designed us for covenant relationships.",reflect:"What does God's design for family and community tell you about your need for connection?",pray:"Ask God to help you invest in the relationships He has given you.",act:"Reach out to a family member or friend with genuine care today.",fsy:{title:"FSY: Relationships",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/06relationships",note:"Today's reading involves a key relationship between people or between a person and God. This FSY section explores what healthy, God-centered relationships look like."}}},resources:[{title:"The Creation",url:"https://www.churchofjesuschrist.org/study/ensign/2010/01/the-creation",type:"Ensign",who:"Elder Russell M. Nelson"},{title:"Don't Miss This \u2014 Genesis 1\u20132; Moses 2\u20133",url:"https://www.youtube.com/c/DontMissThis",type:"Podcast",who:"Don't Miss This"}],ywPrep:{summary:"God organized the earth specifically for His children. Adam and Eve were created in God's image \u2014 spiritually and physically. The creation account teaches that our bodies are sacred, that marriage is ordained of God, and that we have divine potential far beyond what the world tells us.",prompts:["What does it mean to be created in the image of God?","Why does it matter that God called each part of creation 'good' and finally 'very good'?","How does knowing God created the earth for you personally change how you treat the world?","What does God's design for family and community tell you about your need for connection?"]}},{week:4,dates:"Jan 19\u201325",title:"The Fall Was Part of the Plan",ref:"Genesis 3\u20134; Moses 4\u20135",theme:"The Fall was a necessary step for growth, agency, and our need for a Savior.",days:{Monday:{scripture:"Moses 4:1\u20134; 2 Nephi 2:25",summary:"The Fall of Adam and Eve. The serpent tempts Eve with the fruit of the Tree of Knowledge of Good and Evil. Eve eats, Adam follows. They know they are naked. God walks in the garden calling 'Where art thou?' \u2014 a question He never stops asking. Consequences follow: toil, pain, death.",keyPrinciple:"Satan wanted to destroy agency. God's plan requires it. Agency is the gift that makes growth possible.",reflect:"Where do you feel most free to choose? Where do you feel most constrained?",pray:"Ask God to help you use your agency to choose growth today.",act:"Make one deliberate, faith-based choice today instead of a default one.",fsy:{title:"FSY: Agency and Integrity",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/04agency-and-integrity",note:"Agency is at the heart of today's reading. God gives commandments but never forces obedience \u2014 the choice is always ours. This section explores how to make choices aligned with God's will."}},Wednesday:{scripture:"Genesis 3:9; Moses 4:15",summary:"God confronts Adam, Eve, and the serpent. Each receives consequences, but God also gives a promise \u2014 the seed of Eve will bruise the head of the serpent. This is the first hint of a Savior. Then God makes coats of skins to cover them. Even in judgment, there is mercy.",keyPrinciple:"After the Fall, God's first question was 'Where art thou?' He came looking. He always comes looking.",reflect:"When have you felt like you were hiding from God? What brought you back?",pray:"Stop hiding. Let God find you today.",act:"Be honest with God in prayer about one thing you've been avoiding.",fsy:{title:"FSY: Repentance and Forgiveness",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/05repentance-and-forgiveness",note:"Today's reading shows someone facing consequences of sin \u2014 or being given a second chance. This FSY section teaches that repentance is always available and God's mercy can cover any mistake."}},Friday:{scripture:"Moses 5:5\u20139; Genesis 4:1\u20137",summary:"Cain and Abel. Both offer sacrifices. God accepts Abel's but not Cain's. God asks Cain: 'Why art thou wroth? If thou doest well, shalt thou not be accepted?' Cain kills Abel anyway. His punishment: a wanderer on the earth. Sin always costs more than we expect.",keyPrinciple:"Cain chose to love Satan more than God. That choice had consequences that spread far beyond himself.",reflect:"How do your choices ripple out to affect people around you?",pray:"Ask God to show you if any of your choices are hurting others.",act:"Correct or repair one relational rift today.",fsy:{title:"FSY: Agency and Integrity",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/04agency-and-integrity",note:"Agency is at the heart of today's reading. God gives commandments but never forces obedience \u2014 the choice is always ours. This section explores how to make choices aligned with God's will."}}},resources:[{title:"The Atonement and the Journey of Mortality",url:"https://www.churchofjesuschrist.org/study/general-conference/2012/04/the-atonement-and-the-journey-of-mortality",type:"General Conference",who:"Elder David A. Bednar"},{title:"Don't Miss This \u2014 Genesis 3\u20134; Moses 4\u20135",url:"https://www.youtube.com/c/DontMissThis",type:"Podcast",who:"Don't Miss This"}],ywPrep:{summary:"The Fall of Adam and Eve was not a mistake \u2014 it was a necessary step in God's plan. Satan wanted to destroy agency; God's plan requires it. Cain chose to love Satan more than God, and his choice rippled far beyond himself. The Fall was a fall forward \u2014 into mortality, growth, and the need for Jesus Christ.",prompts:["How does knowing the Fall was part of God's plan change how you think about hard things in your life?","Why did God give Adam and Eve commandments He knew they couldn't both keep at the same time?","Cain asked, 'Am I my brother's keeper?' What is your answer to that question today?","Eve rejoiced in the Fall because through it they would have a Redeemer. What trial has taught you something you couldn't learn any other way?"]}},{week:5,dates:"Jan 26\u2013Feb 1",title:"Enoch Walked with God",ref:"Genesis 5; Moses 6",theme:"Enoch was young and slow of speech. God called him anyway.",days:{Monday:{scripture:"Moses 6:26\u201331",summary:"Moses 6 introduces Enoch \u2014 a young, slow-of-speech man whom God calls to preach repentance to a wicked people. Enoch is astonished that God would call him. God promises to be with him. Enoch preaches and the people shake with fear. God was not wrong about Enoch.",keyPrinciple:"God called Enoch when he felt completely unqualified. God always equips those He calls.",reflect:"What calling or challenge have you felt unequal to? What happened?",pray:"Ask God to give you confidence in His calling on your life.",act:"Do one thing today that you've been avoiding because you don't feel qualified.",fsy:{title:"FSY: Covenant Path",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/02covenant-path",note:"Covenants are the backbone of today's reading. This section explains what it means to be on the covenant path and how every ordinance connects us more deeply to God."}},Wednesday:{scripture:"Moses 7:18",summary:"Moses 7 reveals the vision of Zion \u2014 a people so united in righteousness that God translates their entire city. Enoch sees the plan of salvation, the Flood, the scattering of Israel, the restoration, and the Second Coming. He weeps for his people. God weeps with him.",keyPrinciple:"Zion: one heart, one mind, no poor among them. This is God's vision for His people.",reflect:"What would your ward or school look like if everyone had one heart and one mind?",pray:"Ask God to help you be a unifying presence, not a dividing one.",act:"Do one act that builds unity in your home or community today.",fsy:{title:"FSY: Giving Service",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/11giving-service",note:"Today's reading features someone who gives more than expected \u2014 or fails to. This section explores why serving others is central to discipleship."}},Friday:{scripture:"Moses 7:28\u201333",summary:"Moses 7 continues: God weeps over His children who refused to come to Him. Enoch is astonished \u2014 'How is it that the heavens weep?' God explains His love for His children and the grief of seeing them choose misery. Zion is taken up. The earth mourns.",keyPrinciple:"God wept over His children who refused to come to Him. He does not feel indifferent about you.",reflect:"What does it mean to you that God can weep \u2014 that He feels deeply about your choices?",pray:"Ask God to show you how He feels about you specifically.",act:"Write a short letter from God to yourself based on what you've read this week.",fsy:{title:"FSY: Giving Service",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/11giving-service",note:"Today's reading features someone who gives more than expected \u2014 or fails to. This section explores why serving others is central to discipleship."}}},resources:[{title:"Becoming Like God",url:"https://www.churchofjesuschrist.org/study/ensign/2015/01/becoming-like-god",type:"Ensign",who:"Gospel Topics Essay"},{title:"Don't Miss This \u2014 Moses 6; Genesis 5",url:"https://www.youtube.com/c/DontMissThis",type:"Podcast",who:"Don't Miss This"}],ywPrep:{summary:"Enoch was young and slow of speech \u2014 and God called him anyway. He preached to hard-hearted people and built Zion: a community so unified and righteous that God took the whole city to heaven. God then showed Enoch the suffering of the earth and wept. God feels. He mourns. He cares for every one of His children.",prompts:["Enoch felt he was 'but a lad' and unqualified. When have you felt unqualified but God called you anyway?","What does a Zion community look like in your school or ward today?","God wept over the wickedness of people He loved. What does that tell you about how He feels about you?","Enoch's city was taken to heaven because they were pure in heart. What are you doing to build that kind of community?"]}},{week:6,dates:"Feb 2\u20138",title:"The Lord Called His People Zion",ref:"Moses 7",theme:"God wept over His children who refused to come to Him. He does not feel indifferent about you.",days:{Monday:{scripture:"Moses 7:29, 33",summary:"Moses 7 describes the city of Zion \u2014 people who were 'of one heart and one mind' and 'dwelt in righteousness.' They had no poor among them. Enoch taught them until they were pure enough that God took them. Zion is not just a place \u2014 it's a condition of the heart.",keyPrinciple:"God weeps because He is the Father of these souls \u2014 and they will not receive His peace. His love is personal.",reflect:"How does knowing God weeps change your picture of who He is?",pray:"Talk to God today as a Father who feels \u2014 not just as a distant judge.",act:"Write what you would say to God if you knew He was genuinely grieved about something in your life.",fsy:{title:"FSY: Giving Service",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/11giving-service",note:"Today's reading features someone who gives more than expected \u2014 or fails to. This section explores why serving others is central to discipleship."}},Wednesday:{scripture:"Moses 7:37\u201340",summary:"Moses 7 closes with Enoch seeing the future: the Flood, Christ's birth and death, the restoration, and the Second Coming when Zion will return and meet the New Jerusalem. The whole panorama of history from one prophet's vision.",keyPrinciple:"Enoch saw the wickedness of the world and wept. Caring about God's children means their pain becomes our pain.",reflect:"What in the world around you do you grieve over? Is that grief motivating you to act?",pray:"Ask God to give you His heart for the people around you \u2014 friends, family, your community.",act:"Do one specific act of care for someone who is struggling.",fsy:{title:"FSY: Giving Service",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/11giving-service",note:"Today's reading features someone who gives more than expected \u2014 or fails to. This section explores why serving others is central to discipleship."}},Friday:{scripture:"Moses 7:62\u201363",summary:"Moses 8 introduces Noah, who is righteous in a corrupt generation. God is grieved that He made man. He tells Noah to build an ark for his family and the animals. Noah preaches repentance but no one listens. The rain comes.",keyPrinciple:"God will bring Zion back. He will send righteousness and truth. He hasn't given up.",reflect:"What hope do you find in knowing God's plan is still moving forward despite the mess of the world?",pray:"Ask God to renew your hope in His ultimate plan.",act:"Write one thing about the future you trust God with.",fsy:{title:"FSY: Living the Gospel",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/12living-the-gospel",note:"Today's reading illustrates what it looks like to live the gospel fully \u2014 or to drift from it. This section describes what it means to be an active disciple in everyday life."}}},resources:[{title:"Zion: The Pure in Heart",url:"https://www.churchofjesuschrist.org/study/general-conference/2012/04/zion-the-pure-in-heart",type:"General Conference",who:"Elder D. Todd Christofferson"},{title:"Don't Miss This \u2014 Moses 7",url:"https://www.youtube.com/c/DontMissThis",type:"Podcast",who:"Don't Miss This"}],ywPrep:{summary:"Moses 7 is one of the most tender chapters in scripture. Enoch sees God weep. He asks how God, being perfect, can weep \u2014 and God answers: these are my children, my work, my love. He mourns those who refused His offered hand. This week is about understanding a God who is deeply emotionally present, not distant.",prompts:["Enoch asked God, 'How is it that thou canst weep, seeing thou art holy?' How would you answer that question?","God described those who rejected Him as 'without affection.' What does affection for God look like in daily life?","Enoch saw the nations of the earth in wickedness and wept himself. What do you grieve over in the world today?","Enoch's city was translated \u2014 taken to heaven \u2014 because they were ready. What would it mean to be truly ready?"]}},{week:7,dates:"Feb 9\u201315",title:"Noah Found Grace in the Eyes of the Lord",ref:"Genesis 6\u201311; Moses 8",theme:"Noah was righteous in a world that forgot God. Grace is finding favor with Him by turning toward Him.",days:{Monday:{scripture:"Genesis 6:8\u20139; Moses 8:27",summary:"Genesis 6\u20138: The Flood. God observes the wickedness of the world and His heart is grieved. Noah finds grace. He builds the ark \u2014 300 cubits long. The fountains of the deep burst open. Forty days of rain. Everything with breath on land dies. The ark floats.",keyPrinciple:"Noah was perfect in his generation \u2014 not sinless, but wholehearted. He walked with God.",reflect:"What does it look like to walk with God in your ordinary daily life?",pray:"Ask God to help you walk more closely with Him today.",act:"Choose one way to include God in your normal, ordinary day.",fsy:{title:"FSY: Covenant Path",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/02covenant-path",note:"Covenants are the backbone of today's reading. This section explains what it means to be on the covenant path and how every ordinance connects us more deeply to God."}},Wednesday:{scripture:"Genesis 7:1; Hebrews 11:7",summary:"After the Flood, the waters recede. Noah sends out a raven and then a dove \u2014 the dove returns with an olive leaf. They emerge from the ark. Noah offers sacrifice. God makes a covenant with Noah: never again will He destroy all life with a flood. The rainbow is the sign.",keyPrinciple:"By faith Noah built an ark. Faith is acting on God's word before you see the result.",reflect:"What is God asking you to do right now that requires faith before evidence?",pray:"Ask God for the kind of faith that acts without seeing.",act:"Take one step of faith today toward something God has been prompting you toward.",fsy:{title:"FSY: Agency and Integrity",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/04agency-and-integrity",note:"Agency is at the heart of today's reading. God gives commandments but never forces obedience \u2014 the choice is always ours. This section explores how to make choices aligned with God's will."}},Friday:{scripture:"Genesis 9:13\u201315",summary:"Genesis 11: The Tower of Babel. Humanity speaks one language and decides to build a tower to heaven. God comes down to see it and says 'Nothing will be withheld from them which they purpose to do.' He confuses their language and scatters them. Ambition without God leads to confusion.",keyPrinciple:"God set a rainbow in the clouds as a sign of His covenant. He remembers His promises.",reflect:"What covenant has God made with you? How do you remember it?",pray:"Thank God for one covenant promise He has kept in your life.",act:"Find a symbol or reminder of one of God's promises and put it somewhere visible.",fsy:{title:"FSY: Physical Health",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/08physical-health",note:"Today's reading involves the physical body \u2014 its limits or miraculous capacity. This section teaches that the body is sacred and how we treat it reflects what we believe."}}},resources:[{title:"The Windows of Heaven",url:"https://www.churchofjesuschrist.org/study/general-conference/2013/10/the-windows-of-heaven",type:"General Conference",who:"Elder David A. Bednar"},{title:"Don't Miss This \u2014 Genesis 6\u201311; Moses 8",url:"https://www.youtube.com/c/DontMissThis",type:"Podcast",who:"Don't Miss This"}],ywPrep:{summary:"Noah preached for 120 years and only his family listened. Still he kept going. The ark was built one plank at a time while the whole world watched and mocked. The flood was judgment \u2014 but the rainbow was covenant. God always follows judgment with covenant. The Tower of Babel was humanity's attempt to reach God by human power alone.",prompts:["Noah kept building even when no one believed him. What do you do when you feel alone in your faith?","What is your 'ark' right now \u2014 what is God asking you to build that requires sustained effort?","God made a covenant with Noah after the flood. Why does God make covenants?","The Tower of Babel: people tried to reach heaven by their own effort. What towers do people build today?"]}},{week:8,dates:"Feb 16\u201322",title:"I Will Make of Thee a Great Nation",ref:"Genesis 12\u201317; Abraham 1\u20132",theme:"God called Abraham to leave everything familiar. The covenant blesses all nations \u2014 including us.",days:{Monday:{scripture:"Genesis 12:1\u20134; Abraham 2:4",summary:"Genesis 12\u201313: Abram is called to leave his home in Ur and go to a land God will show him. God promises to make him a great nation and bless all families of the earth through him. Abram obeys without knowing the destination. He arrives in Canaan. God appears and says: 'Unto thy seed will I give this land.'",keyPrinciple:"Abram left without knowing where he was going. Obedience often comes before understanding.",reflect:"What has God asked you to do that required leaving something behind?",pray:"Ask God to give you the courage to obey even when the destination is unclear.",act:"Take one step today toward something God has been prompting you toward.",fsy:{title:"FSY: Covenant Path",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/02covenant-path",note:"Covenants are the backbone of today's reading. This section explains what it means to be on the covenant path and how every ordinance connects us more deeply to God."}},Wednesday:{scripture:"Genesis 13:14\u201317; Genesis 17:1\u20138",summary:"Genesis 15\u201317: God makes a formal covenant with Abram \u2014 he will have descendants as numerous as the stars. Abram believes God and it is counted as righteousness. God changes his name to Abraham: 'father of many nations.' Circumcision becomes the sign of the covenant.",keyPrinciple:"God made a covenant with Abraham \u2014 not because he was perfect but because he was faithful.",reflect:"What is your part of the Abrahamic covenant? What has God promised you?",pray:"Ask God to help you live worthy of the covenants you've made.",act:"Read about the Abrahamic covenant and write what it means for you personally.",fsy:{title:"FSY: Covenant Path",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/02covenant-path",note:"Covenants are the backbone of today's reading. This section explains what it means to be on the covenant path and how every ordinance connects us more deeply to God."}},Friday:{scripture:"Abraham 1:2\u20133",summary:"Abraham 1\u20132: Abraham's background \u2014 he sought the blessings of the patriarchs and was nearly sacrificed by a wicked priest. God delivered him. In Egypt, Abraham teaches Pharaoh astronomy. The Abrahamic Covenant is established: land, posterity, and a ministry to bless all nations.",keyPrinciple:"Abraham sought greater knowledge, greater righteousness, and more peace. His desires shaped his destiny.",reflect:"What are your deepest spiritual desires right now? Are you actively seeking what you want?",pray:"Ask God to refine and clarify your deepest desires.",act:"Write your top three spiritual desires. Make one concrete plan toward one of them.",fsy:{title:"FSY: Agency and Integrity",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/04agency-and-integrity",note:"Agency is at the heart of today's reading. God gives commandments but never forces obedience \u2014 the choice is always ours. This section explores how to make choices aligned with God's will."}}},resources:[{title:"Abraham, Isaac, and the Covenant",url:"https://www.churchofjesuschrist.org/study/general-conference/2016/10/the-covenant",type:"General Conference",who:"Elder Russell M. Nelson"},{title:"Don't Miss This \u2014 Genesis 12\u201317; Abraham 1\u20132",url:"https://www.youtube.com/c/DontMissThis",type:"Podcast",who:"Don't Miss This"}],ywPrep:{summary:"God called Abraham to leave his homeland, his family, his idols \u2014 everything. He didn't know where he was going. He just went. God made a covenant with him that would bless every family on earth. That covenant extends to us today through baptism and temple ordinances. We are covenant children of Abraham.",prompts:["Abraham left without knowing where he was going. What has God asked you to commit to before you knew the outcome?","God promised Abraham children even when Sarah was barren and Abraham was old. What impossible promises do you trust God to keep?","We are Abraham's seed through covenant. What does it mean to belong to this covenant family?","Abraham was called out of a world of idolatry. What idols compete for your loyalty today?"]}},{week:9,dates:"Feb 23\u2013Mar 1",title:"Is Any Thing Too Hard for the Lord?",ref:"Genesis 18\u201323",theme:"Nothing is too hard for the Lord. Abraham interceded for those he loved. Lot's wife looked back.",days:{Monday:{scripture:"Genesis 18:9\u201314",summary:"Genesis 18: Three visitors \u2014 possibly angels \u2014 come to Abraham's tent. Abraham runs to meet them and offers hospitality. They announce that Sarah will have a son within a year. Sarah laughs. The Lord asks: 'Is any thing too hard for the Lord?' \u2014 one of the great questions of scripture.",keyPrinciple:"'Is any thing too hard for the Lord?' The question God asked Sarah is the question He asks us.",reflect:"What has felt too hard or too late for God to fix in your life?",pray:"Bring your most impossible situation to God today.",act:"Write the thing you've stopped believing God can change. Then pray specifically for it."},Wednesday:{scripture:"Genesis 18:22\u201332",summary:"Genesis 19\u201320: Lot and the destruction of Sodom and Gomorrah. Angels warn Lot to flee. His wife looks back and becomes a pillar of salt. God rains fire and brimstone on the cities. Abraham watches the smoke rise from afar. God destroyed the cities but saved Lot for Abraham's sake.",keyPrinciple:"Abraham interceded for Sodom repeatedly. He kept asking. God kept listening.",reflect:"Who are you praying for persistently right now? Are you discouraged?",pray:"Keep asking. Bring one persistent prayer to God today.",act:"Add one person to your prayer list and commit to praying for them for 30 days.",fsy:{title:"FSY: Relationships",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/06relationships",note:"Today's reading involves a key relationship between people or between a person and God. This FSY section explores what healthy, God-centered relationships look like."}},Friday:{scripture:"Genesis 19:17, 26",summary:"Genesis 21\u201322: Isaac is born \u2014 the promised son, finally. Then God commands Abraham to offer Isaac as a burnt offering. Abraham rises early in the morning and goes. Isaac carries the wood up the mountain. At the last moment, God provides a ram. 'Now I know that thou fearest God.'",keyPrinciple:"Lot's wife looked back. She lost everything by returning in her heart to what God had delivered her from.",reflect:"What are the things you keep looking back at? What is it costing you?",pray:"Ask God to help you move forward without looking back.",act:"Identify one habit or relationship you keep returning to that holds you back. Give it to God.",fsy:{title:"FSY: Agency and Integrity",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/04agency-and-integrity",note:"Agency is at the heart of today's reading. God gives commandments but never forces obedience \u2014 the choice is always ours. This section explores how to make choices aligned with God's will."}}},resources:[{title:"Is Any Thing Too Hard for the Lord?",url:"https://www.churchofjesuschrist.org/study/general-conference/2020/04/23olsen",type:"General Conference",who:"Elder Brent H. Nielson"},{title:"Don't Miss This \u2014 Genesis 18\u201323",url:"https://www.youtube.com/c/DontMissThis",type:"Podcast",who:"Don't Miss This"},{title:"FSY: Agency and Integrity",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/04agency-and-integrity",type:"FSY Handbook",who:"For the Strength of Youth"}],ywPrep:{summary:"God promised Abraham a son when it seemed impossible. 'Is any thing too hard for the Lord?' Sarah laughed. Lot's family nearly didn't make it out of Sodom \u2014 they hesitated, and angels had to drag them out. Lot's wife looked back and paid the ultimate price. Abraham interceded persistently for those he loved.",prompts:["Sarah laughed when God said she'd have a son. When have you found yourself doubting something God promised?","Lot's wife looked back. What things do we look back at that keep us stuck?","Abraham kept interceding for Sodom even as God was ready to move on. What does his persistence teach about prayer?","God provided a ram in the thicket at the last possible moment. When has He provided for you at the last moment?"]}},{week:10,dates:"Mar 2\u20138",title:"Surely the Lord Is in This Place",ref:"Genesis 24\u201333",theme:"Jacob wrestled with God and would not let go. God's covenant continues through imperfect people.",days:{Monday:{scripture:"Genesis 28:11\u201317",summary:"Genesis 24: Abraham sends his servant to find a wife for Isaac from his own people. The servant prays at a well for a specific sign. Rebekah appears and fulfills every detail of the prayer before he finishes. He bows and worships God. God answered his prayer in real time.",keyPrinciple:"Jacob woke up and said, 'Surely the Lord is in this place; and I knew it not.' God was present when Jacob didn't know it.",reflect:"When have you recognized God's presence in a moment only after it had passed?",pray:"Ask God to help you recognize His presence in ordinary moments.",act:"At the end of today, write one place where God showed up.",fsy:{title:"FSY: Covenant Path",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/02covenant-path",note:"Covenants are the backbone of today's reading. This section explains what it means to be on the covenant path and how every ordinance connects us more deeply to God."}},Wednesday:{scripture:"Genesis 32:24\u201330",summary:"Genesis 25\u201328: Esau sells his birthright for a bowl of red stew. Jacob and Esau are twins \u2014 their conflict begins in the womb. Jacob, helped by Rebekah, deceives Isaac and steals the blessing meant for Esau. Esau vows to kill Jacob. Jacob flees to his uncle Laban.",keyPrinciple:"Jacob wrestled with God all night and refused to let go until he received a blessing.",reflect:"What are you wrestling with in your relationship with God right now? Are you holding on?",pray:"Like Jacob, refuse to let go of God until you receive what you need.",act:"Pray specifically and persistently for one thing. Don't give up.",fsy:{title:"FSY: Agency and Integrity",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/04agency-and-integrity",note:"Agency is at the heart of today's reading. God gives commandments but never forces obedience \u2014 the choice is always ours. This section explores how to make choices aligned with God's will."}},Friday:{scripture:"Genesis 33:1\u201310",summary:"Genesis 28\u201333: Jacob dreams of a ladder reaching to heaven \u2014 angels ascending and descending. God speaks and renews the Abrahamic Covenant with Jacob. Jacob wakes: 'Surely the Lord is in this place, and I knew it not.' He sets up a stone pillar and vows to follow God.",keyPrinciple:"Esau ran to meet Jacob, embraced him, and wept. Twenty years of estrangement \u2014 healed by one generous act.",reflect:"Is there someone in your life you are estranged from? What would it take to run toward them?",pray:"Ask God for the courage to reach across a relational divide.",act:"Reach out to someone you've been distant from. You go first.",fsy:{title:"FSY: Relationships",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/06relationships",note:"Today's reading involves a key relationship between people or between a person and God. This FSY section explores what healthy, God-centered relationships look like."}}},resources:[{title:"Continue in Patience",url:"https://www.churchofjesuschrist.org/study/general-conference/2010/04/continue-in-patience",type:"General Conference",who:"President Dieter F. Uchtdorf"},{title:"Don't Miss This \u2014 Genesis 24\u201333",url:"https://www.youtube.com/c/DontMissThis",type:"Podcast",who:"Don't Miss This"}],ywPrep:{summary:"Jacob was complicated. He deceived his father to get Esau's blessing, fled in fear, saw angels in a dream, wrestled with God until daybreak, and wept when he reunited with his estranged brother. Jacob's story is about persistence, transformation, and the God who keeps showing up even when we've made a mess.",prompts:["Jacob saw a ladder to heaven in a dream and said, 'Surely the Lord is in this place; and I knew it not.' When have you recognized God was present only after the moment passed?","Jacob wrestled with God and refused to let go. What does it look like to wrestle with God in prayer?","Jacob feared Esau's anger but Esau ran to meet him with tears. What does their reconciliation teach about forgiveness?","Jacob's name was changed to Israel \u2014 one who wrestles with God. What has your wrestling taught you?"]}},{week:11,dates:"Mar 9\u201315",title:"The Lord Was with Joseph",ref:"Genesis 37\u201341",theme:"Joseph maintained integrity in slavery, in Potiphar's house, in prison. God was with him in every place.",days:{Monday:{scripture:"Genesis 37:3\u20134, 19\u201328",summary:"Genesis 37: Joseph is Jacob's favorite son \u2014 the coat of many colors. His brothers hate him and his dreams make it worse. He dreams that his brothers' sheaves bow to his. His brothers sell him to Ishmaelite traders for twenty pieces of silver. He arrives in Egypt as a slave.",keyPrinciple:"Joseph's brothers sold him because of jealousy and pride. Comparison destroys families.",reflect:"When has comparison to a sibling or peer damaged a relationship in your life?",pray:"Ask God to heal any envy or resentment in your family relationships.",act:"Genuinely celebrate one success of a sibling, friend, or peer today.",fsy:{title:"FSY: Relationships",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/06relationships",note:"Today's reading involves a key relationship between people or between a person and God. This FSY section explores what healthy, God-centered relationships look like."}},Wednesday:{scripture:"Genesis 39:1\u20139",summary:"Genesis 38\u201339: Joseph serves in Potiphar's house and prospers. Potiphar's wife lies about him and he is thrown in prison. Even there, 'the Lord was with Joseph.' He interprets dreams for the butler and baker. Two years pass. He waits \u2014 without bitterness.",keyPrinciple:"Joseph fled from temptation. He didn't reason with it or linger near it. He ran.",reflect:"What temptations do you need to flee from rather than resist at close range?",pray:"Ask God for the wisdom to recognize when to run and the courage to actually do it.",act:"Create one physical or digital boundary between you and a recurring temptation.",fsy:{title:"FSY: Agency and Integrity",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/04agency-and-integrity",note:"Agency is at the heart of today's reading. God gives commandments but never forces obedience \u2014 the choice is always ours. This section explores how to make choices aligned with God's will."}},Friday:{scripture:"Genesis 39:20\u201323",summary:"Genesis 40\u201341: Pharaoh dreams of seven fat cows devoured by seven thin ones, and seven full ears of corn swallowed by seven blighted ones. The butler finally remembers Joseph. Joseph interprets: seven years of abundance followed by seven years of famine. Pharaoh sets Joseph over all Egypt.",keyPrinciple:"Joseph was in prison \u2014 and the Lord was with him. Unjust circumstances don't mean God has abandoned you.",reflect:"When have you experienced God's presence in a situation that felt completely unjust?",pray:"Ask God to be present with you in your current hard place.",act:"Write one way God has been with you this week even in difficulty.",fsy:{title:"FSY: Agency and Integrity",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/04agency-and-integrity",note:"Agency is at the heart of today's reading. God gives commandments but never forces obedience \u2014 the choice is always ours. This section explores how to make choices aligned with God's will."}}},resources:[{title:"Be Not Moved",url:"https://www.churchofjesuschrist.org/study/general-conference/2020/10/14freeman",type:"General Conference",who:"Sister Reyna I. Aburto"},{title:"Don't Miss This \u2014 Genesis 37\u201341",url:"https://www.youtube.com/c/DontMissThis",type:"Podcast",who:"Don't Miss This"}],ywPrep:{summary:"Joseph was hated by his brothers for his righteousness and his father's favor. They sold him into slavery. Joseph didn't become bitter \u2014 he became excellent. He resisted Potiphar's wife, went to prison unjustly, and interpreted dreams faithfully. At every point, God was with Joseph. You cannot separate Joseph's character from his suffering \u2014 both made him who he was.",prompts:["Joseph was hated for his righteousness. When has being faithful made you a target?","Joseph fled from Potiphar's wife. What situations do you need to physically leave rather than negotiate with?","Joseph was in prison for years for doing the right thing. How do you keep faith when righteousness doesn't pay off immediately?","Joseph saw people who were suffering and asked, 'Why look ye so sadly today?' Who in your life needs that question?"]}},{week:12,dates:"Mar 16\u201322",title:"God Meant It unto Good",ref:"Genesis 42\u201350",theme:"Joseph's suffering had a purpose. You meant evil against me \u2014 but God meant it for good.",days:{Monday:{scripture:"Genesis 41:14\u201316",summary:"Genesis 42\u201343: Famine spreads. Jacob sends Joseph's brothers to Egypt for grain. They don't recognize Joseph \u2014 he is now second in command of Egypt and speaks through an interpreter. He tests them, accusing them of being spies. He keeps Simeon and sends them home to bring Benjamin.",keyPrinciple:"Joseph didn't take credit for interpreting Pharaoh's dream. He pointed straight to God. Humility in success.",reflect:"When you succeed, who do you thank? How do you keep God at the center of your accomplishments?",pray:"Give God credit for your strengths and successes today.",act:"Say 'God helped me with that' about one thing you accomplished this week.",fsy:{title:"FSY: Agency and Integrity",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/04agency-and-integrity",note:"Agency is at the heart of today's reading. God gives commandments but never forces obedience \u2014 the choice is always ours. This section explores how to make choices aligned with God's will."}},Wednesday:{scripture:"Genesis 45:1\u20135, 7\u20138",summary:"Genesis 44: Joseph plants his silver cup in
