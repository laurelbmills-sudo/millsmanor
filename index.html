      days: [

      days: [
        { day: "Monday", summary: "Genesis 1\u20132 describes the creation of the world in six days \u2014 light, land, sea, plants, animals, and finally humanity. God speaks things into existence and declares each one good. On the seventh day He rests. This is the foundation of the Sabbath and of human dignity.", scripture: "Genesis 1:1; Abraham 4:1", keyPrinciple: "In the beginning, God organized the heavens and earth. Creation was intentional, not accidental.", reflect: "What does it mean that you live on a planet God specifically organized for you?", pray: "Thank God for one specific thing about creation you love.", act: "Go outside and notice one thing in creation that reflects God's care.", dailyQuote: { text: "In the beginning God created the heaven and the earth.", source: "Genesis 1:1" }, resources: [{ title: "Creation", url: "https://www.churchofjesuschrist.org/study/general-conference/2007/04/creation", type: "General Conference", who: "Elder Russell M. Nelson" }, { title: "Don't Miss This \u2014 Genesis 1\u20132", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }, { title: "FSY: Physical Health", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/08physical-health", type: "FSY Handbook", who: "For the Strength of Youth", note: "Today's reading involves the physical body \u2014 its limits or miraculous capacity. This section teaches that the body is sacred and how we treat it reflects what we believe." }] },
        { day: "Wednesday", summary: "Genesis 2 zooms in: God forms Adam from the dust, breathes into his nostrils, places him in Eden. He is given work \u2014 to dress and keep the garden. Then God says 'It is not good for man to be alone' and creates Eve. Marriage and family are God's design from the very beginning.", scripture: "Genesis 1:26\u201327; Moses 2:26\u201327", keyPrinciple: "God created man and woman in His own image. Our bodies reflect something divine.", reflect: "How does believing your body is made in God's image change how you treat it?", pray: "Ask God to help you see your body the way He does.", act: "Write three things you appreciate about your body today.", dailyQuote: { text: "God created man in his own image, in the image of God created he him; male and female created he them.", source: "Genesis 1:27" }, resources: [{ title: "The Great Plan of Happiness", url: "https://www.churchofjesuschrist.org/study/general-conference/1993/10/the-great-plan-of-happiness", type: "General Conference", who: "Elder Dallin H. Oaks" }, { title: "The Body Is a Sacred Gift", url: "https://www.churchofjesuschrist.org/study/ensign/2012/09/the-body-is-a-sacred-gift", type: "Ensign", who: "Elder David A. Bednar" }, { title: "FSY: Physical Health", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/08physical-health", type: "FSY Handbook", who: "For the Strength of Youth", note: "Today's reading involves the physical body \u2014 its limits or miraculous capacity. This section teaches that the body is sacred and how we treat it reflects what we believe." }] },
        { day: "Friday", summary: "Moses 2\u20133 adds the Lord's perspective to the creation account \u2014 God's voice, His Spirit moving on the face of the waters. Then the physical creation of Adam and the Garden, the commandment about the Tree of Knowledge. Two ways to read: literal days or eternal organizing principles.", scripture: "Genesis 2:18, 24", keyPrinciple: "It is not good for man to be alone. God designed us for covenant relationships.", reflect: "What does God's design for family and community tell you about your need for connection?", pray: "Ask God to help you invest in the relationships He has given you.", act: "Reach out to a family member or friend with genuine care today.", dailyQuote: { text: "It is not good that the man should be alone.", source: "Genesis 2:18" }, resources: [{ title: "Marriage Is Essential to His Eternal Plan", url: "https://www.churchofjesuschrist.org/study/general-conference/2006/04/marriage-is-essential-to-his-eternal-plan", type: "General Conference", who: "Elder David A. Bednar" }, { title: "Don't Miss This \u2014 Moses 2\u20133; Abraham 4\u20135", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }, { title: "FSY: Relationships", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/06relationships", type: "FSY Handbook", who: "For the Strength of Youth", note: "Today's reading involves a key relationship between people or between a person and God. This FSY section explores what healthy, God-centered relationships look like." }] },
        { day: "Saturday", scripture: "Moses 3:8\u20139", keyPrinciple: "God planted a garden and put man and woman in it. He provides for those He creates.", reflect: "What garden has God planted in your life \u2014 a home, community, or opportunity \u2014 to help you grow?", pray: "Ask God to help you tend what He has given you.", act: "Do one thing today to care for your environment or home.", dailyQuote: { text: "Out of the ground made the Lord God to grow every tree... pleasant to the sight, and good for food.", source: "Genesis 2:9" } }
      ]
    },
    {
      week: 4,
      dates: "Jan 19\u201325",
      ref: "Genesis 3\u20134; Moses 4\u20135",
      title: "The Fall Was Part of the Plan",
      theme: "The Fall was a necessary step for growth, agency, and our need for a Savior.",
      resources: [{ title: "The Atonement and the Journey of Mortality", url: "https://www.churchofjesuschrist.org/study/general-conference/2012/04/the-atonement-and-the-journey-of-mortality", type: "General Conference", who: "Elder David A. Bednar" }, { title: "Don't Miss This \u2014 Genesis 3\u20134; Moses 4\u20135", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }],
      ywPrep: { summary: "The Fall of Adam and Eve was not a mistake \u2014 it was a necessary step in God's plan. Satan wanted to destroy agency; God's plan requires it. Cain chose to love Satan more than God, and his choice rippled far beyond himself. The Fall was a fall forward \u2014 into mortality, growth, and the need for Jesus Christ.", prompts: ["How does knowing the Fall was part of God's plan change how you think about hard things in your life?", "Why did God give Adam and Eve commandments He knew they couldn't both keep at the same time?", "Cain asked, 'Am I my brother's keeper?' What is your answer to that question today?", "Eve rejoiced in the Fall because through it they would have a Redeemer. What trial has taught you something you couldn't learn any other way?"] },
      days: [
        { day: "Monday", summary: "The Fall of Adam and Eve. The serpent tempts Eve with the fruit of the Tree of Knowledge of Good and Evil. Eve eats, Adam follows. They know they are naked. God walks in the garden calling 'Where art thou?' \u2014 a question He never stops asking. Consequences follow: toil, pain, death.", scripture: "Moses 4:1\u20134; 2 Nephi 2:25", keyPrinciple: "Satan wanted to destroy agency. God's plan requires it. Agency is the gift that makes growth possible.", reflect: "Where do you feel most free to choose? Where do you feel most constrained?", pray: "Ask God to help you use your agency to choose growth today.", act: "Make one deliberate, faith-based choice today instead of a default one.", dailyQuote: { text: "Adam fell that men might be; and men are, that they might have joy.", source: "2 Nephi 2:25" }, resources: [{ title: "Agency and Anger", url: "https://www.churchofjesuschrist.org/study/general-conference/1998/10/agency-and-anger", type: "General Conference", who: "Elder Lynn G. Robbins" }, { title: "Don't Miss This \u2014 Moses 4; Genesis 3", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }, { title: "FSY: Agency and Integrity", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/04agency-and-integrity", type: "FSY Handbook", who: "For the Strength of Youth", note: "Agency is at the heart of today's reading. God gives commandments but never forces obedience \u2014 the choice is always ours. This section explores how to make choices aligned with God's will." }] },
        { day: "Wednesday", summary: "God confronts Adam, Eve, and the serpent. Each receives consequences, but God also gives a promise \u2014 the seed of Eve will bruise the head of the serpent. This is the first hint of a Savior. Then God makes coats of skins to cover them. Even in judgment, there is mercy.", scripture: "Genesis 3:9; Moses 4:15", keyPrinciple: "After the Fall, God's first question was 'Where art thou?' He came looking. He always comes looking.", reflect: "When have you felt like you were hiding from God? What brought you back?", pray: "Stop hiding. Let God find you today.", act: "Be honest with God in prayer about one thing you've been avoiding.", dailyQuote: { text: "And the Lord God called unto Adam, and said unto him, Where art thou?", source: "Genesis 3:9" }, resources: [{ title: "Where Art Thou?", url: "https://www.churchofjesuschrist.org/study/general-conference/2021/10/23freeman", type: "General Conference", who: "Elder Bradley D. Foster" }, { title: "The Merciful Obtain Mercy", url: "https://www.churchofjesuschrist.org/study/general-conference/2012/04/the-merciful-obtain-mercy", type: "General Conference", who: "President Dieter F. Uchtdorf" }, { title: "FSY: Repentance and Forgiveness", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/05repentance-and-forgiveness", type: "FSY Handbook", who: "For the Strength of Youth", note: "Today's reading shows someone facing consequences of sin \u2014 or being given a second chance. This FSY section teaches that repentance is always available and God's mercy can cover any mistake." }] },
        { day: "Friday", summary: "Cain and Abel. Both offer sacrifices. God accepts Abel's but not Cain's. God asks Cain: 'Why art thou wroth? If thou doest well, shalt thou not be accepted?' Cain kills Abel anyway. His punishment: a wanderer on the earth. Sin always costs more than we expect.", scripture: "Moses 5:5\u20139; Genesis 4:1\u20137", keyPrinciple: "Cain chose to love Satan more than God. That choice had consequences that spread far beyond himself.", reflect: "How do your choices ripple out to affect people around you?", pray: "Ask God to show you if any of your choices are hurting others.", act: "Correct or repair one relational rift today.", dailyQuote: { text: "If thou doest well, thou shalt be accepted. And if thou doest not well, sin lieth at the door.", source: "Genesis 4:7" }, resources: [{ title: "Am I My Brother's Keeper?", url: "https://www.churchofjesuschrist.org/study/general-conference/1994/10/am-i-my-brothers-keeper", type: "General Conference", who: "Elder M. Russell Ballard" }, { title: "Don't Miss This \u2014 Genesis 4; Moses 5", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }, { title: "FSY: Agency and Integrity", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/04agency-and-integrity", type: "FSY Handbook", who: "For the Strength of Youth", note: "Agency is at the heart of today's reading. God gives commandments but never forces obedience \u2014 the choice is always ours. This section explores how to make choices aligned with God's will." }] },
        { day: "Saturday", scripture: "Moses 5:10\u201311", keyPrinciple: "Eve rejoiced in the Fall because through it they would know good and evil \u2014 and have a Redeemer.", reflect: "What trial in your life has taught you something you couldn't have learned any other way?", pray: "Thank God for what your hard experiences have taught you.", act: "Write one thing your trials have given you that you wouldn't trade.", dailyQuote: { text: "Were it not for our transgression we never should have had seed, and never should have known good and evil.", source: "Moses 5:11" } }
      ]
    },
    {
      week: 5,
      dates: "Jan 26\u2013Feb 1",
      ref: "Genesis 5; Moses 6",
      title: "Enoch Walked with God",
      theme: "Enoch was young and slow of speech. God called him anyway.",
      resources: [{ title: "Becoming Like God", url: "https://www.churchofjesuschrist.org/study/ensign/2015/01/becoming-like-god", type: "Ensign", who: "Gospel Topics Essay" }, { title: "Don't Miss This \u2014 Moses 6; Genesis 5", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }],
      ywPrep: { summary: "Enoch was young and slow of speech \u2014 and God called him anyway. He preached to hard-hearted people and built Zion: a community so unified and righteous that God took the whole city to heaven. God then showed Enoch the suffering of the earth and wept. God feels. He mourns. He cares for every one of His children.", prompts: ["Enoch felt he was 'but a lad' and unqualified. When have you felt unqualified but God called you anyway?", "What does a Zion community look like in your school or ward today?", "God wept over the wickedness of people He loved. What does that tell you about how He feels about you?", "Enoch's city was taken to heaven because they were pure in heart. What are you doing to build that kind of community?"] },
      days: [
        { day: "Monday", summary: "Moses 6 introduces Enoch \u2014 a young, slow-of-speech man whom God calls to preach repentance to a wicked people. Enoch is astonished that God would call him. God promises to be with him. Enoch preaches and the people shake with fear. God was not wrong about Enoch.", scripture: "Moses 6:26\u201331", keyPrinciple: "God called Enoch when he felt completely unqualified. God always equips those He calls.", reflect: "What calling or challenge have you felt unequal to? What happened?", pray: "Ask God to give you confidence in His calling on your life.", act: "Do one thing today that you've been avoiding because you don't feel qualified.", dailyQuote: { text: "Why is it that I have found favor in thy sight, and am but a lad?", source: "Moses 6:31" }, resources: [{ title: "The Call of the Prophet", url: "https://www.churchofjesuschrist.org/study/general-conference/2012/10/the-call-of-the-prophet", type: "General Conference", who: "Elder Neil L. Andersen" }, { title: "Don't Miss This \u2014 Moses 6", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }, { title: "FSY: Covenant Path", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/02covenant-path", type: "FSY Handbook", who: "For the Strength of Youth", note: "Covenants are the backbone of today's reading. This section explains what it means to be on the covenant path and how every ordinance connects us more deeply to God." }] },
        { day: "Wednesday", summary: "Moses 7 reveals the vision of Zion \u2014 a people so united in righteousness that God translates their entire city. Enoch sees the plan of salvation, the Flood, the scattering of Israel, the restoration, and the Second Coming. He weeps for his people. God weeps with him.", scripture: "Moses 7:18", keyPrinciple: "Zion: one heart, one mind, no poor among them. This is God's vision for His people.", reflect: "What would your ward or school look like if everyone had one heart and one mind?", pray: "Ask God to help you be a unifying presence, not a dividing one.", act: "Do one act that builds unity in your home or community today.", dailyQuote: { text: "And the Lord called his people Zion, because they were of one heart and one mind, and dwelt in righteousness.", source: "Moses 7:18" }, resources: [{ title: "Zion: The Pure in Heart", url: "https://www.churchofjesuschrist.org/study/general-conference/2012/04/zion-the-pure-in-heart", type: "General Conference", who: "Elder D. Todd Christofferson" }, { title: "Building Zion in Our Homes", url: "https://www.churchofjesuschrist.org/study/ensign/2001/05/building-zion-in-our-homes", type: "Ensign", who: "Elder Henry B. Eyring" }, { title: "FSY: Giving Service", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/11giving-service", type: "FSY Handbook", who: "For the Strength of Youth", note: "Today's reading features someone who gives more than expected \u2014 or fails to. This section explores why serving others is central to discipleship." }] },
        { day: "Friday", summary: "Moses 7 continues: God weeps over His children who refused to come to Him. Enoch is astonished \u2014 'How is it that the heavens weep?' God explains His love for His children and the grief of seeing them choose misery. Zion is taken up. The earth mourns.", scripture: "Moses 7:28\u201333", keyPrinciple: "God wept over His children who refused to come to Him. He does not feel indifferent about you.", reflect: "What does it mean to you that God can weep \u2014 that He feels deeply about your choices?", pray: "Ask God to show you how He feels about you specifically.", act: "Write a short letter from God to yourself based on what you've read this week.", dailyQuote: { text: "And it came to pass that the God of heaven looked upon the residue of the people, and he wept.", source: "Moses 7:28" }, resources: [{ title: "Mourning with Those That Mourn", url: "https://www.churchofjesuschrist.org/study/general-conference/2012/04/mourning-with-those-that-mourn", type: "General Conference", who: "Sister Chieko N. Okazaki" }, { title: "Don't Miss This \u2014 Moses 7", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }, { title: "FSY: Giving Service", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/11giving-service", type: "FSY Handbook", who: "For the Strength of Youth", note: "Today's reading features someone who gives more than expected \u2014 or fails to. This section explores why serving others is central to discipleship." }] },
        { day: "Saturday", scripture: "Moses 7:62\u201364", keyPrinciple: "Enoch's city will return and be joined with a righteous people in the last days. We are preparing for that.", reflect: "What kind of person do you want to be when Zion is established?", pray: "Ask God what changes would prepare you for that day.", act: "Make one commitment to be more Zion-like this week.", dailyQuote: { text: "Righteousness will I send down out of heaven; and truth will I send forth out of the earth.", source: "Moses 7:62" } }
      ]
    },
    {
      week: 6,
      dates: "Feb 2\u20138",
      ref: "Moses 7",
      title: "The Lord Called His People Zion",
      theme: "God wept over His children who refused to come to Him. He does not feel indifferent about you.",
      resources: [{ title: "Zion: The Pure in Heart", url: "https://www.churchofjesuschrist.org/study/general-conference/2012/04/zion-the-pure-in-heart", type: "General Conference", who: "Elder D. Todd Christofferson" }, { title: "Don't Miss This \u2014 Moses 7", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }],
      ywPrep: { summary: "Moses 7 is one of the most tender chapters in scripture. Enoch sees God weep. He asks how God, being perfect, can weep \u2014 and God answers: these are my children, my work, my love. He mourns those who refused His offered hand. This week is about understanding a God who is deeply emotionally present, not distant.", prompts: ["Enoch asked God, 'How is it that thou canst weep, seeing thou art holy?' How would you answer that question?", "God described those who rejected Him as 'without affection.' What does affection for God look like in daily life?", "Enoch saw the nations of the earth in wickedness and wept himself. What do you grieve over in the world today?", "Enoch's city was translated \u2014 taken to heaven \u2014 because they were ready. What would it mean to be truly ready?"] },
      days: [
        { day: "Monday", summary: "Moses 7 describes the city of Zion \u2014 people who were 'of one heart and one mind' and 'dwelt in righteousness.' They had no poor among them. Enoch taught them until they were pure enough that God took them. Zion is not just a place \u2014 it's a condition of the heart.", scripture: "Moses 7:29, 33", keyPrinciple: "God weeps because He is the Father of these souls \u2014 and they will not receive His peace. His love is personal.", reflect: "How does knowing God weeps change your picture of who He is?", pray: "Talk to God today as a Father who feels \u2014 not just as a distant judge.", act: "Write what you would say to God if you knew He was genuinely grieved about something in your life.", dailyQuote: { text: "Behold these thy brethren; they are the workmanship of mine own hands... I gave unto them their knowledge.", source: "Moses 7:32" }, resources: [{ title: "God Weeps", url: "https://www.churchofjesuschrist.org/study/general-conference/2015/04/god-weeps", type: "General Conference", who: "Elder Tad R. Callister" }, { title: "Don't Miss This \u2014 Moses 7", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }, { title: "FSY: Giving Service", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/11giving-service", type: "FSY Handbook", who: "For the Strength of Youth", note: "Today's reading features someone who gives more than expected \u2014 or fails to. This section explores why serving others is central to discipleship." }] },
        { day: "Wednesday", summary: "Moses 7 closes with Enoch seeing the future: the Flood, Christ's birth and death, the restoration, and the Second Coming when Zion will return and meet the New Jerusalem. The whole panorama of history from one prophet's vision.", scripture: "Moses 7:37\u201340", keyPrinciple: "Enoch saw the wickedness of the world and wept. Caring about God's children means their pain becomes our pain.", reflect: "What in the world around you do you grieve over? Is that grief motivating you to act?", pray: "Ask God to give you His heart for the people around you \u2014 friends, family, your community.", act: "Do one specific act of care for someone who is struggling.", dailyQuote: { text: "And as Enoch saw this, he had bitterness of soul, and wept over his brethren.", source: "Moses 7:41" }, resources: [{ title: "Becoming Zion People", url: "https://www.churchofjesuschrist.org/study/ensign/1978/03/becoming-a-zion-people", type: "Ensign", who: "Elder Bruce R. McConkie" }, { title: "One Heart and One Mind", url: "https://www.saintsunscripted.com", type: "Podcast", who: "Saints Unscripted" }, { title: "FSY: Giving Service", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/11giving-service", type: "FSY Handbook", who: "For the Strength of Youth", note: "Today's reading features someone who gives more than expected \u2014 or fails to. This section explores why serving others is central to discipleship." }] },
        { day: "Friday", summary: "Moses 8 introduces Noah, who is righteous in a corrupt generation. God is grieved that He made man. He tells Noah to build an ark for his family and the animals. Noah preaches repentance but no one listens. The rain comes.", scripture: "Moses 7:62\u201363", keyPrinciple: "God will bring Zion back. He will send righteousness and truth. He hasn't given up.", reflect: "What hope do you find in knowing God's plan is still moving forward despite the mess of the world?", pray: "Ask God to renew your hope in His ultimate plan.", act: "Write one thing about the future you trust God with.", dailyQuote: { text: "Righteousness will I send down out of heaven; and truth will I send forth out of the earth.", source: "Moses 7:62" }, resources: [{ title: "Come What May, and Love It", url: "https://www.churchofjesuschrist.org/study/general-conference/2008/10/come-what-may-and-love-it", type: "General Conference", who: "Elder Joseph B. Wirthlin" }, { title: "The Eternal Perspective of the Gospel", url: "https://www.churchofjesuschrist.org/study/general-conference/2011/10/the-eternal-perspective-of-the-gospel", type: "General Conference", who: "President Dieter F. Uchtdorf" }, { title: "FSY: Living the Gospel", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/12living-the-gospel", type: "FSY Handbook", who: "For the Strength of Youth", note: "Today's reading illustrates what it looks like to live the gospel fully \u2014 or to drift from it. This section describes what it means to be an active disciple in everyday life." }] },
        { day: "Saturday", scripture: "Moses 7:18", keyPrinciple: "Zion is a people of one heart and one mind with no poor among them. It starts with small communities.", reflect: "What does Zion look like in your home or your Young Women class right now?", pray: "Ask God to make your small community more unified this week.", act: "Do one thing to lift someone out of isolation or poverty of any kind \u2014 financial, emotional, or spiritual.", dailyQuote: { text: "And the Lord called his people Zion, because they were of one heart and one mind, and dwelt in righteousness.", source: "Moses 7:18" } }
      ]
    },
    {
      week: 7,
      dates: "Feb 9\u201315",
      ref: "Genesis 6\u201311; Moses 8",
      title: "Noah Found Grace in the Eyes of the Lord",
      theme: "Noah was righteous in a world that forgot God. Grace is finding favor with Him by turning toward Him.",
      resources: [{ title: "The Windows of Heaven", url: "https://www.churchofjesuschrist.org/study/general-conference/2013/10/the-windows-of-heaven", type: "General Conference", who: "Elder David A. Bednar" }, { title: "Don't Miss This \u2014 Genesis 6\u201311; Moses 8", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }],
      ywPrep: { summary: "Noah preached for 120 years and only his family listened. Still he kept going. The ark was built one plank at a time while the whole world watched and mocked. The flood was judgment \u2014 but the rainbow was covenant. God always follows judgment with covenant. The Tower of Babel was humanity's attempt to reach God by human power alone.", prompts: ["Noah kept building even when no one believed him. What do you do when you feel alone in your faith?", "What is your 'ark' right now \u2014 what is God asking you to build that requires sustained effort?", "God made a covenant with Noah after the flood. Why does God make covenants?", "The Tower of Babel: people tried to reach heaven by their own effort. What towers do people build today?"] },
      days: [
        { day: "Monday", summary: "Genesis 6\u20138: The Flood. God observes the wickedness of the world and His heart is grieved. Noah finds grace. He builds the ark \u2014 300 cubits long. The fountains of the deep burst open. Forty days of rain. Everything with breath on land dies. The ark floats.", scripture: "Genesis 6:8\u20139; Moses 8:27", keyPrinciple: "Noah was perfect in his generation \u2014 not sinless, but wholehearted. He walked with God.", reflect: "What does it look like to walk with God in your ordinary daily life?", pray: "Ask God to help you walk more closely with Him today.", act: "Choose one way to include God in your normal, ordinary day.", dailyQuote: { text: "Noah found grace in the eyes of the Lord. And Noah walked with God.", source: "Genesis 6:8\u20139" }, resources: [{ title: "Converted unto the Lord", url: "https://www.churchofjesuschrist.org/study/general-conference/2012/10/converted-unto-the-lord", type: "General Conference", who: "Elder David A. Bednar" }, { title: "Don't Miss This \u2014 Genesis 6\u201311; Moses 8", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }, { title: "FSY: Covenant Path", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/02covenant-path", type: "FSY Handbook", who: "For the Strength of Youth", note: "Covenants are the backbone of today's reading. This section explains what it means to be on the covenant path and how every ordinance connects us more deeply to God." }] },
        { day: "Wednesday", summary: "After the Flood, the waters recede. Noah sends out a raven and then a dove \u2014 the dove returns with an olive leaf. They emerge from the ark. Noah offers sacrifice. God makes a covenant with Noah: never again will He destroy all life with a flood. The rainbow is the sign.", scripture: "Genesis 7:1; Hebrews 11:7", keyPrinciple: "By faith Noah built an ark. Faith is acting on God's word before you see the result.", reflect: "What is God asking you to do right now that requires faith before evidence?", pray: "Ask God for the kind of faith that acts without seeing.", act: "Take one step of faith today toward something God has been prompting you toward.", dailyQuote: { text: "By faith Noah... prepared an ark to the saving of his house.", source: "Hebrews 11:7" }, resources: [{ title: "The Faith to Move Mountains", url: "https://www.churchofjesuschrist.org/study/general-conference/2021/04/41rasband", type: "General Conference", who: "Elder Ronald A. Rasband" }, { title: "Noah and the Covenant of the Rainbow", url: "https://www.churchofjesuschrist.org/study/ensign/1981/05/the-covenant-of-the-rainbow", type: "Ensign", who: "Elder Bruce R. McConkie" }, { title: "FSY: Agency and Integrity", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/04agency-and-integrity", type: "FSY Handbook", who: "For the Strength of Youth", note: "Agency is at the heart of today's reading. God gives commandments but never forces obedience \u2014 the choice is always ours. This section explores how to make choices aligned with God's will." }] },
        { day: "Friday", summary: "Genesis 11: The Tower of Babel. Humanity speaks one language and decides to build a tower to heaven. God comes down to see it and says 'Nothing will be withheld from them which they purpose to do.' He confuses their language and scatters them. Ambition without God leads to confusion.", scripture: "Genesis 9:13\u201315", keyPrinciple: "God set a rainbow in the clouds as a sign of His covenant. He remembers His promises.", reflect: "What covenant has God made with you? How do you remember it?", pray: "Thank God for one covenant promise He has kept in your life.", act: "Find a symbol or reminder of one of God's promises and put it somewhere visible.", dailyQuote: { text: "I do set my bow in the cloud, and it shall be for a token of a covenant between me and the earth.", source: "Genesis 9:13" }, resources: [{ title: "The Windows of Heaven", url: "https://www.churchofjesuschrist.org/study/general-conference/2013/10/the-windows-of-heaven", type: "General Conference", who: "Elder David A. Bednar" }, { title: "Don't Miss This \u2014 The Tower of Babel", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }, { title: "FSY: Physical Health", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/08physical-health", type: "FSY Handbook", who: "For the Strength of Youth", note: "Today's reading involves the physical body \u2014 its limits or miraculous capacity. This section teaches that the body is sacred and how we treat it reflects what we believe." }] },
        { day: "Saturday", scripture: "Genesis 11:1\u20139", keyPrinciple: "The Tower of Babel: humanity tried to reach God by their own power. God is not impressed by our towers.", reflect: "What towers do people build today to feel significant or reach God without Him?", pray: "Ask God to show you where you're relying on your own strength instead of His.", act: "Surrender one thing to God today that you've been trying to handle alone.", dailyQuote: { text: "Come, let us build us a city and a tower... and let us make us a name.", source: "Genesis 11:4" } }
      ]
    },
    {
      week: 8,
      dates: "Feb 16\u201322",
      ref: "Genesis 12\u201317; Abraham 1\u20132",
      title: "I Will Make of Thee a Great Nation",
      theme: "God called Abraham to leave everything familiar. The covenant blesses all nations \u2014 including us.",
      resources: [{ title: "Abraham, Isaac, and the Covenant", url: "https://www.churchofjesuschrist.org/study/general-conference/2016/10/the-covenant", type: "General Conference", who: "Elder Russell M. Nelson" }, { title: "Don't Miss This \u2014 Genesis 12\u201317; Abraham 1\u20132", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }],
      ywPrep: { summary: "God called Abraham to leave his homeland, his family, his idols \u2014 everything. He didn't know where he was going. He just went. God made a covenant with him that would bless every family on earth. That covenant extends to us today through baptism and temple ordinances. We are covenant children of Abraham.", prompts: ["Abraham left without knowing where he was going. What has God asked you to commit to before you knew the outcome?", "God promised Abraham children even when Sarah was barren and Abraham was old. What impossible promises do you trust God to keep?", "We are Abraham's seed through covenant. What does it mean to belong to this covenant family?", "Abraham was called out of a world of idolatry. What idols compete for your loyalty today?"] },
      days: [
        { day: "Monday", summary: "Genesis 12\u201313: Abram is called to leave his home in Ur and go to a land God will show him. God promises to make him a great nation and bless all families of the earth through him. Abram obeys without knowing the destination. He arrives in Canaan. God appears and says: 'Unto thy seed will I give this land.'", scripture: "Genesis 12:1\u20134; Abraham 2:4", keyPrinciple: "Abram left without knowing where he was going. Obedience often comes before understanding.", reflect: "What has God asked you to do that required leaving something behind?", pray: "Ask God to give you the courage to obey even when the destination is unclear.", act: "Take one step today toward something God has been prompting you toward.", dailyQuote: { text: "Get thee out of thy country... unto a land that I will shew thee. So Abram departed.", source: "Genesis 12:1, 4" }, resources: [{ title: "Obedience to the Law of God", url: "https://www.churchofjesuschrist.org/study/general-conference/2013/04/obedience-to-the-law-of-god", type: "General Conference", who: "Elder L. Tom Perry" }, { title: "Don't Miss This \u2014 Genesis 12\u201317", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }, { title: "FSY: Covenant Path", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/02covenant-path", type: "FSY Handbook", who: "For the Strength of Youth", note: "Covenants are the backbone of today's reading. This section explains what it means to be on the covenant path and how every ordinance connects us more deeply to God." }] },
        { day: "Wednesday", summary: "Genesis 15\u201317: God makes a formal covenant with Abram \u2014 he will have descendants as numerous as the stars. Abram believes God and it is counted as righteousness. God changes his name to Abraham: 'father of many nations.' Circumcision becomes the sign of the covenant.", scripture: "Genesis 13:14\u201317; Genesis 17:1\u20138", keyPrinciple: "God made a covenant with Abraham \u2014 not because he was perfect but because he was faithful.", reflect: "What is your part of the Abrahamic covenant? What has God promised you?", pray: "Ask God to help you live worthy of the covenants you've made.", act: "Read about the Abrahamic covenant and write what it means for you personally.", dailyQuote: { text: "I will make thy seed as the dust of the earth... Arise, walk through the land, for I will give it unto thee.", source: "Genesis 13:16\u201317" }, resources: [{ title: "The Covenant", url: "https://www.churchofjesuschrist.org/study/general-conference/2016/10/the-covenant", type: "General Conference", who: "Elder Russell M. Nelson" }, { title: "Blessings of the Abrahamic Covenant", url: "https://www.churchofjesuschrist.org/study/ensign/1992/06/blessings-of-the-abrahamic-covenant", type: "Ensign", who: "Elder Dennis B. Neuenschwander" }, { title: "FSY: Covenant Path", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/02covenant-path", type: "FSY Handbook", who: "For the Strength of Youth", note: "Covenants are the backbone of today's reading. This section explains what it means to be on the covenant path and how every ordinance connects us more deeply to God." }] },
        { day: "Friday", summary: "Abraham 1\u20132: Abraham's background \u2014 he sought the blessings of the patriarchs and was nearly sacrificed by a wicked priest. God delivered him. In Egypt, Abraham teaches Pharaoh astronomy. The Abrahamic Covenant is established: land, posterity, and a ministry to bless all nations.", scripture: "Abraham 1:2\u20133", keyPrinciple: "Abraham sought greater knowledge, greater righteousness, and more peace. His desires shaped his destiny.", reflect: "What are your deepest spiritual desires right now? Are you actively seeking what you want?", pray: "Ask God to refine and clarify your deepest desires.", act: "Write your top three spiritual desires. Make one concrete plan toward one of them.", dailyQuote: { text: "I sought for the blessings of the fathers... desiring to be a greater follower of righteousness.", source: "Abraham 1:2" }, resources: [{ title: "The Desires of Our Hearts", url: "https://www.churchofjesuschrist.org/study/general-conference/2008/04/the-desires-of-our-hearts", type: "General Conference", who: "Elder Dallin H. Oaks" }, { title: "Don't Miss This \u2014 Abraham 1\u20132", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }, { title: "FSY: Agency and Integrity", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/04agency-and-integrity", type: "FSY Handbook", who: "For the Strength of Youth", note: "Agency is at the heart of today's reading. God gives commandments but never forces obedience \u2014 the choice is always ours. This section explores how to make choices aligned with God's will." }] },
        { day: "Saturday", scripture: "Genesis 17:1", keyPrinciple: "Walk before me, and be thou perfect \u2014 wholehearted, complete. God establishes covenant with those who turn to Him fully.", reflect: "What would wholehearted discipleship look like for you in your current season of life?", pray: "Ask God to show you what walking before Him means for you today.", act: "Commit to one covenant behavior you've been inconsistent in.", dailyQuote: { text: "Walk before me, and be thou perfect. And I will make my covenant between me and thee.", source: "Genesis 17:1\u20132" } }
      ]
    },
    {
      week: 9,
      dates: "Feb 23\u2013Mar 1",
      ref: "Genesis 18\u201323",
      title: "Is Any Thing Too Hard for the Lord?",
      theme: "Nothing is too hard for the Lord. Abraham interceded for those he loved. Lot's wife looked back.",
      resources: [{ title: "Is Any Thing Too Hard for the Lord?", url: "https://www.churchofjesuschrist.org/study/general-conference/2020/04/23olsen", type: "General Conference", who: "Elder Brent H. Nielson" }, { title: "Don't Miss This \u2014 Genesis 18\u201323", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }, { title: "FSY: Agency and Integrity", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/04agency-and-integrity", type: "FSY Handbook", who: "For the Strength of Youth", note: "Agency is at the heart of today's reading. God gives commandments but never forces obedience \u2014 the choice is always ours. This section explores how to make choices aligned with God's will." }],
      ywPrep: { summary: "God promised Abraham a son when it seemed impossible. 'Is any thing too hard for the Lord?' Sarah laughed. Lot's family nearly didn't make it out of Sodom \u2014 they hesitated, and angels had to drag them out. Lot's wife looked back and paid the ultimate price. Abraham interceded persistently for those he loved.", prompts: ["Sarah laughed when God said she'd have a son. When have you found yourself doubting something God promised?", "Lot's wife looked back. What things do we look back at that keep us stuck?", "Abraham kept interceding for Sodom even as God was ready to move on. What does his persistence teach about prayer?", "God provided a ram in the thicket at the last possible moment. When has He provided for you at the last moment?"] },
      days: [
        { day: "Monday", summary: "Genesis 18: Three visitors \u2014 possibly angels \u2014 come to Abraham's tent. Abraham runs to meet them and offers hospitality. They announce that Sarah will have a son within a year. Sarah laughs. The Lord asks: 'Is any thing too hard for the Lord?' \u2014 one of the great questions of scripture.", scripture: "Genesis 18:9\u201314", keyPrinciple: "'Is any thing too hard for the Lord?' The question God asked Sarah is the question He asks us.", reflect: "What has felt too hard or too late for God to fix in your life?", pray: "Bring your most impossible situation to God today.", act: "Write the thing you've stopped believing God can change. Then pray specifically for it.", dailyQuote: { text: "Is any thing too hard for the Lord? At the time appointed I will return unto thee.", source: "Genesis 18:14" }, resources: [{ title: "Is Any Thing Too Hard for the Lord?", url: "https://www.churchofjesuschrist.org/study/general-conference/2020/04/23olsen", type: "General Conference", who: "Elder Brent H. Nielson" }, { title: "Don't Miss This \u2014 Genesis 18\u201323", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }] },
        { day: "Wednesday", summary: "Genesis 19\u201320: Lot and the destruction of Sodom and Gomorrah. Angels warn Lot to flee. His wife looks back and becomes a pillar of salt. God rains fire and brimstone on the cities. Abraham watches the smoke rise from afar. God destroyed the cities but saved Lot for Abraham's sake.", scripture: "Genesis 18:22\u201332", keyPrinciple: "Abraham interceded for Sodom repeatedly. He kept asking. God kept listening.", reflect: "Who are you praying for persistently right now? Are you discouraged?", pray: "Keep asking. Bring one persistent prayer to God today.", act: "Add one person to your prayer list and commit to praying for them for 30 days.", dailyQuote: { text: "And Abraham drew near, and said, Wilt thou also destroy the righteous with the wicked?", source: "Genesis 18:23" }, resources: [{ title: "Pray Always", url: "https://www.churchofjesuschrist.org/study/general-conference/2008/10/pray-always", type: "General Conference", who: "Elder David A. Bednar" }, { title: "The Intercessory Power of Prayer", url: "https://www.churchofjesuschrist.org/study/ensign/1978/12/the-intercessory-power-of-prayer", type: "Ensign", who: "Elder Boyd K. Packer" }, { title: "FSY: Relationships", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/06relationships", type: "FSY Handbook", who: "For the Strength of Youth", note: "Today's reading involves a key relationship between people or between a person and God. This FSY section explores what healthy, God-centered relationships look like." }] },
        { day: "Friday", summary: "Genesis 21\u201322: Isaac is born \u2014 the promised son, finally. Then God commands Abraham to offer Isaac as a burnt offering. Abraham rises early in the morning and goes. Isaac carries the wood up the mountain. At the last moment, God provides a ram. 'Now I know that thou fearest God.'", scripture: "Genesis 19:17, 26", keyPrinciple: "Lot's wife looked back. She lost everything by returning in her heart to what God had delivered her from.", reflect: "What are the things you keep looking back at? What is it costing you?", pray: "Ask God to help you move forward without looking back.", act: "Identify one habit or relationship you keep returning to that holds you back. Give it to God.", dailyQuote: { text: "Escape for thy life; look not behind thee... But his wife looked back from behind him, and she became a pillar of salt.", source: "Genesis 19:17, 26" }, resources: [{ title: "The Transforming Power of Faith and Character", url: "https://www.churchofjesuschrist.org/study/general-conference/2010/10/the-transforming-power-of-faith-and-character", type: "General Conference", who: "Elder Richard G. Scott" }, { title: "Don't Miss This \u2014 Lot's Wife", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }, { title: "FSY: Agency and Integrity", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/04agency-and-integrity", type: "FSY Handbook", who: "For the Strength of Youth", note: "Agency is at the heart of today's reading. God gives commandments but never forces obedience \u2014 the choice is always ours. This section explores how to make choices aligned with God's will." }] },
        { day: "Saturday", scripture: "Genesis 22:11\u201314", keyPrinciple: "God provided the ram in the thicket. 'In the mount of the Lord it shall be seen.' He provides at the exact right moment.", reflect: "When has God provided for you in a way you couldn't have arranged yourself?", pray: "Thank God for one specific provision in your life.", act: "Tell someone today about a time God provided unexpectedly.", dailyQuote: { text: "In the mount of the Lord it shall be seen... And Abraham called the name of that place Jehovah-jireh.", source: "Genesis 22:14" } }
      ]
    },
    {
      week: 10,
      dates: "Mar 2\u20138",
      ref: "Genesis 24\u201333",
      title: "Surely the Lord Is in This Place",
      theme: "Jacob wrestled with God and would not let go. God's covenant continues through imperfect people.",
      resources: [{ title: "Continue in Patience", url: "https://www.churchofjesuschrist.org/study/general-conference/2010/04/continue-in-patience", type: "General Conference", who: "President Dieter F. Uchtdorf" }, { title: "Don't Miss This \u2014 Genesis 24\u201333", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }],
      ywPrep: { summary: "Jacob was complicated. He deceived his father to get Esau's blessing, fled in fear, saw angels in a dream, wrestled with God until daybreak, and wept when he reunited with his estranged brother. Jacob's story is about persistence, transformation, and the God who keeps showing up even when we've made a mess.", prompts: ["Jacob saw a ladder to heaven in a dream and said, 'Surely the Lord is in this place; and I knew it not.' When have you recognized God was present only after the moment passed?", "Jacob wrestled with God and refused to let go. What does it look like to wrestle with God in prayer?", "Jacob feared Esau's anger but Esau ran to meet him with tears. What does their reconciliation teach about forgiveness?", "Jacob's name was changed to Israel \u2014 one who wrestles with God. What has your wrestling taught you?"] },
      days: [
        { day: "Monday", summary: "Genesis 24: Abraham sends his servant to find a wife for Isaac from his own people. The servant prays at a well for a specific sign. Rebekah appears and fulfills every detail of the prayer before he finishes. He bows and worships God. God answered his prayer in real time.", scripture: "Genesis 28:11\u201317", keyPrinciple: "Jacob woke up and said, 'Surely the Lord is in this place; and I knew it not.' God was present when Jacob didn't know it.", reflect: "When have you recognized God's presence in a moment only after it had passed?", pray: "Ask God to help you recognize His presence in ordinary moments.", act: "At the end of today, write one place where God showed up.", dailyQuote: { text: "Surely the Lord is in this place; and I knew it not.", source: "Genesis 28:16" }, resources: [{ title: "The Lord Is in Our Midst", url: "https://www.churchofjesuschrist.org/study/general-conference/2020/04/12stevenson", type: "General Conference", who: "Elder Gary E. Stevenson" }, { title: "Don't Miss This \u2014 Genesis 24\u201333", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }, { title: "FSY: Covenant Path", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/02covenant-path", type: "FSY Handbook", who: "For the Strength of Youth", note: "Covenants are the backbone of today's reading. This section explains what it means to be on the covenant path and how every ordinance connects us more deeply to God." }] },
        { day: "Wednesday", summary: "Genesis 25\u201328: Esau sells his birthright for a bowl of red stew. Jacob and Esau are twins \u2014 their conflict begins in the womb. Jacob, helped by Rebekah, deceives Isaac and steals the blessing meant for Esau. Esau vows to kill Jacob. Jacob flees to his uncle Laban.", scripture: "Genesis 32:24\u201330", keyPrinciple: "Jacob wrestled with God all night and refused to let go until he received a blessing.", reflect: "What are you wrestling with in your relationship with God right now? Are you holding on?", pray: "Like Jacob, refuse to let go of God until you receive what you need.", act: "Pray specifically and persistently for one thing. Don't give up.", dailyQuote: { text: "I will not let thee go, except thou bless me.", source: "Genesis 32:26" }, resources: [{ title: "Wrestling with the Lord", url: "https://www.saintsunscripted.com", type: "Podcast", who: "Saints Unscripted" }, { title: "Continue in Patience", url: "https://www.churchofjesuschrist.org/study/general-conference/2010/04/continue-in-patience", type: "General Conference", who: "President Dieter F. Uchtdorf" }, { title: "FSY: Agency and Integrity", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/04agency-and-integrity", type: "FSY Handbook", who: "For the Strength of Youth", note: "Agency is at the heart of today's reading. God gives commandments but never forces obedience \u2014 the choice is always ours. This section explores how to make choices aligned with God's will." }] },
        { day: "Friday", summary: "Genesis 28\u201333: Jacob dreams of a ladder reaching to heaven \u2014 angels ascending and descending. God speaks and renews the Abrahamic Covenant with Jacob. Jacob wakes: 'Surely the Lord is in this place, and I knew it not.' He sets up a stone pillar and vows to follow God.", scripture: "Genesis 33:1\u201310", keyPrinciple: "Esau ran to meet Jacob, embraced him, and wept. Twenty years of estrangement \u2014 healed by one generous act.", reflect: "Is there someone in your life you are estranged from? What would it take to run toward them?", pray: "Ask God for the courage to reach across a relational divide.", act: "Reach out to someone you've been distant from. You go first.", dailyQuote: { text: "And Esau ran to meet him, and embraced him, and fell on his neck, and kissed him: and they wept.", source: "Genesis 33:4" }, resources: [{ title: "The Beauty and Importance of Reconciliation", url: "https://www.churchofjesuschrist.org/study/general-conference/2021/04/45christofferson", type: "General Conference", who: "Elder D. Todd Christofferson" }, { title: "Forgiveness Will Change Bitterness to Love", url: "https://www.churchofjesuschrist.org/study/general-conference/2015/04/forgiveness-will-change-bitterness-to-love", type: "General Conference", who: "Elder Kevin R. Duncan" }, { title: "FSY: Relationships", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/06relationships", type: "FSY Handbook", who: "For the Strength of Youth", note: "Today's reading involves a key relationship between people or between a person and God. This FSY section explores what healthy, God-centered relationships look like." }] },
        { day: "Saturday", scripture: "Genesis 32:28", keyPrinciple: "Jacob's name was changed to Israel \u2014 one who prevails with God. Our struggles shape our identity.", reflect: "How have your hardest struggles shaped who you are becoming?", pray: "Thank God for the identity He is building through your trials.", act: "Write about one way a past struggle made you stronger or more faithful.", dailyQuote: { text: "Thy name shall be called no more Jacob, but Israel: for as a prince hast thou power with God and with men.", source: "Genesis 32:28" } }
      ]
    },
    {
      week: 11,
      dates: "Mar 9\u201315",
      ref: "Genesis 37\u201341",
      title: "The Lord Was with Joseph",
      theme: "Joseph maintained integrity in slavery, in Potiphar's house, in prison. God was with him in every place.",
      resources: [{ title: "Be Not Moved", url: "https://www.churchofjesuschrist.org/study/general-conference/2020/10/14freeman", type: "General Conference", who: "Sister Reyna I. Aburto" }, { title: "Don't Miss This \u2014 Genesis 37\u201341", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }],
      ywPrep: { summary: "Joseph was hated by his brothers for his righteousness and his father's favor. They sold him into slavery. Joseph didn't become bitter \u2014 he became excellent. He resisted Potiphar's wife, went to prison unjustly, and interpreted dreams faithfully. At every point, God was with Joseph. You cannot separate Joseph's character from his suffering \u2014 both made him who he was.", prompts: ["Joseph was hated for his righteousness. When has being faithful made you a target?", "Joseph fled from Potiphar's wife. What situations do you need to physically leave rather than negotiate with?", "Joseph was in prison for years for doing the right thing. How do you keep faith when righteousness doesn't pay off immediately?", "Joseph saw people who were suffering and asked, 'Why look ye so sadly today?' Who in your life needs that question?"] },
      days: [
        { day: "Monday", summary: "Genesis 37: Joseph is Jacob's favorite son \u2014 the coat of many colors. His brothers hate him and his dreams make it worse. He dreams that his brothers' sheaves bow to his. His brothers sell him to Ishmaelite traders for twenty pieces of silver. He arrives in Egypt as a slave.", scripture: "Genesis 37:3\u20134, 19\u201328", keyPrinciple: "Joseph's brothers sold him because of jealousy and pride. Comparison destroys families.", reflect: "When has comparison to a sibling or peer damaged a relationship in your life?", pray: "Ask God to heal any envy or resentment in your family relationships.", act: "Genuinely celebrate one success of a sibling, friend, or peer today.", dailyQuote: { text: "Come now therefore, and let us slay him... And they sold Joseph to the Ishmeelites for twenty pieces of silver.", source: "Genesis 37:20, 28" }, resources: [{ title: "The Influence of Jealousy", url: "https://www.churchofjesuschrist.org/study/ensign/1979/05/the-influence-of-jealousy", type: "Ensign", who: "Elder Marvin J. Ashton" }, { title: "Don't Miss This \u2014 Genesis 37\u201341", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }, { title: "FSY: Relationships", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/06relationships", type: "FSY Handbook", who: "For the Strength of Youth", note: "Today's reading involves a key relationship between people or between a person and God. This FSY section explores what healthy, God-centered relationships look like." }] },
        { day: "Wednesday", summary: "Genesis 38\u201339: Joseph serves in Potiphar's house and prospers. Potiphar's wife lies about him and he is thrown in prison. Even there, 'the Lord was with Joseph.' He interprets dreams for the butler and baker. Two years pass. He waits \u2014 without bitterness.", scripture: "Genesis 39:1\u20139", keyPrinciple: "Joseph fled from temptation. He didn't reason with it or linger near it. He ran.", reflect: "What temptations do you need to flee from rather than resist at close range?", pray: "Ask God for the wisdom to recognize when to run and the courage to actually do it.", act: "Create one physical or digital boundary between you and a recurring temptation.", dailyQuote: { text: "How then can I do this great wickedness, and sin against God?", source: "Genesis 39:9" }, resources: [{ title: "We Will Not Yield", url: "https://www.churchofjesuschrist.org/study/general-conference/2019/10/35christofferson", type: "General Conference", who: "Elder D. Todd Christofferson" }, { title: "Be Strong and of a Good Courage", url: "https://www.churchofjesuschrist.org/study/general-conference/2014/10/be-strong-and-of-a-good-courage", type: "General Conference", who: "Elder Robert D. Hales" }, { title: "FSY: Agency and Integrity", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/04agency-and-integrity", type: "FSY Handbook", who: "For the Strength of Youth", note: "Agency is at the heart of today's reading. God gives commandments but never forces obedience \u2014 the choice is always ours. This section explores how to make choices aligned with God's will." }] },
        { day: "Friday", summary: "Genesis 40\u201341: Pharaoh dreams of seven fat cows devoured by seven thin ones, and seven full ears of corn swallowed by seven blighted ones. The butler finally remembers Joseph. Joseph interprets: seven years of abundance followed by seven years of famine. Pharaoh sets Joseph over all Egypt.", scripture: "Genesis 39:20\u201323", keyPrinciple: "Joseph was in prison \u2014 and the Lord was with him. Unjust circumstances don't mean God has abandoned you.", reflect: "When have you experienced God's presence in a situation that felt completely unjust?", pray: "Ask God to be present with you in your current hard place.", act: "Write one way God has been with you this week even in difficulty.", dailyQuote: { text: "But the Lord was with Joseph, and shewed him mercy, and gave him favour in the sight of the keeper of the prison.", source: "Genesis 39:21" }, resources: [{ title: "The Lord Was with Joseph", url: "https://www.churchofjesuschrist.org/study/ensign/2008/12/the-lord-was-with-joseph", type: "Ensign", who: "Church of Jesus Christ" }, { title: "Seeing Others as They May Become", url: "https://www.churchofjesuschrist.org/study/general-conference/2012/10/seeing-others-as-they-may-become", type: "General Conference", who: "Elder Thomas S. Monson" }, { title: "FSY: Agency and Integrity", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/04agency-and-integrity", type: "FSY Handbook", who: "For the Strength of Youth", note: "Agency is at the heart of today's reading. God gives commandments but never forces obedience \u2014 the choice is always ours. This section explores how to make choices aligned with God's will." }] },
        { day: "Saturday", scripture: "Genesis 40:5\u20138", keyPrinciple: "Joseph saw two prisoners in distress and asked, 'Why look ye so sadly today?' He paid attention to suffering around him.", reflect: "Who in your life is quietly struggling that you might have missed?", pray: "Ask God to open your eyes to the needs of people around you.", act: "Ask someone 'How are you really doing?' and actually listen to the answer.", dailyQuote: { text: "Wherefore look ye so sadly today?", source: "Genesis 40:7" } }
      ]
    },
    {
      week: 12,
      dates: "Mar 16\u201322",
      ref: "Genesis 42\u201350",
      title: "God Meant It unto Good",
      theme: "Joseph's suffering had a purpose. You meant evil against me \u2014 but God meant it for good.",
      resources: [{ title: "Patience in Affliction", url: "https://www.churchofjesuschrist.org/study/general-conference/2016/04/where-justice-love-and-mercy-meet", type: "General Conference", who: "Elder Jeffrey R. Holland" }, { title: "Don't Miss This \u2014 Genesis 42\u201350", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }],
      ywPrep: { summary: "Joseph rose from prison to second-in-command of Egypt in a single day. When his brothers came hungry, he recognized them \u2014 they didn't recognize him. He could have let them suffer. Instead he wept, revealed himself, and said, 'God sent me before you.' His suffering was his preparation. 'You meant evil \u2014 but God meant it for good.'", prompts: ["How does knowing God can use even our worst experiences for good change how you handle hard things now?", "Joseph wept when he saw his brothers \u2014 compassion even for people who hurt him. How do you get to that kind of forgiveness?", "Joseph said, 'It was not you but God who sent me here.' How do you distinguish what people did to you from what God is doing through it?", "Joseph provided abundantly for his family. How does covenant family loyalty show up in your life?"] },
      days: [
        { day: "Monday", summary: "Genesis 42\u201343: Famine spreads. Jacob sends Joseph's brothers to Egypt for grain. They don't recognize Joseph \u2014 he is now second in command of Egypt and speaks through an interpreter. He tests them, accusing them of being spies. He keeps Simeon and sends them home to bring Benjamin.", scripture: "Genesis 41:14\u201316", keyPrinciple: "Joseph didn't take credit for interpreting Pharaoh's dream. He pointed straight to God. Humility in success.", reflect: "When you succeed, who do you thank? How do you keep God at the center of your accomplishments?", pray: "Give God credit for your strengths and successes today.", act: "Say 'God helped me with that' about one thing you accomplished this week.", dailyQuote: { text: "It is not in me: God shall give Pharaoh an answer of peace.", source: "Genesis 41:16" }, resources: [{ title: "The Character of Christ", url: "https://speeches.byu.edu/talks/david-a-bednar/character-christ/", type: "Devotional", who: "Elder David A. Bednar \u2014 BYU" }, { title: "Don't Miss This \u2014 Genesis 42\u201350", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }, { title: "FSY: Agency and Integrity", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/04agency-and-integrity", type: "FSY Handbook", who: "For the Strength of Youth", note: "Agency is at the heart of today's reading. God gives commandments but never forces obedience \u2014 the choice is always ours. This section explores how to make choices aligned with God's will." }] },
        { day: "Wednesday", summary: "Genesis 44: Joseph plants his silver cup in Benjamin's sack. His servants chase them down. The brothers are brought back. Judah offers himself as a slave in Benjamin's place, pleading with Joseph about their father. This is the moment that shows how much the brothers have changed.", scripture: "Genesis 45:1\u20135, 7\u20138", keyPrinciple: "'God sent me before you to preserve life.' Joseph saw God's hand in his suffering.", reflect: "Is there a painful chapter in your story you are beginning to see as God's preparation?", pray: "Ask God to give you perspective to see His hand in your hardest experiences.", act: "Write about one hard experience and what God may have been preparing you for through it.", dailyQuote: { text: "Be not grieved, nor angry with yourselves... for God did send me before you to preserve life.", source: "Genesis 45:5" }, resources: [{ title: "Ye Have Done It Unto Me", url: "https://www.churchofjesuschrist.org/study/general-conference/2016/10/ye-have-done-it-unto-me", type: "General Conference", who: "President Thomas S. Monson" }, { title: "God Will Use You", url: "https://www.saintsunscripted.com", type: "Podcast", who: "Saints Unscripted" }, { title: "FSY: Giving Service", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/11giving-service", type: "FSY Handbook", who: "For the Strength of Youth", note: "Today's reading features someone who gives more than expected \u2014 or fails to. This section explores why serving others is central to discipleship." }] },
        { day: "Friday", summary: "Genesis 45\u201350: Joseph can no longer control himself. He clears the room and weeps loudly. He reveals himself: 'I am Joseph your brother, whom ye sold into Egypt.' The brothers are terrified. Joseph says: 'Be not grieved with yourselves \u2014 God sent me before you to preserve life.' Forgiveness is possible.", scripture: "Genesis 50:19\u201321", keyPrinciple: "'Ye thought evil against me; but God meant it unto good.' This is the gospel in one sentence.", reflect: "What evil, mistake, or injustice in your life is God in the process of turning for good?", pray: "Ask God to give you eyes to see His redemptive work in your hardest experiences.", act: "Write your own version: 'You/I meant _____ for harm. But God meant it for _____.", dailyQuote: { text: "Ye thought evil against me; but God meant it unto good.", source: "Genesis 50:20" }, resources: [{ title: "The Healing Power of Forgiveness", url: "https://www.churchofjesuschrist.org/study/general-conference/2007/04/the-healing-power-of-forgiveness", type: "General Conference", who: "Elder James E. Faust" }, { title: "Don't Miss This \u2014 Joseph Reveals Himself", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }, { title: "FSY: Repentance and Forgiveness", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/05repentance-and-forgiveness", type: "FSY Handbook", who: "For the Strength of Youth", note: "Today's reading shows someone facing consequences of sin \u2014 or being given a second chance. This FSY section teaches that repentance is always available and God's mercy can cover any mistake." }] },
        { day: "Saturday", scripture: "Genesis 45:14\u201315", keyPrinciple: "Joseph wept when he embraced his brothers. Forgiveness isn't silent \u2014 it's often tearful and physical.", reflect: "Is there a reconciliation you've been holding back? What would full forgiveness look like?", pray: "Ask God to do the work of forgiveness in you that you cannot manufacture yourself.", act: "Take one step toward forgiving someone who hurt you.", dailyQuote: { text: "And he fell upon his brother Benjamin's neck, and wept... Moreover he kissed all his brethren, and wept upon them.", source: "Genesis 45:14\u201315" } }
      ]
    },
    {
      week: 13,
      dates: "Mar 23\u201329",
      ref: "Exodus 1\u20136",
      title: "I Have Remembered My Covenant",
      theme: "God heard the cries of Israel in bondage and sent Moses. He hears our cries too.",
      resources: [{ title: "He Will Place You on His Shoulders", url: "https://www.churchofjesuschrist.org/study/general-conference/2020/04/22uchtdorf", type: "General Conference", who: "President Dieter F. Uchtdorf" }, { title: "Don't Miss This \u2014 Exodus 1\u20136", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }],
      ywPrep: { summary: "Israel was enslaved in Egypt and cried out to God. God heard them. He called Moses from a burning bush \u2014 a man who felt he could not speak, a man with a past he was running from. Moses said, 'Here am I.' God sent him back to face Pharaoh. The burning bush burned and was not consumed \u2014 a symbol of people refined by fire but not destroyed.", prompts: ["Moses saw a bush burning but not consumed. What does that image mean to you about trials that don't destroy us?", "God called Moses by name from the burning bush. When have you felt God call your name?", "Moses made excuses: 'I cannot speak.' God answered every excuse. What excuses are you making that God might be answering right now?", "God told Moses, 'I have heard their cry.' What does it mean to you that God hears your cries?"] },
      days: [
        { day: "Monday", summary: "Exodus 1\u20133: A new Pharaoh arises who doesn't know Joseph. He enslaves the Israelites and orders male babies killed. Moses is placed in a basket by his mother, found by Pharaoh's daughter, and raised in the palace. He grows up, kills an Egyptian beating a Hebrew, and flees to Midian. God appears in a burning bush.", scripture: "Exodus 2:23\u201325", keyPrinciple: "God heard Israel's groaning, remembered His covenant, and looked upon them. He sees. He remembers.", reflect: "When have you felt unseen or forgotten? What helped you remember that God sees you?", pray: "Tell God exactly what you're carrying right now. He hears it.", act: "Write out your burden honestly in prayer \u2014 don't edit it.", dailyQuote: { text: "And God heard their groaning, and God remembered his covenant... and God had respect unto them.", source: "Exodus 2:24\u201325" }, resources: [{ title: "He Hath Filled the Hungry with Good Things", url: "https://www.churchofjesuschrist.org/study/general-conference/2014/04/he-hath-filled-the-hungry-with-good-things", type: "General Conference", who: "Elder Joseph B. Wirthlin" }, { title: "Don't Miss This \u2014 Exodus 1\u20136", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }, { title: "FSY: Covenant Path", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/02covenant-path", type: "FSY Handbook", who: "For the Strength of Youth", note: "Covenants are the backbone of today's reading. This section explains what it means to be on the covenant path and how every ordinance connects us more deeply to God." }] },
        { day: "Wednesday", summary: "Exodus 3\u20135: God commissions Moses to go back to Egypt and lead Israel out. Moses lists five objections \u2014 who am I, what will I say, what if they don't believe me, I'm not eloquent, please send someone else. God answers every objection. He gives Moses signs and sends Aaron as a spokesman.", scripture: "Exodus 3:2\u20136, 14", keyPrinciple: "God revealed His name: I AM. He is eternal, present, and existing in all times simultaneously.", reflect: "What does 'I AM' as God's name mean to you in your current moment?", pray: "Pray to the I AM \u2014 the God who is always present, in every moment.", act: "Sit quietly for two minutes and rest in the fact that God simply IS \u2014 with you right now.", dailyQuote: { text: "I AM THAT I AM... Thus shalt thou say unto the children of Israel, I AM hath sent me unto you.", source: "Exodus 3:14" }, resources: [{ title: "Approaching the Throne of God with Confidence", url: "https://www.churchofjesuschrist.org/study/general-conference/2012/04/approaching-the-throne-of-god-with-confidence", type: "General Conference", who: "Elder Jorg Klebingat" }, { title: "Holy Scriptures: The Power of God unto Salvation", url: "https://www.churchofjesuschrist.org/study/general-conference/1993/04/holy-scriptures-the-power-of-god-unto-salvation", type: "General Conference", who: "Elder L. Tom Perry" }, { title: "FSY: Covenant Path", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/02covenant-path", type: "FSY Handbook", who: "For the Strength of Youth", note: "Covenants are the backbone of today's reading. This section explains what it means to be on the covenant path and how every ordinance connects us more deeply to God." }] },
        { day: "Friday", summary: "Exodus 5\u20136: Moses goes to Pharaoh and asks him to let Israel go to worship in the wilderness. Pharaoh responds by increasing their workload \u2014 now they must gather their own straw to make bricks. The Israelites blame Moses. Moses cries to God: 'Why hast thou so evil entreated this people?' God reassures him.", scripture: "Exodus 4:10\u201312", keyPrinciple: "Moses said 'I cannot speak.' God said 'I made your mouth.' Our limitations do not limit God.", reflect: "What limitation do you use as a reason not to do what God is asking?", pray: "Give God your specific limitation and ask Him to be strong in that exact weak place.", act: "Do one thing today despite feeling unqualified.", dailyQuote: { text: "Who hath made man's mouth?... Now therefore go, and I will be with thy mouth.", source: "Exodus 4:11\u201312" }, resources: [{ title: "Entitled to Liberty", url: "https://www.churchofjesuschrist.org/study/general-conference/2013/10/entitled-to-liberty", type: "General Conference", who: "Elder D. Todd Christofferson" }, { title: "Don't Miss This \u2014 Moses Called", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }, { title: "FSY: Agency and Integrity", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/04agency-and-integrity", type: "FSY Handbook", who: "For the Strength of Youth", note: "Agency is at the heart of today's reading. God gives commandments but never forces obedience \u2014 the choice is always ours. This section explores how to make choices aligned with God's will." }] },
        { day: "Saturday", scripture: "Exodus 6:6\u20138", keyPrinciple: "God promised to redeem Israel with an outstretched arm. The covenant was the foundation of the rescue.", reflect: "What covenant promise of God are you holding onto in your current situation?", pray: "Claim one specific covenant promise in your prayer today.", act: "Look up one covenant promise in your scriptures and write it where you'll see it.", dailyQuote: { text: "I am the Lord, and I will bring you out from under the burdens of the Egyptians, and I will rid you out of their bondage.", source: "Exodus 6:6" } }
      ]
    },
    {
      week: 14,
      dates: "Mar 30\u2013Apr 5",
      ref: "Easter",
      title: "He Is Risen",
      theme: "He is risen. Every Passover lamb pointed to Jesus Christ \u2014 the Lamb of God.",
      resources: [{ title: "The Atonement of Jesus Christ", url: "https://www.churchofjesuschrist.org/study/general-conference/2022/04/23nelson", type: "General Conference", who: "President Russell M. Nelson" }, { title: "Don't Miss This \u2014 Easter Week", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }],
      ywPrep: { summary: "Easter falls in this week. Every Passover lamb was a type of Jesus Christ \u2014 perfect, sacrificed, its blood applied to save the firstborn. Jesus is our Passover lamb. He was crucified at Passover. He rose on the third day. The entire law of Moses was pointing to this moment. He is risen.", prompts: ["How does knowing Jesus died at the exact Passover feast \u2014 fulfilling every detail of the type \u2014 affect your faith?", "The disciples didn't recognize Jesus on the road to Emmaus until He broke bread. Where do you most clearly recognize the resurrected Christ?", "Mary thought Jesus was the gardener. Then He said her name. What does it mean that the risen Christ knows your name?", "'He is not here \u2014 He is risen.' What difference does the Resurrection make to your daily life right now?"] },
      days: [
        { day: "Monday", summary: "Exodus 7\u201311: The ten plagues of Egypt. Nile turns to blood. Frogs. Lice. Flies. Livestock disease. Boils. Hail. Locusts. Darkness. Through each plague, Pharaoh hardens his heart. God is demonstrating His power over everything Egypt worships \u2014 the Nile, the sun, the cattle.", scripture: "Exodus 12:3\u20137, 12\u201313", keyPrinciple: "The Passover lamb had to be perfect. Its blood applied to the doorposts protected the firstborn. This is a type of Christ.", reflect: "What does it mean to personally apply the Atonement \u2014 not just know about it?", pray: "Thank Jesus for being the Lamb whose blood covers you.", act: "Read Exodus 12 slowly, looking for every detail that points to Jesus Christ.", dailyQuote: { text: "And when I see the blood, I will pass over you.", source: "Exodus 12:13" }, resources: [{ title: "The Atonement and the Journey of Mortality", url: "https://www.churchofjesuschrist.org/study/general-conference/2012/04/the-atonement-and-the-journey-of-mortality", type: "General Conference", who: "Elder David A. Bednar" }, { title: "Don't Miss This \u2014 The Passover", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }, { title: "FSY: Covenant Path", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/02covenant-path", type: "FSY Handbook", who: "For the Strength of Youth", note: "Covenants are the backbone of today's reading. This section explains what it means to be on the covenant path and how every ordinance connects us more deeply to God." }] },
        { day: "Wednesday", summary: "Exodus 12: The first Passover. God instructs each family to select a lamb, kill it at twilight, paint its blood on the doorposts. When the angel of death passes over Egypt killing the firstborn, it will pass over every house with blood on the door. They eat the meal in haste. 'This night is a night of watching.'", scripture: "1 Corinthians 5:7", keyPrinciple: "Christ our Passover is sacrificed for us. The law of Moses was always pointing to Him.", reflect: "How has your understanding of the Atonement deepened through studying the Old Testament?", pray: "Pray with gratitude for Jesus as your personal Passover lamb.", act: "Prepare your heart for the sacrament this Sunday as a Passover renewal.", dailyQuote: { text: "Christ our passover is sacrificed for us.", source: "1 Corinthians 5:7" }, resources: [{ title: "He Is Not Here, for He Is Risen", url: "https://www.churchofjesuschrist.org/study/general-conference/2019/04/43nelson", type: "General Conference", who: "President Russell M. Nelson" }, { title: "The Resurrection of Jesus Christ", url: "https://www.churchofjesuschrist.org/study/general-conference/2014/04/the-resurrection-of-jesus-christ", type: "General Conference", who: "Elder D. Todd Christofferson" }, { title: "FSY: Covenant Path", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/02covenant-path", type: "FSY Handbook", who: "For the Strength of Youth", note: "Covenants are the backbone of today's reading. This section explains what it means to be on the covenant path and how every ordinance connects us more deeply to God." }] },
