    {
      week: 42,
      dates: "Oct 12\u201318",
      ref: "Isaiah 58\u201366",
      title: "Arise, Shine; for Thy Light Is Come",
      theme: "Arise, shine \u2014 your light is come. True fasting is justice. The Spirit of the Lord is upon me.",
      resources: [{ title: "Arise and Shine Forth", url: "https://www.churchofjesuschrist.org/study/general-conference/2012/04/arise-and-shine-forth", type: "General Conference", who: "Sister Elaine S. Dalton" }, { title: "Don't Miss This \u2014 Isaiah 58\u201366", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }],
      ywPrep: { summary: "Isaiah 58\u201366 \u2014 Isaiah's final vision of restoration, justice, and glory. 'Arise, shine; for thy light is come.' Isaiah 58 defines true fasting as justice: loose the bonds, feed the hungry, cover the naked. Isaiah 61 is the passage Jesus read in Nazareth: 'The Spirit of the Lord is upon me.' Isaiah 65: a new heaven and new earth.", prompts: ["Isaiah 60:1 says 'Arise, shine; for thy light is come.' What does it look like to rise and shine in your specific life?", "Isaiah 58 says true fasting is justice \u2014 feeding the hungry, loosing bonds. What does that change about how you think about fasting?", "Jesus read Isaiah 61:1\u20132 in the synagogue and said it was fulfilled in Him. Which part of that passage do you need Christ to fulfill in you?", "Isaiah 65:17 describes a new heaven and earth. What do you most look forward to in God's restored world?"] },
      days: [
        { day: "Monday", summary: "Isaiah 58: The fast God chooses \u2014 not fasting as performance or religious ritual, but loosing the bands of wickedness, letting the oppressed go free, sharing bread with the hungry, bringing the homeless poor into your house. 'Then shall thy light break forth as the morning, and thine health shall spring forth speedily.' True religion is about people, not performance.", scripture: "Isaiah 58:6\u20137", keyPrinciple: "True fasting is justice \u2014 loosing bonds, freeing captives, feeding the hungry, covering the naked.", reflect: "How has fasting changed you? Has it ever moved you toward action for someone else?", pray: "Fast or abstain from one thing today and direct that energy toward someone who needs it.", act: "Do one act of justice or mercy today that costs you something.", dailyQuote: { text: "Is not this the fast that I have chosen? to loose the bands of wickedness... to deal thy bread to the hungry?", source: "Isaiah 58:6\u20137" }, resources: [{ title: "The Law of the Fast", url: "https://www.churchofjesuschrist.org/study/general-conference/2001/04/the-law-of-the-fast", type: "General Conference", who: "Elder Joseph B. Wirthlin" }, { title: "Don't Miss This \u2014 Isaiah 58", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }, { title: "FSY: Giving Service", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/11giving-service", type: "FSY Handbook", who: "For the Strength of Youth", note: "Today's reading features someone who gives more than expected \u2014 or fails to. This section explores why serving others is central to discipleship." }] },
        { day: "Wednesday", summary: "Isaiah 60\u201361: 'Arise, shine; for thy light is come, and the glory of the Lord is risen upon thee.' Nations and kings shall come to the brightness of thy rising. Then Isaiah 61 \u2014 words Christ reads in the synagogue in Luke 4 to describe His own mission: 'The Spirit of the Lord God is upon me, because the Lord hath anointed me to preach good tidings unto the meek.'", scripture: "Isaiah 60:1\u20133", keyPrinciple: "Arise, shine \u2014 your light is come. Darkness covers the earth, but glory rises upon you. Be the light.", reflect: "What does it mean for you specifically to arise and shine right now?", pray: "Ask God to make you a light in one specific dark place.", act: "Bring light \u2014 literally or figuratively \u2014 to one dark place today.", dailyQuote: { text: "Arise, shine; for thy light is come, and the glory of the Lord is risen upon thee.", source: "Isaiah 60:1" }, resources: [{ title: "Arise and Shine Forth", url: "https://www.churchofjesuschrist.org/study/general-conference/2012/04/arise-and-shine-forth", type: "General Conference", who: "Sister Elaine S. Dalton" }, { title: "Don't Miss This \u2014 Isaiah 60 (Arise Shine)", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }, { title: "FSY: Giving Service", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/11giving-service", type: "FSY Handbook", who: "For the Strength of Youth", note: "Today's reading features someone who gives more than expected \u2014 or fails to. This section explores why serving others is central to discipleship." }] },
        { day: "Friday", summary: "Isaiah 62\u201366: 'For Zion's sake will I not hold my peace.' God will not rest until Jerusalem is a praise in the earth. Then a new heavens and a new earth \u2014 Jerusalem a rejoicing, her people a joy. 'Before they call, I will answer; and while they are yet speaking, I will hear.' The book of Isaiah ends with an extended vision of the final judgment and the gathering of all nations.", scripture: "Isaiah 61:1\u20133; Luke 4:17\u201321", keyPrinciple: "Jesus read Isaiah 61 in Nazareth and declared it fulfilled. The Spirit of the Lord is upon me \u2014 to heal and redeem.", reflect: "Which part of Isaiah 61:1\u20133 do you most need Christ to fulfill in your life right now?", pray: "Ask the Anointed One to come with healing and liberty to your specific need.", act: "Read Luke 4:16\u201321 alongside Isaiah 61:1\u20133. Write what you see.", dailyQuote: { text: "The Spirit of the Lord God is upon me; because the Lord hath anointed me to preach good tidings unto the meek.", source: "Isaiah 61:1" }, resources: [{ title: "The Spirit of the Lord Is upon Me \u2014 Isaiah 61", url: "https://www.saintsunscripted.com", type: "Podcast", who: "Saints Unscripted" }, { title: "Good Tidings to the Meek", url: "https://www.churchofjesuschrist.org/study/general-conference/2011/10/good-tidings-to-the-meek", type: "General Conference", who: "Elder Jeffrey R. Holland" }, { title: "FSY: Covenant Path", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/02covenant-path", type: "FSY Handbook", who: "For the Strength of Youth", note: "Covenants are the backbone of today's reading. This section explains what it means to be on the covenant path and how every ordinance connects us more deeply to God." }] },
        { day: "Saturday", scripture: "Isaiah 65:17\u201318", keyPrinciple: "God will create a new heaven and new earth. No more weeping. Every person safe and fruitful.", reflect: "What in the current world do you most long to see redeemed in God's new creation?", pray: "Pray for the coming of God's full kingdom with genuine anticipation.", act: "Write three things you hope for in God's restored world.", dailyQuote: { text: "Behold, I create new heavens and a new earth: and the former shall not be remembered, nor come into mind.", source: "Isaiah 65:17" } }
      ]
    },
    {
      week: 43,
      dates: "Oct 19\u201325",
      ref: "Jeremiah 1\u20133; 7; 16\u201318; 20",
      title: "Before I Formed Thee I Knew Thee",
      theme: "Before I formed thee in the belly I knew thee. Jeremiah was called before birth and was faithful anyway.",
      resources: [{ title: "Before I Formed Thee in the Belly I Knew Thee", url: "https://www.churchofjesuschrist.org/study/general-conference/2014/10/knowing-that-god-knows-us", type: "General Conference", who: "Elder Dieter F. Uchtdorf" }, { title: "Don't Miss This \u2014 Jeremiah 1\u201320", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }],
      ywPrep: { summary: "Jeremiah was called before birth and was afraid he was too young. God touched his mouth and said He would put His words there. Jeremiah prophesied for 40 years and was mostly ignored, imprisoned, and mocked. He never quit. 'His word was in mine heart as a burning fire shut up in my bones... and I could not stay.'", prompts: ["God told Jeremiah: 'Before I formed thee in the belly I knew thee.' What does it mean that God knew you before your birth?", "Jeremiah said 'I cannot speak; for I am a child.' What did God say in response?", "Jeremiah 20:9 \u2014 the word was like fire shut up in his bones. What truth burns in you that you feel compelled to speak?", "Jeremiah kept prophesying even when no one listened. What would it take for you to keep speaking truth no one wants to hear?"] },
      days: [
        { day: "Monday", summary: "Jeremiah 1\u20133; 17\u201320: Jeremiah's call \u2014 'Before I formed thee in the belly I knew thee; before thou camest forth out of the womb I sanctified thee.' Jeremiah resists: 'I cannot speak, for I am a child.' God touches his mouth and puts His words in it. Jeremiah will be hated, persecuted, and imprisoned for his message. He weeps so much he is called the weeping prophet.", scripture: "Jeremiah 1:4\u20138", keyPrinciple: "Before you were formed, God knew you. Before you were born, He set you apart. Your call predates your birth.", reflect: "What does it mean to you that you were known and set apart before you were born?", pray: "Thank God for knowing you completely \u2014 before, now, and always.", act: "Write what you believe God knew about you before you were born.", dailyQuote: { text: "Before I formed thee in the belly I knew thee; and before thou camest forth out of the womb I sanctified thee.", source: "Jeremiah 1:5" }, resources: [{ title: "God Knows You", url: "https://www.churchofjesuschrist.org/study/general-conference/2014/10/knowing-that-god-knows-us", type: "General Conference", who: "President Dieter F. Uchtdorf" }, { title: "Don't Miss This \u2014 Jeremiah 1 (The Call)", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }, { title: "FSY: Covenant Path", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/02covenant-path", type: "FSY Handbook", who: "For the Strength of Youth", note: "Covenants are the backbone of today's reading. This section explains what it means to be on the covenant path and how every ordinance connects us more deeply to God." }] },
        { day: "Wednesday", summary: "Jeremiah 20; 36\u201338: Jeremiah tries to stop prophesying \u2014 the people mock him constantly. But: 'His word was in mine heart as a burning fire shut up in my bones; and I was weary with forbearing.' He cannot stop. His scroll is read before the king, who cuts it piece by piece and burns it in the fire. Jeremiah rewrites it with additions. He is thrown into a cistern and left to sink in the mud.", scripture: "Jeremiah 1:9; 20:9", keyPrinciple: "God touched Jeremiah's mouth. The word became like fire in his bones \u2014 he could not hold it in.", reflect: "What truth burns in you that you feel compelled to speak even when it's hard?", pray: "Ask God to put His words in your mouth for someone who needs to hear them.", act: "Speak one true and needed thing to someone today.", dailyQuote: { text: "His word was in mine heart as a burning fire shut up in my bones... and I could not stay.", source: "Jeremiah 20:9" }, resources: [{ title: "A Prophet's Courage", url: "https://www.saintsunscripted.com", type: "Podcast", who: "Saints Unscripted" }, { title: "The Fire Shut Up in My Bones", url: "https://www.churchofjesuschrist.org/study/general-conference/2010/04/the-spirit-of-elijah", type: "General Conference", who: "Elder David A. Bednar" }, { title: "FSY: Agency and Integrity", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/04agency-and-integrity", type: "FSY Handbook", who: "For the Strength of Youth", note: "Agency is at the heart of today's reading. God gives commandments but never forces obedience \u2014 the choice is always ours. This section explores how to make choices aligned with God's will." }] },
        { day: "Friday", summary: "Jeremiah 30\u201333: In the middle of Jerusalem's darkest hour \u2014 siege, famine, captivity \u2014 God tells Jeremiah to buy a field. It is an act of prophetic hope: 'Houses and fields and vineyards shall be possessed again in this land.' Then the New Covenant promise: God will write His law on their hearts, not on stone tablets. All will know Him \u2014 from the least to the greatest.", scripture: "Jeremiah 17:7\u20138", keyPrinciple: "Blessed is the man who trusts in the Lord \u2014 like a tree planted by water, unshaken in drought.", reflect: "What are the rivers of water in your life that keep you rooted when drought hits?", pray: "Ask God to deepen your roots before the next dry season.", act: "Identify and strengthen one root \u2014 a habit, relationship, or practice that keeps you anchored.", dailyQuote: { text: "Blessed is the man that trusteth in the Lord... he shall be as a tree planted by the waters.", source: "Jeremiah 17:7" }, resources: [{ title: "Knowing in Whom We Have Trusted", url: "https://www.churchofjesuschrist.org/study/general-conference/2002/04/in-whom-do-we-trust", type: "General Conference", who: "Elder Neil L. Andersen" }, { title: "Don't Miss This \u2014 Jeremiah 17\u201320", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }, { title: "FSY: Living the Gospel", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/12living-the-gospel", type: "FSY Handbook", who: "For the Strength of Youth", note: "Today's reading illustrates what it looks like to live the gospel fully \u2014 or to drift from it. This section describes what it means to be an active disciple in everyday life." }] },
        { day: "Saturday", scripture: "Jeremiah 9:23\u201324", keyPrinciple: "Don't boast in wisdom, might, or riches. Boast in knowing and understanding God \u2014 that He is kind, just, and righteous.", reflect: "What are you most tempted to base your identity or worth on?", pray: "Reorient your sense of worth to knowing God today.", act: "Say out loud: my worth is not in what I accomplish but in who I know.", dailyQuote: { text: "Let him that glorieth glory in this, that he understandeth and knoweth me, that I am the Lord which exercise lovingkindness, judgment, and righteousness.", source: "Jeremiah 9:24" } }
      ]
    },
    {
      week: 44,
      dates: "Oct 26\u2013Nov 1",
      ref: "Jeremiah 31\u201333; 36\u201338; Lamentations 1; 3",
      title: "Great Is Thy Faithfulness",
      theme: "Jerusalem fell. Jeremiah wept. But in the ashes: His mercies are new every morning. Great is thy faithfulness.",
      resources: [{ title: "Great Is Thy Faithfulness", url: "https://www.churchofjesuschrist.org/study/general-conference/2019/04/15nelson", type: "General Conference", who: "President Russell M. Nelson" }, { title: "Don't Miss This \u2014 Jeremiah 31\u201338; Lamentations", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }],
      ywPrep: { summary: "Lamentations is Jeremiah weeping over the destroyed Jerusalem. In the middle of chapter 3, after graphic descriptions of anguish, he writes: 'It is of the Lord's mercies that we are not consumed, because his compassions fail not. They are new every morning: great is thy faithfulness.' Hope appears in the center of grief. Jeremiah 31 promises a new covenant written on the heart. Jeremiah 32 \u2014 he buys a field while the city falls. Defiant hope.", prompts: ["Lamentations is raw grief \u2014 Jeremiah doesn't minimize. What does it teach us to bring grief honestly to God?", "In the middle of his worst grief, Jeremiah remembered God's mercies. What do you recall that gives you hope?", "'His mercies are new every morning.' What does a new mercy look like in your day today?", "Jeremiah bought a field while Babylon besieged Jerusalem. What defiant act of hope is God asking you to make?"] },
      days: [
        { day: "Monday", summary: "Lamentations 1\u20135: Jerusalem has fallen. The city sits desolate. The roads to Zion mourn because no one comes to the feasts. Her children have gone into captivity. Jeremiah weeps over the ruined city. The enemies mock: 'Is this the city that men called the perfection of beauty?' Yet in the middle of the book: 'It is of the Lord's mercies that we are not consumed. His compassions fail not. They are new every morning.'", scripture: "Lamentations 3:19\u201323", keyPrinciple: "This I recall to my mind, therefore have I hope. Memory of God's past mercies is the foundation of present hope.", reflect: "What do you recall to your mind when hope is running low?", pray: "Name five specific mercies of God in your prayer today.", act: "Make a list of God's mercies this week. Carry it with you.", dailyQuote: { text: "It is of the Lord's mercies that we are not consumed, because his compassions fail not. They are new every morning: great is thy faithfulness.", source: "Lamentations 3:22\u201323" }, resources: [{ title: "His Mercies Are New Every Morning", url: "https://www.saintsunscripted.com", type: "Podcast", who: "Saints Unscripted" }, { title: "Don't Miss This \u2014 Lamentations", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }, { title: "FSY: Living the Gospel", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/12living-the-gospel", type: "FSY Handbook", who: "For the Strength of Youth", note: "Today's reading illustrates what it looks like to live the gospel fully \u2014 or to drift from it. This section describes what it means to be an active disciple in everyday life." }] },
        { day: "Wednesday", summary: "Jeremiah 29; 31\u201333: The letter to the exiles \u2014 people carried off to Babylon. God says: build houses, plant gardens, marry, have children. 'Seek the peace of the city whither I have caused you to be carried away captive.' Then: 'I know the thoughts I think toward you \u2014 thoughts of peace and not of evil, to give you an expected end.' Then: 'Ye shall seek me and find me, when ye shall search for me with all your heart.'", scripture: "Lamentations 3:24\u201326", keyPrinciple: "The Lord is my portion, saith my soul; therefore will I hope in him. Hope is a choice made in grief.", reflect: "When have you had to choose hope against everything you felt?", pray: "Say 'The Lord is my portion' as your declaration \u2014 even if you don't fully feel it.", act: "Write 'Great is thy faithfulness' somewhere you will see it.", dailyQuote: { text: "The Lord is my portion, saith my soul; therefore will I hope in him.", source: "Lamentations 3:24" }, resources: [{ title: "Hope, an Anchor for the Soul", url: "https://www.churchofjesuschrist.org/study/general-conference/2008/10/hope-an-anchor-for-the-soul", type: "General Conference", who: "President James E. Faust" }, { title: "Jeremiah 29:11 \u2014 Plans for Your Future", url: "https://www.saintsunscripted.com", type: "Podcast", who: "Saints Unscripted" }, { title: "FSY: Living the Gospel", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/12living-the-gospel", type: "FSY Handbook", who: "For the Strength of Youth", note: "Today's reading illustrates what it looks like to live the gospel fully \u2014 or to drift from it. This section describes what it means to be an active disciple in everyday life." }] },
        { day: "Friday", summary: "Jeremiah 31: The New Covenant. 'Behold, the days come, saith the Lord, that I will make a new covenant with the house of Israel.' Not like the old covenant \u2014 which they broke. 'I will put my law in their inward parts, and write it in their hearts; and will be their God, and they shall be my people.' This is what the Atonement makes possible \u2014 interior transformation.", scripture: "Jeremiah 29:11\u201313", keyPrinciple: "I know the plans I have for you \u2014 plans for welfare and not for evil, to give you a future and a hope.", reflect: "Do you actually believe God's plans for you are good? What makes it hard to believe?", pray: "Claim Jeremiah 29:11 as your personal promise today.", act: "Write Jeremiah 29:11 by hand and post it somewhere visible.", dailyQuote: { text: "For I know the thoughts that I think toward you, saith the Lord, thoughts of peace, and not of evil, to give you an expected end.", source: "Jeremiah 29:11" }, resources: [{ title: "The New and Everlasting Covenant", url: "https://www.churchofjesuschrist.org/study/general-conference/2012/10/the-new-and-everlasting-covenant", type: "General Conference", who: "Elder D. Todd Christofferson" }, { title: "Don't Miss This \u2014 Jeremiah 31 (New Covenant)", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }, { title: "FSY: Covenant Path", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/02covenant-path", type: "FSY Handbook", who: "For the Strength of Youth", note: "Covenants are the backbone of today's reading. This section explains what it means to be on the covenant path and how every ordinance connects us more deeply to God." }] },
        { day: "Saturday", scripture: "Jeremiah 31:31\u201333", keyPrinciple: "The new covenant is written on hearts, not tablets. Internal transformation, not external compliance.", reflect: "Which commandments feel truly written on your heart \u2014 not just followed out of obligation?", pray: "Ask God to move one commandment from your to-do list to your heart.", act: "Pick one law and ask God to help you love it, not just keep it.", dailyQuote: { text: "I will put my law in their inward parts, and write it in their hearts; and will be their God, and they shall be my people.", source: "Jeremiah 31:33" } }
      ]
    },
    {
      week: 45,
      dates: "Nov 2\u20138",
      ref: "Ezekiel 1\u20133; 33\u201334; 36\u201337; 47",
      title: "A New Heart Also Will I Give You",
      theme: "A new heart will I give you. Can these bones live? God brings dead things back to life.",
      resources: [{ title: "A New Heart and a New Spirit", url: "https://www.churchofjesuschrist.org/study/general-conference/2012/10/a-new-heart-and-a-new-spirit", type: "General Conference", who: "Elder D. Todd Christofferson" }, { title: "Don't Miss This \u2014 Ezekiel 1\u20133; 33\u201334; 36\u201337; 47", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }],
      ywPrep: { summary: "Ezekiel was a priest in exile. He saw a vision of God's glory in Babylon \u2014 God is not limited by geography. He saw a valley of dry bones and God asked: 'Can these bones live?' Ezekiel said: 'Thou knowest.' He prophesied, the bones came together, flesh came upon them, breath entered them. God brings what is dead back to life. He also promised a new heart of flesh instead of stone.", prompts: ["Ezekiel saw God's glory in Babylon \u2014 in exile. What does it mean that God's presence is not limited to sacred places?", "God asked Ezekiel: 'Can these bones live?' Ezekiel said 'Thou knowest.' What situation in your life feels completely dead?", "God raised dead bones by the power of spoken prophecy. What does it mean to speak life?", "Ezekiel 36:26: a new heart of flesh instead of stone. What part of your heart still feels like stone?"] },
      days: [
        { day: "Monday", summary: "Ezekiel 1\u20133: Ezekiel's vision by the river Chebar \u2014 four living creatures with wings, wheels within wheels with eyes all around, a great fire, the glory of God on a throne of sapphire. Ezekiel falls on his face. God commissions him as a watchman \u2014 if the wicked do not repent because the watchman failed to warn them, their blood is on the watchman's hands.", scripture: "Ezekiel 1:1; 3:14\u201315", keyPrinciple: "God met Ezekiel by a river in Babylon \u2014 in exile, far from home. His presence is portable.", reflect: "Have you ever experienced God in a place or time you didn't expect?", pray: "Ask God to meet you right where you are today \u2014 not where you think He should be.", act: "Open your heart to God's presence in an ordinary moment today.", dailyQuote: { text: "The heavens were opened, and I saw visions of God... by the river of Chebar.", source: "Ezekiel 1:1" }, resources: [{ title: "God's Presence in the Exile", url: "https://www.saintsunscripted.com", type: "Podcast", who: "Saints Unscripted" }, { title: "Don't Miss This \u2014 Ezekiel 1\u20133", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }, { title: "FSY: Temple and Family History", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/03temple-and-family-history", type: "FSY Handbook", who: "For the Strength of Youth", note: "Today's reading connects to God dwelling with His people. This section explains why temples matter and how to prepare spiritually to enter." }] },
        { day: "Wednesday", summary: "Ezekiel 36\u201337: God promises to give Israel a new heart \u2014 'I will take away the stony heart out of your flesh, and I will give you an heart of flesh.' Then the valley of dry bones \u2014 Ezekiel is placed in a valley full of dry bones and asked: 'Can these bones live?' He prophesies. Bones come together, sinews grow, flesh covers them, breath enters. A vast army stands. 'These bones are the whole house of Israel.'", scripture: "Ezekiel 36:26\u201328", keyPrinciple: "A new heart also will I give you \u2014 a heart of flesh instead of stone. Transformation, not just forgiveness.", reflect: "What part of your heart still feels like stone \u2014 hardened, closed, or numb?", pray: "Ask God specifically for a new heart in the place where yours is hard.", act: "Name the area of hardness. Surrender it to God's transforming work.", dailyQuote: { text: "A new heart also will I give you, and a new spirit will I put within you: and I will take away the stony heart out of your flesh.", source: "Ezekiel 36:26" }, resources: [{ title: "A New Heart, a New Life", url: "https://www.churchofjesuschrist.org/study/general-conference/2012/10/a-new-heart-and-a-new-spirit", type: "General Conference", who: "Elder D. Todd Christofferson" }, { title: "Don't Miss This \u2014 Ezekiel 36\u201337", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }, { title: "FSY: Repentance and Forgiveness", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/05repentance-and-forgiveness", type: "FSY Handbook", who: "For the Strength of Youth", note: "Today's reading shows someone facing consequences of sin \u2014 or being given a second chance. This FSY section teaches that repentance is always available and God's mercy can cover any mistake." }] },
        { day: "Friday", summary: "Ezekiel 47: In a vision, Ezekiel sees water flowing from the threshold of the temple \u2014 a trickle that becomes ankle-deep, then knee-deep, then waist-deep, then a river too deep to cross. Wherever the river flows, there is life. Fish fill the dead sea, trees grow on both banks, leaves for healing. This is what God's Spirit does \u2014 it starts as a trickle and becomes overwhelming life.", scripture: "Ezekiel 37:1\u20134, 14", keyPrinciple: "Can these bones live? Ezekiel said: thou knowest. Then he prophesied and the bones came together.", reflect: "What situation in your life feels completely dead? Do you believe God can bring it back to life?", pray: "Bring your valley of dry bones to God. Say: thou knowest if this can live.", act: "Write your valley of dry bones. Then write what resurrection would look like.", dailyQuote: { text: "And he said unto me, Son of man, can these bones live? And I answered, O Lord God, thou knowest.", source: "Ezekiel 37:3" }, resources: [{ title: "The Vision of Dry Bones", url: "https://www.saintsunscripted.com", type: "Podcast", who: "Saints Unscripted" }, { title: "Rivers of Living Water \u2014 Ezekiel 47", url: "https://www.churchofjesuschrist.org/study/ensign/2006/04/rivers-of-living-water", type: "Ensign", who: "Elder David B. Haight" }, { title: "FSY: Temple and Family History", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/03temple-and-family-history", type: "FSY Handbook", who: "For the Strength of Youth", note: "Today's reading connects to God dwelling with His people. This section explains why temples matter and how to prepare spiritually to enter." }] },
        { day: "Saturday", scripture: "Ezekiel 47:1\u20139", keyPrinciple: "Water flowed from the temple \u2014 ankle deep, knee deep, waist deep, then a river too deep to cross. Covenant life grows.", reflect: "What depth is your discipleship right now \u2014 ankle deep, knee deep, swimming?", pray: "Ask God to deepen your covenant life this year.", act: "Identify one way you can go deeper in your discipleship this week.", dailyQuote: { text: "Every thing shall live whither the river cometh.", source: "Ezekiel 47:9" } }
      ]
    },
    {
      week: 46,
      dates: "Nov 9\u201315",
      ref: "Daniel 1\u20137",
      title: "God Delivereth and Rescueth",
      theme: "Daniel would not compromise. God delivered from the lions' den. But if not, we will not bow.",
      resources: [{ title: "But If Not\u2026", url: "https://www.churchofjesuschrist.org/study/general-conference/2002/10/but-if-not", type: "General Conference", who: "Elder Dennis E. Simmons" }, { title: "Don't Miss This \u2014 Daniel 1\u20137", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }],
      ywPrep: { summary: "Daniel and his friends were taken to Babylon as teenagers. They resolved not to defile themselves \u2014 and excelled above everyone. Shadrach, Meshach, and Abednego refused to bow to the king's statue: 'Our God is able to deliver us \u2014 but if not, we will not bow.' A fourth person was seen in the fire. Daniel prayed three times a day even when it was illegal, and survived the lions.", prompts: ["Daniel resolved not to defile himself. What small acts of integrity shape your character in ways that matter later?", "'Our God is able to deliver us \u2014 but if not, we will not bow.' What does 'but if not' faith look like for you?", "Who was the fourth person in the fire? What does His presence mean?", "Daniel prayed at his window three times a day knowing he would be arrested. When has your faith been countercultural?"] },
      days: [
        { day: "Monday", summary: "Daniel 1\u20133: Daniel, Hananiah, Mishael, and Azariah are taken to Babylon and given Babylonian names. They refuse to eat the king's food and are healthier than those who do. Daniel interprets Nebuchadnezzar's dream \u2014 a great image of gold, silver, bronze, iron, and clay \u2014 destroyed by a stone cut without hands. The stone fills the whole earth. Then Shadrach, Meshach, and Abed-nego refuse to bow to the golden image and are thrown into the fiery furnace. There are four men walking in the fire.", scripture: "Daniel 1:8, 15, 20", keyPrinciple: "Daniel resolved in his heart not to defile himself. Resolved \u2014 before the test. Small integrity compounds.", reflect: "What is one thing you have resolved in your heart before the test comes?", pray: "Ask God to help you make decisions now that will hold when you are tested later.", act: "Make one pre-commitment about integrity before the next temptation arrives.", dailyQuote: { text: "But Daniel purposed in his heart that he would not defile himself.", source: "Daniel 1:8" }, resources: [{ title: "We Will Not Bow", url: "https://www.saintsunscripted.com", type: "Podcast", who: "Saints Unscripted" }, { title: "Don't Miss This \u2014 Daniel 1\u20133", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }, { title: "FSY: Agency and Integrity", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/04agency-and-integrity", type: "FSY Handbook", who: "For the Strength of Youth", note: "Agency is at the heart of today's reading. God gives commandments but never forces obedience \u2014 the choice is always ours. This section explores how to make choices aligned with God's will." }] },
        { day: "Wednesday", summary: "Daniel 4\u20136: Nebuchadnezzar's pride \u2014 he boasts and is struck with madness, living with animals for seven years, until he acknowledges God. Daniel reads the handwriting on the wall: Mene Mene Tekel Upharsin \u2014 Belshazzar's kingdom is finished. That night he is killed. Then Darius's decree against prayer \u2014 Daniel prays anyway. He is thrown to the lions. In the morning, the king runs to the den: 'O Daniel, servant of the living God, is thy God able to deliver thee?'", scripture: "Daniel 3:16\u201318", keyPrinciple: "Our God can deliver us. But if not, we will not bow. Faith that holds even when deliverance doesn't come.", reflect: "Have you ever held your faith when God didn't intervene the way you wanted?", pray: "Pray a 'but if not' prayer \u2014 trusting God even if the outcome is not what you want.", act: "Name one thing you trust God with even if He does not change it.", dailyQuote: { text: "Our God whom we serve is able to deliver us... But if not, be it known unto thee, O king, that we will not serve thy gods.", source: "Daniel 3:17\u201318" }, resources: [{ title: "But If Not\u2026", url: "https://www.churchofjesuschrist.org/study/general-conference/2002/10/but-if-not", type: "General Conference", who: "Elder Dennis E. Simmons" }, { title: "Don't Miss This \u2014 Daniel 4\u20136 (Lions' Den)", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }, { title: "FSY: Agency and Integrity", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/04agency-and-integrity", type: "FSY Handbook", who: "For the Strength of Youth", note: "Agency is at the heart of today's reading. God gives commandments but never forces obedience \u2014 the choice is always ours. This section explores how to make choices aligned with God's will." }] },
        { day: "Friday", summary: "Daniel 7\u201312: Daniel's apocalyptic visions \u2014 four great beasts representing world empires, the Ancient of Days on His throne with ten thousand times ten thousand attending Him. One like the Son of Man comes with the clouds and receives dominion. Daniel sees the end of the world and the resurrection: 'Many of them that sleep in the dust of the earth shall awake \u2014 some to everlasting life.'", scripture: "Daniel 6:10\u201311, 22\u201323", keyPrinciple: "Daniel opened his window and prayed as usual \u2014 knowing it was illegal. Faithfulness does not hide.", reflect: "Is there any part of your faith you have been hiding or quieting because of social pressure?", pray: "Open your window today. Pray without hiding.", act: "Do one visible act of faith today.", dailyQuote: { text: "Daniel went into his house... he kneeled upon his knees three times a day, and prayed, and gave thanks before his God.", source: "Daniel 6:10" }, resources: [{ title: "Valiant in the Testimony of Jesus Christ", url: "https://www.churchofjesuschrist.org/study/general-conference/2016/10/valiant-in-the-testimony-of-jesus", type: "General Conference", who: "Elder Quentin L. Cook" }, { title: "Daniel's Prophecies of the Last Days", url: "https://www.saintsunscripted.com", type: "Podcast", who: "Saints Unscripted" }, { title: "FSY: Covenant Path", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/02covenant-path", type: "FSY Handbook", who: "For the Strength of Youth", note: "Covenants are the backbone of today's reading. This section explains what it means to be on the covenant path and how every ordinance connects us more deeply to God." }] },
        { day: "Saturday", scripture: "Daniel 2:21\u201322", keyPrinciple: "God changes times and seasons. He removes kings and sets up kings. He is sovereign over history.", reflect: "How does believing God is sovereign over history change how you feel about chaos in the current world?", pray: "Entrust current world events and your personal future to a sovereign God.", act: "List three things that feel out of control. Give each one specifically to God.", dailyQuote: { text: "He changeth the times and the seasons: he removeth kings, and setteth up kings: he giveth wisdom unto the wise.", source: "Daniel 2:21" } }
      ]
    },
    {
      week: 47,
      dates: "Nov 16\u201322",
      ref: "Hosea 1\u20136; 10\u201314; Joel",
      title: "I Will Love Them Freely",
      theme: "God is a loving husband to His covenant people. I will love them freely. Pour out my Spirit on all flesh.",
      resources: [{ title: "The Merciful Obtain Mercy", url: "https://www.churchofjesuschrist.org/study/general-conference/2012/04/the-merciful-obtain-mercy", type: "General Conference", who: "Elder Dieter F. Uchtdorf" }, { title: "Don't Miss This \u2014 Hosea; Joel", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }],
      ywPrep: { summary: "Hosea was commanded to marry a woman who would be unfaithful \u2014 and to keep loving her and taking her back. This is God's own story with Israel. 'I will love them freely.' Hosea shows that God is not a distant judge \u2014 He is a heartbroken husband who keeps pursuing. Joel promises that afterward God will pour out His Spirit on all flesh \u2014 sons and daughters shall prophesy.", prompts: ["Hosea's marriage was a living parable of God's love for unfaithful Israel. How does that story change how you understand God's love for you?", "Hosea 6:6: God desires mercy and knowledge of God more than burnt offerings. What does that mean for how you worship?", "Joel 2:28\u201329 promises the Spirit on sons and daughters. How do you see that fulfilled in your life?", "'I will love them freely' \u2014 God says. What does free love, love with no strings, look like from God? From you?"] },
      days: [
        { day: "Monday", summary: "Hosea 1\u201314: God tells Hosea to marry a woman who will be unfaithful \u2014 because Israel has been unfaithful to God. Hosea loves her anyway and buys her back. This marriage is a living parable of God's relationship with Israel. 'I will heal their backsliding; I will love them freely.' Hosea ends with a call to return: 'Return, O Israel, unto the Lord thy God, for thou hast fallen by thine iniquity.'", scripture: "Hosea 2:19\u201320", keyPrinciple: "God will betroth Israel to Himself \u2014 in righteousness, lovingkindness, mercies, faithfulness. Covenant restored.", reflect: "What would it mean to be betrothed to God \u2014 committed fully, in righteousness and lovingkindness?", pray: "Renew your covenant with God today. Say yes again.", act: "Write the covenant you have with God in your own words.", dailyQuote: { text: "I will betroth thee unto me for ever; yea, I will betroth thee unto me in righteousness, and in judgment, and in lovingkindness, and in mercies.", source: "Hosea 2:19" }, resources: [{ title: "The Love of God", url: "https://www.churchofjesuschrist.org/study/general-conference/2014/04/the-love-of-god", type: "General Conference", who: "Elder Dallin H. Oaks" }, { title: "Don't Miss This \u2014 Hosea", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }, { title: "FSY: Covenant Path", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/02covenant-path", type: "FSY Handbook", who: "For the Strength of Youth", note: "Covenants are the backbone of today's reading. This section explains what it means to be on the covenant path and how every ordinance connects us more deeply to God." }] },
        { day: "Wednesday", summary: "Joel 1\u20133: A plague of locusts strips the land bare. Joel calls it a sign \u2014 the Day of the Lord is near. Call a fast. Gather the elders. Cry unto the Lord. Then the promise: 'I will restore to you the years that the locust hath eaten.' And the Pentecost prophecy: 'I will pour out my Spirit upon all flesh. Your sons and daughters shall prophesy.'", scripture: "Hosea 14:4; 6:6", keyPrinciple: "I will love them freely \u2014 my anger is turned away. God desires mercy more than sacrifice.", reflect: "Where are you trying to perform for God's love instead of simply receiving it?", pray: "Stop performing. Simply receive God's love today.", act: "Do one thing out of love for God today rather than out of duty.", dailyQuote: { text: "I will heal their backsliding, I will love them freely: for mine anger is turned away from him.", source: "Hosea 14:4" }, resources: [{ title: "God's Love Is All-Inclusive", url: "https://www.churchofjesuschrist.org/study/general-conference/2014/04/i-have-a-question", type: "General Conference", who: "Elder Dieter F. Uchtdorf" }, { title: "Don't Miss This \u2014 Joel 2 (Pour Out My Spirit)", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }, { title: "FSY: Repentance and Forgiveness", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/05repentance-and-forgiveness", type: "FSY Handbook", who: "For the Strength of Youth", note: "Today's reading shows someone facing consequences of sin \u2014 or being given a second chance. This FSY section teaches that repentance is always available and God's mercy can cover any mistake." }] },
        { day: "Friday", summary: "Hosea 11; 14: God speaks as a grieving father: 'When Israel was a child, then I loved him, and called my son out of Egypt. I taught Ephraim to walk, taking them by their arms. I drew them with cords of a man, with bands of love.' How can I give you up? God's love is stronger than His judgment. Hosea 14: 'Take with you words, and turn to the Lord.'", scripture: "Joel 2:12\u201313", keyPrinciple: "Return to me with all your heart. Rend your hearts, not your garments. God wants internal turning.", reflect: "What does rending your heart \u2014 genuine contrition \u2014 look like versus just going through motions?", pray: "Pray a whole-heart return to God today \u2014 not ritual, but real.", act: "Name one thing you have been half-hearted about with God. Give it full-heartedness.", dailyQuote: { text: "Turn ye even to me with all your heart... rend your heart, and not your garments, and turn unto the Lord your God.", source: "Joel 2:12\u201313" }, resources: [{ title: "Return unto Me \u2014 the Message of Hosea", url: "https://www.saintsunscripted.com", type: "Podcast", who: "Saints Unscripted" }, { title: "Rend Your Hearts \u2014 Joel's Call", url: "https://www.churchofjesuschrist.org/study/general-conference/2007/10/repentance-and-the-atonement", type: "General Conference", who: "Elder Tad R. Callister" }, { title: "FSY: Giving Service", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/11giving-service", type: "FSY Handbook", who: "For the Strength of Youth", note: "Today's reading features someone who gives more than expected \u2014 or fails to. This section explores why serving others is central to discipleship." }] },
        { day: "Saturday", scripture: "Joel 2:28\u201329", keyPrinciple: "I will pour out my Spirit on all flesh \u2014 sons, daughters, old, young. No one excluded.", reflect: "How do you see the Spirit poured out in your own life and calling?", pray: "Ask God to pour His Spirit on your specific life \u2014 on your gifts and calling.", act: "Name one spiritual gift you believe God has poured out on you. Use it this week.", dailyQuote: { text: "Your sons and your daughters shall prophesy, your old men shall dream dreams, your young men shall see visions.", source: "Joel 2:28" } }
      ]
    },
    {
      week: 48,
      dates: "Nov 23\u201329",
      ref: "Amos; Obadiah; Jonah",
      title: "Seek the Lord, and Ye Shall Live",
      theme: "Jonah ran from God and learned about mercy. God's compassion is bigger than our comfort with who receives it.",
      resources: [{ title: "Repentance and Conversion", url: "https://www.churchofjesuschrist.org/study/general-conference/2007/04/repentance-and-conversion", type: "General Conference", who: "Elder Russell M. Nelson" }, { title: "Don't Miss This \u2014 Amos; Obadiah; Jonah", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }],
      ywPrep: { summary: "Amos was a shepherd and farmer \u2014 not a professional prophet \u2014 who was told to go preach to Israel. He preached economic justice. Jonah ran from God, ended up in a whale, repented, and then was angry when God showed mercy to Nineveh. God asked: should I not spare this city? The lesson: God's mercy is bigger than our comfort with who receives it.", prompts: ["Amos was a farmer, not a trained prophet. What does God's call to ordinary people teach about who He uses?", "Amos 5:24: let justice roll down as waters. What does justice look like in your daily life?", "Jonah ran from God. When have you run from something God clearly called you to?", "God was angry that Jonah was angry about Nineveh's mercy. Is there anyone whose forgiveness or blessing you struggle with?"] },
      days: [
        { day: "Monday", summary: "Amos 1\u20139: Amos \u2014 a shepherd and fig farmer \u2014 is sent to prophesy to the wealthy northern kingdom. His message: you have sold the righteous for silver and the poor for a pair of sandals. You trample the heads of the poor into the dust of the earth. God declares: 'Let judgment run down as waters, and righteousness as a mighty stream.' Then: 'Seek good, and not evil, that ye may live.'", scripture: "Amos 5:24", keyPrinciple: "Let justice roll down as waters, and righteousness as a mighty stream. Faith without justice is hollow.", reflect: "What injustice are you in a position to address in your sphere of influence?", pray: "Ask God to show you one specific way you can work for justice.", act: "Do one tangible act of justice or mercy today.", dailyQuote: { text: "Let judgment run down as waters, and righteousness as a mighty stream.", source: "Amos 5:24" }, resources: [{ title: "Justice Is a Requirement of Heaven", url: "https://www.churchofjesuschrist.org/study/general-conference/2012/04/where-justice-love-and-mercy-meet", type: "General Conference", who: "Elder Jeffrey R. Holland" }, { title: "Don't Miss This \u2014 Amos; Obadiah", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }, { title: "FSY: Giving Service", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/11giving-service", type: "FSY Handbook", who: "For the Strength of Youth", note: "Today's reading features someone who gives more than expected \u2014 or fails to. This section explores why serving others is central to discipleship." }] },
        { day: "Wednesday", summary: "Jonah 1\u20134: God tells Jonah to go to Nineveh \u2014 the enemy capital. Jonah runs the opposite direction. A storm, a great fish, three days in the belly, a second chance. Jonah goes to Nineveh and preaches the shortest sermon in scripture: 'Yet forty days and Nineveh shall be overthrown.' The whole city repents \u2014 king, people, and cattle. God relents. Jonah is furious that God showed mercy to his enemies.", scripture: "Jonah 1:1\u20133; 2:1\u20132, 9", keyPrinciple: "Jonah ran from God. From inside the whale he prayed and was delivered. Running delays \u2014 it doesn't cancel the call.", reflect: "What are you running from that God has already called you to?", pray: "Stop running. Pray Jonah's prayer from the deep: salvation is of the Lord.", act: "Turn toward the thing you have been avoiding. Take one step.", dailyQuote: { text: "Salvation is of the Lord.", source: "Jonah 2:9" }, resources: [{ title: "Running from God \u2014 and Coming Home", url: "https://www.saintsunscripted.com", type: "Podcast", who: "Saints Unscripted" }, { title: "Don't Miss This \u2014 Jonah", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }, { title: "FSY: Repentance and Forgiveness", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/05repentance-and-forgiveness", type: "FSY Handbook", who: "For the Strength of Youth", note: "Today's reading shows someone facing consequences of sin \u2014 or being given a second chance. This FSY section teaches that repentance is always available and God's mercy can cover any mistake." }] },
        { day: "Friday", summary: "Jonah 3\u20134; Obadiah: Jonah sits outside Nineveh hoping for its destruction. God causes a plant to shade him \u2014 Jonah loves it. God sends a worm to kill the plant. Jonah says he is angry enough to die over a plant he didn't make. God: 'Should I not spare Nineveh, that great city, wherein are more than six score thousand persons that cannot discern between their right hand and their left hand?' God's mercy is bigger than ours.", scripture: "Jonah 4:2, 10\u201311", keyPrinciple: "God had compassion on Nineveh. Jonah was angry. God said: should I not have pity on this great city?", reflect: "Is there a person or group whose forgiveness or blessing makes you uncomfortable? Why?", pray: "Ask God to expand your capacity for His mercy toward people you find hard to love.", act: "Pray for someone you find difficult to love. Do it specifically and sincerely.", dailyQuote: { text: "Should not I spare Nineveh, that great city, wherein are more than sixscore thousand persons?", source: "Jonah 4:11" }, resources: [{ title: "The Covenant Path and the City of Nineveh", url: "https://www.saintsunscripted.com", type: "Podcast", who: "Saints Unscripted" }, { title: "Finding Mercy in the Heart of God", url: "https://www.churchofjesuschrist.org/study/general-conference/2012/04/the-merciful-obtain-mercy", type: "General Conference", who: "President Dieter F. Uchtdorf" }, { title: "FSY: Agency and Integrity", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/04agency-and-integrity", type: "FSY Handbook", who: "For the Strength of Youth", note: "Agency is at the heart of today's reading. God gives commandments but never forces obedience \u2014 the choice is always ours. This section explores how to make choices aligned with God's will." }] },
        { day: "Saturday", scripture: "Amos 7:14\u201315", keyPrinciple: "Amos said: I was a herdman and a gatherer of fruit. The Lord took me and said, Go, prophesy. Called from ordinary work.", reflect: "What ordinary work are you doing right now that God might be preparing to redirect?", pray: "Ask God if there is a Go, prophesy moment coming in your ordinary life.", act: "Do your current work with excellence today, as preparation for whatever comes next.", dailyQuote: { text: "I was an herdman, and a gatherer of sycomore fruit: and the Lord took me... and said unto me, Go, prophesy.", source: "Amos 7:14\u201315" } }
      ]
    },
    {
      week: 49,
      dates: "Nov 30\u2013Dec 6",
      ref: "Micah; Nahum; Habakkuk; Zephaniah",
      title: "He Delighteth in Mercy",
      theme: "Do justice, love mercy, walk humbly with thy God. The just shall live by faith. God sings over you with joy.",
      resources: [{ title: "What Manner of Men Ought Ye to Be?", url: "https://www.churchofjesuschrist.org/study/general-conference/2012/04/what-manner-of-men-ought-ye-to-be", type: "General Conference", who: "Elder Lynn G. Robbins" }, { title: "Don't Miss This \u2014 Micah; Habakkuk; Zephaniah", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }],
      ywPrep: { summary: "Micah gave one of the most concise summaries of the gospel: 'He hath shewed thee, O man, what is good; and what doth the Lord require of thee, but to do justly, and to love mercy, and to walk humbly with thy God?' Habakkuk asked God why He allowed evil. God answered: trust Me, the just shall live by faith. Zephaniah says God sings over you with joy.", prompts: ["Micah 6:8: do justice, love mercy, walk humbly. Which of the three is hardest for you right now?", "Habakkuk asked God why He allowed wickedness. Have you ever asked God why? Did He answer?", "'The just shall live by faith' \u2014 Paul quoted this in Romans. What does living by faith look like daily?", "Zephaniah says God sings over us with joy. God sings. What does it mean that God rejoices over you?"] },
      days: [
        { day: "Monday", summary: "Micah 1\u20137: Micah \u2014 a contemporary of Isaiah \u2014 speaks against the corruption of rulers, priests, and prophets who lead Israel astray for money. But the famous summary of what God requires: 'He hath shewed thee, O man, what is good; and what doth the Lord require of thee, but to do justly, and to love mercy, and to walk humbly with thy God?' Then Bethlehem is named as the birthplace of the Messiah.", scripture: "Micah 6:8", keyPrinciple: "Do justice. Love mercy. Walk humbly with thy God. Three requirements. One life.", reflect: "Which of the three is most natural for you? Which is hardest?", pray: "Ask God to show you what walking humbly with Him looks like today specifically.", act: "Do one act of justice, one act of mercy, and one act of humility today.", dailyQuote: { text: "What doth the Lord require of thee, but to do justly, and to love mercy, and to walk humbly with thy God?", source: "Micah 6:8" }, resources: [{ title: "What Does the Lord Require of Thee?", url: "https://www.saintsunscripted.com", type: "Podcast", who: "Saints Unscripted" }, { title: "Don't Miss This \u2014 Micah 6 (Justice, Mercy, Humility)", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }, { title: "FSY: Giving Service", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/11giving-service", type: "FSY Handbook", who: "For the Strength of Youth", note: "Today's reading features someone who gives more than expected \u2014 or fails to. This section explores why serving others is central to discipleship." }] },
        { day: "Wednesday", summary: "Habakkuk 1\u20133; Nahum: Habakkuk asks the hardest question: 'O Lord, how long shall I cry, and thou wilt not hear? Why dost thou shew me iniquity?' God's answer: I am working. You will not believe it if I told you. The righteous shall live by faith. Habakkuk ends with a declaration: 'Though the fig tree shall not blossom, and there shall be no fruit \u2014 yet I will rejoice in the Lord.'", scripture: "Habakkuk 1:2\u20133; 2:1\u20133", keyPrinciple: "Habakkuk asked God why He allowed evil. God said: write the vision, wait for it. It will come.", reflect: "What hard why question do you have for God right now?", pray: "Ask your hard question. Then listen and wait.", act: "Write your question and what you believe God might be saying in response.", dailyQuote: { text: "I will stand upon my watch... and will watch to see what he will say unto me.", source: "Habakkuk 2:1" }, resources: [{ title: "Though I Walk Through the Valley \u2014 Habakkuk", url: "https://www.saintsunscripted.com", type: "Podcast", who: "Saints Unscripted" }, { title: "The Just Shall Live by Faith", url: "https://www.churchofjesuschrist.org/study/general-conference/2015/04/the-cost-and-blessings-of-discipleship", type: "General Conference", who: "Elder Jeffrey R. Holland" }, { title: "FSY: Agency and Integrity", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/04agency-and-integrity", type: "FSY Handbook", who: "For the Strength of Youth", note: "Agency is at the heart of today's reading. God gives commandments but never forces obedience \u2014 the choice is always ours. This section explores how to make choices aligned with God's will." }] },
        { day: "Friday", summary: "Zephaniah 1\u20133: The Day of the Lord is near \u2014 a day of wrath. But after judgment: 'Sing, O daughter of Zion; shout, O Israel. The King of Israel, even the Lord, is in the midst of thee.' Then the most tender promise in all the minor prophets: 'He will rejoice over thee with joy; he will rest in his love; he will joy over thee with singing.' God sings over you.", scripture: "Habakkuk 2:4", keyPrinciple: "The just shall live by faith. Not by sight. Not by feeling. By faith.", reflect: "What are you currently trusting God for that you cannot see yet?", pray: "Declare your faith in God for the unseen thing you are waiting for.", act: "Write out your faith declaration for one specific unseen hope.", dailyQuote: { text: "The just shall live by his faith.", source: "Habakkuk 2:4" }, resources: [{ title: "The Lord Rejoices over You \u2014 Zephaniah 3:17", url: "https://www.saintsunscripted.com", type: "Podcast", who: "Saints Unscripted" }, { title: "Lifted Up upon the Cross", url: "https://www.churchofjesuschrist.org/study/general-conference/2014/04/he-is-risen", type: "General Conference", who: "Elder Dallin H. Oaks" }, { title: "FSY: Living the Gospel", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/12living-the-gospel", type: "FSY Handbook", who: "For the Strength of Youth", note: "Today's reading illustrates what it looks like to live the gospel fully \u2014 or to drift from it. This section describes what it means to be an active disciple in everyday life." }] },
        { day: "Saturday", scripture: "Zephaniah 3:17", keyPrinciple: "The Lord thy God is in the midst of thee. He is mighty. He will rejoice over thee with singing.", reflect: "What does it mean that God sings over you? That His response to you is joy?", pray: "Receive God's singing today. Just receive it.", act: "Write what God might be singing over you right now.", dailyQuote: { text: "The Lord thy God in the midst of thee is mighty; he will save, he will rejoice over thee with joy... he will joy over thee with singing.", source: "Zephaniah 3:17" } }
      ]
    },
    {
      week: 50,
      dates: "Dec 7\u201313",
      ref: "Haggai 1\u20132; Zechariah 1\u20134; 7\u201314",
      title: "Holiness unto the Lord",
      theme: "Not by might, nor by power, but by my Spirit. Rebuild. Thy King cometh, lowly, riding on a donkey.",
      resources: [{ title: "Holiness to the Lord \u2014 In Ordinary Things", url: "https://www.churchofjesuschrist.org/study/general-conference/2012/10/holiness-to-the-lord", type: "General Conference", who: "Elder L. Tom Perry" }, { title: "Don't Miss This \u2014 Haggai; Zechariah 1\u20134; 7\u201314", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }],
      ywPrep: { summary: "Haggai challenged the returned exiles: is it time for you to live in paneled houses while My house lies waste? Consider your ways. Zechariah had eight visions of restoration. 'Not by might, nor by power, but by my Spirit.' Zechariah 9:9 prophesied the triumphal entry \u2014 Jesus riding on a donkey \u2014 five centuries before it happened. 'Thy King cometh, lowly.'", prompts: ["Haggai asked: is it time for you to live in nice houses while my house lies waste? What modern equivalent is God asking you?", "'Not by might, nor by power, but by my Spirit.' What is something only God's Spirit can accomplish in your life?", "Zechariah 9:9 was written 500 years before Palm Sunday. What does precise fulfilled prophecy do for your faith?", "Zechariah 14:20 says 'Holiness unto the Lord' will be inscribed on everything. What would total holiness look like in your world?"] },
      days: [
        { day: "Monday", summary: "Haggai 1\u20132; Zechariah 1\u20134: The exiles have returned from Babylon. They start to rebuild the temple \u2014 and stop. They say: 'The time is not come to build the Lord's house.' Meanwhile they are living in paneled houses. Haggai: 'Consider your ways. Ye looked for much, and lo it came to little.' Then: 'Be strong, O Zerubbabel, be strong, O Joshua. For I am with you, saith the Lord of hosts.' The glory of this latter house shall be greater than the former.", scripture: "Haggai 1:4\u20138", keyPrinciple: "Is it time for you to live in paneled houses while my house lies waste? Consider your ways.", reflect: "What has God asked you to build or prioritize that you have been putting off?", pray: "Ask God to help you prioritize His work before your own comfort.", act: "Do one thing today that builds God's work \u2014 not just your own projects.", dailyQuote: { text: "Consider your ways... Is it time for you, O ye, to dwell in your cieled houses, and this house lie waste?", source: "Haggai 1:4, 7" }, resources: [{ title: "Consider Your Ways \u2014 Haggai's Message", url: "https://www.saintsunscripted.com", type: "Podcast", who: "Saints Unscripted" }, { title: "Don't Miss This \u2014 Haggai; Zechariah 1\u20134", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }, { title: "FSY: Temple and Family History", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/03temple-and-family-history", type: "FSY Handbook", who: "For the Strength of Youth", note: "Today's reading connects to God dwelling with His people. This section explains why temples matter and how to prepare spiritually to enter." }] },
        { day: "Wednesday", summary: "Zechariah 4\u20136: Zechariah's visions \u2014 a golden lampstand fed by two olive trees, representing God's anointed ones. The word of the Lord to Zerubbabel: 'Not by might, nor by power, but by my Spirit, saith the Lord of hosts. Who art thou, O great mountain? Before Zerubbabel thou shalt become a plain.' Every obstacle can be leveled by God's Spirit.", scripture: "Zechariah 4:6", keyPrinciple: "Not by might, nor by power, but by my Spirit. The things that matter most require God's Spirit, not our effort alone.", reflect: "What is one thing you are working on that you need to admit requires God's Spirit?", pray: "Explicitly ask for God's Spirit in the area where you have been working in your own strength.", act: "Pause one effort and pray over it before continuing.", dailyQuote: { text: "Not by might, nor by power, but by my spirit, saith the Lord of hosts.", source: "Zechariah 4:6" }, resources: [{ title: "Not by Might, Nor by Power, But by My Spirit", url: "https://www.churchofjesuschrist.org/study/general-conference/2018/04/he-will-place-you-on-his-shoulders", type: "General Conference", who: "President Henry B. Eyring" }, { title: "Don't Miss This \u2014 Zechariah 4", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }, { title: "FSY: Living the Gospel", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/12living-the-gospel", type: "FSY Handbook", who: "For the Strength of Youth", note: "Today's reading illustrates what it looks like to live the gospel fully \u2014 or to drift from it. This section describes what it means to be an active disciple in everyday life." }] },
        { day: "Friday", summary: "Zechariah 9\u201314: The messianic king comes 'riding upon a donkey, and upon a colt the foal of an ass' \u2014 Palm Sunday in prophecy, written five hundred years before the event. Then: thirty pieces of silver, the potter's field, the one they pierced, the fountain opened for sin and uncleanness. Zechariah 14 describes the Second Coming. All the nations will gather at Jerusalem. The Lord will be King over all the earth.", scripture: "Zechariah 9:9; Matthew 21:5", keyPrinciple: "Thy King cometh, lowly, on a donkey. Written 500 years before Palm Sunday. Fulfilled exactly.", reflect: "What do you feel knowing that Jesus lived out a script written centuries before His birth?", pray: "Thank God for His precision \u2014 every prophecy fulfilled perfectly.", act: "Find one other Zechariah prophecy fulfilled in the Gospels and read both passages.", dailyQuote: { text: "Rejoice greatly, O daughter of Zion... thy King cometh unto thee: he is just, and having salvation; lowly, and riding upon an ass.", source: "Zechariah 9:9" }, resources: [{ title: "Thy King Cometh \u2014 Zechariah 9:9 and Palm Sunday", url: "https://www.saintsunscripted.com", type: "Podcast", who: "Saints Unscripted" }, { title: "The Second Coming", url: "https://www.churchofjesuschrist.org/study/general-conference/2004/04/the-second-coming", type: "General Conference", who: "Elder Dallin H. Oaks" }, { title: "FSY: Covenant Path", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/02covenant-path", type: "FSY Handbook", who: "For the Strength of Youth", note: "Covenants are the backbone of today's reading. This section explains what it means to be on the covenant path and how every ordinance connects us more deeply to God." }] },
        { day: "Saturday", scripture: "Zechariah 14:9, 20", keyPrinciple: "The Lord shall be king over all the earth. Holiness unto the Lord inscribed on everything \u2014 even the bells of horses.", reflect: "What would it look like for your ordinary day to be inscribed with Holiness unto the Lord?", pray: "Ask God to make your ordinary things sacred today.", act: "Do one ordinary task with the intentionality of Holiness unto the Lord.", dailyQuote: { text: "In that day shall there be upon the bells of the horses, Holiness unto the Lord.", source: "Zechariah 14:20" } }
      ]
    },
    {
      week: 51,
      dates: "Dec 14\u201320",
      ref: "Malachi",
      title: "I Have Loved You, Saith the Lord",
      theme: "I have loved you, saith the Lord. Bring the tithes. Elijah is coming. The last words before 400 years of silence.",
      resources: [{ title: "I Have Loved You", url: "https://www.churchofjesuschrist.org/study/general-conference/2016/10/i-have-loved-you", type: "General Conference", who: "Elder Dieter F. Uchtdorf" }, { title: "Don't Miss This \u2014 Malachi", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }, { title: "Turning Hearts \u2014 Temple and Family History", url: "https://www.saintsunscripted.com", type: "Podcast", who: "Saints Unscripted" }],
      ywPrep: { summary: "Malachi means 'my messenger.' He was the last voice before 400 years of silence. He called Israel back to covenant \u2014 bring the tithes, honor God's name. His first words: 'I have loved you, saith the Lord.' His last words: Elijah will come and turn hearts of fathers to children and hearts of children to their fathers. The very last words of the Old Testament \u2014 then silence, until John the Baptist.", prompts: ["Malachi's first words are God's: 'I have loved you, saith the Lord.' Despite everything \u2014 Israel's unfaithfulness \u2014 God leads with love. What does that tell you?", "Malachi 3:10: God says prove me in tithing. Have you ever proved God on a covenant promise? What happened?", "Malachi 4:5\u20136: Elijah will turn hearts of fathers to children and children to fathers. How is family history and temple work connected to your faith?", "Malachi closes with 400 years of silence ahead. What do you do when God seems quiet?"] },
      days: [
        { day: "Monday", summary: "Malachi 1\u20132: The last book of the Old Testament. God opens: 'I have loved you, saith the Lord.' But Israel responds with half-hearted offerings \u2014 blind animals, lame cattle, whatever costs nothing. God says: 'Would that someone among you would shut the temple doors so you would not kindle useless fire on my altar.' Priests who teach falsehood, who show partiality, who have wearied God with their words.", scripture: "Malachi 1:2", keyPrinciple: "God's opening line: I have loved you, saith the Lord. His first word to unfaithful people is love.", reflect: "When you imagine God speaking to you, what is His opening line? What should it be?", pray: "Receive God's I have loved you today. Let it be the foundation of your prayer.", act: "Write what God's love for you specifically means, based on what you have studied this year.", dailyQuote: { text: "I have loved you, saith the Lord.", source: "Malachi 1:2" }, resources: [{ title: "I Have Loved You \u2014 Malachi's Opening", url: "https://www.saintsunscripted.com", type: "Podcast", who: "Saints Unscripted" }, { title: "Don't Miss This \u2014 Malachi 1\u20132", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }, { title: "FSY: Covenant Path", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/02covenant-path", type: "FSY Handbook", who: "For the Strength of Youth", note: "Covenants are the backbone of today's reading. This section explains what it means to be on the covenant path and how every ordinance connects us more deeply to God." }] },
        { day: "Wednesday", summary: "Malachi 3\u20134: The call to bring the full tithe into the storehouse and test God: 'I will open you the windows of heaven and pour out a blessing that there shall not be room enough to receive it.' Then: 'They that feared the Lord spake often one to another. And the Lord hearkened and heard it, and a book of remembrance was written before him.' Your faithfulness is recorded.", scripture: "Malachi 3:10", keyPrinciple: "Bring the tithes \u2014 prove me now herewith \u2014 and see if I will not open the windows of heaven.", reflect: "Have you ever proved God in tithing or another covenant? What was the result?", pray: "Commit to one covenant promise and ask God to prove Himself faithful.", act: "Pay tithing or affirm a financial covenant with God today.", dailyQuote: { text: "Bring ye all the tithes into the storehouse... and prove me now herewith, saith the Lord of hosts, if I will not open you the windows of heaven.", source: "Malachi 3:10" }, resources: [{ title: "Tithing \u2014 a Commandment Even for the Struggling", url: "https://www.churchofjesuschrist.org/study/general-conference/2013/10/tithing-a-commandment-even-for-the-struggling", type: "General Conference", who: "Elder Lynn G. Robbins" }, { title: "Don't Miss This \u2014 Malachi 3 (Tithes and Offerings)", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }, { title: "FSY: Giving Service", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/11giving-service", type: "FSY Handbook", who: "For the Strength of Youth", note: "Today's reading features someone who gives more than expected \u2014 or fails to. This section explores why serving others is central to discipleship." }] },
        { day: "Friday", summary: "Malachi 4: The final words of the Old Testament. 'Behold, I will send you Elijah the prophet before the coming of the great and dreadful day of the Lord. And he shall turn the heart of the fathers to the children, and the heart of the children to their fathers.' Then four hundred years of silence. The next voice will say: 'In those days came John the Baptist, preaching in the wilderness of Judea.'", scripture: "Malachi 3:16\u201317", keyPrinciple: "A book of remembrance was written for those who feared God and thought upon His name. God keeps record.", reflect: "What does it mean that God keeps a book of remembrance for those who think of Him?", pray: "Think upon God's name today. Let it be deliberate and frequent.", act: "Journal a page of remembrance \u2014 your thoughts about God and His faithfulness this year.", dailyQuote: { text: "Then they that feared the Lord spake often one to another: and the Lord hearkened... and a book of remembrance was written.", source: "Malachi 3:16" }, resources: [{ title: "Turn the Hearts of the Fathers to the Children", url: "https://www.churchofjesuschrist.org/study/general-conference/2010/04/the-spirit-of-elijah", type: "General Conference", who: "Elder David A. Bednar" }, { title: "Don't Miss This \u2014 Malachi 4; Elijah", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }, { title: "FSY: Temple and Family History", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/03temple-and-family-history", type: "FSY Handbook", who: "For the Strength of Youth", note: "Today's reading connects to God dwelling with His people. This section explains why temples matter and how to prepare spiritually to enter." }] },
        { day: "Saturday", scripture: "Malachi 4:5\u20136", keyPrinciple: "Elijah will come and turn hearts \u2014 the last promise before 400 years of silence. Then John the Baptist.", reflect: "What is your relationship to your ancestors? To family history and temple work?", pray: "Pray for family \u2014 living and dead \u2014 and for the work of sealing hearts together.", act: "Do one act of family history today \u2014 even a small one.", dailyQuote: { text: "He shall turn the heart of the fathers to the children, and the heart of the children to their fathers.", source: "Malachi 4:6" } }
      ]
    },
    {
      week: 52,
      dates: "Dec 21\u201327",
      ref: "Christmas",
      title: "And the Word Was Made Flesh",
      theme: "The Word was made flesh. Every covenant, every prophet, every promise pointed to one birth in Bethlehem.",
      resources: [{ title: "Christ and the New Covenant", url: "https://www.churchofjesuschrist.org/study/general-conference/2019/12/christ-and-the-new-covenant", type: "General Conference", who: "Elder Jeffrey R. Holland" }, { title: "Don't Miss This \u2014 Christmas Week", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }],
      ywPrep: { summary: "The Old Testament ends. The New Testament begins with the thing the entire Old Testament was anticipating: the birth of Jesus Christ. Luke 2: the shepherds. Matthew 2: the wise men. John 1: 'In the beginning was the Word, and the Word was God. And the Word was made flesh and dwelt among us.' The whole year of study leads here.", prompts: ["The shepherds were the first to hear the announcement \u2014 ordinary, overlooked people. What does God's choice of audience say about who He values?", "John 1:14 says the Word dwelt among us \u2014 literally pitched His tent with humanity. What does that image mean to you?", "As you finish the Old Testament, what is one thing you understand about Jesus that you didn't before?", "The wise men followed a star for years across hundreds of miles. What are you willing to travel far to find or worship?"] },
      days: [
        { day: "Monday", summary: "John 1: 'In the beginning was the Word, and the Word was with God, and the Word was God.' The prologue to John echoes Genesis \u2014 another beginning. Christ is the light that enlightens every person. He came to his own people and they did not receive him. But to those who received him, he gave power to become the sons of God. The Word became flesh and dwelt among us.", scripture: "John 1:1\u20133, 14", keyPrinciple: "In the beginning was the Word. The Word became flesh and pitched His tent among us. This is the whole point.", reflect: "In the beginning He was already there. At the manger He came here. What does that journey mean to you?", pray: "Worship the Word made flesh today. Just worship.", act: "Read John 1:1\u201314 slowly. Underline every phrase that connects to your year in the Old Testament.", dailyQuote: { text: "And the Word was made flesh, and dwelt among us, and we beheld his glory, the glory as of the only begotten of the Father, full of grace and truth.", source: "John 1:14" }, resources: [{ title: "In the Beginning Was the Word", url: "https://www.saintsunscripted.com", type: "Podcast", who: "Saints Unscripted" }, { title: "Don't Miss This \u2014 John 1", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }, { title: "FSY: Covenant Path", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/02covenant-path", type: "FSY Handbook", who: "For the Strength of Youth", note: "Covenants are the backbone of today's reading. This section explains what it means to be on the covenant path and how every ordinance connects us more deeply to God." }] },
