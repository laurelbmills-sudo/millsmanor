 Benjamin's sack. His servants chase them down. The brothers are brought back. Judah offers himself as a slave in Benjamin's place, pleading with Joseph about their father. This is the moment that shows how much the brothers have changed.",keyPrinciple:"'God sent me before you to preserve life.' Joseph saw God's hand in his suffering.",reflect:"Is there a painful chapter in your story you are beginning to see as God's preparation?",pray:"Ask God to give you perspective to see His hand in your hardest experiences.",act:"Write about one hard experience and what God may have been preparing you for through it.",fsy:{title:"FSY: Giving Service",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/11giving-service",note:"Today's reading features someone who gives more than expected \u2014 or fails to. This section explores why serving others is central to discipleship."}},Friday:{scripture:"Genesis 50:19\u201321",summary:"Genesis 45\u201350: Joseph can no longer control himself. He clears the room and weeps loudly. He reveals himself: 'I am Joseph your brother, whom ye sold into Egypt.' The brothers are terrified. Joseph says: 'Be not grieved with yourselves \u2014 God sent me before you to preserve life.' Forgiveness is possible.",keyPrinciple:"'Ye thought evil against me; but God meant it unto good.' This is the gospel in one sentence.",reflect:"What evil, mistake, or injustice in your life is God in the process of turning for good?",pray:"Ask God to give you eyes to see His redemptive work in your hardest experiences.",act:"Write your own version: 'You/I meant _____ for harm. But God meant it for _____.",fsy:{title:"FSY: Repentance and Forgiveness",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/05repentance-and-forgiveness",note:"Today's reading shows someone facing consequences of sin \u2014 or being given a second chance. This FSY section teaches that repentance is always available and God's mercy can cover any mistake."}}},resources:[{title:"Patience in Affliction",url:"https://www.churchofjesuschrist.org/study/general-conference/2016/04/where-justice-love-and-mercy-meet",type:"General Conference",who:"Elder Jeffrey R. Holland"},{title:"Don't Miss This \u2014 Genesis 42\u201350",url:"https://www.youtube.com/c/DontMissThis",type:"Podcast",who:"Don't Miss This"}],ywPrep:{summary:"Joseph rose from prison to second-in-command of Egypt in a single day. When his brothers came hungry, he recognized them \u2014 they didn't recognize him. He could have let them suffer. Instead he wept, revealed himself, and said, 'God sent me before you.' His suffering was his preparation. 'You meant evil \u2014 but God meant it for good.'",prompts:["How does knowing God can use even our worst experiences for good change how you handle hard things now?","Joseph wept when he saw his brothers \u2014 compassion even for people who hurt him. How do you get to that kind of forgiveness?","Joseph said, 'It was not you but God who sent me here.' How do you distinguish what people did to you from what God is doing through it?","Joseph provided abundantly for his family. How does covenant family loyalty show up in your life?"]}},{week:13,dates:"Mar 23\u201329",title:"I Have Remembered My Covenant",ref:"Exodus 1\u20136",theme:"God heard the cries of Israel in bondage and sent Moses. He hears our cries too.",days:{Monday:{scripture:"Exodus 2:23\u201325",summary:"Exodus 1\u20133: A new Pharaoh arises who doesn't know Joseph. He enslaves the Israelites and orders male babies killed. Moses is placed in a basket by his mother, found by Pharaoh's daughter, and raised in the palace. He grows up, kills an Egyptian beating a Hebrew, and flees to Midian. God appears in a burning bush.",keyPrinciple:"God heard Israel's groaning, remembered His covenant, and looked upon them. He sees. He remembers.",reflect:"When have you felt unseen or forgotten? What helped you remember that God sees you?",pray:"Tell God exactly what you're carrying right now. He hears it.",act:"Write out your burden honestly in prayer \u2014 don't edit it.",fsy:{title:"FSY: Covenant Path",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/02covenant-path",note:"Covenants are the backbone of today's reading. This section explains what it means to be on the covenant path and how every ordinance connects us more deeply to God."}},Wednesday:{scripture:"Exodus 3:2\u20136, 14",summary:"Exodus 3\u20135: God commissions Moses to go back to Egypt and lead Israel out. Moses lists five objections \u2014 who am I, what will I say, what if they don't believe me, I'm not eloquent, please send someone else. God answers every objection. He gives Moses signs and sends Aaron as a spokesman.",keyPrinciple:"God revealed His name: I AM. He is eternal, present, and existing in all times simultaneously.",reflect:"What does 'I AM' as God's name mean to you in your current moment?",pray:"Pray to the I AM \u2014 the God who is always present, in every moment.",act:"Sit quietly for two minutes and rest in the fact that God simply IS \u2014 with you right now.",fsy:{title:"FSY: Covenant Path",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/02covenant-path",note:"Covenants are the backbone of today's reading. This section explains what it means to be on the covenant path and how every ordinance connects us more deeply to God."}},Friday:{scripture:"Exodus 4:10\u201312",summary:"Exodus 5\u20136: Moses goes to Pharaoh and asks him to let Israel go to worship in the wilderness. Pharaoh responds by increasing their workload \u2014 now they must gather their own straw to make bricks. The Israelites blame Moses. Moses cries to God: 'Why hast thou so evil entreated this people?' God reassures him.",keyPrinciple:"Moses said 'I cannot speak.' God said 'I made your mouth.' Our limitations do not limit God.",reflect:"What limitation do you use as a reason not to do what God is asking?",pray:"Give God your specific limitation and ask Him to be strong in that exact weak place.",act:"Do one thing today despite feeling unqualified.",fsy:{title:"FSY: Agency and Integrity",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/04agency-and-integrity",note:"Agency is at the heart of today's reading. God gives commandments but never forces obedience \u2014 the choice is always ours. This section explores how to make choices aligned with God's will."}}},resources:[{title:"He Will Place You on His Shoulders",url:"https://www.churchofjesuschrist.org/study/general-conference/2020/04/22uchtdorf",type:"General Conference",who:"President Dieter F. Uchtdorf"},{title:"Don't Miss This \u2014 Exodus 1\u20136",url:"https://www.youtube.com/c/DontMissThis",type:"Podcast",who:"Don't Miss This"}],ywPrep:{summary:"Israel was enslaved in Egypt and cried out to God. God heard them. He called Moses from a burning bush \u2014 a man who felt he could not speak, a man with a past he was running from. Moses said, 'Here am I.' God sent him back to face Pharaoh. The burning bush burned and was not consumed \u2014 a symbol of people refined by fire but not destroyed.",prompts:["Moses saw a bush burning but not consumed. What does that image mean to you about trials that don't destroy us?","God called Moses by name from the burning bush. When have you felt God call your name?","Moses made excuses: 'I cannot speak.' God answered every excuse. What excuses are you making that God might be answering right now?","God told Moses, 'I have heard their cry.' What does it mean to you that God hears your cries?"]}},{week:14,dates:"Mar 30\u2013Apr 5",title:"He Is Risen",ref:"Easter",theme:"He is risen. Every Passover lamb pointed to Jesus Christ \u2014 the Lamb of God.",days:{Monday:{scripture:"Exodus 12:3\u20137, 12\u201313",summary:"Exodus 7\u201311: The ten plagues of Egypt. Nile turns to blood. Frogs. Lice. Flies. Livestock disease. Boils. Hail. Locusts. Darkness. Through each plague, Pharaoh hardens his heart. God is demonstrating His power over everything Egypt worships \u2014 the Nile, the sun, the cattle.",keyPrinciple:"The Passover lamb had to be perfect. Its blood applied to the doorposts protected the firstborn. This is a type of Christ.",reflect:"What does it mean to personally apply the Atonement \u2014 not just know about it?",pray:"Thank Jesus for being the Lamb whose blood covers you.",act:"Read Exodus 12 slowly, looking for every detail that points to Jesus Christ.",fsy:{title:"FSY: Covenant Path",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/02covenant-path",note:"Covenants are the backbone of today's reading. This section explains what it means to be on the covenant path and how every ordinance connects us more deeply to God."}},Wednesday:{scripture:"1 Corinthians 5:7",summary:"Exodus 12: The first Passover. God instructs each family to select a lamb, kill it at twilight, paint its blood on the doorposts. When the angel of death passes over Egypt killing the firstborn, it will pass over every house with blood on the door. They eat the meal in haste. 'This night is a night of watching.'",keyPrinciple:"Christ our Passover is sacrificed for us. The law of Moses was always pointing to Him.",reflect:"How has your understanding of the Atonement deepened through studying the Old Testament?",pray:"Pray with gratitude for Jesus as your personal Passover lamb.",act:"Prepare your heart for the sacrament this Sunday as a Passover renewal.",fsy:{title:"FSY: Covenant Path",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/02covenant-path",note:"Covenants are the backbone of today's reading. This section explains what it means to be on the covenant path and how every ordinance connects us more deeply to God."}},Friday:{scripture:"Luke 24:5\u20136",summary:"Exodus 12\u201313: The final plague \u2014 every firstborn in Egypt dies, including Pharaoh's son. Pharaoh calls Moses at midnight: 'Rise up, and get you forth.' Israel leaves Egypt. Six hundred thousand men, plus women and children. They had been there 430 years. They leave with the wealth of Egypt.",keyPrinciple:"He is not here \u2014 He is risen. The Resurrection is the central event of all human history.",reflect:"What difference does the Resurrection make to your daily life right now?",pray:"Worship the risen Christ today. Not just the suffering Christ \u2014 the risen one.",act:"Tell someone why the Resurrection matters to you personally.",fsy:{title:"FSY: Covenant Path",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/02covenant-path",note:"Covenants are the backbone of today's reading. This section explains what it means to be on the covenant path and how every ordinance connects us more deeply to God."}}},resources:[{title:"The Atonement of Jesus Christ",url:"https://www.churchofjesuschrist.org/study/general-conference/2022/04/23nelson",type:"General Conference",who:"President Russell M. Nelson"},{title:"Don't Miss This \u2014 Easter Week",url:"https://www.youtube.com/c/DontMissThis",type:"Podcast",who:"Don't Miss This"}],ywPrep:{summary:"Easter falls in this week. Every Passover lamb was a type of Jesus Christ \u2014 perfect, sacrificed, its blood applied to save the firstborn. Jesus is our Passover lamb. He was crucified at Passover. He rose on the third day. The entire law of Moses was pointing to this moment. He is risen.",prompts:["How does knowing Jesus died at the exact Passover feast \u2014 fulfilling every detail of the type \u2014 affect your faith?","The disciples didn't recognize Jesus on the road to Emmaus until He broke bread. Where do you most clearly recognize the resurrected Christ?","Mary thought Jesus was the gardener. Then He said her name. What does it mean that the risen Christ knows your name?","'He is not here \u2014 He is risen.' What difference does the Resurrection make to your daily life right now?"]}},{week:15,dates:"Apr 6\u201312",title:"That Ye May Know That I Am the Lord",ref:"Exodus 7\u201313",theme:"The plagues showed Egypt there is a God, and He is Israel's God. The Passover points to the Atonement.",days:{Monday:{scripture:"Exodus 7:10\u201312",summary:"Exodus 13\u201315: Israel approaches the Red Sea. Pharaoh changes his mind and sends his army after them. Israel panics. Moses says: 'Fear ye not, stand still, and see the salvation of the Lord.' The cloud moves behind Israel. Moses stretches his rod over the sea. The waters divide. They cross on dry ground.",keyPrinciple:"Pharaoh's magicians could mimic Moses's miracles \u2014 but only to a point. Counterfeits have limits.",reflect:"What counterfeits of God's blessings are most tempting in your life?",pray:"Ask God to help you distinguish His gifts from cheap imitations.",act:"Identify one area where you might be settling for a counterfeit.",fsy:{title:"FSY: Living the Gospel",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/12living-the-gospel",note:"Today's reading illustrates what it looks like to live the gospel fully \u2014 or to drift from it. This section describes what it means to be an active disciple in everyday life."}},Wednesday:{scripture:"Exodus 12:3\u20137, 12\u201313",summary:"Exodus 15\u201316: After crossing the Red Sea, Israel sings \u2014 Miriam leads the women in dancing and song. Then the murmuring begins. No water, then bitter water. God shows Moses a tree to throw in the water \u2014 it becomes sweet. God says: 'If you obey, I will be your healer.' Then no food. God sends manna from heaven.",keyPrinciple:"The Passover lamb had to be perfect, its blood applied. You can't just know about it \u2014 you have to apply it.",reflect:"What does it mean to apply Christ's atoning blood to your life personally?",pray:"Thank Jesus for being the Lamb whose blood covers you.",act:"Read Exodus 12 looking for every detail that points to Jesus Christ.",fsy:{title:"FSY: Sabbath Day",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/06sabbath-day",note:"Today's reading touches on sacred time, rest, or covenant renewal. This section explains why God asks us to set aside one day \u2014 and what that day is really for."}},Friday:{scripture:"Exodus 13:17\u201318, 21",summary:"Exodus 16\u201317: Manna appears each morning \u2014 like coriander seed, white, tasting of wafers and honey. They gather what they need, no more, no less. On the sixth day they gather double. On the Sabbath it doesn't appear. God is teaching them to trust \u2014 one day at a time. Then water from the rock at Horeb.",keyPrinciple:"God led them the long way \u2014 and led them personally with a pillar of cloud and fire. He doesn't abandon us in the wilderness.",reflect:"Has God ever led you the long way? What did you learn in the longer route?",pray:"Ask God to make His presence as clear and visible to you as a pillar of fire.",act:"Name one thing God has led you through that you're grateful for now.",fsy:{title:"FSY: Living the Gospel",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/12living-the-gospel",note:"Today's reading illustrates what it looks like to live the gospel fully \u2014 or to drift from it. This section describes what it means to be an active disciple in everyday life."}}},resources:[{title:"The Passover and the Sacrament",url:"https://www.churchofjesuschrist.org/study/ensign/1972/02/the-passover-and-the-sacrament",type:"Ensign",who:"Elder Mark E. Petersen"},{title:"Don't Miss This \u2014 Exodus 7\u201313",url:"https://www.youtube.com/c/DontMissThis",type:"Podcast",who:"Don't Miss This"}],ywPrep:{summary:"Ten plagues. Each targeted a different Egyptian god \u2014 showing that Israel's God was more powerful than all of Egypt's gods combined. The Passover: blood on the doorposts saved Israel's firstborn. The people had to actually apply the blood \u2014 they couldn't just know about it. The Israelites took unleavened bread in haste and walked out of slavery.",prompts:["Each plague targeted an Egyptian god. What gods compete for people's loyalty today?","The Passover lamb's blood had to be applied \u2014 not just known about. What does applying Christ's Atonement look like for you?","The Israelites left in such haste they had no time for leaven. What does leaving Egypt quickly without looking back look like in your life?","This is why we take the sacrament every week. What does the sacrament mean to you now that you've studied Passover?"]}},{week:16,dates:"Apr 13\u201319",title:"Stand Still, and See the Salvation of the Lord",ref:"Exodus 14\u201318",theme:"God parted the Red Sea when Israel had nowhere to go. He specializes in impossible deliverances.",days:{Monday:{scripture:"Exodus 14:13\u201314",summary:"Exodus 17\u201318: Israel arrives at Rephidim and fights Amalek. When Moses holds up his rod, Israel prevails. When his arms drop, Amalek prevails. Aaron and Hur hold up his arms. Israel wins. Then Jethro, Moses's father-in-law, visits and gives Moses wise counsel: delegate. Moses is doing too much alone.",keyPrinciple:"'Fear not. Stand still. See the salvation of the Lord. He will fight for you.' Sometimes God asks us to stop and watch.",reflect:"What situation are you facing where God might be saying 'stand still and watch what I do'?",pray:"Practice stillness today. Tell God what you're afraid of and ask Him to fight for you.",act:"Spend five quiet minutes trusting instead of planning or worrying.",fsy:{title:"FSY: Covenant Path",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/02covenant-path",note:"Covenants are the backbone of today's reading. This section explains what it means to be on the covenant path and how every ordinance connects us more deeply to God."}},Wednesday:{scripture:"Exodus 14:21\u201322",summary:"Exodus 19\u201320: Israel arrives at Sinai. God calls Moses up the mountain and proposes a covenant: if you obey, you will be a kingdom of priests and a holy nation. The people agree. Then God descends in fire and smoke with thunder. The people tremble. He speaks the Ten Commandments.",keyPrinciple:"The sea parted. Israel walked through on dry ground. God's impossible became Israel's path forward.",reflect:"What impossible has God made possible in your life?",pray:"Thank God for one specific miracle \u2014 big or small \u2014 He has done for you.",act:"Tell one person today about something God did for you that you didn't expect.",fsy:{title:"FSY: Living the Gospel",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/12living-the-gospel",note:"Today's reading illustrates what it looks like to live the gospel fully \u2014 or to drift from it. This section describes what it means to be an active disciple in everyday life."}},Friday:{scripture:"Exodus 16:14\u201316",summary:"Exodus 20\u201324: The commandments expand into laws about worship, property, justice, and mercy. God describes a sacrificial system that points forward to Christ. Moses reads the covenant to the people. They say: 'All that the Lord hath said will we do.' Moses goes up the mountain. God's glory is like a consuming fire.",keyPrinciple:"Manna came every morning \u2014 fresh, just enough for today. Not stockpiled. Just daily.",reflect:"What does your daily spiritual manna look like? Scripture? Prayer? Stillness?",pray:"Ask God for what you need just for today. Not the whole year \u2014 just today.",act:"Gather your spiritual manna today. Don't skip it.",fsy:{title:"FSY: Physical Health",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/08physical-health",note:"Today's reading involves the physical body \u2014 its limits or miraculous capacity. This section teaches that the body is sacred and how we treat it reflects what we believe."}}},resources:[{title:"Be Still, and Know That I Am God",url:"https://www.churchofjesuschrist.org/study/general-conference/2016/04/be-still-and-know-that-i-am-god",type:"General Conference",who:"Elder Dennis B. Neuenschwander"},{title:"Don't Miss This \u2014 Exodus 14\u201318",url:"https://www.youtube.com/c/DontMissThis",type:"Podcast",who:"Don't Miss This"}],ywPrep:{summary:"Israel left Egypt and immediately faced the Red Sea ahead and Pharaoh's army behind. Moses said, 'Stand still, and see the salvation of the Lord.' They stepped forward \u2014 the sea parted. Then in the wilderness: no food, no water, constant complaints. God provided manna every morning \u2014 only enough for one day. Not stockpiled. Just daily.",prompts:["Israel was trapped between the sea and the army. When have you felt like there was no way forward and no way back?","God said to Moses: stop crying and move forward. When does God answer prayer by telling us to stop praying and start moving?","The Israelites murmured almost immediately after one of the greatest miracles in history. Why do we forget so quickly?","Manna came every morning \u2014 only enough for one day. What does daily dependence on God look like for you?"]}},{week:17,dates:"Apr 20\u201326",title:"I Will Write It upon Their Hearts",ref:"Exodus 19\u201320; 24; 31\u201334",theme:"God gave the commandments as a covenant guide. The new covenant is written on the heart.",days:{Monday:{scripture:"Exodus 19:3\u20136",summary:"Exodus 20: The Ten Commandments \u2014 no other gods, no idols, don't misuse God's name, keep the Sabbath, honor parents, no murder, no adultery, no theft, no false witness, no coveting. These commandments come from a God who already delivered them from slavery. Obedience is a response to grace, not a way to earn it.",keyPrinciple:"God called Israel to be a kingdom of priests \u2014 set apart to represent Him to the world.",reflect:"What does it mean to you personally to be called to represent God?",pray:"Ask God to help you live as His representative today.",act:"In one interaction today, intentionally represent God's love and character.",fsy:{title:"FSY: Sabbath Day",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/06sabbath-day",note:"Today's reading touches on sacred time, rest, or covenant renewal. This section explains why God asks us to set aside one day \u2014 and what that day is really for."}},Wednesday:{scripture:"Exodus 20:1\u20133",summary:"Exodus 32: While Moses is on the mountain with God, the people ask Aaron to make them a god. Aaron collects their gold and makes a golden calf. 'These are thy gods, O Israel, which brought thee up out of the land of Egypt.' God is furious. Moses intercedes. He comes down and shatters the tablets.",keyPrinciple:"The first commandment is love \u2014 love God first. All other commands flow from this one.",reflect:"What competes with God for the top position in your life right now?",pray:"Give God first place today. Deliberately choose Him over whatever is competing.",act:"Identify your top competitor with God and make a plan to reorder your priorities.",fsy:{title:"FSY: Agency and Integrity",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/04agency-and-integrity",note:"Agency is at the heart of today's reading. God gives commandments but never forces obedience \u2014 the choice is always ours. This section explores how to make choices aligned with God's will."}},Friday:{scripture:"Exodus 32:1\u20134, 14",summary:"Exodus 33\u201334: Moses asks to see God's glory. God passes before him saying: 'The Lord, the Lord God, merciful and gracious, longsuffering.' Moses bows and worships. New tablets are made. The covenant is renewed. Moses descends and his face shines so brightly the people are afraid to come near him.",keyPrinciple:"Israel made a golden calf 40 days after covenanting. Moses interceded. God relented. Mercy won.",reflect:"When have you broken a commitment quickly after making it? What brought you back?",pray:"Thank God for those who intercede for you \u2014 and for Jesus who always intercedes.",act:"Commit to one covenant behavior you have been inconsistent in. Write it down.",fsy:{title:"FSY: Covenant Path",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/02covenant-path",note:"Covenants are the backbone of today's reading. This section explains what it means to be on the covenant path and how every ordinance connects us more deeply to God."}}},resources:[{title:"The Laws of God",url:"https://www.churchofjesuschrist.org/study/general-conference/2012/10/the-laws-of-god",type:"General Conference",who:"Elder L. Tom Perry"},{title:"Don't Miss This \u2014 Exodus 19\u201320; 24; 31\u201334",url:"https://www.youtube.com/c/DontMissThis",type:"Podcast",who:"Don't Miss This"}],ywPrep:{summary:"God gave the Ten Commandments as a covenant guide for love, not just compliance. Israel immediately broke the covenant with the golden calf. Moses interceded and God gave the law again. The new covenant is written not on stone but on the heart.",prompts:["The Ten Commandments begin with 'I am the Lord your God who brought you out.' Why does identity come before law?","Israel made a golden calf three days after covenanting with God. What does that tell you about human nature?","Moses interceded for Israel even when God was ready to give up. Who intercedes for us now?","Which of the Ten Commandments do you feel is truly written on your heart versus just followed as a rule?"]}},{week:18,dates:"Apr 27\u2013May 3",title:"Let Them Make Me a Sanctuary",ref:"Exodus 35\u201340; Leviticus 1; 4; 16; 19",theme:"God gave detailed instructions for the Tabernacle. He wanted to dwell among His people.",days:{Monday:{scripture:"Exodus 25:8",summary:"Exodus 25\u201330: God gives detailed instructions for the Tabernacle \u2014 the portable temple Israel will build in the wilderness. Every element is symbolic: the ark of the covenant, the mercy seat, the menorah, the bread of the presence, the altar of incense. God says: 'Let them make me a sanctuary that I may dwell among them.'",keyPrinciple:"Let them make me a sanctuary; that I may dwell among them. God's whole desire is to be with His people.",reflect:"What does God dwelling among you mean for your daily life?",pray:"Invite God to dwell in your home and heart today specifically.",act:"Create a small sacred space in your home for scripture, prayer, or stillness.",fsy:{title:"FSY: Temple and Family History",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/03temple-and-family-history",note:"Today's reading connects to God dwelling with His people. This section explains why temples matter and how to prepare spiritually to enter."}},Wednesday:{scripture:"Exodus 25:17\u201322",summary:"Exodus 35\u201338: Israel builds the Tabernacle. Bezaleel is filled with the Spirit of God to do all manner of workmanship. Everyone whose heart stirred them and whose spirit was willing brought an offering. They brought so much Moses had to tell them to stop. The people gave with joy.",keyPrinciple:"The Mercy Seat was where God's presence rested. God meets us at a place called mercy.",reflect:"How does knowing God's presence rests at a place called mercy change how you approach Him?",pray:"Come to God at the mercy seat today \u2014 with honesty, not performance.",act:"Study one element of the Tabernacle and its symbolic connection to Christ.",fsy:{title:"FSY: Temple and Family History",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/03temple-and-family-history",note:"Today's reading connects to God dwelling with His people. This section explains why temples matter and how to prepare spiritually to enter."}},Friday:{scripture:"Exodus 35:21\u201322, 29",summary:"Leviticus 1\u201310: The sacrificial system is established. Burnt offerings, grain offerings, peace offerings, sin offerings, guilt offerings \u2014 each points to atonement. Aaron and his sons are consecrated as priests. When the Tabernacle is complete, the glory of God fills it. No one can enter. God is present.",keyPrinciple:"The people gave willingly \u2014 their hearts moved them. Not because they had to. Out of love.",reflect:"What motivates your giving \u2014 obligation or genuine love?",pray:"Ask God to give you a willing heart that gives freely.",act:"Give something today \u2014 time, money, attention \u2014 out of love rather than duty.",fsy:{title:"FSY: Giving Service",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/11giving-service",note:"Today's reading features someone who gives more than expected \u2014 or fails to. This section explores why serving others is central to discipleship."}}},resources:[{title:"The Holy Temple",url:"https://www.churchofjesuschrist.org/study/general-conference/2010/10/the-holy-temple",type:"General Conference",who:"President Boyd K. Packer"},{title:"Don't Miss This \u2014 Exodus 35\u201340; Leviticus",url:"https://www.youtube.com/c/DontMissThis",type:"Podcast",who:"Don't Miss This"}],ywPrep:{summary:"God gave detailed instructions for the Tabernacle \u2014 every dimension and material specified. Every element pointed to Christ: the altar (Atonement), the laver (baptism), the bread (sacrament), the high priest (Christ as mediator). When it was complete, the glory of the Lord filled it.",prompts:["The Tabernacle was God's way of dwelling with Israel in the wilderness. How does the temple fulfill that same purpose today?","Every item in the Tabernacle had specific symbolic meaning pointing to Christ. What elements of temple worship are most meaningful to you?","The people donated freely \u2014 their hearts moved them. What motivates your giving: obligation or love?","The Tabernacle was portable \u2014 they could take it everywhere. How do you carry the spirit of the temple daily?"]}},{week:19,dates:"May 4\u201310",title:"The Lord Bless Thee and Keep Thee",ref:"Numbers 11\u201314; 20\u201324; 27",theme:"The law of Moses was a schoolmaster pointing to Christ. Manna came every morning \u2014 just enough for the day.",days:{Monday:{scripture:"Numbers 6:24\u201326",summary:"Numbers 11\u201312: Israel murmurs again \u2014 they want meat instead of manna. They weep and cry about the fish and cucumbers they had in Egypt. God sends quail \u2014 so much it comes out of their nostrils. Then Miriam and Aaron criticize Moses for his Cushite wife. God strikes Miriam with leprosy. Moses prays for her healing.",keyPrinciple:"The Aaronic blessing: the Lord bless you, keep you, make His face shine on you, be gracious, give you peace.",reflect:"Which part of this blessing do you need most \u2014 protection, grace, or peace?",pray:"Pray the Aaronic blessing over yourself today. Receive it.",act:"Write Numbers 6:24\u201326 by hand and post it somewhere visible.",fsy:{title:"FSY: Covenant Path",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/02covenant-path",note:"Covenants are the backbone of today's reading. This section explains what it means to be on the covenant path and how every ordinance connects us more deeply to God."}},Wednesday:{scripture:"Numbers 13:27\u201333",summary:"Numbers 13\u201314: Twelve spies are sent into Canaan. They return after forty days. The land flows with milk and honey \u2014 they bring back a cluster of grapes so large two men carry it. But ten spies say: 'We are like grasshoppers in their sight.' Caleb and Joshua say: 'We can do it.' The people choose fear.",keyPrinciple:"Ten spies felt like grasshoppers. Two felt like conquerors. Same land \u2014 completely different perspective.",reflect:"When have you felt like a grasshopper? What shifted your perspective?",pray:"Ask God to give you Caleb's perspective on your current giants.",act:"Write your giant on one side of a paper and what God says about it on the other.",fsy:{title:"FSY: Agency and Integrity",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/04agency-and-integrity",note:"Agency is at the heart of today's reading. God gives commandments but never forces obedience \u2014 the choice is always ours. This section explores how to make choices aligned with God's will."}},Friday:{scripture:"Numbers 14:6\u20139",summary:"Numbers 21\u201327: The people speak against God and Moses again. God sends serpents. Many die. Moses makes a bronze serpent and puts it on a pole \u2014 anyone who looks at it lives. This points to Christ being lifted up on the cross. Then Balaam and his donkey, Phinehas's zeal, and the daughters of Zelophehad claiming their inheritance.",keyPrinciple:"Caleb and Joshua tore their clothes in grief over Israel's unbelief. Faith is worth grieving over when it's missing.",reflect:"What makes you grieve when people around you choose fear over faith?",pray:"Ask God to anchor your faith so it isn't swept away by others' fear.",act:"Stand for one faith-based perspective in a conversation today.",fsy:{title:"FSY: Education and Learning",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/10education-and-learning",note:"Today's reading features wisdom or the cost of ignoring instruction. This section encourages learning as a lifelong spiritual discipline."}}},resources:[{title:"Numbers: The Book of Wanderings",url:"https://www.churchofjesuschrist.org/study/ensign/1980/06/numbers-the-book-of-wanderings",type:"Ensign",who:"Sidney B. Sperry"},{title:"Don't Miss This \u2014 Numbers 11\u201314; 20\u201324",url:"https://www.youtube.com/c/DontMissThis",type:"Podcast",who:"Don't Miss This"}],ywPrep:{summary:"Numbers 6 gives the Aaronic Priesthood blessing: 'The Lord bless thee and keep thee.' Two spies saw giants; two saw God \u2014 the same land, completely different perspective. The majority's fear cost an entire generation their promised land.",prompts:["Numbers 6:24\u201326 \u2014 what would it mean to personally receive each phrase God speaks over you?","Ten spies saw giants. Two saw God. What is the difference in how they were looking at the same situation?","Israel murmured constantly even after miracles. Where do you recognize that pattern in yourself?","Manna was given one day at a time. What does trusting God one day at a time look like for you right now?"]}},{week:20,dates:"May 11\u201317",title:"Thou Shalt Love the Lord Thy God",ref:"Deuteronomy 6\u20138; 15; 18; 29\u201330; 34",theme:"Moses' farewell: love God with all your heart, soul, and strength. I set before you life and death \u2014 choose life.",days:{Monday:{scripture:"Deuteronomy 6:4\u20139",summary:"Deuteronomy 6\u20138: Moses gives Israel the Shema \u2014 'Hear O Israel, the Lord our God is one Lord. Thou shalt love the Lord thy God with all thine heart, with all thy soul, and with all thy might.' He urges them to teach these words to their children constantly. God is about to give them a prosperous land. Don't forget where it came from.",keyPrinciple:"Love the Lord your God with all your heart, soul, and strength. The Shema \u2014 the foundation of everything.",reflect:"Heart, soul, strength \u2014 which aspect of your love for God needs the most attention right now?",pray:"Pray the Shema: Lord, I love you with my heart, soul, and strength.",act:"Write Deuteronomy 6:5 somewhere in your home where your family will see it.",fsy:{title:"FSY: Covenant Path",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/02covenant-path",note:"Covenants are the backbone of today's reading. This section explains what it means to be on the covenant path and how every ordinance connects us more deeply to God."}},Wednesday:{scripture:"Deuteronomy 8:2\u20133",summary:"Deuteronomy 29\u201330: Moses gathers all Israel before him \u2014 leaders, elders, children, strangers, woodcutters, water drawers \u2014 and renews the covenant. Then he says: 'I have set before you life and death, blessing and cursing. Therefore choose life.' It is always a choice.",keyPrinciple:"God led Israel in the wilderness to humble them and prove what was in their heart. Trials reveal us.",reflect:"What has a recent trial revealed about what is truly in your heart?",pray:"Ask God what He is building in you through your current hard season.",act:"Write what you have learned about yourself through your hardest recent experience.",fsy:{title:"FSY: Education and Learning",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/10education-and-learning",note:"Today's reading features wisdom or the cost of ignoring instruction. This section encourages learning as a lifelong spiritual discipline."}},Friday:{scripture:"Deuteronomy 30:15\u201316, 19\u201320",summary:"Deuteronomy 31\u201334: Moses writes down the law and gives it to the Levites. He teaches Israel a song. Then God tells him to go up Mount Nebo where he will see Canaan but not enter it. Moses is 120 years old. His eye is not dim. He sees the land and dies. 'There arose not a prophet since in Israel like Moses.'",keyPrinciple:"I set before you life and death. Choose life \u2014 that both you and your seed may live.",reflect:"What is one choice in front of you right now that is really a choice between spiritual life and death?",pray:"Ask God to help you choose life in your daily decisions.",act:"Write three life-giving choices you want to make this week.",fsy:{title:"FSY: Agency and Integrity",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/04agency-and-integrity",note:"Agency is at the heart of today's reading. God gives commandments but never forces obedience \u2014 the choice is always ours. This section explores how to make choices aligned with God's will."}}},resources:[{title:"Teaching Our Children to Love the Lord",url:"https://www.churchofjesuschrist.org/study/general-conference/2016/10/teaching-our-children-to-love-the-lord",type:"General Conference",who:"Sister Rosemary M. Wixom"},{title:"Don't Miss This \u2014 Deuteronomy 6\u20138; 30; 34",url:"https://www.youtube.com/c/DontMissThis",type:"Podcast",who:"Don't Miss This"}],ywPrep:{summary:"Deuteronomy is Moses' farewell sermon. He spent his last days teaching Israel to love God, remember His history with them, and choose the covenant again. 'Love the Lord thy God with all thine heart, and with all thy soul, and with all thy might.' Jesus quoted this as the greatest commandment. Moses died before entering the promised land.",prompts:["Moses said, 'Love the Lord with all your heart, soul, and might.' Which of the three is hardest for you right now?","God told Israel to talk about His commandments morning and night. What does daily faith formation look like in your home?","Moses died before entering the promised land after 40 years of faithful leading. What does his faithfulness without the reward teach you?","'I set before you life and death \u2014 choose life.' What does choosing life look like for you specifically today?"]}},{week:21,dates:"May 18\u201324",title:"Be Strong and of a Good Courage",ref:"Joshua 1\u20138; 23\u201324",theme:"Joshua led Israel into the promised land. Courage is obedience in the presence of fear.",days:{Monday:{scripture:"Joshua 1:5\u20139",summary:"Joshua 1\u20134: Moses has died. God commissions Joshua: 'Be strong and of a good courage. Every place the sole of your foot shall tread, I have given it to you.' The people cross the Jordan River on dry ground \u2014 echoing the Red Sea crossing. Twelve stones are set up as a memorial: 'What do these stones mean?' 'God stopped the Jordan.'",keyPrinciple:"Be strong and courageous \u2014 I will be with you wherever you go. The courage comes from the presence.",reflect:"What situation is God asking you to face this week? Where is He in that situation?",pray:"Ask God to make His presence real in your scariest place.",act:"Do one thing today that requires courage. God said He'd be with you.",fsy:{title:"FSY: Agency and Integrity",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/04agency-and-integrity",note:"Agency is at the heart of today's reading. God gives commandments but never forces obedience \u2014 the choice is always ours. This section explores how to make choices aligned with God's will."}},Wednesday:{scripture:"Joshua 3:13\u201317",summary:"Joshua 5\u20138: Israel circumcises the men born in the wilderness \u2014 the generation that never received the covenant sign. They observe Passover. The manna stops \u2014 they eat from the land. Joshua meets the captain of the Lord's host with a drawn sword. The walls of Jericho fall after seven days of marching.",keyPrinciple:"The river parted when the priests' feet touched the water. Faith requires a step before the miracle.",reflect:"What step is God waiting for you to take before He opens the way?",pray:"Ask God for the faith to step in before the water parts.",act:"Take one concrete step toward something you've been waiting on God to open first.",fsy:{title:"FSY: Agency and Integrity",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/04agency-and-integrity",note:"Agency is at the heart of today's reading. God gives commandments but never forces obedience \u2014 the choice is always ours. This section explores how to make choices aligned with God's will."}},Friday:{scripture:"Joshua 6:3\u20135, 20",summary:"Joshua 23\u201324: Joshua is old and gives his farewell address. He recites everything God has done for Israel \u2014 brought them out of Egypt, defeated their enemies, gave them a land they did not plant. Then the great challenge: 'Choose you this day whom ye will serve.' Joshua's answer: 'As for me and my house, we will serve the Lord.'",keyPrinciple:"March around Jericho seven days. Shout. The walls fell. God's methods often look nothing like ours.",reflect:"Is God asking you to do something that seems pointless or too simple? What is your wall?",pray:"Ask God for patience to keep marching when nothing seems to be happening.",act:"Keep doing what God told you to do, even if nothing visible is changing yet.",fsy:{title:"FSY: Living the Gospel",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/12living-the-gospel",note:"Today's reading illustrates what it looks like to live the gospel fully \u2014 or to drift from it. This section describes what it means to be an active disciple in everyday life."}}},resources:[{title:"Be Strong and of a Good Courage",url:"https://www.churchofjesuschrist.org/study/general-conference/2014/10/be-strong-and-of-a-good-courage",type:"General Conference",who:"Elder Robert D. Hales"},{title:"Don't Miss This \u2014 Joshua 1\u20138; 23\u201324",url:"https://www.youtube.com/c/DontMissThis",type:"Podcast",who:"Don't Miss This"}],ywPrep:{summary:"Moses died. Joshua was terrified. God said 'be strong and courageous' three times. The Jordan parted after the priests stepped in first. Jericho fell after seven days of marching. Joshua's final declaration: 'As for me and my house, we will serve the Lord.'",prompts:["God told Joshua to be courageous three times. Why does God repeat Himself?","The Jordan didn't part until the priests stepped in. What step of faith are you standing at the edge of?","Jericho's walls fell after seven days of what looked like foolishness. What is God asking you to keep doing when nothing visible is happening?","'As for me and my house, we will serve the Lord.' What is your personal declaration of covenant loyalty?"]}},{week:22,dates:"May 25\u201331",title:"The Lord Raised Up a Deliverer",ref:"Judges 2\u20134; 6\u20138; 13\u201316",theme:"Deborah led wisely. Gideon fought with 300. Samson squandered his gifts. God raises up unexpected deliverers.",days:{Monday:{scripture:"Judges 2:10\u201312, 16",summary:"Judges 2\u20134: After Joshua dies, Israel falls into a cycle: they abandon God, enemies oppress them, they cry out, God raises a judge to deliver them, they follow God while the judge lives, then fall again. Deborah is a prophetess and judge \u2014 she leads Barak into battle against Sisera. Israel defeats the Canaanites.",keyPrinciple:"A generation arose that knew not the Lord. Covenant memory is the thing that keeps us from the cycle.",reflect:"What practices help you not forget God between blessings?",pray:"Ask God to help you build habits that keep Him central even when life is comfortable.",act:"Write one practice you will implement to remember God daily.",fsy:{title:"FSY: Living the Gospel",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/12living-the-gospel",note:"Today's reading illustrates what it looks like to live the gospel fully \u2014 or to drift from it. This section describes what it means to be an active disciple in everyday life."}},Wednesday:{scripture:"Judges 4:4\u20139, 14",summary:"Judges 4\u20135: Deborah and Barak's song of victory \u2014 one of the oldest poems in the Bible. Then Jael, a woman not even Israelite, drives a tent peg through Sisera's head. The song celebrates ordinary people doing extraordinary acts of deliverance. God works through whomever He chooses.",keyPrinciple:"Deborah led Israel as prophetess and judge. She went into battle and credited God for the victory.",reflect:"What leadership has God given you \u2014 in your home, class, or community?",pray:"Ask God to give you Deborah's confidence to lead when called.",act:"Lead one thing today with intentionality and credit God for the result.",fsy:{title:"FSY: Giving Service",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/11giving-service",note:"Today's reading features someone who gives more than expected \u2014 or fails to. This section explores why serving others is central to discipleship."}},Friday:{scripture:"Judges 7:2\u20137",summary:"Judges 13\u201316: Samson \u2014 the last judge. An angel announces his birth. He is to be a Nazirite, set apart to God. He has supernatural strength from his hair. He marries a Philistine woman against his parents' wishes. He kills a lion with his bare hands. He tells Delilah the secret of his strength. She betrays him.",keyPrinciple:"God reduced Gideon's army so Israel wouldn't credit themselves for the victory. 300 against thousands.",reflect:"When has God made something harder so you would know the victory was His?",pray:"Ask God to remove anything that makes you trust your own strength over His.",act:"Identify one place you're relying on your own power and give it to God today.",fsy:{title:"FSY: Agency and Integrity",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/04agency-and-integrity",note:"Agency is at the heart of today's reading. God gives commandments but never forces obedience \u2014 the choice is always ours. This section explores how to make choices aligned with God's will."}}},resources:[{title:"Deborah and the Latter-day Sisterhood",url:"https://www.churchofjesuschrist.org/study/ensign/2016/09/deborah-and-the-latter-day-sisterhood",type:"Ensign",who:"Camille Fronk Olson"},{title:"Don't Miss This \u2014 Judges 2\u20134; 6\u20138; 13\u201316",url:"https://www.youtube.com/c/DontMissThis",type:"Podcast",who:"Don't Miss This"}],ywPrep:{summary:"Judges is honest and uncomfortable. Israel kept forgetting God, suffering, crying out, being delivered \u2014 and forgetting again. Deborah judged all of Israel with wisdom and led them to military victory. Gideon was the least of the least and God called him 'mighty man of valor.' Samson had every gift and wasted them all through slow compromise.",prompts:["Deborah was a judge, prophetess, wife, and military leader. What does her story say about women in God's kingdom?","God reduced Gideon's army from 32,000 to 300. Why would God intentionally make the task harder?","Samson's gifts didn't automatically lead to righteousness. What gifts could you use for good or waste?","The Judges cycle repeats: forget, suffer, cry out, deliver, forget. Where do you see that pattern in your own life?"]}},{week:23,dates:"Jun 1\u20137",title:"My Heart Rejoiceth in the Lord",ref:"Ruth; 1 Samuel 1\u20137",theme:"Ruth's loyalty is a picture of covenant love. Hannah prayed desperately and God answered with Samuel.",days:{Monday:{scripture:"Ruth 1:16\u201317",summary:"Ruth 1: Naomi, an Israelite, loses her husband and both sons in Moab. She tells her daughters-in-law to return to their own people. Orpah leaves but Ruth clings to Naomi: 'Whither thou goest, I will go. Thy people shall be my people, and thy God my God.' This is one of the great declarations of loyalty in all of scripture.",keyPrinciple:"Whither thou goest I will go. Your people shall be my people. Ruth's loyalty was a covenant, not a convenience.",reflect:"Who are the people you are committed to regardless of cost or convenience?",pray:"Ask God to give you Ruth-level loyalty in your most important relationships.",act:"Do something for one person that shows you are fully in \u2014 no conditions.",fsy:{title:"FSY: Relationships",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/06relationships",note:"Today's reading involves a key relationship between people or between a person and God. This FSY section explores what healthy, God-centered relationships look like."}},Wednesday:{scripture:"Ruth 2:12",summary:"Ruth 2\u20133: Ruth gleans in Boaz's fields \u2014 a provision in Israelite law for the poor. Boaz notices her and tells his workers to leave extra grain for her and not rebuke her. He asks who she is. Naomi realizes Boaz is their kinsman-redeemer \u2014 a relative with the legal right and responsibility to restore the family.",keyPrinciple:"Boaz redeemed Ruth \u2014 covered her, bought her back, protected her. He is a type of Christ as our kinsman redeemer.",reflect:"In what ways is Jesus your kinsman redeemer \u2014 covering you, buying you back, protecting you?",pray:"Thank Jesus for being your personal kinsman redeemer.",act:"Read about kinsman redeemer in a Bible dictionary. Write what stands out to you.",fsy:{title:"FSY: Covenant Path",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/02covenant-path",note:"Covenants are the backbone of today's reading. This section explains what it means to be on the covenant path and how every ordinance connects us more deeply to God."}},Friday:{scripture:"1 Samuel 1:10\u201311, 20",summary:"Ruth 4: Boaz goes to the city gate and negotiates with the closer kinsman, who won't marry Ruth because it will affect his own inheritance. Boaz takes the sandal as a symbol of the transaction. He marries Ruth. She bears a son \u2014 Obed, the grandfather of David. A Moabite woman becomes part of the lineage of Christ.",keyPrinciple:"Hannah poured out her soul to God \u2014 weeping, vowing, refusing to give up. God gave her Samuel.",reflect:"What prayer have you brought to God with Hannah's intensity? How has He answered?",pray:"Pour out one honest, deep prayer today. Hold nothing back.",act:"Write the prayer you have been afraid to pray out loud.",fsy:{title:"FSY: Living the Gospel",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/12living-the-gospel",note:"Today's reading illustrates what it looks like to live the gospel fully \u2014 or to drift from it. This section describes what it means to be an active disciple in everyday life."}}},resources:[{title:"The Book of Ruth: Covenant Love",url:"https://www.churchofjesuschrist.org/study/ensign/1991/03/the-book-of-ruth-covenant-love",type:"Ensign",who:"Camille Fronk Olson"},{title:"Don't Miss This \u2014 Ruth; 1 Samuel 1\u20137",url:"https://www.youtube.com/c/DontMissThis",type:"Podcast",who:"Don't Miss This"}],ywPrep:{summary:"Ruth left her people and gods to stay with Naomi: 'Whither thou goest, I will go.' Boaz redeemed her as a kinsman redeemer \u2014 a clear type of Christ who covers and buys back. Hannah prayed so intensely the priest thought she was drunk. God gave her Samuel. Both women modeled faith through profound personal pain.",prompts:["Ruth said, 'Whither thou goest, I will go.' Who has shown you that kind of loyalty? Who have you shown it to?","Boaz covered Ruth, protected her, and bought her back. How is this a picture of Jesus Christ?","Hannah's prayer was so intense the priest thought she was drunk. When have you prayed that desperately?","Hannah gave Samuel back to God after she finally received him. What has God given you that He might be asking you to consecrate?"]}},{week:24,dates:"Jun 8\u201314",title:"The Lord Looketh on the Heart",ref:"1 Samuel 8\u201310; 13; 15\u201316",theme:"Israel wanted a king like the nations. God gave them Saul. David was chosen because God looks on the heart.",days:{Monday:{scripture:"1 Samuel 8:5\u20137",summary:"1 Samuel 8\u201310: Israel demands a king \u2014 'to be like all the nations.' God tells Samuel this is a rejection of God's kingship, not Samuel's leadership. He warns them what a king will do: take their sons for war, their daughters for cooks, their fields for his servants. They still want a king. God gives them Saul \u2014 tall, head and shoulders above all others.",keyPrinciple:"Israel wanted a king like the nations. God said they were rejecting Him. Conformity costs covenant.",reflect:"What pressure to conform to the world have you felt recently? What did it cost you?",pray:"Ask God to help you want Him more than you want to fit in.",act:"Identify one area where you are choosing culture over covenant.",fsy:{title:"FSY: Living the Gospel",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/12living-the-gospel",note:"Today's reading illustrates what it looks like to live the gospel fully \u2014 or to drift from it. This section describes what it means to be an active disciple in everyday life."}},Wednesday:{scripture:"1 Samuel 15:22",summary:"1 Samuel 13\u201315: Saul is impatient. He offers the sacrifice himself instead of waiting for Samuel. Samuel arrives and says: 'Thou hast done foolishly. The Lord would have established thy kingdom forever, but now it shall not continue.' Then Saul is commanded to destroy the Amalekites completely \u2014 he spares the king and best livestock. Samuel: 'To obey is better than sacrifice.'",keyPrinciple:"To obey is better than sacrifice. Saul sacrificed without obeying. God was not impressed.",reflect:"Where are you substituting religious activity for actual obedience?",pray:"Ask God to show you one area where you are going through the motions.",act:"Obey one specific thing God has been asking that you have been rationalizing around.",fsy:{title:"FSY: Agency and Integrity",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/04agency-and-integrity",note:"Agency is at the heart of today's reading. God gives commandments but never forces obedience \u2014 the choice is always ours. This section explores how to make choices aligned with God's will."}},Friday:{scripture:"1 Samuel 16:7",summary:"1 Samuel 16: God tells Samuel to go to Bethlehem to anoint one of Jesse's sons. Seven sons pass before Samuel. God says no to each one. 'Man looketh on the outward appearance but the Lord looketh on the heart.' The youngest, David \u2014 out with the sheep \u2014 is brought in. Samuel anoints him and the Spirit comes upon him.",keyPrinciple:"Man looks at outward appearance. God looks at the heart. David was chosen while his brothers stood by.",reflect:"What does God see in your heart right now that outward appearances hide?",pray:"Ask God to show you your heart honestly \u2014 the good and the parts that need work.",act:"Write an honest inventory of what you believe God sees in your heart right now.",fsy:{title:"FSY: Living the Gospel",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/12living-the-gospel",note:"Today's reading illustrates what it looks like to live the gospel fully \u2014 or to drift from it. This section describes what it means to be an active disciple in everyday life."}}},resources:[{title:"The Lord Looketh on the Heart",url:"https://www.churchofjesuschrist.org/study/general-conference/1994/04/the-lord-looketh-on-the-heart",type:"General Conference",who:"Elder Richard G. Scott"},{title:"Don't Miss This \u2014 1 Samuel 8\u201316",url:"https://www.youtube.com/c/DontMissThis",type:"Podcast",who:"Don't Miss This"}],ywPrep:{summary:"Israel demanded a king to be like other nations. God gave them Saul \u2014 tall, impressive, and ultimately disobedient. God rejected Saul and sent Samuel to anoint the youngest, smallest son of Jesse, who was out tending sheep. 'The Lord looketh not on the outward appearance, but on the heart.'",prompts:["Israel wanted a king 'like the nations.' What do we want today just to fit in with the world around us?","Saul was tall and impressive. David was small and overlooked. Why does God consistently choose the unexpected person?","'The Lord looketh on the heart.' What is the current state of your heart?","To obey is better than sacrifice. Saul sacrificed without obeying. What does that look like today?"]}},{week:25,dates:"Jun 15\u201321",title:"The Battle Is the Lord's",ref:"1 Samuel 17\u201318; 24\u201326; 2 Samuel 5\u20137",theme:"David faced Goliath with faith, not armor. The battle is the Lord's. He showed mercy to his enemy.",days:{Monday:{scripture:"1 Samuel 17:32\u201337",summary:"1 Samuel 17: Goliath \u2014 a Philistine champion nine feet tall \u2014 challenges Israel for forty days. Everyone is terrified. David, delivering food to his brothers, hears the challenge and asks: 'Who is this uncircumcised Philistine that he should defy the armies of the living God?' He takes a sling and five smooth stones. Goliath falls.",keyPrinciple:"David rehearsed his past deliverances to build faith for his present giant. History with God builds courage.",reflect:"What past deliverances can you rehearse to build faith for what you're facing now?",pray:"Rehearse your testimony out loud today. Tell God what He has done for you.",act:"Write three times God came through for you. Read it before bed.",fsy:{title:"FSY: Agency and Integrity",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/04agency-and-integrity",note:"Agency is at the heart of today's reading. God gives commandments but never forces obedience \u2014 the choice is always ours. This section explores how to make choices aligned with God's will."}},Wednesday:{scripture:"1 Samuel 17:45\u201347",summary:"1 Samuel 18\u201326: David becomes a military hero. The women sing: 'Saul hath slain his thousands and David his ten thousands.' Saul becomes jealous and tries to kill David multiple times. David lives as a fugitive. He has two chances to kill Saul and refuses both times. 'The Lord forbid that I should stretch forth mine hand against the Lord's anointed.'",keyPrinciple:"'I come in the name of the Lord.' The battle belongs to Him, not to us.",reflect:"What would it look like to face your current Goliath in the name of the Lord rather than your own ability?",pray:"Name your giant to God. Say out loud: 'This battle is the Lord's.'",act:"Replace one anxious thought with 'the battle is the Lord's' every time it comes today.",fsy:{title:"FSY: Covenant Path",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/02covenant-path",note:"Covenants are the backbone of today's reading. This section explains what it means to be on the covenant path and how every ordinance connects us more deeply to God."}},Friday:{scripture:"1 Samuel 24:4\u20137, 10",summary:"2 Samuel 5\u20137: David is anointed king over all Israel after years of waiting. He captures Jerusalem and makes it his capital. He brings the ark of the covenant into the city and dances before the Lord with all his might. God makes a covenant with David: his throne will be established forever. David asks to build God a house; God says He will build David a house.",keyPrinciple:"David spared Saul's life when he had every reason \u2014 and opportunity \u2014 to end it. He refused to avenge himself.",reflect:"Who has wronged you that you have the power to hurt but have chosen not to? What did that cost you?",pray:"Ask God to give you David's restraint toward someone who has hurt you.",act:"Choose to respond to one injustice with mercy today instead of retaliation.",fsy:{title:"FSY: Agency and Integrity",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/04agency-and-integrity",note:"Agency is at the heart of today's reading. God gives commandments but never forces obedience \u2014 the choice is always ours. This section explores how to make choices aligned with God's will."}}},resources:[{title:"David and Goliath: A Type of Christ",url:"https://www.churchofjesuschrist.org/study/ensign/2012/06/old-testament",type:"Ensign",who:"Church of Jesus Christ"},{title:"Don't Miss This \u2014 1 Samuel 17\u201326; 2 Samuel 5\u20137",url:"https://www.youtube.com/c/DontMissThis",type:"Podcast",who:"Don't Miss This"}],ywPrep:{summary:"David was too small for Saul's armor. He went to Goliath with a sling and the name of the Lord. 'The battle is the Lord's.' Later, when David could have killed Saul \u2014 his pursuer \u2014 he refused twice. He would not touch the Lord's anointed. God then established David's kingdom with a covenant pointing to Christ.",prompts:["David refused Saul's armor because it didn't fit. What unique strengths has God given you for your own giants?","'The battle is the Lord's, not ours.' What battle are you trying to fight in your own strength right now?","David spared Saul's life twice when he had every reason to take it. What does that level of restraint look like in your relationships?","God promised David a throne that would endure forever \u2014 fulfilled in Jesus Christ. How do you see Christ in David's story?"]}},{week:26,dates:"Jun 22\u201328",title:"Hear Thou in Heaven Their Prayer",ref:"2 Samuel 11\u201312; 1 Kings 3; 6\u20139; 11",theme:"David fell and repented. Solomon asked for wisdom and built the temple. Even greatness can erode.",days:{Monday:{scripture:"2 Samuel 11\u201312",focus:"2 Samuel 11:1\u20134",summary:"2 Samuel 11\u201312: David stays home when kings go to war. He sees Bathsheba bathing, sends for her, she becomes pregnant. He arranges for her husband Uriah to be killed in battle. He marries Bathsheba. The Lord sends Nathan the prophet to David with a parable about a rich man who steals a poor man's only lamb. David is furious \u2014 until Nathan says: 'Thou art the man.'",keyPrinciple:"David's sin began with staying home when kings went to war \u2014 displaced presence. Where we are matters.",reflect:"Where are you supposed to be \u2014 spiritually, relationally, vocationally \u2014 that you're currently avoiding?",pray:"Ask God to put you back in your right place.",act:"Return to one thing you've been avoiding \u2014 a relationship, a calling, a habit.",fsy:{title:"FSY: Repentance and Forgiveness",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/05repentance-and-forgiveness",note:"Today's reading shows someone facing consequences of sin \u2014 or being given a second chance. This FSY section teaches that repentance is always available and God's mercy can cover any mistake."}},Wednesday:{scripture:"1 Kings 3; 6\u20137",focus:"1 Kings 3:5\u20139",summary:"1 Kings 3; 6\u20137: David dies and Solomon becomes king. God appears to Solomon in a dream and offers him anything he wants. Solomon asks for wisdom to govern well. God is so pleased that Solomon asked for this \u2014 not wealth or victory \u2014 that He gives him wisdom AND wealth AND honor. Then Solomon builds the temple \u2014 seven years, thousands of workers, cedar from Lebanon.",keyPrinciple:"'Thou art the man.' Nathan's parable pierced what direct accusation couldn't. David's repentance was deep and real.",reflect:"Is there a 'thou art the man' moment you've been avoiding \u2014 a truth about yourself you haven't accepted?",pray:"Pray Psalm 51:1\u20134 as your own prayer today.",act:"Read Psalm 51 slowly, out loud, as if it's your own prayer.",fsy:{title:"FSY: Repentance and Forgiveness",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/05repentance-and-forgiveness",note:"Today's reading shows someone facing consequences of sin \u2014 or being given a second chance. This FSY section teaches that repentance is always available and God's mercy can cover any mistake."}},Friday:{scripture:"1 Kings 8\u20139; 11",focus:"1 Kings 8:27\u201330",summary:"1 Kings 8\u20139; 11: Solomon dedicates the temple with one of the greatest prayers in scripture: 'Hear thou in heaven thy dwelling place, and when thou hearest, forgive.' Fire comes down and fills the temple. The glory of God is so thick the priests cannot stand. Then Solomon's wives turn his heart to other gods. 'His heart was not perfect with the Lord his God, as was the heart of David his father.'",keyPrinciple:"Solomon asked for wisdom to govern God's people well. God gave him wisdom \u2014 and everything else.",reflect:"If God appeared to you and said 'Ask what I shall give thee,' what would you ask for?",pray:"Ask God for wisdom today \u2014 specifically for your most complex current situation.",act:"Identify one decision you're facing and ask for wisdom about it specifically.",fsy:{title:"FSY: Temple and Family History",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/03temple-and-family-history",note:"Today's reading connects to God dwelling with His people. This section explains why temples matter and how to prepare spiritually to enter."}}},resources:[{title:"Repentance Is Always Possible",url:"https://www.churchofjesuschrist.org/study/general-conference/2022/10/47christofferson",type:"General Conference",who:"Elder D. Todd Christofferson"},{title:"Don't Miss This \u2014 2 Samuel 11\u201312; 1 Kings 3; 6\u20139",url:"https://www.youtube.com/c/DontMissThis",type:"Podcast",who:"Don't Miss This"}],ywPrep:{summary:"David was home when kings went to war. He stayed behind, saw Bathsheba, and his life unraveled from one moment of displaced presence. Nathan told him a parable \u2014 David didn't recognize himself \u2014 then said, 'Thou art the man.' David's repentance in Psalm 51 is one of the rawest prayers in scripture. Solomon then asked for wisdom above everything else, and God gave him both wisdom and wealth.",prompts:["David's sin began when he wasn't where he was supposed to be. How does being out of our right place leave us vulnerable?","Nathan confronted David with a story rather than a direct accusation. When has someone helped you see yourself through a story?","Psalm 51 is David's repentance prayer. What makes it so powerful and honest?","Solomon asked for wisdom instead of wealth or victory. What would you ask God for if you could ask for anything?"]}},{week:27,dates:"Jun 29\u2013Jul 5",title:"How Long Halt Ye Between Two Opinions?",ref:"1 Kings 12\u201313; 17\u201322",theme:"The kingdom split. Elijah challenged Israel to choose. After his greatest victory, he collapsed. God met him with bread and rest.",days:{Monday:{scripture:"1 Kings 12\u201313; 17\u201318",focus:"1 Kings 18:21",summary:"1 Kings 12\u201313; 17\u201318: The kingdom splits after Solomon. Rehoboam threatens heavier burdens; ten tribes follow Jeroboam north. Elijah appears from nowhere and announces a drought \u2014 no rain except at his word. God hides him by the brook Cherith where ravens bring him food. Then to Zarephath where a widow shares her last meal \u2014 her oil and flour never run out. Finally Elijah confronts 450 prophets of Baal on Mount Carmel and calls down fire from heaven.",keyPrinciple:"'How long halt ye between two opinions? If the Lord be God, follow Him.' No more fence-sitting.",reflect:"Where are you fence-sitting between God and something else right now?",pray:"Ask God for the clarity and courage to fully choose one side.",act:"Pick one area of spiritual fence-sitting and make a real decision today.",fsy:{title:"FSY: Agency and Integrity",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/04agency-and-integrity",note:"Agency is at the heart of today's reading. God gives commandments but never forces obedience \u2014 the choice is always ours. This section explores how to make choices aligned with God's will."}},Wednesday:{scripture:"1 Kings 19",focus:"1 Kings 19:4\u20137",summary:"1 Kings 19: After the greatest miracle of his life, Elijah receives a death threat from Jezebel and runs. He sits under a juniper tree and asks to die: 'It is enough; now, O Lord, take away my life.' An angel touches him \u2014 twice \u2014 with food and water. God does not rebuke him. He says: 'The journey is too great for thee.' Then God appears \u2014 not in wind, earthquake, or fire \u2014 but in a still small voice.",keyPrinciple:"Elijah called down fire and then immediately ran in fear. Spiritual highs don't protect us from exhaustion.",reflect:"When have you had a major spiritual victory followed quickly by a crash?",pray:"Ask God to sustain you after the mountain, not just on it.",act:"Do something today that fills your tank \u2014 rest, nature, real food, a conversation that matters.",fsy:{title:"FSY: Physical Health",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/08physical-health",note:"Today's reading involves the physical body \u2014 its limits or miraculous capacity. This section teaches that the body is sacred and how we treat it reflects what we believe."}},Friday:{scripture:"1 Kings 20\u201322",focus:"1 Kings 19:11\u201313",summary:"1 Kings 20\u201322: Ahab fights Ben-Hadad of Syria and wins \u2014 twice, against impossible odds, because God is showing He is Lord everywhere, not just in the hills. Then Ahab covets Naboth's vineyard. Naboth refuses to sell his inheritance. Jezebel arranges Naboth's murder. Elijah confronts Ahab: 'Hast thou killed, and also taken possession?' Ahab's humiliation before God. Jehoshaphat joins a disastrous alliance with Ahab \u2014 the danger of choosing the wrong partnerships.",keyPrinciple:"God fed Elijah, let him sleep, and fed him again. He didn't lecture him. The journey is too great for you alone.",reflect:"When have you been so depleted that God's answer was simply: eat, rest, eat again?",pray:"Ask God to meet your exhaustion with provision, not demands.",act:"Rest without guilt today. Nourish your body. Treat it as sacred.",fsy:{title:"FSY: Physical Health",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/08physical-health",note:"Today's reading involves the physical body \u2014 its limits or miraculous capacity. This section teaches that the body is sacred and how we treat it reflects what we believe."}}},resources:[{title:"The Prophet Elijah",url:"https://www.churchofjesuschrist.org/study/general-conference/1989/10/elijah-the-prophet",type:"General Conference",who:"Elder Joseph B. Wirthlin"},{title:"Don't Miss This \u2014 1 Kings 12\u201313; 17\u201322",url:"https://www.youtube.com/c/DontMissThis",type:"Podcast",who:"Don't Miss This"},{title:"Mental Health and Elijah's Depression",url:"https://www.saintsunscripted.com",type:"Podcast",who:"Saints Unscripted"}],ywPrep:{summary:"The kingdom split after Solomon. Elijah appeared on the scene and challenged 450 prophets of Baal on Mount Carmel \u2014 called down fire from heaven \u2014 and then immediately ran in fear from one woman. He sat under a juniper tree and asked to die. God didn't rebuke him. He sent an angel with food and said: 'Arise and eat, the journey is too great for thee.' God meets burnout with bread, rest, and a still small voice.",prompts:["Elijah asked, 'How long halt ye between two opinions?' What areas of your life feel spiritually undecided?","Elijah went from his greatest miracle to suicidal exhaustion in one day. Why do spiritual highs sometimes precede crashes?","God's answer to Elijah's burnout was food, rest, and gentle touch \u2014 not a lecture. What does that teach about how God treats exhaustion?","God was not in the wind, earthquake, or fire \u2014 but in the still small voice. How do you hear that voice in your own life?"]}},{week:28,dates:"Jul 6\u201312",title:"There Is a Prophet in Israel",ref:"2 Kings 2\u20137",theme:"Elisha received a double portion. Oil multiplied, Naaman healed, eyes opened to heaven's armies.",days:{Monday:{scripture:"2 Kings 2:2\u20136, 9\u201310",summary:"2 Kings 2: Elijah is about to be taken to heaven. He tries three times to tell Elisha to stay behind \u2014 Elisha refuses each time: 'As the Lord liveth, I will not leave thee.' They cross the Jordan. A chariot of fire separates them. Elijah ascends in a whirlwind. Elisha picks up Elijah's mantle and parts the Jordan himself. The double portion of the spirit rests on him.",keyPrinciple:"Elisha refused to leave Elijah three times. His persistence and loyalty earned a double portion.",reflect:"Who in your life is worth staying close to \u2014 a mentor, parent, or leader \u2014 even when others pull away?",pray:"Ask God for the persistence to stay near people who are leading you toward Him.",act:"Express genuine gratitude to one mentor or leader in your life today.",fsy:{title:"FSY: Relationships",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/06relationships",note:"Today's reading involves a key relationship between people or between a person and God. This FSY section explores what healthy, God-centered relationships look like."}},Wednesday:{scripture:"2 Kings 4:1\u20137",summary:"2 Kings 4: A widow's husband has died leaving debts. Creditors are coming to take her sons as slaves. Elisha asks: 'What do you have in the house?' A little oil. He tells her to gather empty vessels \u2014 as many as possible \u2014 and pour. The oil fills every vessel. It stops when the vessels run out. The miracle matched her preparation.",keyPrinciple:"The widow's oil multiplied until she ran out of vessels. The miracle stopped when preparation stopped.",reflect:"What vessels are you preparing for God to fill?",pray:"Ask God to show you how to prepare for the blessing that is coming.",act:"Do one act of preparation today for a future opportunity or responsibility.",fsy:{title:"FSY: Giving Service",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/11giving-service",note:"Today's reading features someone who gives more than expected \u2014 or fails to. This section explores why serving others is central to discipleship."}},Friday:{scripture:"2 Kings 5:10\u201314",summary:"2 Kings 5\u20137: Naaman, the commander of Syria's army, has leprosy. His Israelite servant girl says there is a prophet in Israel. Naaman arrives at Elisha's house. Elisha sends a messenger \u2014 he doesn't even come out \u2014 and says: go wash in the Jordan seven times. Naaman is furious. His servants persuade him. He dips seven times. He is clean. Then Elisha's servant Gehazi lies to get the reward \u2014 and receives Naaman's leprosy instead.",keyPrinciple:"Naaman almost missed his healing because God's instructions seemed too simple and beneath him.",reflect:"What has God asked you to do that seemed too simple or too humble to take seriously?",pray:"Ask God if there's a simple instruction you've been resisting.",act:"Do one simple, unglamorous act of obedience today.",fsy:{title:"FSY: Living the Gospel",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/12living-the-gospel",note:"Today's reading illustrates what it looks like to live the gospel fully \u2014 or to drift from it. This section describes what it means to be an active disciple in everyday life."}}},resources:[{title:"Are We Not All Beggars?",url:"https://www.churchofjesuschrist.org/study/general-conference/2014/10/are-we-not-all-beggars",type:"General Conference",who:"Elder Jeffrey R. Holland"},{title:"Don't Miss This \u2014 2 Kings 2\u20137 (Elisha)",url:"https://www.youtube.com/c/DontMissThis",type:"Podcast",who:"Don't Miss This"}],ywPrep:{summary:"Elisha refused to leave Elijah's side three times, then asked for a double portion of his spirit. After Elijah was taken to heaven, Elisha performed miracle after miracle: a widow's oil multiplied, a child raised from the dead, Naaman healed of leprosy despite his pride, and his servant's eyes opened to see the armies of heaven surrounding them. 'Fear not \u2014 they that be with us are more than they that be with them.'",prompts:["Elisha refused to leave Elijah no matter how many times he was told to stay. Who in your life is worth that kind of persistence?","The widow's oil multiplied until she ran out of vessels. What does that teach about preparation and faith?","Naaman nearly missed his healing because the cure seemed too simple. What simple things does God ask that we sometimes resist?","Elisha prayed and his servant saw the armies of heaven. What unseen support do you believe God has around you?"]}},{week:29,dates:"Jul 13\u201319",title:"They Served Other Gods",ref:"2 Kings 16\u201325",theme:"Israel fell to Assyria. Judah fell to Babylon. Generations of warnings. Choices have generational consequences.",days:{Monday:{scripture:"2 Kings 17:7\u20139, 13\u201314",summary:"2 Kings 17\u201318: The northern kingdom of Israel is conquered by Assyria and the people scattered \u2014 the 'ten lost tribes.' Why? They had been warned by prophet after prophet and would not listen. They served idols, passed children through fire, rejected the covenant. Then Hezekiah becomes king in Judah \u2014 'He trusted in the Lord God of Israel, and after him was none like him among all the kings of Judah.'",keyPrinciple:"Israel fell because they wouldn't hear the prophets and walked in the ways of the nations. Ignoring God has consequences.",reflect:"What warnings are you hearing from prophets right now that you might be setting aside?",pray:"Ask God to help you hear and act on prophetic counsel even when it's inconvenient.",act:"Read one recent general conference talk and identify one personal application.",fsy:{title:"FSY: Living the Gospel",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/12living-the-gospel",note:"Today's reading illustrates what it looks like to live the gospel fully \u2014 or to drift from it. This section describes what it means to be an active disciple in everyday life."}},Wednesday:{scripture:"2 Kings 18:5\u20137; 19:14\u201319",summary:"2 Kings 18\u201319: Sennacherib of Assyria invades Judah and sends a threatening letter to Hezekiah. Hezekiah takes the letter into the temple and spreads it before the Lord: 'Thou art the God, even thou alone, of all the kingdoms of the earth. Bow thine ear, O Lord, and hear.' That night the angel of the Lord strikes 185,000 Assyrian soldiers dead.",keyPrinciple:"Hezekiah spread the threatening letter before God and prayed. He didn't panic \u2014 he prayed with specifics.",reflect:"What 'threatening letter' \u2014 bad news, hard diagnosis, impossible situation \u2014 do you need to spread before God?",pray:"Lay your specific fear before God exactly as Hezekiah did.",act:"Write out your worst fear on paper and then write one promise of God next to it.",fsy:{title:"FSY: Agency and Integrity",url:"https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/04agency-and-integrity",note:"Agency is at the heart of today's readin
