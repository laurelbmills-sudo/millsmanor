    {
      week: 36,
      dates: "Aug 31\u2013Sep 6",
      ref: "Psalms 102\u2013103; 110; 116\u2013119; 127\u2013128; 135\u2013139; 146\u2013150",
      title: "I Will Praise the Lord",
      theme: "Praise is an act of faith. Bless the Lord at all times \u2014 not just when life is good.",
      resources: [{ title: "Praise to the Lord, the Almighty", url: "https://www.churchofjesuschrist.org/study/general-conference/2017/04/praise-to-the-lord-the-almighty", type: "General Conference", who: "President Henry B. Eyring" }, { title: "Don't Miss This \u2014 Psalms 102\u2013150", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }],
      ywPrep: { summary: "The final Psalms section \u2014 Psalms 102\u2013150 \u2014 includes the great praise psalms. Psalm 103: 'Bless the Lord, O my soul.' Psalm 110: 'The Lord said unto my Lord, Sit thou at my right hand' \u2014 Jesus quoted this. Psalm 118: 'This is the day which the Lord hath made.' Psalm 150: 'Let every thing that hath breath praise the Lord.' Praise is an act of faith.", prompts: ["Psalm 103 lists specific reasons to bless the Lord. What are your specific reasons right now?", "Psalm 110 is the most quoted OT psalm in the New Testament \u2014 Jesus and the apostles saw Christ in it. What do you see?", "Psalm 118:22 says the stone the builders rejected is the chief cornerstone \u2014 Jesus quoted this about Himself. How does rejection become cornerstone?", "Psalm 150 says let everything that has breath praise the Lord. What does it mean to praise with your actual life?"] },
      days: [
        { day: "Monday", summary: "Psalms 103\u2013106; 110: Psalm 103: 'Bless the Lord, O my soul, who forgiveth all thine iniquities, who healeth all thy diseases, who redeemeth thy life from destruction, who crowneth thee with lovingkindness and tender mercies.' Psalm 110 is the most quoted psalm in the New Testament \u2014 a messianic prophecy about the Lord sitting at God's right hand.", scripture: "Psalm 103:1\u20135", keyPrinciple: "Bless the Lord, O my soul \u2014 and forget not all His benefits. Gratitude requires intentional remembering.", reflect: "What specific benefits of God have you been forgetting to notice lately?", pray: "Bless the Lord specifically \u2014 list His benefits out loud in prayer.", act: "Write ten specific things God has done for you in the last year.", dailyQuote: { text: "Bless the Lord, O my soul, and forget not all his benefits.", source: "Psalm 103:2" }, resources: [{ title: "Bless the Lord, O My Soul", url: "https://www.churchofjesuschrist.org/study/general-conference/2023/04/26andersen", type: "General Conference", who: "Elder Neil L. Andersen" }, { title: "Don't Miss This \u2014 Psalms 103; 110", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }, { title: "FSY: Sabbath Day", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/06sabbath-day", type: "FSY Handbook", who: "For the Strength of Youth", note: "Today's reading touches on sacred time, rest, or covenant renewal. This section explains why God asks us to set aside one day \u2014 and what that day is really for." }] },
        { day: "Wednesday", summary: "Psalms 116\u2013119; 127\u2013128: Psalm 116: 'I love the Lord because he hath heard my voice. The Lord is gracious and righteous; our God is merciful.' Psalm 127: 'Except the Lord build the house, they labour in vain that build it.' Psalm 128: 'Blessed is every one that feareth the Lord. Thy wife shall be as a fruitful vine by the sides of thine house.'", scripture: "Psalm 118:22\u201324", keyPrinciple: "The stone the builders rejected has become the chief cornerstone. This is the day the Lord has made.", reflect: "Where in your life has something rejected or discarded become the foundation of something good?", pray: "Thank God for turning what was rejected into something foundational in your life.", act: "Rejoice in this specific day. Name three things about today that are from God.", dailyQuote: { text: "This is the day which the Lord hath made; we will rejoice and be glad in it.", source: "Psalm 118:24" }, resources: [{ title: "Praise and Gratitude", url: "https://www.churchofjesuschrist.org/study/general-conference/2012/04/grateful-in-any-circumstances", type: "General Conference", who: "President Dieter F. Uchtdorf" }, { title: "Don't Miss This \u2014 Psalms 116\u2013119", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }, { title: "FSY: Living the Gospel", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/12living-the-gospel", type: "FSY Handbook", who: "For the Strength of Youth", note: "Today's reading illustrates what it looks like to live the gospel fully \u2014 or to drift from it. This section describes what it means to be an active disciple in everyday life." }] },
        { day: "Friday", summary: "Psalms 135\u2013150: The great hymns of praise. Psalm 136: 'O give thanks unto the Lord, for he is good \u2014 for his mercy endureth forever' \u2014 repeated 26 times. Psalm 145: 'The Lord is gracious and full of compassion, slow to anger and of great mercy.' Psalm 148: 'Praise him, sun and moon, praise him, all ye stars of light.' Psalm 150: 'Let every thing that hath breath praise the Lord.'", scripture: "Psalm 127:1\u20132", keyPrinciple: "Except the Lord build the house, they labour in vain. All the striving, all the building \u2014 it's empty without Him.", reflect: "What are you building right now that you need to make sure the Lord is building with you?", pray: "Give God your current project \u2014 work, family, calling \u2014 and ask Him to build with you.", act: "Identify one area where you have been laboring in your own strength without inviting God in.", dailyQuote: { text: "Except the Lord build the house, they labour in vain that build it.", source: "Psalm 127:1" }, resources: [{ title: "Except the Lord Build the House", url: "https://www.saintsunscripted.com", type: "Podcast", who: "Saints Unscripted" }, { title: "Don't Miss This \u2014 Psalms 127\u2013150", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }, { title: "FSY: Living the Gospel", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/12living-the-gospel", type: "FSY Handbook", who: "For the Strength of Youth", note: "Today's reading illustrates what it looks like to live the gospel fully \u2014 or to drift from it. This section describes what it means to be an active disciple in everyday life." }] },
        { day: "Saturday", scripture: "Psalm 150:6", keyPrinciple: "Let every thing that hath breath praise the Lord. Praise is the posture of the soul that knows who God is.", reflect: "What does it look like to praise God with your actual life \u2014 not just your words?", pray: "Praise God today without any requests. Just praise.", act: "Do one thing today that is pure worship \u2014 no agenda, no asking, just honoring Him.", dailyQuote: { text: "Let every thing that hath breath praise the Lord. Praise ye the Lord.", source: "Psalm 150:6" } }
      ]

    {
      week: 37,
      dates: "Sep 7\u201313",
      ref: "Proverbs 1\u20134; 15\u201316; 22; 31; Ecclesiastes 1\u20133; 11\u201312",
      title: "Fear God and Keep His Commandments",
      theme: "Trust in the Lord with all your heart, lean not on your own understanding. Fear God \u2014 this is the whole duty of man.",
      resources: [{ title: "Becoming a Disciple of Jesus Christ", url: "https://www.churchofjesuschrist.org/study/general-conference/2017/10/becoming-a-disciple-of-jesus-christ", type: "General Conference", who: "Elder Brian K. Taylor" }, { title: "Don't Miss This \u2014 Proverbs; Ecclesiastes", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }],
      ywPrep: { summary: "Proverbs is wisdom literature \u2014 practical teaching for daily life. 'Trust in the Lord with all your heart, lean not on your own understanding.' 'A soft answer turneth away wrath.' 'Train up a child in the way he should go.' Ecclesiastes asks what gives life meaning and concludes: fear God and keep His commandments \u2014 this is the whole duty of man.", prompts: ["Proverbs 3:5\u20136: trust in the Lord with all your heart, lean not on your own understanding. Where are you leaning on your own understanding right now?", "Proverbs 31 describes a woman of valor. Which characteristics stand out to you?", "Ecclesiastes calls most pursuits 'vanity.' What does it mean that so much of what we chase is ultimately empty?", "'Fear God and keep His commandments \u2014 this is the whole duty of man.' How does that simplify life?"] },
      days: [
        { day: "Monday", summary: "Proverbs 1\u20139: Wisdom is personified as a woman crying in the streets \u2014 'How long will you love simplicity?' The first nine chapters are a father's extended address to his son about wisdom, discipline, and avoiding foolish choices. 'Trust in the Lord with all thine heart and lean not unto thine own understanding.' The fear of the Lord is the beginning of wisdom.", scripture: "Proverbs 3:5\u20137", keyPrinciple: "Trust in the Lord with all your heart. Lean not on your own understanding. In all your ways acknowledge Him.", reflect: "Where is your own understanding currently competing with God's direction?", pray: "Surrender your understanding about one specific decision to God.", act: "Make one decision today by asking God first instead of figuring it out yourself.", dailyQuote: { text: "Trust in the Lord with all thine heart; and lean not unto thine own understanding. In all thy ways acknowledge him, and he shall direct thy paths.", source: "Proverbs 3:5\u20136" }, resources: [{ title: "Trust in the Lord with All Your Heart", url: "https://www.churchofjesuschrist.org/study/general-conference/2022/04/27bednar", type: "General Conference", who: "Elder David A. Bednar" }, { title: "Don't Miss This \u2014 Proverbs", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }, { title: "FSY: Education and Learning", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/10education-and-learning", type: "FSY Handbook", who: "For the Strength of Youth", note: "Today's reading features wisdom or the cost of ignoring instruction. This section encourages learning as a lifelong spiritual discipline." }] },
        { day: "Wednesday", summary: "Proverbs 31: The virtuous woman \u2014 a poem in the original Hebrew that forms an acrostic using every letter of the alphabet. She rises while it is still night. She plants a vineyard with her own hands. She extends her hands to the poor. Her husband is known in the gates. Strength and honor are her clothing. She shall rejoice in time to come.", scripture: "Proverbs 31:25\u201326, 30", keyPrinciple: "Strength and honour are her clothing. She speaketh with wisdom. Favour is deceitful, beauty is vain \u2014 a woman that feareth the Lord shall be praised.", reflect: "Which qualities of the Proverbs 31 woman do you most want to cultivate?", pray: "Ask God to develop in you the character of a woman who fears Him.", act: "Pick one quality from Proverbs 31 and intentionally practice it today.", dailyQuote: { text: "Strength and honour are her clothing... and in her tongue is the law of kindness.", source: "Proverbs 31:25\u201326" }, resources: [{ title: "The Virtuous Woman \u2014 Proverbs 31", url: "https://www.saintsunscripted.com", type: "Podcast", who: "Saints Unscripted" }, { title: "A Mother's Influence", url: "https://www.churchofjesuschrist.org/study/general-conference/2010/05/mothers-who-know", type: "General Conference", who: "Sister Julie B. Beck" }, { title: "FSY: Relationships", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/06relationships", type: "FSY Handbook", who: "For the Strength of Youth", note: "Today's reading involves a key relationship between people or between a person and God. This FSY section explores what healthy, God-centered relationships look like." }] },
        { day: "Friday", summary: "Ecclesiastes 1\u201312: Qoheleth \u2014 the Preacher \u2014 has tried everything: wisdom, pleasure, work, wealth. Vanity of vanities. The Preacher's conclusion after searching everywhere: 'Fear God and keep his commandments, for this is the whole duty of man. God will bring every deed into judgment.' Everything else is chasing after wind.", scripture: "Ecclesiastes 3:1\u20134", keyPrinciple: "To everything there is a season \u2014 a time for every purpose under heaven. God ordains the rhythms of life.", reflect: "What season are you in right now? What does that season require of you?", pray: "Ask God to help you be present in your current season rather than wishing for another.", act: "Name your current season and write one thing God might be doing in it.", dailyQuote: { text: "To every thing there is a season, and a time to every purpose under the heaven.", source: "Ecclesiastes 3:1" }, resources: [{ title: "To Everything a Season \u2014 Ecclesiastes", url: "https://www.saintsunscripted.com", type: "Podcast", who: "Saints Unscripted" }, { title: "A Fortunate Fall \u2014 Finding Meaning", url: "https://www.churchofjesuschrist.org/study/general-conference/2012/04/the-miracle-of-the-atonement", type: "General Conference", who: "Elder C. Scott Grow" }, { title: "FSY: Living the Gospel", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/12living-the-gospel", type: "FSY Handbook", who: "For the Strength of Youth", note: "Today's reading illustrates what it looks like to live the gospel fully \u2014 or to drift from it. This section describes what it means to be an active disciple in everyday life." }] },
        { day: "Saturday", scripture: "Ecclesiastes 12:13\u201314", keyPrinciple: "Fear God and keep His commandments \u2014 this is the whole duty of man. Everything else is secondary.", reflect: "After everything Ecclesiastes calls vanity, what remains? How does that simplify your life?", pray: "Recommit to the simple core: fear God and keep His commandments.", act: "Clear one thing from your life that is vanity \u2014 consuming time or energy without meaning.", dailyQuote: { text: "Fear God, and keep his commandments: for this is the whole duty of man.", source: "Ecclesiastes 12:13" } }
      ]
    },

      theme: "Isaiah saw Christ more clearly than almost anyone. Though your sins be as scarlet, they shall be white as snow.",
      resources: [{ title: "Come Unto Me", url: "https://www.churchofjesuschrist.org/study/general-conference/2016/04/come-unto-me", type: "General Conference", who: "Elder Robert D. Hales" }, { title: "Don't Miss This \u2014 Isaiah 1\u201312", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }, { title: "Isaiah for Latter-day Saints", url: "https://www.saintsunscripted.com", type: "Podcast", who: "Saints Unscripted" }],
      ywPrep: { summary: "Isaiah is the most quoted Old Testament prophet in the New Testament and by Jesus Himself. His first chapters call Israel to reason with God: 'Though your sins be as scarlet, they shall be as white as snow.' He saw the Savior's ministry centuries before it happened. Isaiah 6: he saw God's glory, felt undone, was cleansed with a coal, and said 'Here am I, send me.'", prompts: ["Isaiah 1:18: 'Though your sins be as scarlet, they shall be as white as snow.' What does that imagery mean to you?", "Isaiah saw the Lord and said 'I am undone' \u2014 then was cleansed. What does that pattern teach about repentance?", "Isaiah said 'Here am I, send me.' What is God sending you to do right now?", "Isaiah 9:6 names Christ Wonderful Counselor, Mighty God, Everlasting Father, Prince of Peace. Which title means most to you?"] },
      days: [
        { day: "Monday", summary: "Isaiah 1\u20135: Isaiah begins with a devastating indictment of Israel \u2014 a nation that has rebelled, a people laden with iniquity, children who have forsaken the Lord. 'Come now, let us reason together, saith the Lord: though your sins be as scarlet, they shall be as white as snow.' But Israel continues chasing idols. The vineyard song: God planted Israel as a choice vine. Why did it bring forth wild grapes?", scripture: "Isaiah 1:18", keyPrinciple: "Come now, let us reason together: though your sins be as scarlet, they shall be as white as snow. God invites dialogue.", reflect: "What does it mean to reason together with God rather than just confess to Him?", pray: "Have a real conversation with God today \u2014 not just a list of requests.", act: "Write a letter to God reasoning through something you are struggling with.", dailyQuote: { text: "Come now, and let us reason together, saith the Lord: though your sins be as scarlet, they shall be as white as snow.", source: "Isaiah 1:18" }, resources: [{ title: "Come unto Me", url: "https://www.churchofjesuschrist.org/study/general-conference/2016/04/come-unto-me", type: "General Conference", who: "Elder Robert D. Hales" }, { title: "Don't Miss This \u2014 Isaiah 1\u20135", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }, { title: "FSY: Covenant Path", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/02covenant-path", type: "FSY Handbook", who: "For the Strength of Youth", note: "Covenants are the backbone of today's reading. This section explains what it means to be on the covenant path and how every ordinance connects us more deeply to God." }] },
        { day: "Wednesday", summary: "Isaiah 6: Isaiah's call. He sees the Lord on a throne, high and lifted up. Seraphim surround the throne crying 'Holy, holy, holy.' Isaiah says: 'Woe is me! I am a man of unclean lips.' A seraph flies to him with a coal from the altar and touches his mouth \u2014 'Thine iniquity is taken away.' Then God says: 'Whom shall I send?' Isaiah: 'Here am I; send me.'", scripture: "Isaiah 6:1\u20138", keyPrinciple: "Isaiah saw God, felt completely undone, was cleansed, and immediately volunteered. Repentance leads to readiness.", reflect: "When have you felt most aware of your own unworthiness \u2014 and what did God do with that?", pray: "Ask God to cleanse one specific thing in your life and make you ready.", act: "Say 'Here am I, send me' as a prayer of genuine availability today.", dailyQuote: { text: "Also I heard the voice of the Lord, saying, Whom shall I send, and who will go for us? Then said I, Here am I; send me.", source: "Isaiah 6:8" }, resources: [{ title: "Here Am I, Send Me", url: "https://www.churchofjesuschrist.org/study/general-conference/2014/10/are-you-sleeping-through-the-restoration", type: "General Conference", who: "President Dieter F. Uchtdorf" }, { title: "Don't Miss This \u2014 Isaiah 6 (The Call)", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }, { title: "FSY: Agency and Integrity", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/04agency-and-integrity", type: "FSY Handbook", who: "For the Strength of Youth", note: "Agency is at the heart of today's reading. God gives commandments but never forces obedience \u2014 the choice is always ours. This section explores how to make choices aligned with God's will." }] },
        { day: "Friday", summary: "Isaiah 9\u201312: Isaiah prophesies of a child who will be born \u2014 'Wonderful, Counsellor, the Mighty God, the Everlasting Father, the Prince of Peace.' His government shall know no end. Then Isaiah 11: a shoot from the stump of Jesse \u2014 the Messiah. 'He shall not judge after the sight of his eyes.' The wolf shall lie down with the lamb. Isaiah 12: 'With joy shall ye draw water out of the wells of salvation.'", scripture: "Isaiah 9:6\u20137", keyPrinciple: "Wonderful Counselor, Mighty God, Everlasting Father, Prince of Peace. Isaiah described Christ seven centuries early.", reflect: "Which title for Christ do you need most right now?", pray: "Address God by the name you most need today. Let that name shape your prayer.", act: "Study one of Isaiah's four titles for Christ and what it means for you personally.", dailyQuote: { text: "For unto us a child is born, unto us a son is given... and his name shall be called Wonderful, Counsellor, The mighty God, The everlasting Father, The Prince of Peace.", source: "Isaiah 9:6" }, resources: [{ title: "Wonderful Counselor, Mighty God, Everlasting Father, Prince of Peace", url: "https://www.churchofjesuschrist.org/study/general-conference/2014/04/the-living-christ", type: "General Conference", who: "Elder Jeffrey R. Holland" }, { title: "Don't Miss This \u2014 Isaiah 9\u201312", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }, { title: "FSY: Covenant Path", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/02covenant-path", type: "FSY Handbook", who: "For the Strength of Youth", note: "Covenants are the backbone of today's reading. This section explains what it means to be on the covenant path and how every ordinance connects us more deeply to God." }] },
        { day: "Saturday", scripture: "Isaiah 11:1\u20133, 9", keyPrinciple: "A stem of Jesse \u2014 Christ \u2014 will arise. The earth shall be full of the knowledge of the Lord as the waters cover the sea.", reflect: "What does it look like for your home to be full of the knowledge of the Lord?", pray: "Ask God to fill your home with His knowledge and presence.", act: "Do one thing today to fill your space with the knowledge of God.", dailyQuote: { text: "They shall not hurt nor destroy in all my holy mountain: for the earth shall be full of the knowledge of the Lord, as the waters cover the sea.", source: "Isaiah 11:9" } }
      ]
    },
    {
      week: 39,
      dates: "Sep 21\u201327",
      ref: "Isaiah 13\u201314; 22; 24\u201330; 35",
      title: "God Is My Salvation",
      theme: "God is my salvation \u2014 I will trust and not be afraid. The wilderness shall rejoice and blossom.",
      resources: [{ title: "God Is My Salvation", url: "https://www.churchofjesuschrist.org/study/general-conference/2016/10/god-is-my-salvation", type: "General Conference", who: "Elder Wilford W. Andersen" }, { title: "Don't Miss This \u2014 Isaiah 13\u201314; 24\u201330; 35", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }],
      ywPrep: { summary: "Isaiah 13\u201335 moves between warnings of judgment on wicked nations and beautiful promises of redemption. 'Thou wilt keep him in perfect peace, whose mind is stayed on thee.' The desert shall blossom as the rose. God turning wastelands into gardens. Amid the dark passages, Isaiah keeps returning to light.", prompts: ["Isaiah 26:3 promises perfect peace to those whose minds are stayed on God. What does keeping your mind stayed on God look like practically?", "Isaiah 35 describes the desert blossoming. What desolation in your life do you hope God will blossom?", "Isaiah 12:2: 'God is my salvation; I will trust and not be afraid.' What fear do you need to hand to Him today?", "Isaiah 25:8: God will swallow up death in victory and wipe away all tears. What tears do you most need Him to wipe away?"] },
      days: [
        { day: "Monday", summary: "Isaiah 13\u201314; 24\u201328: Isaiah's oracles against Babylon, Assyria, and the nations. Then apocalyptic visions \u2014 the earth will be shaken, the moon will be ashamed. But in the midst of judgment: 'Thou wilt keep him in perfect peace whose mind is stayed on thee.' Isaiah 25: 'He will swallow up death in victory. The Lord God will wipe away tears from all faces.'", scripture: "Isaiah 12:2", keyPrinciple: "God is my salvation; I will trust and not be afraid. The Lord Jehovah is my strength and my song.", reflect: "When you are afraid, what do you return to? What is your song?", pray: "Sing or speak Isaiah 12:2 as your declaration today.", act: "Write your own short declaration of trust based on Isaiah 12:2.", dailyQuote: { text: "Behold, God is my salvation; I will trust, and not be afraid: for the Lord Jehovah is my strength and my song.", source: "Isaiah 12:2" }, resources: [{ title: "God Is My Salvation \u2014 Isaiah's Witness", url: "https://www.saintsunscripted.com", type: "Podcast", who: "Saints Unscripted" }, { title: "Don't Miss This \u2014 Isaiah 13\u201314; 24\u201330", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }, { title: "FSY: Covenant Path", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/02covenant-path", type: "FSY Handbook", who: "For the Strength of Youth", note: "Covenants are the backbone of today's reading. This section explains what it means to be on the covenant path and how every ordinance connects us more deeply to God." }] },
        { day: "Wednesday", summary: "Isaiah 29\u201333: Woe to those who hide their plans from God. 'Ye have said: we have made a covenant with death, and with hell we have agreement.' God mocks their false security. Then promises: the blind shall see, the deaf shall hear, the lame shall leap. 'In quietness and in confidence shall be your strength. Return unto me, for I have redeemed thee.'", scripture: "Isaiah 26:3\u20134", keyPrinciple: "Thou wilt keep him in perfect peace whose mind is stayed on thee. Peace is a product of where your mind rests.", reflect: "Where does your mind go when you are anxious? What does staying it on God look like practically?", pray: "Practice redirecting your mind to God every time anxiety rises today.", act: "Set a reminder three times today: mind stayed on God.", dailyQuote: { text: "Thou wilt keep him in perfect peace, whose mind is stayed on thee: because he trusteth in thee.", source: "Isaiah 26:3" }, resources: [{ title: "Peace of Conscience and Peace of Mind", url: "https://www.churchofjesuschrist.org/study/general-conference/2004/04/peace-of-conscience-and-peace-of-mind", type: "General Conference", who: "Elder Boyd K. Packer" }, { title: "Thou Wilt Keep Him in Perfect Peace", url: "https://www.saintsunscripted.com", type: "Podcast", who: "Saints Unscripted" }, { title: "FSY: Physical Health", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/08physical-health", type: "FSY Handbook", who: "For the Strength of Youth", note: "Today's reading involves the physical body \u2014 its limits or miraculous capacity. This section teaches that the body is sacred and how we treat it reflects what we believe." }] },
        { day: "Friday", summary: "Isaiah 35: A vision of the redeemed. 'The wilderness and the solitary place shall be glad for them. The desert shall rejoice and blossom as the rose.' Then: 'The eyes of the blind shall be opened, the ears of the deaf shall be unstopped. The lame shall leap as a hart, the tongue of the dumb shall sing.' And the ransomed of the Lord shall return with songs and everlasting joy.", scripture: "Isaiah 35:1\u20134", keyPrinciple: "The wilderness shall blossom as a rose. Desolation becomes garden. God specializes in reversals.", reflect: "What is the wilderness in your life that you are trusting God to blossom?", pray: "Ask God for one specific blossoming \u2014 a reversal of something desolate.", act: "Plant something today \u2014 literally or figuratively \u2014 as an act of faith in future growth.", dailyQuote: { text: "The wilderness and the solitary place shall be glad for them; and the desert shall rejoice, and blossom as the rose.", source: "Isaiah 35:1" }, resources: [{ title: "The Desert Shall Blossom \u2014 Isaiah's Hope", url: "https://www.saintsunscripted.com", type: "Podcast", who: "Saints Unscripted" }, { title: "Don't Miss This \u2014 Isaiah 35", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }, { title: "FSY: Living the Gospel", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/12living-the-gospel", type: "FSY Handbook", who: "For the Strength of Youth", note: "Today's reading illustrates what it looks like to live the gospel fully \u2014 or to drift from it. This section describes what it means to be an active disciple in everyday life." }] },
        { day: "Saturday", scripture: "Isaiah 25:8", keyPrinciple: "God will swallow up death in victory and wipe away all tears from all faces. This is the end of the story.", reflect: "What tears do you most need God to wipe away? How does resurrection hope change how you carry them now?", pray: "Bring your grief or sorrow to God today. He is the God who wipes tears.", act: "Write about a loss or sorrow and what it means that God will wipe that tear away.", dailyQuote: { text: "He will swallow up death in victory; and the Lord God will wipe away tears from off all faces.", source: "Isaiah 25:8" } }
      ]
    },
    {
      week: 40,
      dates: "Sep 28\u2013Oct 4",
      ref: "Isaiah 40\u201349",
      title: "Comfort Ye My People",
      theme: "Comfort ye. They that wait upon the Lord shall renew their strength. Fear not \u2014 I have called thee by name.",
      resources: [{ title: "Waiting on the Road to Damascus", url: "https://www.churchofjesuschrist.org/study/general-conference/2011/04/waiting-on-the-road-to-damascus", type: "General Conference", who: "President Dieter F. Uchtdorf" }, { title: "Don't Miss This \u2014 Isaiah 40\u201349", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }],
      ywPrep: { summary: "Isaiah 40\u201349 \u2014 often called Deutero-Isaiah \u2014 contains the most beautiful promises in scripture. 'Comfort ye, comfort ye my people.' 'They that wait upon the Lord shall renew their strength.' 'Fear not \u2014 I have called thee by name; thou art mine.' These chapters were written to people in captivity who needed to know God had not forgotten them.", prompts: ["Isaiah 40:28\u201331 promises strength to the weary. Where are you weary? What does waiting upon the Lord look like for you?", "Isaiah 40:11 says God will gently lead those that are with young. What does God's gentleness with you look like right now?", "Isaiah 43:1\u20133 says God calls us by name and we are His. What does being called by name change?", "Isaiah 43:25: 'I, even I, am he that blotteth out thy transgressions, for mine own sake.' Why does God forgive for His own sake?"] },
      days: [
        { day: "Monday", summary: "Isaiah 40\u201344: The great comfort chapters. 'Comfort ye, comfort ye my people, saith your God.' 'He that waiteth upon the Lord shall renew their strength. They shall mount up with wings as eagles, they shall run and not be weary.' Then God names Cyrus \u2014 by name, a century before his birth \u2014 as the one who will give permission for Israel to return from exile. 'Fear not, for I have redeemed thee; I have called thee by name; thou art mine.'", scripture: "Isaiah 40:1, 11, 29\u201331", keyPrinciple: "Comfort ye. God feeds His flock like a shepherd. He gives strength to the weary who wait on Him.", reflect: "Which part do you need most today \u2014 comfort, gentle shepherding, or strength for the weary?", pray: "Receive God's specific comfort for what you are carrying today.", act: "Rest in Isaiah 40 for fifteen minutes. Read it slowly. Let it be enough.", dailyQuote: { text: "They that wait upon the Lord shall renew their strength; they shall mount up with wings as eagles.", source: "Isaiah 40:31" }, resources: [{ title: "Comfort for Those Who Mourn", url: "https://www.churchofjesuschrist.org/study/general-conference/2013/04/lift-up-your-heart-and-rejoice", type: "General Conference", who: "Elder Quentin L. Cook" }, { title: "Don't Miss This \u2014 Isaiah 40\u201344", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }, { title: "FSY: Living the Gospel", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/12living-the-gospel", type: "FSY Handbook", who: "For the Strength of Youth", note: "Today's reading illustrates what it looks like to live the gospel fully \u2014 or to drift from it. This section describes what it means to be an active disciple in everyday life." }] },
        { day: "Wednesday", summary: "Isaiah 43\u201346: God says: 'I, even I, am he that blotteth out thy transgressions for mine own sake, and will not remember thy sins.' Then lists of false gods that cannot see, hear, or save \u2014 they are carried, unable to move. But God says: 'Before me no god was formed, neither shall there be after me. I, even I, am the Lord; and beside me there is no saviour.'", scripture: "Isaiah 43:1\u20134", keyPrinciple: "Fear not, I have called thee by thy name. Thou art mine. When thou passest through waters, I will be with thee.", reflect: "What waters \u2014 flood, fire, hard place \u2014 are you passing through right now?", pray: "Receive God's declaration: Thou art mine. Let it settle in your heart.", act: "Write Isaiah 43:2\u20133 with your own name inserted into it.", dailyQuote: { text: "Fear not: for I have redeemed thee, I have called thee by thy name; thou art mine.", source: "Isaiah 43:1" }, resources: [{ title: "Called by His Name", url: "https://www.churchofjesuschrist.org/study/general-conference/2018/04/called-to-heal", type: "General Conference", who: "Elder Gerrit W. Gong" }, { title: "Don't Miss This \u2014 Isaiah 43 (Fear Not)", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }, { title: "FSY: Covenant Path", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/02covenant-path", type: "FSY Handbook", who: "For the Strength of Youth", note: "Covenants are the backbone of today's reading. This section explains what it means to be on the covenant path and how every ordinance connects us more deeply to God." }] },
        { day: "Friday", summary: "Isaiah 47\u201349: The fall of Babylon \u2014 she sat as a queen, she thought she would be a lady forever. Then God speaks to scattered Israel: 'Can a woman forget her sucking child? Yea, she may forget, yet will I not forget thee. Behold, I have graven thee upon the palms of my hands.' Your name is written on God's hands.", scripture: "Isaiah 44:22; 43:25", keyPrinciple: "I have blotted out thy transgressions as a thick cloud. Return unto me, for I have redeemed thee.", reflect: "What sin or shame have you been carrying that God says He has blotted out like a cloud?", pray: "Receive God's forgiveness today. Stop carrying what He has already removed.", act: "Write one burden of shame that God says He has already erased. Then cross it out.", dailyQuote: { text: "I have blotted out, as a thick cloud, thy transgressions, and, as a cloud, thy sins: return unto me; for I have redeemed thee.", source: "Isaiah 44:22" }, resources: [{ title: "He Will Take You Back", url: "https://www.churchofjesuschrist.org/study/general-conference/2015/04/he-will-take-you-back", type: "General Conference", who: "Elder Jose L. Alonso" }, { title: "Don't Miss This \u2014 Isaiah 47\u201349", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }, { title: "FSY: Repentance and Forgiveness", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/05repentance-and-forgiveness", type: "FSY Handbook", who: "For the Strength of Youth", note: "Today's reading shows someone facing consequences of sin \u2014 or being given a second chance. This FSY section teaches that repentance is always available and God's mercy can cover any mistake." }] },
        { day: "Saturday", scripture: "Isaiah 49:15\u201316", keyPrinciple: "Can a mother forget her nursing child? God says: I will not forget thee. Behold, I have graven thee on the palms of my hands.", reflect: "What does it mean that God has your name engraved on His hands?", pray: "Rest in the fact that God cannot forget you \u2014 you are engraved on His hands.", act: "Write what it means to you personally that God cannot forget you.", dailyQuote: { text: "I will not forget thee. Behold, I have graven thee upon the palms of my hands.", source: "Isaiah 49:15\u201316" } }
      ]
    },
    {
      week: 41,
      dates: "Oct 5\u201311",
      ref: "Isaiah 50\u201357",
      title: "He Was Wounded for Our Transgressions",
      theme: "He was wounded for our transgressions. Isaiah 53 is the clearest prophecy of the Atonement in the Old Testament.",
      resources: [{ title: "His Suffering: The Atonement of Jesus Christ", url: "https://www.churchofjesuschrist.org/study/general-conference/2014/04/he-is-risen", type: "General Conference", who: "Elder D. Todd Christofferson" }, { title: "Don't Miss This \u2014 Isaiah 50\u201357", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }],
      ywPrep: { summary: "Isaiah 50\u201357 contains Isaiah 53 \u2014 the Suffering Servant \u2014 the most direct prophecy of the Atonement in the entire Old Testament. Written 700 years before it happened. 'He was wounded for our transgressions, he was bruised for our iniquities: the chastisement of our peace was upon him; and with his stripes we are healed.' Every verse points to Jesus Christ.", prompts: ["Isaiah 53 describes Christ's suffering in past tense, written centuries before it happened. What verse hits you hardest?", "'He hath borne our griefs and carried our sorrows.' What grief is He carrying for you right now?", "Isaiah 55:1: Come, buy and eat without money. What does it mean that God's invitation is free?", "Isaiah 55:8\u20139: My thoughts are higher than your thoughts. When has that been comforting rather than frustrating?"] },
      days: [
        { day: "Monday", summary: "Isaiah 50\u201353: The Servant Songs. Isaiah describes a suffering servant who will be exalted. 'He hath no form nor comeliness. He was despised and rejected of men, a man of sorrows, acquainted with grief.' Then: 'He was wounded for our transgressions. He was bruised for our iniquities. The chastisement of our peace was upon him. With his stripes we are healed.' This is the most direct prophecy of Christ's atonement in the Old Testament.", scripture: "Isaiah 53:3\u20135", keyPrinciple: "He was despised and rejected. He bore our griefs. He was wounded for our transgressions. Written 700 years early.", reflect: "Which phrase from Isaiah 53 hits you hardest right now? Why?", pray: "Read Isaiah 53 as a prayer of gratitude to the Savior.", act: "Memorize Isaiah 53:5 this week.", dailyQuote: { text: "He was wounded for our transgressions, he was bruised for our iniquities: the chastisement of our peace was upon him; and with his stripes we are healed.", source: "Isaiah 53:5" }, resources: [{ title: "He Was Wounded for Our Transgressions", url: "https://www.churchofjesuschrist.org/study/general-conference/2014/04/where-justice-love-and-mercy-meet", type: "General Conference", who: "Elder Jeffrey R. Holland" }, { title: "Don't Miss This \u2014 Isaiah 50\u201353", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }, { title: "FSY: Repentance and Forgiveness", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/05repentance-and-forgiveness", type: "FSY Handbook", who: "For the Strength of Youth", note: "Today's reading shows someone facing consequences of sin \u2014 or being given a second chance. This FSY section teaches that repentance is always available and God's mercy can cover any mistake." }] },
        { day: "Wednesday", summary: "Isaiah 53\u201354: The servant's suffering continues \u2014 'He was oppressed and afflicted, yet he opened not his mouth. He was led as a lamb to the slaughter.' Then the outcome: 'He shall see of the travail of his soul and shall be satisfied.' Then Isaiah 54: 'For a small moment have I forsaken thee, but with great mercies will I gather thee. With everlasting kindness will I have mercy on thee, saith the Lord thy Redeemer.'", scripture: "Isaiah 53:6\u20137", keyPrinciple: "All we like sheep have gone astray. He was brought as a lamb to the slaughter and opened not his mouth.", reflect: "How does the image of the silent lamb going to slaughter deepen your understanding of the Atonement?", pray: "Thank Christ for His silent willingness to bear what you deserved.", act: "Sit quietly with Isaiah 53:6\u20137 for ten minutes. No agenda. Just receive.", dailyQuote: { text: "All we like sheep have gone astray; we have turned every one to his own way; and the Lord hath laid on him the iniquity of us all.", source: "Isaiah 53:6" }, resources: [{ title: "The Atonement \u2014 The Gift No Man Can Repay", url: "https://www.churchofjesuschrist.org/study/general-conference/2015/04/the-gift-of-grace", type: "General Conference", who: "President Dieter F. Uchtdorf" }, { title: "Isaiah 53 \u2014 The Suffering Servant", url: "https://www.saintsunscripted.com", type: "Podcast", who: "Saints Unscripted" }, { title: "FSY: Covenant Path", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/02covenant-path", type: "FSY Handbook", who: "For the Strength of Youth", note: "Covenants are the backbone of today's reading. This section explains what it means to be on the covenant path and how every ordinance connects us more deeply to God." }] },
        { day: "Friday", summary: "Isaiah 55\u201357: The great invitation. 'Ho, every one that thirsteth, come ye to the waters. He that hath no money, come ye, buy and eat.' 'Seek ye the Lord while he may be found, call ye upon him while he is near.' 'My thoughts are not your thoughts, neither are your ways my ways, saith the Lord. For as the heavens are higher than the earth, so are my ways higher than your ways.'", scripture: "Isaiah 55:1\u20133", keyPrinciple: "Come, buy and eat \u2014 without money. God's invitation is free. The best things He offers cannot be purchased.", reflect: "What does it mean that God's most important gifts cannot be earned or purchased?", pray: "Come to God today without trying to earn it. Just come.", act: "Do one thing today simply because God invited you \u2014 without calculating whether you deserve it.", dailyQuote: { text: "Ho, every one that thirsteth, come ye to the waters, and he that hath no money; come ye, buy, and eat.", source: "Isaiah 55:1" }, resources: [{ title: "All of Grace", url: "https://www.churchofjesuschrist.org/study/general-conference/2014/10/spiritual-whirlwinds", type: "General Conference", who: "Elder Neil L. Andersen" }, { title: "Don't Miss This \u2014 Isaiah 55 (Come to the Waters)", url: "https://www.youtube.com/c/DontMissThis", type: "Podcast", who: "Don't Miss This" }, { title: "FSY: Covenant Path", url: "https://www.churchofjesuschrist.org/study/manual/for-the-strength-of-youth/2022/01/02covenant-path", type: "FSY Handbook", who: "For the Strength of Youth", note: "Covenants are the backbone of today's reading. This section explains what it means to be on the covenant path and how every ordinance connects us more deeply to God." }] },
        { day: "Saturday", scripture: "Isaiah 55:8\u20139", keyPrinciple: "My thoughts are not your thoughts, my ways are not your ways. God is higher than our understanding.", reflect: "When has trusting that God's ways are higher brought you comfort rather than frustration?", pray: "Surrender one situation you don't understand to a God whose ways are higher than yours.", act: "Write one thing you don't understand right now. Then write: 'His ways are higher than mine.'", dailyQuote: { text: "For my thoughts are not your thoughts, neither are your ways my ways, saith the Lord.", source: "Isaiah 55:8" } }
      ]
